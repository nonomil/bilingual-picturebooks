<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steve vs The Wither — 朗读版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body { font-family: 'Nunito', sans-serif; background:#1a1a2e; 
         display:flex; flex-direction:column; overflow:hidden; }

  /* 顶部导航 */
  .top-nav { position:fixed; top:0; left:0; right:0; z-index:100;
             background:rgba(26,26,46,.95); backdrop-filter:blur(10px);
             padding:12px 20px; display:flex; align-items:center; justify-content:space-between;
             border-bottom:1px solid rgba(255,255,255,.1); }
  .top-nav .title { color:#fff; font-size:18px; font-weight:600; }
  .top-nav .back-btn { color:#fff; text-decoration:none; font-size:14px;
                       opacity:.8; transition:opacity .2s; }
  .top-nav .back-btn:hover { opacity:1; }

  /* 主内容区 */
  .main-content { flex:1; display:flex; flex-direction:column; 
                  padding:70px 20px 180px; overflow-y:auto; }

  /* 全幅图片 */
  .full-img-wrap { width:100%; max-width:700px; margin:0 auto 20px; }
  .full-img { width:100%; border-radius:16px; 
              box-shadow:0 8px 32px rgba(0,0,0,.3); display:block; }

  /* 文本区域 */
  .text-section { max-width:700px; margin:0 auto; width:100%; }
  .en-text { font-size:20px; line-height:1.8; color:#fff; 
             background:rgba(255,255,255,.1); padding:16px; 
             border-radius:12px; margin-bottom:12px; }
  .word { cursor:pointer; border-radius:4px; padding:0 2px;
          transition: background .15s; display:inline; }
  .word:hover { background:#ffd166; color:#000; }
  .word.speaking { background:#ff6b6b; color:#fff; }

.zh-text { font-size:17px; color:rgba(255,255,255,.8); 
            background:rgba(255,255,255,.05); padding:12px 16px; 
            border-radius:10px; margin-bottom:16px; }

  /* 词汇区域 */
  .vocab-section { margin-top:16px; }
  .vocab-section .label { font-size:13px; color:#4ecdc4; margin-bottom:8px; }
  .vocab-row { display:flex; flex-wrap:wrap; gap:8px; }
  .vocab-card { background:rgba(78,205,196,.15); border:1px solid rgba(78,205,196,.3);
                border-radius:20px; padding:6px 14px; font-size:14px;
                cursor:pointer; transition:all .15s; }
  .vocab-card:hover { background:rgba(78,205,196,.3); transform:scale(1.02); }
  .vocab-card .vw { font-weight:700; color:#4ecdc4; margin-right:6px; }
  .vocab-card .vp { font-size:12px; color:#888; }
  .vocab-card .vz { margin-left:6px; color:rgba(255,255,255,.7); }

  /* 词组区域 */
  .phrase-section { margin-top:16px; }
  .phrase-section .label { font-size:13px; color:#ffd166; margin-bottom:8px; }
  .phrase-row { display:flex; flex-wrap:wrap; gap:8px; }
  .phrase-card { background:rgba(255,209,102,.15); border:1px solid rgba(255,209,102,.3);
                 border-radius:20px; padding:6px 14px; font-size:14px;
                 cursor:pointer; transition:all .15s; }
  .phrase-card:hover { background:rgba(255,209,102,.3); transform:scale(1.02); }
  .phrase-card .pen { color:#ffd166; margin-right:6px; }
  .phrase-card .pzh { color:rgba(255,255,255,.7); margin-left:6px; }

  /* 词汇卡片 - 底部悬浮 */
  .vocab-bar { position:fixed; bottom:0; left:0; right:0; 
               background:rgba(15,15,30,.98); backdrop-filter:blur(10px);
               border-top:1px solid rgba(255,255,255,.1);
               padding:16px 20px; max-height:160px; overflow-y:auto; }
  .vocab-bar .bar-title { font-size:13px; color:#888; margin-bottom:10px; }
  .vocab-row { display:flex; flex-wrap:wrap; gap:10px; }
  .vocab-card { background:rgba(255,255,255,.08); border-radius:10px; 
                padding:8px 12px; cursor:pointer;
                transition: all .15s; min-width:150px; flex:1 1 calc(50% - 10px); }
  .vocab-card:hover { background:rgba(255,255,255,.15); transform:scale(1.02); }
  .vocab-card .vw { font-size:15px; font-weight:700; color:#4ecdc4; margin-right:6px; }
  .vocab-card .vp { font-size:12px; color:#888; }
  .vocab-card .vz { font-size:14px; color:#fff; margin-top:2px; }
  .vocab-card .v-line { display:flex; align-items:baseline; gap:6px; }

  /* 底部导航 */
  .bottom-nav { position:fixed; bottom:160px; left:0; right:0;
                display:flex; align-items:center; justify-content:space-between;
                padding:0 20px; pointer-events:none; }
  .nav-btn { background:rgba(255,255,255,.15); color:#fff; border:none;
             border-radius:50px; padding:12px 24px; font-size:16px;
             cursor:pointer; transition: all .15s; pointer-events:auto;
             backdrop-filter:blur(10px); }
  .nav-btn:hover { background:rgba(255,255,255,.25); }
  .nav-btn:disabled { opacity:.3; pointer-events:none; }
  .page-indicator { color:rgba(255,255,255,.6); font-size:14px; }

  /* 速度控制 */
  .speed-bar { position:fixed; bottom:170px; right:20px;
               background:rgba(0,0,0,.6); border-radius:20px; padding:6px 12px;
               display:flex; align-items:center; gap:8px; z-index:50; }
  .speed-bar label { color:#888; font-size:12px; }
  .speed-bar select { background:rgba(255,255,255,.1); color:#fff; 
                      border:none; border-radius:12px; padding:4px 8px; font-size:12px; }

  .read-fab { position:fixed; bottom:220px; right:20px;
              width:56px; height:56px; border-radius:50%;
              background:linear-gradient(135deg, #ff6b6b, #ff8e53);
              border:none; color:#fff; font-size:24px; cursor:pointer;
              box-shadow:0 4px 20px rgba(255,107,107,.4);
              z-index:50; transition:transform .2s; }
  .read-fab:hover { transform:scale(1.1); }
</style>
</head>
<body>
  <nav class="top-nav">
    <a href="../../" class="back-btn">← 返回首页</a>
    <span class="title">Steve vs The Wither</span>
    <span></span>
  </nav>

  <div class="main-content">
    <div class="full-img-wrap">
      <img class="full-img" id="pageImg" src="" alt="">
    </div>
    <div class="text-section">
      <div class="en-text" id="enText"></div>
      <div class="zh-text" id="zhText"></div>
      
      <!-- 词汇区域 -->
      <div class="vocab-section" id="vocabSection" style="display:none;">
        <div class="label">💡 单词</div>
        <div class="vocab-row" id="vocabRow"></div>
      </div>
      
      <!-- 词组区域 -->
      <div class="phrase-section" id="phraseSection">
        <div class="label">📚 词组</div>
        <div class="phrase-row" id="phraseRow"></div>
      </div>
    </div>
  </div>

  <div class="vocab-bar">
    <div class="bar-title">💡 重点词汇（点击发音）</div>
    <div class="vocab-row" id="vocabRow"></div>
  </div>

  <div class="speed-bar">
    <label>语速</label>
    <select id="speedSelect" onchange="changeSpeed()">
      <option value="0.7">慢速</option>
      <option value="1" selected>常速</option>
      <option value="1.3">快速</option>
    </select>
  </div>

  <button class="read-fab" onclick="readCurrent()">🔊</button>

  <div class="bottom-nav">
    <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">← 上一页</button>
    <span class="page-indicator" id="pageIndicator"></span>
    <button class="nav-btn" id="nextBtn" onclick="changePage(1)">下一页 →</button>
  </div>

<script>
const PAGES = [{"img": "images/minecraft/page-2.jpg", "en": "🛩️ Steve vs The Wither — Sky Knight", "zh": "史蒂夫大战凋零 — 天空骑士", "keys": [{"w": "sky", "p": "/skaɪ/", "zh": "天空"}], "phrases": [{"en": "Steve vs The Wither", "zh": "史蒂夫大战凋零"}]}, {"img": "images/minecraft/page-3.jpg", "en": "Steve lived in a quiet village. He was a builder, a miner, and a dreamer.", "zh": "史蒂夫住在一个安静的村庄里。他是一个建造者，一个矿工，也是一个梦想家。", "keys": [{"w": "determined", "p": "/dɪˈtɜːrmɪnd/", "zh": "坚定的"}], "phrases": [{"en": "quiet village", "zh": "安静的村庄"}]}, {"img": "images/minecraft/page-4.jpg", "en": "One day, the sky turned dark. A terrible roar shook the ground. The Wither was coming.", "zh": "有一天，天空变暗了。可怕的咆哮震动了大地。凋零来了。", "keys": [{"w": "ground", "p": "/ɡraʊnd/", "zh": "大地"}], "phrases": [{"en": "the sky turned dark", "zh": "天空变暗了"}]}, {"img": "images/minecraft/page-5.jpg", "en": "Steve said he needed to fight from the sky. He began to build an airplane.", "zh": "\"我需要从天空战斗它，\"史蒂夫说。他开始建造一个从来没有人见过的东西——一架飞机。", "keys": [{"w": "airplane", "p": "/ˈerpleɪn/", "zh": "飞机"}], "phrases": [{"en": "fight it from the sky", "zh": "从天空中与它战斗"}]}, {"img": "images/minecraft/page-6.jpg", "en": "Day and night, Steve worked on his airplane. He hammered iron and attached big propellers.", "zh": "日日夜夜，史蒂夫在他的飞机上工作。他锤打铁器，弯曲木材，安装巨大的螺旋桨。", "keys": [{"w": "attach", "p": "/əˈtætʃ/", "zh": "安装"}], "phrases": [{"en": "work on his plane", "zh": "制造他的飞机"}]}, {"img": "images/minecraft/page-7.jpg", "en": "Finally it was done. A beautiful red biplane, shining in the sunlight. Steve called it Sky Knight.", "zh": "终于，它完成了。一架美丽的红色双翼飞机，在阳光下闪闪发光。史蒂夫叫它\"天空骑士\"。", "keys": [{"w": "knight", "p": "/naɪt/", "zh": "骑士"}], "phrases": [{"en": "a beautiful red biplane", "zh": "一架美丽的红色双翼飞机"}]}, {"img": "images/minecraft/page-8.jpg", "en": "The villagers gathered to watch. Steve put on his goggles and climbed into the cockpit.", "zh": "村民们聚在一起观看。史蒂夫戴上护目镜，爬进驾驶舱。", "keys": [{"w": "goggles", "p": "/ˈɡɑːɡlz/", "zh": "护目镜"}], "phrases": [{"en": "gather together to watch", "zh": "聚在一起观看"}]}, {"img": "images/minecraft/page-9.jpg", "en": "The engine roared. The propeller spun faster and faster. Then Steve was flying!", "zh": "引擎轰鸣。螺旋桨越转越快。然后，史蒂夫飞起来了！", "keys": [{"w": "engine", "p": "/ˈendʒɪn/", "zh": "引擎"}], "phrases": [{"en": "the engine roared", "zh": "引擎轰鸣"}]}, {"img": "images/minecraft/page-10.jpg", "en": "Up in the sky, everything looked different. The world was big and beautiful.", "zh": "在天空中，一切看起来都不一样了。世界很大很美。史蒂夫感觉像鸟一样自由。", "keys": [{"w": "landscape", "p": "/ˈlændskeɪp/", "zh": "风景"}], "phrases": [{"en": "look different in the sky", "zh": "在天空中看起来不一样"}]}, {"img": "images/minecraft/page-11.jpg", "en": "But soon the sky grew dark again. Purple clouds swirled ahead. Steve gripped the controls tightly.", "zh": "但很快，天空又变暗了。紫色的云在前方旋转。史蒂夫紧紧握住操纵杆。", "keys": [{"w": "control", "p": "/kənˈtroʊl/", "zh": "控制"}], "phrases": [{"en": "the sky grew dark", "zh": "天空变暗了"}]}, {"img": "images/minecraft/page-12.jpg", "en": "Then he saw it - the Wither. A giant creature with three heads and glowing blue eyes.", "zh": "然后他看到了——凋零。一个巨大的生物，有三个头，发出蓝色光芒的眼睛，黑暗的力量在它周围旋转。", "keys": [{"w": "creature", "p": "/ˈkriːtʃər/", "zh": "生物"}], "phrases": [{"en": "a giant creature", "zh": "一个巨大的生物"}]}, {"img": "images/minecraft/page-13.jpg", "en": "The Wither shot explosive skulls at Steve! He swerved left, then right. BOOM! BOOM!", "zh": "凋零向史蒂夫射出爆炸骷髅头！他向左转，然后向右转。轰！轰！天空中满是爆炸。", "keys": [{"w": "dodge", "p": "/dɑːdʒ/", "zh": "闪避"}], "phrases": [{"en": "shoot explosive skulls", "zh": "发射爆炸骷髅头"}]}, {"img": "images/minecraft/page-14.jpg", "en": "One skull came straight at him! Steve flipped his plane upside down and zoomed past it.", "zh": "一个骷髅头直冲他而来！史蒂夫把飞机翻了过来，从它旁边飞过。好险！", "keys": [{"w": "straight", "p": "/streɪt/", "zh": "直直地"}], "phrases": [{"en": "come straight at him", "zh": "直冲他而来"}]}, {"img": "images/minecraft/page-15.jpg", "en": "I need to fight back! Steve grabbed his enchanted bow with special arrows of light.", "zh": "\"我需要反击！\"史蒂夫拿起他的附魔弓。他有特殊的箭——光之箭。", "keys": [{"w": "special", "p": "/ˈspeʃl/", "zh": "特殊的"}], "phrases": [{"en": "fight back", "zh": "反击"}]}, {"img": "images/minecraft/page-16.jpg", "en": "Steve aimed carefully. He fired! Golden arrows streaked through the dark sky like shooting stars.", "zh": "史蒂夫仔细瞄准。他射箭了！金色的箭像流星一样划过黑暗的天空。", "keys": [{"w": "shooting star", "p": "/ˈʃuːtɪŋ stɑːr/", "zh": "流星"}], "phrases": [{"en": "shooting star", "zh": "流星"}]}, {"img": "images/minecraft/page-17.jpg", "en": "HIT! The arrow struck the Wither head. It screamed in pain! Blue sparks flew everywhere.", "zh": "命中！箭射中了凋零的第一个头。它痛苦地尖叫！蓝色火花四处飞溅。", "keys": [{"w": "scream", "p": "/skriːm/", "zh": "尖叫"}], "phrases": [{"en": "painful scream", "zh": "痛苦地尖叫"}]}, {"img": "images/minecraft/page-18.jpg", "en": "The Wither was furious! It grew bigger and shot skulls in every direction.", "zh": "凋零暴怒了！它变得更大，向四面八方射出骷髅头。天空变成了战场。", "keys": [{"w": "direction", "p": "/dəˈrekʃn/", "zh": "方向"}], "phrases": [{"en": "in all directions", "zh": "向四面八方"}]}, {"img": "images/minecraft/page-19.jpg", "en": "CRASH! A skull hit Steve wing. Smoke poured out. But Steve did not give up.", "zh": "砰！一个骷髅头击中了史蒂夫的机翼。烟冒了出来。飞机摇晃着。但史蒂夫没有放弃。", "keys": [{"w": "give up", "p": "/ɡɪv ʌp/", "zh": "放弃"}], "phrases": [{"en": "give up", "zh": "放弃"}]}, {"img": "images/minecraft/page-20.jpg", "en": "Steve stood up in his cockpit. He had one arrow left - his strongest one.", "zh": "史蒂夫在驾驶舱里站起来。他只剩一支箭了——他最强的一支。\"这是为了我的村庄！\"", "keys": [{"w": "village", "p": "/ˈvɪlɪdʒ/", "zh": "村庄"}], "phrases": [{"en": "my village", "zh": "我的村庄"}]}, {"img": "images/minecraft/page-20.jpg", "en": "He fired! The golden arrow split into three beams and hit all three heads at once!", "zh": "他射箭了！金色的箭笔直飞去。它分裂成三束光，同时击中了三个头！", "keys": [{"w": "epic", "p": "/ˈepɪk/", "zh": "史诗般的"}], "phrases": [{"en": "split into three beams of light", "zh": "分裂成三束光"}]}];
let cur = 0;
let currentSpeed = 1;
const synth = window.speechSynthesis;

function changeSpeed() {
  currentSpeed = parseFloat(document.getElementById('speedSelect').value);
}

function getVoice(lang) {
  const voices = synth.getVoices();
  if (!voices.length) return null;
  
  if (lang === 'zh') {
    const preferred = ['Xiaoxiao', 'Yunxi', 'Yunyang', 'Yunjian'];
    for (const p of preferred) {
      const v = voices.find(vo => vo.lang.startsWith('zh') && vo.name.includes(p));
      if (v) return v;
    }
    return voices.find(vo => vo.lang.startsWith('zh')) || null;
  } else {
    const preferred = ['Google', 'Microsoft', 'Samantha', 'Daniel', 'Karen', 'Apple', 'Amazon'];
    for (const p of preferred) {
      const v = voices.find(vo => vo.lang.startsWith('en') && vo.name.includes(p));
      if (v) return v;
    }
    return voices.find(vo => vo.lang.startsWith('en')) || null;
  }
}

function renderPage(i) {
  const p = PAGES[i];
  
  // 图片
  document.getElementById('pageImg').src = '../../' + p.img;
  
  // 英文句子 - 单词可点击
  const words = p.en.split(' ').map((w, idx) => {
    const clean = w.replace(/[.,!?':;]/g, '');
    return `<span class="word" onclick="speakWord('${clean}', this)">${w}</span>`;
  }).join(' ');
  document.getElementById('enText').innerHTML = words;
  
  // 中文
  document.getElementById('zhText').textContent = p.zh;
  
  // 词汇（如果有）放在词组前面
  const keys = p.keys || [];
  const phrases = p.phrases || [];
  
  // 先显示词汇
  if (keys.length > 0) {
    document.getElementById('vocabSection').style.display = 'block';
    document.getElementById('vocabRow').innerHTML = keys.map(k =>
      `<div class="vocab-card" onclick="speakWord('${k.w}', this)">
        <span class="vw">${k.w}</span> <span class="vp">${k.p}</span> <span class="vz">${k.zh}</span>
      </div>`
    ).join('');
  } else {
    document.getElementById('vocabSection').style.display = 'none';
  }
  
  // 词组
  if (phrases.length > 0) {
    document.getElementById('phraseSection').style.display = 'block';
    document.getElementById('phraseRow').innerHTML = phrases.map(ph => 
      `<div class="phrase-card" onclick="speakPhrase('${ph.en.replace(/'/g, "\\'")}')">
        <span class="pen">${ph.en}</span>
        <span class="pzh">${ph.zh}</span>
      </div>`
    ).join('');
  } else {
    document.getElementById('phraseSection').style.display = 'none';
  }
  
  // 指示器
  document.getElementById('pageIndicator').textContent = `${i+1} / ${PAGES.length}`;
  document.getElementById('prevBtn').disabled = i === 0;
  document.getElementById('nextBtn').disabled = i === PAGES.length - 1;
}

function changePage(dir) {
  synth.cancel();
  cur = Math.max(0, Math.min(PAGES.length - 1, cur + dir));
  renderPage(cur);
  window.scrollTo(0, 0);
}

// 点击单词发音
function speakWord(word, el) {
  synth.cancel();
  if (el) {
    document.querySelectorAll('.word').forEach(w => w.classList.remove('speaking'));
    el.classList.add('speaking');
  }
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'en-US';
  utt.rate = currentSpeed * 0.9;
  const v = getVoice('en');
  if (v) utt.voice = v;
  utt.onend = () => { if (el) el.classList.remove('speaking'); };
  synth.speak(utt);
}

// 词组发音
function speakPhrase(phrase) {
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(phrase);
  utt.lang = 'en-US';
  utt.rate = currentSpeed;
  const v = getVoice('en');
  if (v) utt.voice = v;
  synth.speak(utt);
}

// 整句朗读
function readCurrent() {
  synth.cancel();
  const p = PAGES[cur];
  
  const enUtt = new SpeechSynthesisUtterance(p.en);
  enUtt.lang = 'en-US';
  enUtt.rate = currentSpeed;
  const enVoice = getVoice('en');
  if (enVoice) enUtt.voice = enVoice;
  
  enUtt.onend = () => {
    if (p.zh) {
      const zhUtt = new SpeechSynthesisUtterance(p.zh);
      zhUtt.lang = 'zh-CN';
      zhUtt.rate = currentSpeed;
      const zhVoice = getVoice('zh');
      if (zhVoice) zhUtt.voice = zhVoice;
      synth.speak(zhUtt);
    }
  };
  synth.speak(enUtt);
}

// 键盘导航
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') changePage(-1);
  if (e.key === 'ArrowRight') changePage(1);
});

renderPage(0);
// 页面加载后自动朗读
setTimeout(() => {
  if (synth.getVoices().length > 0) readCurrent();
  else synth.onvoiceschanged = () => setTimeout(readCurrent, 500);
}, 800);
</script>
</body>
</html>
