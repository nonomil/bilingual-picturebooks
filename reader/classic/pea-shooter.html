<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{STORY_TITLE}} — 朗读版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Nunito', sans-serif; background:#fffdf5; 
         min-height:100vh; display:flex; flex-direction:column; align-items:center; }

  .reader-wrap { max-width:800px; width:100%; padding:16px; }

  .page-img { width:100%; border-radius:16px; 
              box-shadow:0 4px 20px rgba(0,0,0,.12); display:block; }

  .text-area { margin-top:16px; padding:16px; 
               background:#fff; border-radius:12px;
               box-shadow:0 2px 8px rgba(0,0,0,.08); }

  .en-sentence { font-size:22px; line-height:1.8; color:#333; font-family:'Nunito',sans-serif; }
  .word { cursor:pointer; border-radius:4px; padding:0 2px;
          transition: background .15s; font-family:'Nunito',sans-serif; }
  .word:hover { background:#fff3b0; }
  .word.speaking { background:#ffd166; }

  .word-tip { display:inline-block; font-size:13px; color:#888;
              background:#f8f8f8; border-radius:6px;
              padding:2px 8px; margin-left:4px; }

  .zh-sentence { font-size:18px; color:#555; margin-top:14px; font-family:'Nunito',sans-serif; }

  .vocab-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; }
  .vocab-card { background:#e8f4fd; border-radius:8px; 
                padding:6px 12px; cursor:pointer;
                transition: transform .15s; }
  .vocab-card:hover { transform:scale(1.05); }
  .vocab-card .vw { font-size:16px; font-weight:bold; color:#1a5276; }
  .vocab-card .vp { font-size:12px; color:#888; }
  .vocab-card .vz { font-size:14px; color:#555; margin-top:2px; }

  .nav { display:flex; align-items:center; justify-content:space-between;
         margin-top:20px; padding-bottom:24px; }
  .nav-btn { background:#ff9f43; color:#fff; border:none;
             border-radius:50px; padding:10px 28px; font-size:18px;
             cursor:pointer; transition: opacity .15s; }
  .nav-btn:disabled { opacity:.35; }
  .page-indicator { font-size:16px; color:#aaa; }

  .progress-bar { width:100%; height:6px; background:#eee;
                  border-radius:3px; margin-top:8px; }
  .progress-fill { height:100%; background:#ff9f43; 
                   border-radius:3px; transition:width .3s; }

  .read-btn { background:#54a0ff; color:#fff; border:none;
              border-radius:50px; padding:8px 20px; font-size:16px;
              cursor:pointer; margin-right:8px; }
  .read-btn:hover { background:#2980b9; }

  h2 { text-align:center; color:#e17055; margin:16px 0 8px; font-size:22px }
  h2 small { display:block; font-size:16px; color:#888; font-weight:400; margin-top:4px; }
  .unit-tag { text-align:center; color:#888; font-size:14px; margin-bottom:8px; }
</style>
</head>
<body>
<div class="reader-wrap">
  <div class="unit-tag">Unit 1</div>
  <h2>{{STORY_TITLE}}<small>勇敢的豌豆射手</small></h2>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div id="pageArea" style="margin-top:16px"></div>
  <div class="nav">
    <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">← 上一页</button>
    <div>
      <button class="read-btn" onclick="readCurrent()">🔊 朗读</button>
      <span class="page-indicator" id="pageIndicator"></span>
    </div>
    <button class="nav-btn" id="nextBtn" onclick="changePage(1)">下一页 →</button>
  </div>
</div>

<script>
const PAGES = [{"img": "pea-shooter/page-1.jpg", "en": "In a bright, sunny garden lived a tiny green Pea Shooter named Pip. He had big round eyes, a cheerful smile, and a little leaf on his head. Pip loved his garden home more than anything in the world.\n\nEvery morning, Pip would stretch his leaves and say, \"Today is going to be a great day!\"", "zh": "在一个明亮、阳光灿烂的花园里，住着一只绿色的小豌豆射手，名叫皮皮。他有一双圆圆的大眼睛，一个开心的笑容，头顶上还有一片小叶子。皮皮爱他的花园家园胜过世界上的一切。\n\n每天早上，皮皮都会伸伸他的叶子说：“今天一定会是个好日子！”", "keys": [{"w": "bright", "p": "/braɪt/", "zh": "明亮的"}], "phrases": [{"en": "a bright, sunny garden", "zh": "一个明亮、阳光灿烂的花园"}]}, {"img": "pea-shooter/page-2.jpg", "en": "One sunny morning, Pip decided to take a walk along the cobblestone path. The flowers waved at him as he passed. Butterflies danced around his head.\n\n\"What a wonderful day for a walk!\" Pip cheered, hopping along the path.", "zh": "一个阳光明媚的早晨，皮皮决定沿着鹅卵石小路散步。花朵们在他经过时向他挥手，蝴蝶在他头顶翩翩起舞。\n\n“散步的好天气！”皮皮欢呼着，沿着小路蹦蹦跳跳。", "keys": [{"w": "decide", "p": "/dɪˈsaɪd/", "zh": "决定"}], "phrases": [{"en": "take a walk along the cobblestone path", "zh": "沿着鹅卵石小路散步"}]}, {"img": "pea-shooter/page-3.jpg", "en": "Pip walked through the most beautiful part of the garden. Tall sunflowers stood like guards. Colorful mushrooms dotted the ground. Bees hummed happy songs.\n\n\"I love my garden so much,\" Pip whispered happily.", "zh": "皮皮走过花园中最美丽的地方。高高的向日葵像卫兵一样站着，五颜六色的蘑菇点缀着地面，蜜蜂哼着快乐的歌。\n\n“我太爱我的花园了，”皮皮幸福地低语。", "keys": [{"w": "beautiful", "p": "/ˈbjuːtəfəl/", "zh": "美丽的"}], "phrases": [{"en": "the most beautiful part of the garden", "zh": "花园中最美丽的地方"}]}, {"img": "pea-shooter/page-4.jpg", "en": "Suddenly, Pip heard a strange sound. THUMP. THUMP. THUMP. The ground began to shake. Dark clouds rolled in from nowhere.\n\n\"W-what was that?\" Pip's eyes grew wide with worry.", "zh": "突然，皮皮听到了一个奇怪的声音。咚。咚。咚。地面开始震动，乌云不知从哪里涌了上来。\n\n“那…那是什么？”皮皮的眼睛因担心而睁大了。", "keys": [{"w": "suddenly", "p": "/ˈsʌdənli/", "zh": "突然地"}], "phrases": [{"en": "a strange sound", "zh": "一个奇怪的声音"}]}, {"img": "pea-shooter/page-5.jpg", "en": "From behind the bushes stumbled a scary zombie! It had an orange traffic cone on its head and moved very slowly. But it kept coming closer and closer!\n\n\"A ZOMBIE!\" Pip gasped. His little body trembled with fear.", "zh": "从灌木丛后面踉跄地走出一个可怕的僵尸！它头上戴着一个橙色的路障，走得很慢，但一直越来越近！\n\n“僵尸！”皮皮倒吸一口气，他的小身体因恐惧而颤抖。", "keys": [{"w": "bush", "p": "/bʊʃ/", "zh": "灌木丛"}], "phrases": [{"en": "from behind the bushes", "zh": "从灌木丛后面"}]}, {"img": "pea-shooter/page-6.jpg", "en": "\"I must be brave!\" Pip shouted. He puffed up his cheeks and fired green peas at the zombie. PEW! PEW! PEW!\n\nThe peas flew through the air like tiny green bullets. \"Take THAT, you big bully!\"", "zh": "“我必须勇敢！”皮皮大喊。他鼓起腮帮子，向僵尸发射绿色豌豆。噗！噗！噗！\n\n豌豆像绿色的小子弹一样飞过空中。“接招吧，你这个大坏蛋！”", "keys": [{"w": "brave", "p": "/breɪv/", "zh": "勇敢的"}], "phrases": [{"en": "I must be brave", "zh": "我必须勇敢"}]}, {"img": "pea-shooter/page-7.jpg", "en": "But something terrible happened. The peas bounced right off the traffic cone! BING! BONG! PING! The zombie didn't even slow down.\n\n\"Oh no! My peas can't break through that cone!\" Pip cried in frustration.", "zh": "但可怕的事情发生了。豌豆直接从路障上弹开了！叮！当！乒！僵尸甚至没有放慢脚步。\n\n“哦不！我的豌豆打不穿那个路障！”皮皮沮丧地哭了。", "keys": [{"w": "terrible", "p": "/ˈterəbəl/", "zh": "可怕的"}], "phrases": [{"en": "bounced right off the traffic cone", "zh": "直接从路障上弹开了"}]}, {"img": "pea-shooter/page-8.jpg", "en": "Pip turned and ran as fast as his little legs could carry him. He zoomed past Cherry Bombs and Potato Mines, looking for help.\n\n\"I need to find someone who can help me!\" Pip panted as he ran.", "zh": "皮皮转身拼命地跑。他飞速经过樱桃炸弹和土豆地雷，到处寻找帮助。\n\n“我需要找到能帮我的人！”皮皮一边跑一边喘气。", "keys": [{"w": "turn", "p": "/tɜːrn/", "zh": "转身"}], "phrases": [{"en": "ran as fast as his little legs could carry him", "zh": "拼命地跑"}]}, {"img": "pea-shooter/page-9.jpg", "en": "Then Pip found his best friend — Sunny the Sunflower! Sunny had bright golden petals and a warm, kind smile. She always made everyone feel better.\n\n\"Sunny! I need your help! There's a zombie coming!\" Pip cried.", "zh": "然后皮皮找到了他最好的朋友——向日葵小阳！小阳有明亮金色的花瓣和温暖善良的笑容，她总是让每个人感觉好起来。\n\n“小阳！我需要你的帮助！有僵尸来了！”皮皮哭着说。", "keys": [{"w": "friend", "p": "/frend/", "zh": "朋友"}], "phrases": [{"en": "best friend", "zh": "最好的朋友"}]}, {"img": "pea-shooter/page-10.jpg", "en": "Sunny listened carefully and nodded. \"Don't worry, Pip. I know exactly what to do. We need to call someone very special — someone very HOT!\"\n\n\"Hot?\" Pip asked, confused. \"Who could help us with a zombie?\"", "zh": "小阳仔细听着，点了点头。“别担心，皮皮。我完全知道该怎么办。我们需要叫一个非常特别的人——一个非常火热的人！”\n\n“火热？”皮皮疑惑地问，“谁能帮我们对付僵尸？”", "keys": [{"w": "carefully", "p": "/ˈkerfəli/", "zh": "仔细地"}], "phrases": [{"en": "Don't worry", "zh": "别担心"}]}, {"img": "pea-shooter/page-11.jpg", "en": "Sunny closed her eyes and lifted her face to the sky. Her golden petals began to glow brighter and brighter. Magical golden sparkles swirled around her.\n\n\"I need to collect enough sunlight energy first,\" Sunny explained. The whole garden seemed to light up!", "zh": "小阳闭上眼睛，把脸朝向天空。她金色的花瓣开始越来越亮地发光，神奇的金色火花围绕着她旋转。\n\n“我需要先收集足够的阳光能量，”小阳解释道。整个花园似乎都亮了起来！", "keys": [{"w": "petal", "p": "/ˈpetl/", "zh": "花瓣"}], "phrases": [{"en": "lifted her face to the sky", "zh": "把脸朝向天空"}]}, {"img": "pea-shooter/page-12.jpg", "en": "One by one, beautiful golden orbs of sunlight floated from Sunny's petals. They sparkled like tiny suns, filling the air with warmth.\n\n\"Wow!\" Pip gasped. \"That's the most beautiful thing I've ever seen!\"", "zh": "一颗又一颗美丽的金色阳光球从小阳的花瓣中飘出。它们像小太阳一样闪耀，让空气中充满了温暖。\n\n“哇！”皮皮惊叹道，“这是我见过的最美丽的东西！”", "keys": [{"w": "orb", "p": "/ɔːrb/", "zh": "球体；光球"}], "phrases": [{"en": "golden orbs of sunlight", "zh": "金色的阳光球"}]}, {"img": "pea-shooter/page-13.jpg", "en": "But the zombie was getting closer! It was now at the edge of the garden. Sunny glowed even brighter, producing more and more sunlight.\n\n\"Hurry, Sunny!\" Pip urged. \"The zombie is almost here!\"", "zh": "但僵尸越来越近了！它现在已经到了花园的边缘。小阳发出更亮的光，产生越来越多的阳光。\n\n“快点，小阳！”皮皮催促道，“僵尸马上就到了！”", "keys": [{"w": "zombie", "p": "/ˈzɑːmbi/", "zh": "僵尸"}], "phrases": [{"en": "getting closer", "zh": "越来越近"}]}, {"img": "pea-shooter/page-14.jpg", "en": "Finally, a big pile of golden sunlight orbs gathered on the ground. Pip and Sunny cheered! They had enough energy now.\n\n\"We did it!\" Sunny smiled. \"Now, let me call our special friend...\"", "zh": "终于，一大堆金色阳光球聚集在地面上。皮皮和小阳欢呼起来！他们现在有足够的能量了。\n\n“我们做到了！”小阳微笑着说，“现在，让我叫我们特别的朋友...”", "keys": [{"w": "finally", "p": "/ˈfaɪnəli/", "zh": "终于"}], "phrases": [{"en": "a big pile of golden sunlight orbs", "zh": "一大堆金色阳光球"}]}, {"img": "pea-shooter/page-15.jpg", "en": "Sunny gathered all the golden light together. She whispered magical words that made the ground rumble. The earth began to shake and crack.\n\n\"Who's coming?\" Pip asked nervously, clutching Sunny's stem.", "zh": "小阳把所有金色的光聚在一起，她低声念着魔法咒语，让地面发出隆隆声。大地开始震动和裂开。\n\n“谁要来了？”皮皮紧张地问，紧紧抓住小阳的茎。", "keys": [{"w": "whisper", "p": "/ˈwɪspər/", "zh": "低声说"}], "phrases": [{"en": "gathered all the golden light together", "zh": "把所有金色的光聚在一起"}]}, {"img": "pea-shooter/page-16.jpg", "en": "CRACK! BOOM! A GIANT red Jalapeno burst from the soil! He was enormous, fierce, and ON FIRE! Flames shot from his body like a volcano.\n\n\"WHO DARED TO WAKE ME UP?!\" Jalapeno roared. Pip stared in amazement.", "zh": "裂开！轰！一个巨大的红色火爆辣椒从土壤中冲了出来！他巨大、凶猛，而且全身着火！火焰像火山一样从他的身体喷射出来。\n\n“谁敢把我叫醒？！”火爆辣椒咆哮道。皮皮惊呆了。", "keys": [{"w": "giant", "p": "/ˈdʒaɪənt/", "zh": "巨大的"}], "phrases": [{"en": "burst from the soil", "zh": "从土壤中冲了出来"}]}, {"img": "pea-shooter/page-17.jpg", "en": "Jalapeno saw the zombie and his eyes blazed with anger. Red and orange flames erupted everywhere! The entire garden lit up in fiery colors.\n\n\"THAT zombie dared to threaten my garden? NOT ON MY WATCH!\" Jalapeno fumed.", "zh": "火爆辣椒看到了僵尸，他的眼睛因愤怒而燃烧。红色和橙色的火焰到处喷发！整个花园被火热的颜色照亮了。\n\n“那个僵尸敢威胁我的花园？绝不允许！”火爆辣椒怒气冲冲地说。", "keys": [{"w": "blaze", "p": "/bleɪz/", "zh": "熊熊燃烧"}], "phrases": [{"en": "his eyes blazed with anger", "zh": "他的眼睛因愤怒而燃烧"}]}, {"img": "pea-shooter/page-18.jpg", "en": "Jalapeno took a deep breath and WHOOSH — a massive wave of fire hit the Conehead Zombie! The traffic cone melted like butter. The zombie screamed and disappeared in a puff of smoke.\n\n\"AND STAY OUT!\" Jalapeno shouted triumphantly.", "zh": "火爆辣椒深吸一口气，呼——巨大的火焰波击中了路障僵尸！路障像黄油一样融化了。僵尸尖叫一声，在一缕烟雾中消失了。\n\n“滚远点！”火爆辣椒得意地喊道。", "keys": [{"w": "massive", "p": "/ˈmæsɪv/", "zh": "巨大的"}], "phrases": [{"en": "took a deep breath", "zh": "深吸一口气"}]}, {"img": "pea-shooter/page-19.jpg", "en": "Pip and Sunny cheered happily! Where the zombie had been, there was only a small puff of smoke. The garden was safe once more.\n\nJalapeno smiled, gave a thumbs up, and slowly sank back into the ground. \"Anytime, friends. Anytime.\"", "zh": "皮皮和小阳开心地欢呼！僵尸原来在的地方，只剩下一个小小的烟雾。花园再次安全了。\n\n火爆辣椒微笑着，竖起大拇指，慢慢沉回地面。“随时效劳，朋友们。”", "keys": [{"w": "cheer", "p": "/tʃɪr/", "zh": "欢呼"}], "phrases": [{"en": "cheered happily", "zh": "开心地欢呼"}]}];
let cur = 0;
const synth = window.speechSynthesis;

function renderPage(i) {
  const p = PAGES[i];
  const words = p.en.split(' ').map((w, idx) =>
    `<span class="word" id="w${idx}" onclick="showWordTip(this,'${w.replace(/'/g, "\\'")}')">${w}</span>`
  ).join(' ');

  const vocabCards = (p.keys || []).map(k =>
    `<div class="vocab-card" onclick="speakWord('${k.w}')">
      <div class="vw">${k.w}</div><div class="vp">${k.p}</div><div class="vz">${k.zh}</div>
    </div>`
  ).join('');

  document.getElementById('pageArea').innerHTML = `
    <img class="page-img" src="../../${p.img}" alt="page ${i+1}" onerror="this.style.background='#eee';this.style.minHeight='300px'">
    <div class="text-area">
      <div class="en-sentence">${words}</div>
      <div class="zh-sentence">${p.zh}</div>
      <div class="vocab-row">${vocabCards}</div>
    </div>`;

  document.getElementById('progressFill').style.width = `${(i+1)/PAGES.length*100}%`;
  document.getElementById('pageIndicator').textContent = `${i+1} / ${PAGES.length}`;
  document.getElementById('prevBtn').disabled = i === 0;
  document.getElementById('nextBtn').disabled = i === PAGES.length - 1;
}

function changePage(dir) {
  synth.cancel();
  cur = Math.max(0, Math.min(PAGES.length - 1, cur + dir));
  renderPage(cur);
}

function readCurrent() {
  synth.cancel();
  const p = PAGES[cur];
  const words = p.en.split(' ');
  let idx = 0;
  function speakNext() {
    if (idx >= words.length) return;
    document.querySelectorAll('.word').forEach(el => el.classList.remove('speaking'));
    const el = document.getElementById(`w${idx}`);
    if (el) el.classList.add('speaking');
    const utt = new SpeechSynthesisUtterance(words[idx]);
    utt.lang = 'en-GB'; utt.rate = 0.8;
    utt.onend = () => { idx++; speakNext(); };
    synth.speak(utt);
  }
  speakNext();
}

function showWordTip(el, word) {
  speakWord(word);
  if (el.querySelector('.word-tip')) { el.querySelector('.word-tip').remove(); return; }
  const p = PAGES[cur];
  const key = (p.keys || []).find(k => k.w.toLowerCase() === word.toLowerCase().replace(/[.,!?']/g,''));
  if (key) {
    const tip = document.createElement('span');
    tip.className = 'word-tip';
    tip.textContent = `${key.p} ${key.zh}`;
    el.appendChild(tip);
  }
}

function speakWord(word) {
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'en-GB'; utt.rate = 0.7;
  synth.speak(utt);
}

renderPage(0);
</script>
</body>
</html>
