<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invisible Tank Mission — 朗读版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body { font-family: 'Nunito', sans-serif; background:#1a1a2e; 
         display:flex; flex-direction:column; overflow:hidden; }

  /* 顶部导航 */
  .top-nav { position:fixed; top:0; left:0; right:0; z-index:100;
             background:rgba(26,26,46,.95); backdrop-filter:blur(10px);
             padding:12px 20px; display:flex; align-items:center; justify-content:space-between;
             border-bottom:1px solid rgba(255,255,255,.1); }
  .top-nav .title { color:#fff; font-size:18px; font-weight:600; }
  .top-nav .back-btn { color:#fff; text-decoration:none; font-size:14px;
                       opacity:.8; transition:opacity .2s; }
  .top-nav .back-btn:hover { opacity:1; }

  /* 主内容区 */
  .main-content { flex:1; display:flex; flex-direction:column; 
                  padding:70px 20px 180px; overflow-y:auto; }

  /* 全幅图片 */
  .full-img-wrap { width:100%; max-width:700px; margin:0 auto 20px; }
  .full-img { width:100%; border-radius:16px; 
              box-shadow:0 8px 32px rgba(0,0,0,.3); display:block; }

  /* 文本区域 */
  .text-section { max-width:700px; margin:0 auto; width:100%; }
  .en-text { font-size:20px; line-height:1.8; color:#fff; 
             background:rgba(255,255,255,.1); padding:16px; 
             border-radius:12px; margin-bottom:12px; }
  .word { cursor:pointer; border-radius:4px; padding:0 2px;
          transition: background .15s; display:inline; }
  .word:hover { background:#ffd166; color:#000; }
  .word.speaking { background:#ff6b6b; color:#fff; }

.zh-text { font-size:17px; color:rgba(255,255,255,.8); 
            background:rgba(255,255,255,.05); padding:12px 16px; 
            border-radius:10px; margin-bottom:16px; }

  /* 词汇区域 */
  .vocab-section { margin-top:16px; }
  .vocab-section .label { font-size:13px; color:#4ecdc4; margin-bottom:8px; }
  .vocab-row { display:flex; flex-wrap:wrap; gap:8px; }
  .vocab-card { background:rgba(78,205,196,.15); border:1px solid rgba(78,205,196,.3);
                border-radius:20px; padding:6px 14px; font-size:14px;
                cursor:pointer; transition:all .15s; }
  .vocab-card:hover { background:rgba(78,205,196,.3); transform:scale(1.02); }
  .vocab-card .vw { font-weight:700; color:#4ecdc4; margin-right:6px; }
  .vocab-card .vp { font-size:12px; color:#888; }
  .vocab-card .vz { margin-left:6px; color:rgba(255,255,255,.7); }

  /* 词组区域 */
  .phrase-section { margin-top:16px; }
  .phrase-section .label { font-size:13px; color:#ffd166; margin-bottom:8px; }
  .phrase-row { display:flex; flex-wrap:wrap; gap:8px; }
  .phrase-card { background:rgba(255,209,102,.15); border:1px solid rgba(255,209,102,.3);
                 border-radius:20px; padding:6px 14px; font-size:14px;
                 cursor:pointer; transition:all .15s; }
  .phrase-card:hover { background:rgba(255,209,102,.3); transform:scale(1.02); }
  .phrase-card .pen { color:#ffd166; margin-right:6px; }
  .phrase-card .pzh { color:rgba(255,255,255,.7); margin-left:6px; }

  /* 词汇卡片 - 底部悬浮 */
  .vocab-bar { position:fixed; bottom:0; left:0; right:0; 
               background:rgba(15,15,30,.98); backdrop-filter:blur(10px);
               border-top:1px solid rgba(255,255,255,.1);
               padding:16px 20px; max-height:160px; overflow-y:auto; }
  .vocab-bar .bar-title { font-size:13px; color:#888; margin-bottom:10px; }
  .vocab-row { display:flex; flex-wrap:wrap; gap:10px; }
  .vocab-card { background:rgba(255,255,255,.08); border-radius:10px; 
                padding:8px 12px; cursor:pointer;
                transition: all .15s; min-width:150px; flex:1 1 calc(50% - 10px); }
  .vocab-card:hover { background:rgba(255,255,255,.15); transform:scale(1.02); }
  .vocab-card .vw { font-size:15px; font-weight:700; color:#4ecdc4; margin-right:6px; }
  .vocab-card .vp { font-size:12px; color:#888; }
  .vocab-card .vz { font-size:14px; color:#fff; margin-top:2px; }
  .vocab-card .v-line { display:flex; align-items:baseline; gap:6px; }

  /* 底部导航 */
  .bottom-nav { position:fixed; bottom:160px; left:0; right:0;
                display:flex; align-items:center; justify-content:space-between;
                padding:0 20px; pointer-events:none; }
  .nav-btn { background:rgba(255,255,255,.15); color:#fff; border:none;
             border-radius:50px; padding:12px 24px; font-size:16px;
             cursor:pointer; transition: all .15s; pointer-events:auto;
             backdrop-filter:blur(10px); }
  .nav-btn:hover { background:rgba(255,255,255,.25); }
  .nav-btn:disabled { opacity:.3; pointer-events:none; }
  .page-indicator { color:rgba(255,255,255,.6); font-size:14px; }

  /* 速度控制 */
  .speed-bar { position:fixed; bottom:170px; right:20px;
               background:rgba(0,0,0,.6); border-radius:20px; padding:6px 12px;
               display:flex; align-items:center; gap:8px; z-index:50; }
  .speed-bar label { color:#888; font-size:12px; }
  .speed-bar select { background:rgba(255,255,255,.1); color:#fff; 
                      border:none; border-radius:12px; padding:4px 8px; font-size:12px; }

  .read-fab { position:fixed; bottom:220px; right:20px;
              width:56px; height:56px; border-radius:50%;
              background:linear-gradient(135deg, #ff6b6b, #ff8e53);
              border:none; color:#fff; font-size:24px; cursor:pointer;
              box-shadow:0 4px 20px rgba(255,107,107,.4);
              z-index:50; transition:transform .2s; }
  .read-fab:hover { transform:scale(1.1); }
</style>
</head>
<body>
  <nav class="top-nav">
    <a href="../../" class="back-btn">← 返回首页</a>
    <span class="title">Invisible Tank Mission</span>
    <span></span>
  </nav>

  <div class="main-content">
    <div class="full-img-wrap">
      <img class="full-img" id="pageImg" src="" alt="">
    </div>
    <div class="text-section">
      <div class="en-text" id="enText"></div>
      <div class="zh-text" id="zhText"></div>
      
      <!-- 词汇区域 -->
      <div class="vocab-section" id="vocabSection" style="display:none;">
        <div class="label">💡 单词</div>
        <div class="vocab-row" id="vocabRow"></div>
      </div>
      
      <!-- 词组区域 -->
      <div class="phrase-section" id="phraseSection">
        <div class="label">📚 词组</div>
        <div class="phrase-row" id="phraseRow"></div>
      </div>
    </div>
  </div>

  <div class="vocab-bar">
    <div class="bar-title">💡 重点词汇（点击发音）</div>
    <div class="vocab-row" id="vocabRow"></div>
  </div>

  <div class="speed-bar">
    <label>语速</label>
    <select id="speedSelect" onchange="changeSpeed()">
      <option value="0.7">慢速</option>
      <option value="1" selected>常速</option>
      <option value="1.3">快速</option>
    </select>
  </div>

  <button class="read-fab" onclick="readCurrent()">🔊</button>

  <div class="bottom-nav">
    <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">← 上一页</button>
    <span class="page-indicator" id="pageIndicator"></span>
    <button class="nav-btn" id="nextBtn" onclick="changePage(1)">下一页 →</button>
  </div>

<script>
const PAGES = [{"img": "images/invisible-tank/page-1.jpg", "en": "A mysterious black tank that can turn invisible, ready for a secret mission.", "zh": "一辆神秘的黑色坦克，可以变得完全透明，准备执行秘密任务。", "keys": [{"w": "mysterious", "p": "/mɪˈstɪriəs/", "zh": "神秘的"}], "phrases": [{"en": "mysterious black tank", "zh": "神秘的黑色坦克"}]}, {"img": "images/invisible-tank/page-2.jpg", "en": "Sneaky enemy trucks steal the glowing energy crystals hidden on the mountain top.", "zh": "偷偷摸摸的敌人卡车把藏在山顶的发光能量水晶偷走了！", "keys": [{"w": "sneaky", "p": "/ˈsniːki/", "zh": "鬼鬼祟祟的"}], "phrases": [{"en": "sneaky enemy trucks", "zh": "偷偷摸摸的敌人卡车"}]}, {"img": "images/invisible-tank/page-3.jpg", "en": "The kid presses the glowing blue button — whoosh! The tank becomes completely invisible!", "zh": "小孩按下发光的蓝色按钮——嗖！坦克变得完全透明了！", "keys": [{"w": "press", "p": "/pres/", "zh": "按下"}], "phrases": [{"en": "glowing blue button", "zh": "发光的蓝色按钮"}]}, {"img": "images/invisible-tank/page-4.jpg", "en": "The invisible tank follows the enemy convoy silently, not even the guard dogs notice it.", "zh": "隐身坦克悄悄跟在敌人车队后面，连敌人的侦查狗都没发现。", "keys": [{"w": "follows", "p": "/ˈfɑːloʊz/", "zh": "跟随"}], "phrases": [{"en": "follows the enemy convoy silently", "zh": "悄悄跟着敌人车队"}]}, {"img": "images/invisible-tank/page-5.jpg", "en": "The invisible tank reaches the enemy camp. There are guards everywhere and tall watchtowers!", "zh": "隐身坦克到达敌人营地。到处都是卫兵和高高的瞭望塔！", "keys": [{"w": "reaches", "p": "/ˈriːtʃɪz/", "zh": "到达"}], "phrases": [{"en": "reaches the enemy camp", "zh": "到达敌人营地"}]}, {"img": "images/invisible-tank/page-6.jpg", "en": "Twenty fake tanks appear around the enemy camp and the soldiers panic in confusion!", "zh": "敌人营地周围突然出现了二十辆一模一样的幻影坦克，士兵们吓得四处张望！", "keys": [{"w": "fake", "p": "/feɪk/", "zh": "假的"}], "phrases": [{"en": "appear around the enemy camp", "zh": "出现在敌人营地周围"}]}, {"img": "images/invisible-tank/page-7.jpg", "en": "Tiny fly-sized cameras zip over to the enemy tanks and send back live video to the kid's screen.", "zh": "像苍蝇一样小的微型摄像头飞到敌人坦克上，把画面传回屏幕。", "keys": [{"w": "tiny", "p": "/ˈtaɪni/", "zh": "极小的"}], "phrases": [{"en": "fly-sized cameras", "zh": "像苍蝇一样小的摄像头"}]}, {"img": "images/invisible-tank/page-8.jpg", "en": "The kid throws a special dart that flies straight into the enemy truck's energy core!", "zh": "小孩投出飞镖，精准命中敌人卡车的能量核心！", "keys": [{"w": "special", "p": "/ˈspeʃl/", "zh": "特殊的"}], "phrases": [{"en": "throws a special dart", "zh": "投出一枚特殊飞镖"}]}, {"img": "images/invisible-tank/page-9.jpg", "en": "The dart hits the core — BOOM! The enemy truck's power shuts down completely!", "zh": "飞镖命中核心——轰！敌人卡车的动力彻底熄火了！", "keys": [{"w": "hits", "p": "/hɪts/", "zh": "击中"}], "phrases": [{"en": "hits the core", "zh": "击中核心"}]}, {"img": "images/invisible-tank/page-10.jpg", "en": "A magnetic claw reaches out and zips the crystal boxes right into the invisible tank.", "zh": "磁力抓取爪伸出，嗖地一下把能量水晶吸了过来！", "keys": [{"w": "magnetic", "p": "/mæɡˈnetɪk/", "zh": "磁性的"}], "phrases": [{"en": "A magnetic claw reaches out", "zh": "一只磁力爪伸出来"}]}, {"img": "images/invisible-tank/page-11.jpg", "en": "The magnetic claw grabs the second crystal too! Two down, one to go!", "zh": "磁力爪又抓到了第二个水晶！两个到手，还差一个！", "keys": [{"w": "grabs", "p": "/ɡræbz/", "zh": "抓住"}], "phrases": [{"en": "grabs the second crystal", "zh": "抓住第二个水晶"}]}, {"img": "images/invisible-tank/page-12.jpg", "en": "The last enemy truck spots the floating crystals and sounds the alarm! WHEE-OOH WHEE-OOH!", "zh": "最后一辆敌人卡车发现了飘浮的水晶，拉响了警报！呜——呜——！", "keys": [{"w": "enemy", "p": "/ˈenəmi/", "zh": "敌人"}], "phrases": [{"en": "spots the floating crystals", "zh": "发现漂浮的水晶"}]}, {"img": "images/invisible-tank/page-13.jpg", "en": "The enemy truck chases the invisible tank through the forest at full speed!", "zh": "敌人卡车全速追赶隐身坦克，在森林里疯狂穿梭！", "keys": [{"w": "chases", "p": "/ˈtʃeɪsɪz/", "zh": "追赶"}], "phrases": [{"en": "chases the invisible tank", "zh": "追赶隐身坦克"}]}, {"img": "images/invisible-tank/page-14.jpg", "en": "An explosion sends Doubao the robot flying higher than the whole galaxy!", "zh": "一阵爆炸把豆包炸飞了，豆包飞得比银河系还高！", "keys": [{"w": "explosion", "p": "/ɪkˈspləʊʒən/", "zh": "爆炸"}], "phrases": [{"en": "An explosion sends Doubao flying", "zh": "一场爆炸把豆包炸飞了"}]}, {"img": "images/invisible-tank/page-15.jpg", "en": "Doubao falls back down like a shooting star, yelling all the way!", "zh": "豆包像流星一样落下来，一路尖叫！", "keys": [{"w": "falls", "p": "/fɔːlz/", "zh": "掉落"}], "phrases": [{"en": "falls back down like a shooting star", "zh": "像流星一样落下来"}]}, {"img": "images/invisible-tank/page-16.jpg", "en": "Doubao lands on the ground with a big BUMP and says 'Ouch, my bottom hurts!'", "zh": "豆包砰地坐到地上，哎呀，屁股好疼啊，摔了个屁股蹲！", "keys": [{"w": "lands", "p": "/lændz/", "zh": "着地"}], "phrases": [{"en": "lands on the ground with a big BUMP", "zh": "砰地坐到地上"}]}, {"img": "images/invisible-tank/page-17.jpg", "en": "Doubao accidentally falls right in front of the enemy truck! The truck screeches to a halt!", "zh": "豆包正好摔在敌人卡车前面！卡车急刹车停了下来！", "keys": [{"w": "accidentally", "p": "/ˌæksɪˈdentəli/", "zh": "意外地"}], "phrases": [{"en": "accidentally falls right in front of the enemy truck", "zh": "正好摔在敌人卡车前面"}]}, {"img": "images/invisible-tank/page-18.jpg", "en": "While the truck is stopped, the magnetic claw quickly grabs the last crystal!", "zh": "趁卡车停下，磁力爪迅速抓走了最后一个水晶！", "keys": [{"w": "stopped", "p": "/stɒpt/", "zh": "停下的"}], "phrases": [{"en": "while the truck is stopped", "zh": "趁卡车停下"}]}, {"img": "images/invisible-tank/page-19.jpg", "en": "Doubao has a bouncy bottom pad and springs right back up, ready to keep fighting!", "zh": "豆包有弹性缓冲垫，一下子就弹了起来，继续战斗！", "keys": [{"w": "bouncy", "p": "/ˈbaʊnsi/", "zh": "有弹性的"}], "phrases": [{"en": "has a bouncy bottom pad", "zh": "有弹性缓冲垫"}]}, {"img": "images/invisible-tank/page-20.jpg", "en": "The invisible tank activates full stealth and vanishes completely! The enemy trucks can't find it!", "zh": "隐身坦克开启全隐身模式，彻底消失！敌人卡车找不到它了！", "keys": [{"w": "activates", "p": "/ˈæktɪveɪts/", "zh": "启动"}], "phrases": [{"en": "activates full stealth", "zh": "开启全隐身模式"}]}, {"img": "images/invisible-tank/page-21.jpg", "en": "The invisible tank carries the crystals home safely, with Doubao riding on top as a lookout.", "zh": "隐身坦克带着水晶安全回到基地，豆包坐在坦克顶上当侦查员。", "keys": [{"w": "carries", "p": "/ˈkæriz/", "zh": "运送"}], "phrases": [{"en": "carries the crystals home safely", "zh": "安全地把水晶带回基地"}]}];
let cur = 0;
let currentSpeed = 1;
const synth = window.speechSynthesis;

function changeSpeed() {
  currentSpeed = parseFloat(document.getElementById('speedSelect').value);
}

function getVoice(lang) {
  const voices = synth.getVoices();
  if (!voices.length) return null;
  
  if (lang === 'zh') {
    const preferred = ['Xiaoxiao', 'Yunxi', 'Yunyang', 'Yunjian'];
    for (const p of preferred) {
      const v = voices.find(vo => vo.lang.startsWith('zh') && vo.name.includes(p));
      if (v) return v;
    }
    return voices.find(vo => vo.lang.startsWith('zh')) || null;
  } else {
    const preferred = ['Google', 'Microsoft', 'Samantha', 'Daniel', 'Karen', 'Apple', 'Amazon'];
    for (const p of preferred) {
      const v = voices.find(vo => vo.lang.startsWith('en') && vo.name.includes(p));
      if (v) return v;
    }
    return voices.find(vo => vo.lang.startsWith('en')) || null;
  }
}

function renderPage(i) {
  const p = PAGES[i];
  
  // 图片
  document.getElementById('pageImg').src = '../../' + p.img;
  
  // 英文句子 - 单词可点击
  const words = p.en.split(' ').map((w, idx) => {
    const clean = w.replace(/[.,!?':;]/g, '');
    return `<span class="word" onclick="speakWord('${clean}', this)">${w}</span>`;
  }).join(' ');
  document.getElementById('enText').innerHTML = words;
  
  // 中文
  document.getElementById('zhText').textContent = p.zh;
  
  // 词汇（如果有）放在词组前面
  const keys = p.keys || [];
  const phrases = p.phrases || [];
  
  // 先显示词汇
  if (keys.length > 0) {
    document.getElementById('vocabSection').style.display = 'block';
    document.getElementById('vocabRow').innerHTML = keys.map(k =>
      `<div class="vocab-card" onclick="speakWord('${k.w}', this)">
        <span class="vw">${k.w}</span> <span class="vp">${k.p}</span> <span class="vz">${k.zh}</span>
      </div>`
    ).join('');
  } else {
    document.getElementById('vocabSection').style.display = 'none';
  }
  
  // 词组
  if (phrases.length > 0) {
    document.getElementById('phraseSection').style.display = 'block';
    document.getElementById('phraseRow').innerHTML = phrases.map(ph => 
      `<div class="phrase-card" onclick="speakPhrase('${ph.en.replace(/'/g, "\\'")}')">
        <span class="pen">${ph.en}</span>
        <span class="pzh">${ph.zh}</span>
      </div>`
    ).join('');
  } else {
    document.getElementById('phraseSection').style.display = 'none';
  }
  
  // 指示器
  document.getElementById('pageIndicator').textContent = `${i+1} / ${PAGES.length}`;
  document.getElementById('prevBtn').disabled = i === 0;
  document.getElementById('nextBtn').disabled = i === PAGES.length - 1;
}

function changePage(dir) {
  synth.cancel();
  cur = Math.max(0, Math.min(PAGES.length - 1, cur + dir));
  renderPage(cur);
  window.scrollTo(0, 0);
}

// 点击单词发音
function speakWord(word, el) {
  synth.cancel();
  if (el) {
    document.querySelectorAll('.word').forEach(w => w.classList.remove('speaking'));
    el.classList.add('speaking');
  }
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'en-US';
  utt.rate = currentSpeed * 0.9;
  const v = getVoice('en');
  if (v) utt.voice = v;
  utt.onend = () => { if (el) el.classList.remove('speaking'); };
  synth.speak(utt);
}

// 词组发音
function speakPhrase(phrase) {
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(phrase);
  utt.lang = 'en-US';
  utt.rate = currentSpeed;
  const v = getVoice('en');
  if (v) utt.voice = v;
  synth.speak(utt);
}

// 整句朗读
function readCurrent() {
  synth.cancel();
  const p = PAGES[cur];
  
  const enUtt = new SpeechSynthesisUtterance(p.en);
  enUtt.lang = 'en-US';
  enUtt.rate = currentSpeed;
  const enVoice = getVoice('en');
  if (enVoice) enUtt.voice = enVoice;
  
  enUtt.onend = () => {
    if (p.zh) {
      const zhUtt = new SpeechSynthesisUtterance(p.zh);
      zhUtt.lang = 'zh-CN';
      zhUtt.rate = currentSpeed;
      const zhVoice = getVoice('zh');
      if (zhVoice) zhUtt.voice = zhVoice;
      synth.speak(zhUtt);
    }
  };
  synth.speak(enUtt);
}

// 键盘导航
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') changePage(-1);
  if (e.key === 'ArrowRight') changePage(1);
});

renderPage(0);
// 页面加载后自动朗读
setTimeout(() => {
  if (synth.getVoices().length > 0) readCurrent();
  else synth.onvoiceschanged = () => setTimeout(readCurrent, 500);
}, 800);
</script>
</body>
</html>
