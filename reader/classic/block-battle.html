<head>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Nunito', sans-serif; background:#fffdf5; 
         min-height:100vh; display:flex; flex-direction:column; align-items:center; }

  .reader-wrap { max-width:800px; width:100%; padding:16px; }

  .page-img { width:100%; border-radius:16px; 
              box-shadow:0 4px 20px rgba(0,0,0,.12); display:block; }

  .text-area { margin-top:16px; padding:16px; 
               background:#fff; border-radius:12px;
               box-shadow:0 2px 8px rgba(0,0,0,.08); }

  .en-sentence { font-size:22px; line-height:1.8; color:#333; font-family:'Nunito',sans-serif; }
  .word { cursor:pointer; border-radius:4px; padding:0 2px;
          transition: background .15s; font-family:'Nunito',sans-serif; }
  .word:hover { background:#fff3b0; }
  .word.speaking { background:#ffd166; }

  .word-tip { display:inline-block; font-size:13px; color:#888;
              background:#f8f8f8; border-radius:6px;
              padding:2px 8px; margin-left:4px; }

  .zh-sentence { font-size:18px; color:#555; margin-top:14px; font-family:'Nunito',sans-serif; }

  .vocab-row { display:flex; flex-wrap:wrap; gap:12px; margin-top:16px; }
  .vocab-card { background:#f8f9fa; border-radius:10px; 
                padding:10px 14px; cursor:pointer;
                transition: all .15s; min-width:180px; }
  .vocab-card:hover { transform:scale(1.02); box-shadow:0 4px 12px rgba(0,0,0,.1); background:#fff; }
  .vocab-card .vw { font-size:16px; font-weight:bold; color:#2980b9; margin-right:6px; }
  .vocab-card .vp { font-size:13px; color:#888; }
  .vocab-card .vz { font-size:14px; color:#555; }
  .vocab-card .v-line { display:flex; align-items:baseline; gap:8px; margin-top:2px; }
  .vocab-card .vph { font-size:12px; color:#666; border-top:1px solid #eee; margin-top:6px; padding-top:4px; }
  .vocab-card .vph-en { color:#2980b9; }

  .nav { display:flex; align-items:center; justify-content:space-between;
         margin-top:20px; padding-bottom:24px; }
  .nav-btn { background:#ff9f43; color:#fff; border:none;
             border-radius:50px; padding:10px 28px; font-size:18px;
             cursor:pointer; transition: opacity .15s; }
  .nav-btn:disabled { opacity:.35; }
  .page-indicator { font-size:16px; color:#aaa; }

  .progress-bar { width:100%; height:6px; background:#eee;
                  border-radius:3px; margin-top:8px; }
  .progress-fill { height:100%; background:#ff9f43; 
                   border-radius:3px; transition:width .3s; }

  .read-btn { background:#54a0ff; color:#fff; border:none;
              border-radius:50px; padding:8px 16px; font-size:14px;
              cursor:pointer; margin-right:8px; }
  .read-btn:hover { background:#2980b9; }
  .speed-select { background:#fff; color:#333; border:1px solid #ddd;
                  border-radius:20px; padding:6px 12px; font-size:13px;
                  cursor:pointer; margin-right:8px; }
  .speed-select:hover { background:#f5f5f5; }

  h2 { text-align:center; color:#e17055; margin:16px 0 8px; font-size:22px }
  h2 small { display:block; font-size:16px; color:#888; font-weight:400; margin-top:4px; }
  .unit-tag { text-align:center; color:#888; font-size:14px; margin-bottom:8px; }
</style>
</head>

<div class="reader-wrap">

      <option value="1" selected>常速</option>
      <option value="1.3">快速</option>
    </select>
  </div>
</div>

", "en": "lazy - sleep comfortably and snore after the battle!", "zh": "大胜之后，勇士觉得很累。'我为什么还要继续放方块？'他打了个哈欠。'让机械手帮我干活吧！'他舒服地躺在一个柔软的方块上，闭上眼睛，很快就睡着了。机械手还在一块一块地放方块，勇士在一旁安静地打着呼噜。", "keys": [{"w": "lazy", "p": "/ˈleɪzi/", "zh": "懒惰的"}], "phrases": [{"en": "feel lazy", "zh": "觉得懒洋洋的"}]}];
let cur = 0;
let currentSpeed = 1;
const synth = window.speechSynthesis;

function changeSpeed() {
  currentSpeed = parseFloat(document.getElementById('speedSelect').value);
}

function getVoice(lang) {
  const voices = synth.getVoices();
  if (!voices.length) return null;
  
  if (lang === 'zh') {
    // 中文：优先 Xiaoxiao（温暖女声）, Yunxi（阳光男声）
    const preferred = ['Xiaoxiao', 'Yunxi', 'Yunyang', 'Yunjian'];
    for (const p of preferred) {
      const v = voices.find(vo => vo.lang.startsWith('zh') && vo.name.includes(p));
      if (v) return v;
    }
    return voices.find(vo => vo.lang.startsWith('zh')) || null;
  } else {
    // 英文：优先自然声音
    const preferred = ['Google', 'Microsoft', 'Samantha', 'Daniel', 'Karen', 'Apple', 'Amazon'];
    for (const p of preferred) {
      const v = voices.find(vo => vo.lang.startsWith('en') && vo.name.includes(p));
      if (v) return v;
    }
    return voices.find(vo => vo.lang.startsWith('en')) || null;
  }
}

function renderPage(i) {
  const p = PAGES[i];
  const words = p.en.split(' ').map((w, idx) =>
    `<span class="word" id="w${idx}" onclick="showWordTip(this,'${w.replace(/'/g, "\\'")}')">${w}</span>`
  ).join(' ');

  const vocabCards = (p.keys || []).map(k =>
    `<div class="vocab-card" onclick="speakWord('${k.w}')">
      <div class="v-line"><span class="vw">${k.w}</span><span class="vp">${k.p}</span><span class="vz">${k.zh}</span></div>
      <div class="vph"><span class="vph-en">${k.ph || k.w}</span> ${k.ph ? k.zh : ''}</div>
    </div>`
  ).join('');

  // 如果没有ph字段，用中文解释代替
  const vocabPhrases = (p.keys || []).map(k => k.ph || k.zh).join(', ');

  document.getElementById('pageArea').innerHTML = `
    <img class="page-img" src="../../../${p.img}" alt="page ${i+1}" onerror="this.style.display='none'">
    <div class="text-area">
      <div class="en-sentence">${words}</div>
      <div class="zh-sentence">${p.zh}</div>
      <div class="vocab-row">${vocabCards}</div>
    </div>`;

  document.getElementById('progressFill').style.width = `${(i+1)/PAGES.length*100}%`;
  document.getElementById('pageIndicator').textContent = `${i+1} / ${PAGES.length}`;
  document.getElementById('prevBtn').disabled = i === 0;
  document.getElementById('nextBtn').disabled = i === PAGES.length - 1;
}

function changePage(dir) {
  synth.cancel();
  cur = Math.max(0, Math.min(PAGES.length - 1, cur + dir));
  renderPage(cur);
}

// 随机高亮朗读
let highlightTimer = null;
let highlightRunning = false;

function startRandomHighlight(wordCount, duration) {
  highlightRunning = true;
  const interval = duration / wordCount;
  let idx = 0;
  document.querySelectorAll('.word').forEach(el => el.classList.remove('speaking'));

  function next() {
    if (!highlightRunning) return;
    document.querySelectorAll('.word').forEach(el => el.classList.remove('speaking'));
    if (wordCount > 0) {
      const el = document.getElementById('w' + idx);
      if (el) el.classList.add('speaking');
    }
    idx++;
    if (idx < wordCount) {
      highlightTimer = setTimeout(next, interval);
    } else {
      setTimeout(() => {
        document.querySelectorAll('.word').forEach(el => el.classList.remove('speaking'));
        highlightRunning = false;
      }, 500);
    }
  }
  next();
}

function readCurrent() {
  synth.cancel();
  highlightRunning = false;
  if (highlightTimer) clearTimeout(highlightTimer);
  document.querySelectorAll('.word').forEach(el => el.classList.remove('speaking'));

  const p = PAGES[cur];
  
  // 先读英文整句
  const enUtt = new SpeechSynthesisUtterance(p.en);
  enUtt.lang = 'en-US';
  enUtt.rate = currentSpeed;
  enUtt.pitch = 1.0;
  const enVoice = getVoice('en');
  if (enVoice) enUtt.voice = enVoice;
  
  // 估算朗读时间用于高亮
  const estEnDuration = p.en.split(' ').length * 400; // ms per word
  enUtt.onstart = () => startRandomHighlight(p.en.split(' ').length, estEnDuration * currentSpeed);
  enUtt.onend = () => {
    highlightRunning = false;
    // 再读中文
    if (p.zh) {
      const zhUtt = new SpeechSynthesisUtterance(p.zh);
      zhUtt.lang = 'zh-CN';
      zhUtt.rate = currentSpeed;
      zhUtt.pitch = 1.0;
      const zhVoice = getVoice('zh');
      if (zhVoice) zhUtt.voice = zhVoice;
      synth.speak(zhUtt);
    }
  };
  synth.speak(enUtt);
}

function showWordTip(el, word) {
  speakWord(word);
  if (el.querySelector('.word-tip')) { el.querySelector('.word-tip').remove(); return; }
  const p = PAGES[cur];
  const key = (p.keys || []).find(k => k.w.toLowerCase() === word.toLowerCase().replace(/[.,!?']/g,''));
  if (key) {
    const tip = document.createElement('span');
    tip.className = 'word-tip';
    tip.textContent = `${key.p} ${key.zh}`;
    el.appendChild(tip);
  }
}

function speakWord(word) {
  synth.cancel();
  highlightRunning = false;
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'en-US';
  utt.rate = currentSpeed * 0.8;
  const v = getVoice('en');
  if (v) utt.voice = v;
  synth.speak(utt);
}

renderPage(0);
window.addEventListener('load', () => {
  setTimeout(() => {
    // Load voices then auto-read
    if (synth.getVoices().length > 0) readCurrent();
    else synth.onvoiceschanged = () => setTimeout(readCurrent, 500);
  }, 800);
});
</script>
