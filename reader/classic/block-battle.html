]}, {"img": "images/block-battle/page-27.jpg", "en": "laser - charge and dodge the laser beams!", "zh": "一个高科技炮塔升起，充能着明亮的红色激光束。你怎么躲？", "keys": [{"w": "laser", "p": "/ˈleɪzər/", "zh": "激光"}], "phrases": [{"en": "charge a bright red laser", "zh": "给明亮的红色激光充能"}]}, {"img": "images/block-battle/page-28.jpg", "en": "hammer - one swing of the giant legendary hammer!", "zh": "勇士挥舞着一把巨大的金色锤子。这就是传说中的锤子王——最强的武器！", "keys": [{"w": "hammer", "p": "/ˈhæmər/", "zh": "锤子"}], "phrases": [{"en": "a giant golden hammer", "zh": "一把巨大的金色锤子"}]}, {"img": "images/block-battle/page-29.jpg", "en": "swing - one mighty swing smashed everything tiny!", "zh": "激光炮塔被大锤一挥就砸成了碎片！", "keys": [{"w": "swing", "p": "/swɪŋ/", "zh": "挥舞"}], "phrases": [{"en": "one swing", "zh": "一下挥舞"}]}, {"img": "images/block-battle/page-30.jpg", "en": "fortress - a mechanical flying fortress, unbeatable!", "zh": "一个带着翅膀的巨大堡垒升上天空。看起来不可战胜！", "keys": [{"w": "fortress", "p": "/ˈfɔːrtrəs/", "zh": "堡垒"}], "phrases": [{"en": "a giant fortress", "zh": "一个巨大的堡垒"}]}, {"img": "images/block-battle/page-31.jpg", "en": "weigh - the immense mechanical hand has great weight!", "zh": "这锤子有1500个方块那么重！堡垒在巨大的重量下颤抖，几乎飞不动了！", "keys": [{"w": "weigh", "p": "/weɪ/", "zh": "重（动词）"}], "phrases": [{"en": "weigh 1500 blocks", "zh": "重达1500个方块"}]}, {"img": "images/block-battle/page-32.jpg", "en": "extend - reach out with incredible extendable arms!", "zh": "一只巨大的金属手臂从地面伸出，以惊人的力量向堡垒抓去。", "keys": [{"w": "extend", "p": "/ɪkˈstend/", "zh": "伸出"}], "phrases": [{"en": "extend from the ground", "zh": "从地面伸出"}]}, {"img": "images/block-battle/page-33.jpg", "en": "clever - a clever plan using sound wave to launch!", "zh": "勇士想到了一个聪明的计划！如果锤子砸到地面，声波把敌人弹飞到天上呢？", "keys": [{"w": "clever", "p": "/ˈklevər/", "zh": "聪明的"}], "phrases": [{"en": "a clever plan", "zh": "一个聪明的计划"}]}, {"img": "images/block-battle/page-34.jpg", "en": "strike - the hammer strike sends a huge shockwave!", "zh": "锤子以惊人的力量猛击地面！巨大的冲击波向四面八方扩散。", "keys": [{"w": "strike", "p": "/straɪk/", "zh": "击打"}], "phrases": [{"en": "strike the ground", "zh": "击打地面"}]}, {"img": "images/block-battle/page-35.jpg", "en": "cannonball - fly high over the arena like a cannonball!", "zh": "像一颗炮弹一样，敌人飞上了高高的天空！对战结束了！", "keys": [{"w": "cannonball", "p": "/ˈkænənbɔːl/", "zh": "炮弹"}], "phrases": [{"en": "like a cannonball", "zh": "像一颗炮弹一样"}]}, {"img": "images/block-battle/page-36.jpg", "en": "lazy - fall asleep comfortably after the big battle!", "zh": "为什么要放方块？让机械手帮我放！勇士舒服地躺下来，睡着了。", "keys": [{"w": "lazy", "p": "/ˈleɪzi/", "zh": "懒惰的"}], "phrases": [{"en": "let the robotic arm do it", "zh": "让机械手帮我放"}]}, {"img": "images/block-battle/page-37.jpg", "en": "The second round begins! A brave warrior returns to the arena.", "zh": "冒险永不止步！我们再来一场吧！", "keys": [{"w": "adventure", "p": "/ədˈventʃər/", "zh": "冒险"}], "phrases": [{"en": "The adventure never ends", "zh": "冒险永不止步"}]}, {"img": "images/block-battle/page-38.jpg", "en": "stealth - disappear with stealth skill, very confused!", "zh": "一个阳光明媚的下午，两个最好的朋友——一个披着红披风的小勇士和一个聪明的建造师——在彩色的竞技场面对面站着。今天就是他们期待已久的日子：方块大战！每个人都要设计自己的武器，比比谁最强。", "keys": [{"w": "warrior", "p": "/ˈwɔːriər/", "zh": "勇士"}], "phrases": [{"en": "a brave warrior", "zh": "一个勇敢的勇士"}]}, {"img": "images/block-battle/page-39.jpg", "en": "obsidian - build a shield with super hard obsidian material!", "zh": "建造师笑着说：'我选一个带隐身技能的方块！'突然，他全身开始发出神秘的蓝色光芒。慢慢地，他消失在了空气中！'现在你看不到我了！'他的声音从四面八方传来。", "keys": [{"w": "stealth", "p": "/stelθ/", "zh": "隐身"}], "phrases": [{"en": "stealth skill", "zh": "隐身技能"}]}, {"img": "images/block-battle/page-40.jpg", "en": "evil - ride a sword with evil attack and purple lightning!", "zh": "建造师重新出现了，立刻开始工作。'我要造一个三层黑曜石盾牌！'他骄傲地宣布。一块一块地，一个巨大的黑色盾牌从地面升起。黑曜石是方块世界最坚硬的材料之一。'一般攻击根本打不破这个！'他笑着说。", "keys": [{"w": "obsidian", "p": "/əbˈsɪdiən/", "zh": "黑曜石"}], "phrases": [{"en": "obsidian shield", "zh": "黑曜石盾牌"}]}, {"img": "images/block-battle/page-41.jpg", "en": "impossible - the obsidian shield cannot be broken!", "zh": "勇士一点也不担心。'看我的！'他大喊，跳上了一把漂浮在空中的巨大暗紫色之剑。剑上覆盖着邪恶能量，闪着暗紫色的闪电。'有这个邪恶攻击力，你的盾牌什么都不算！'勇士全速飞向盾牌。", "keys": [{"w": "sword", "p": "/sɔːrd/", "zh": "剑"}], "phrases": [{"en": "giant sword", "zh": "巨大的剑"}]}, {"img": "images/block-battle/page-42.jpg", "en": "laser - a high-tech turret that shoots laser beams!", "zh": "哐当！邪恶之剑以惊人的力量撞上黑曜石盾牌。让所有人吃惊的是，传说中坚不可摧的盾牌被彻底砸扁了——像一张煎饼！黑曜石碎片像烟花一样四处飞溅。'不可能！'建造师惊呼，盯着被拍扁的盾牌残骸。", "keys": [{"w": "crush", "p": "/krʌʃ/", "zh": "压碎"}], "phrases": [{"en": "crushed flat", "zh": "被砸扁"}]}, {"img": "images/block-battle/page-43.jpg", "en": "enormous - the enormous hammer is the secret weapon!", "zh": "建造师不肯认输。'好，比就比！'他迅速组装了一个高科技激光炮塔。炮塔嗡嗡地启动了，充能着明亮的红色激光束，照亮了整个竞技场。'看你躲不躲得过这个！'他咧嘴笑着，直接瞄准了勇士。", "keys": [{"w": "laser", "p": "/ˈleɪzər/", "zh": "激光"}], "phrases": [{"en": "laser turret", "zh": "激光炮塔"}]}, {"img": "images/block-battle/page-44.jpg", "en": "fortress - a mechanical flying fortress, unbeatable!", "zh": "勇士大笑，掏出了他的秘密武器——一把巨大的金色锤子，叫做锤子王。这是任何人见过的最大的锤子，闪耀着金光。'你觉得一个小激光就能挡住我？'他说着，把锤子高高举过头顶。", "keys": [{"w": "hammer", "p": "/ˈhæmər/", "zh": "锤子"}], "phrases": [{"en": "secret weapon", "zh": "秘密武器"}]}, {"img": "images/block-battle/page-45.jpg", "en": "swing - one mighty swing of the scrap hammer!", "zh": "只一挥，轰！金色锤子砸在激光炮塔上，把它砸成了碎片！齿轮、电线和金属零件四处飞溅。建造师震惊地盯着炮塔变成的那堆废铁。'这锤子也太太太强了！'他小声说。", "keys": [{"w": "swing", "p": "/swɪŋ/", "zh": "挥舞"}], "phrases": [{"en": "one mighty swing", "zh": "有力的一挥"}]}, {"img": "images/block-battle/page-46.jpg", "en": "fortress - the mechanical fortress looks unbeatable!", "zh": "建造师还有一招。'我要造一个飞行的机械堡垒！'一个带着巨大翅膀的结构从地面升起，飞上了天空。它装着厚厚的金属板，看起来真的不可战胜。'你打不到会飞的东西！'建造师在空中大喊。", "keys": [{"w": "fortress", "p": "/ˈfɔːrtrəs/", "zh": "堡垒"}], "phrases": [{"en": "mechanical fortress", "zh": "机械堡垒"}]}, {"img": "images/block-battle/page-47.jpg", "en": "weigh - the hammer weighs 1,500 blocks, immense!", "zh": "但勇士有一个更疯狂的主意。他拿出了最重的武器——一把重达1500个方块的锤子！当他举起它时，整个竞技场都在颤抖。飞行堡垒在巨大的重量下剧烈摇晃，几乎飞不动了。'这是我的超级武器！'勇士咧嘴笑道。", "keys": [{"w": "weigh", "p": "/weɪ/", "zh": "重（动词）"}], "phrases": [{"en": "weigh 1500 blocks", "zh": "重达1500个方块"}]}, {"img": "images/block-battle/page-48.jpg", "en": "extend - extend and grab with incredible stretching arms!", "zh": "建造师快没招了，但他突然想起了一件事。'等等！我还有我的机械手！'一只巨大的金属手臂从地面伸出，伸向高空中的堡垒。它重700个方块，什么都能抓住。'这只手够强壮，能把你的堡垒抓碎！'他喊道。", "keys": [{"w": "extend", "p": "/ɪkˈstend/", "zh": "伸出"}], "phrases": [{"en": "extend from the ground", "zh": "从地面伸出"}]}, {"img": "images/block-battle/page-49.jpg", "en": "clever - a brilliant clever plan with a shockwave!", "zh": "勇士看着伸向自己的机械手，使劲思考。然后他的眼睛亮了。'我有一个聪明的计划！'他对自己说。'如果我用锤子砸地面，声波产生的冲击力就会把你弹飞到天上——我就赢了！'这是一个绝妙的主意。", "keys": [{"w": "clever", "p": "/ˈklevər/", "zh": "聪明的"}], "phrases": [{"en": "a clever plan", "zh": "一个聪明的计划"}]}, {"img": "images/block-battle/page-50.jpg", "en": "strike - the hammer strike has incredible impact!", "zh": "勇士把巨大的锤子高高举起，猛砸向地面。哐当！撞击力太大了，整个竞技场像地震一样摇晃。巨大的冲击波向四面八方扩散，把灰尘和方块都吹上了天。声音回荡在整个大地上。", "keys": [{"w": "strike", "p": "/straɪk/", "zh": "击打"}], "phrases": [{"en": "strike the ground", "zh": "击打地面"}]}, {"img": "images/block-battle/page-51.jpg", "en": "cannonball - tumble through the sky like a cannonball, amazed!", "zh": "就像勇士计划的那样，建造师像一颗炮弹一样被弹飞上了天！他越飞越高，在云层中旋转翻滚。'我在飞！'他尖叫着，又害怕又惊讶。对战结束了——勇士用聪明的计谋赢了！", "keys": [{"w": "cannonball", "p": "/ˈkænənbɔːl/", "zh": "炮弹"}], "phrases": [{"en": "like a cannonball", "zh": "像一颗炮弹一样"}]}, {"img": "images/block-battle/page-52.jpg", "en": "lazy - sleep comfortably and snore after the battle!", "zh": "大胜之后，勇士觉得很累。'我为什么还要继续放方块？'他打了个哈欠。'让机械手帮我干活吧！'他舒服地躺在一个柔软的方块上，闭上眼睛，很快就睡着了。机械手还在一块一块地放方块，勇士在一旁安静地打着呼噜。", "keys": [{"w": "lazy", "p": "/ˈleɪzi/", "zh": "懒惰的"}], "phrases": [{"en": "feel lazy", "zh": "觉得懒洋洋的"}]}];
const game_url = '../../game/classic/block-battle.html';
let current_page = 0;
let current_rate = 0.92;
let is_reading = false;
let translation_visible = false;
let current_word_ranges = [];
const synth = window.speechSynthesis;

function escape_for_attr(raw_text) {
  return String(raw_text || '').replace(/'/g, "\\'");
}

function get_asset_src(raw_path) {
  const path_text = String(raw_path || '').trim();
  if (!path_text) return '';
  if (path_text.startsWith('http://') || path_text.startsWith('https://')) return path_text;
  if (path_text.startsWith('images/')) return '../../' + path_text;
  return '../../images/' + path_text.replace(/^\/+/, '');
}

function split_zh_chunks(zh_text) {
  const source_text = String(zh_text || '');
  return source_text.split(/(?<=[。！？；：,.!?])/).filter(Boolean);
}

function build_word_tokens(en_text) {
  const source_text = String(en_text || '');
  const tokens = source_text.match(/\S+/g) || [];
  let search_index = 0;
  return tokens.map((token) => {
    const start = source_text.indexOf(token, search_index);
    const end = start + token.length;
    search_index = end;
    return { token, start, end };
  });
}

function update_translation_ui() {
  const zh_box = document.getElementById('zh_sentence');
  const toggle_btn = document.getElementById('translate_toggle_btn');
  if (!zh_box || !toggle_btn) return;
  zh_box.classList.toggle('hidden', !translation_visible);
  toggle_btn.textContent = translation_visible ? '隐藏翻译' : '显示翻译';
}

function toggle_translation(force_visible) {
  if (typeof force_visible === 'boolean') {
    translation_visible = force_visible;
  } else {
    translation_visible = !translation_visible;
  }
  update_translation_ui();
}

function render_page(page_index) {
  const page = pages_data[page_index];
  current_word_ranges = build_word_tokens(page.en || '');
  const words_html = current_word_ranges.map((item, idx) =>
    `<span class="word" id="w_${idx}" onclick="show_word_tip(this,'${escape_for_attr(item.token)}')">${item.token}</span>`
  ).join(' ');
  const zh_chunks = split_zh_chunks(page.zh || '');
  const zh_html = zh_chunks.map((chunk, idx) =>
    `<span class="zh_chunk" id="zh_${idx}">${chunk}</span>`
  ).join('');
  const word_row_html = (page.keys || []).length ? (page.keys || []).map((item) =>
    `<span class="lex_chip words" onclick="speak_word('${escape_for_attr(item.w || '')}')"><b>${item.w || ''}</b> ${item.p || ''} ${item.zh || ''}</span>`
  ).join('') : '<span class="lex_empty">暂无重点单词</span>';
  const phrase_row_html = (page.phrases || []).length ? (page.phrases || []).map((item) =>
    `<span class="lex_chip phrases" onclick="speak_phrase('${escape_for_attr(item.en || '')}')"><b>${item.en || ''}</b> ${item.zh || ''}</span>`
  ).join('') : '<span class="lex_empty">暂无重点词组</span>';

  document.getElementById('page_area').innerHTML = `
    <img class="hero_img" src="${get_asset_src(page.img)}" alt="page ${page_index + 1}" onerror="this.style.objectFit='contain';this.style.background='#eee';">
    <div class="text_area">
      <div class="text_toolbar">
        <div class="toolbar_tip">点英文可听单词，点下方卡片可听单词和词组</div>
        <div class="toolbar_actions">
          <button class="translate_btn" onclick="toggle_translation()">${translation_visible ? '隐藏翻译' : '显示翻译'}</button>
        </div>
      </div>
      <div class="en_sentence">${words_html}</div>
      <div class="zh_sentence hidden" id="zh_sentence">${zh_html}</div>
      <div class="lexicon">
        <div class="lex_row"><span class="lex_label words">单词</span><div class="lex_items">${word_row_html}</div></div>
        <div class="lex_row"><span class="lex_label phrases">词组</span><div class="lex_items">${phrase_row_html}</div></div>
      </div>
    </div>`;

  document.getElementById('progress_fill').style.width = `${((page_index + 1) / pages_data.length) * 100}%`;
  document.getElementById('page_total').textContent = `第 ${page_index + 1} 页，共 ${pages_data.length} 页`;
  document.getElementById('page_indicator').textContent = `${page_index + 1} / ${pages_data.length}`;
  document.getElementById('prev_btn').disabled = page_index === 0;
  const on_last_page = page_index === pages_data.length - 1;
  document.getElementById('next_btn').textContent = on_last_page ? '完成并去游戏 →' : '下一页 →';
  document.getElementById('to_game_btn').style.display = on_last_page ? 'inline-block' : 'none';
  update_translation_ui();
}

function clear_highlight() {
  document.querySelectorAll('.word.speaking').forEach((el) => el.classList.remove('speaking'));
  document.querySelectorAll('.zh_chunk.speaking').forEach((el) => el.classList.remove('speaking'));
}

function speak_utterance(text_value, lang_code, rate_value, on_boundary) {
  return new Promise((resolve) => {
    const utterance = new SpeechSynthesisUtterance(text_value);
    utterance.lang = lang_code;
    utterance.rate = rate_value;
    utterance.pitch = 1;
    if (on_boundary) utterance.onboundary = on_boundary;
    utterance.onend = resolve;
    utterance.onerror = resolve;
    synth.speak(utterance);
  });
}

function highlight_en_word(char_index) {
  clear_highlight();
  const word_index = current_word_ranges.findIndex((item) => char_index >= item.start && char_index < item.end);
  if (word_index < 0) return;
  const active_word = document.getElementById(`w_${word_index}`);
  if (active_word) active_word.classList.add('speaking');
}

async function speak_english_sentence() {
  const page = pages_data[current_page];
  await speak_utterance(String(page.en || ''), 'en-US', current_rate * 0.92, (event) => {
    if (typeof event.charIndex === 'number') {
      highlight_en_word(event.charIndex);
    }
  });
}

async function speak_chinese_sentence() {
  toggle_translation(true);
  const zh_chunks = split_zh_chunks(pages_data[current_page].zh || '');
  for (let i = 0; i < zh_chunks.length; i += 1) {
    clear_highlight();
    const current_chunk = document.getElementById(`zh_${i}`);
    if (current_chunk) current_chunk.classList.add('speaking');
    await speak_utterance(String(zh_chunks[i] || ''), 'zh-CN', current_rate);
  }
}

async function read_current() {
  if (is_reading) return;
  is_reading = true;
  synth.cancel();
  clear_highlight();
  const page = pages_data[current_page];
  await speak_english_sentence();
  clear_highlight();
  await speak_chinese_sentence();
  clear_highlight();
  for (const item of (page.keys || [])) {
    await speak_utterance(String(item.w || ''), 'en-US', current_rate * 0.85);
  }
  for (const item of (page.phrases || [])) {
    await speak_utterance(String(item.en || ''), 'en-US', current_rate * 0.82);
  }
  is_reading = false;
}

async function read_chinese_only() {
  if (is_reading) return;
  is_reading = true;
  synth.cancel();
  clear_highlight();
  await speak_chinese_sentence();
  clear_highlight();
  is_reading = false;
}

function show_word_tip(target_el, word_text) {
  speak_word(word_text);
  const old_tip = target_el.querySelector('.word_tip');
  if (old_tip) {
    old_tip.remove();
    return;
  }
  const page = pages_data[current_page];
  const clean_word = String(word_text || '').toLowerCase().replace(/[.,!?'"“”]/g, '');
  const found = (page.keys || []).find((item) => String(item.w || '').toLowerCase() === clean_word);
  if (!found) return;
  const tip = document.createElement('span');
  tip.className = 'word_tip';
  tip.textContent = `${found.p || ''} ${found.zh || ''}`.trim();
  target_el.appendChild(tip);
}

function speak_word(word_text) {
  if (!word_text) return;
  synth.cancel();
  clear_highlight();
  speak_utterance(String(word_text), 'en-US', current_rate * 0.84);
}

function speak_phrase(phrase_text) {
  if (!phrase_text) return;
  synth.cancel();
  clear_highlight();
  speak_utterance(String(phrase_text), 'en-US', current_rate * 0.8);
}

function goto_game() {
  window.location.href = game_url;
}

function change_page(direction) {
  synth.cancel();
  clear_highlight();
  const on_last_page = current_page === pages_data.length - 1;
  if (direction > 0 && on_last_page) {
    goto_game();
    return;
  }
  current_page = Math.max(0, Math.min(pages_data.length - 1, current_page + direction));
  render_page(current_page);
}

render_page(0);
window.addEventListener('load', () => {
  setTimeout(() => { read_current(); }, 500);
});
</script>
