<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugarcane Tank Battle — 朗读版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Nunito', sans-serif; background:#fffdf5; 
         min-height:100vh; display:flex; flex-direction:column; align-items:center; }

  .reader-wrap { max-width:800px; width:100%; padding:16px; }

  .page-img { width:100%; border-radius:16px; 
              box-shadow:0 4px 20px rgba(0,0,0,.12); display:block; }

  .text-area { margin-top:16px; padding:16px; 
               background:#fff; border-radius:12px;
               box-shadow:0 2px 8px rgba(0,0,0,.08); }

  .en-sentence { font-size:22px; line-height:1.8; color:#333; font-family:'Nunito',sans-serif; }
  .word { cursor:pointer; border-radius:4px; padding:0 2px;
          transition: background .15s; font-family:'Nunito',sans-serif; }
  .word:hover { background:#fff3b0; }
  .word.speaking { background:#ffd166; }

  .word-tip { display:inline-block; font-size:13px; color:#888;
              background:#f8f8f8; border-radius:6px;
              padding:2px 8px; margin-left:4px; }

  .zh-sentence { font-size:18px; color:#555; margin-top:14px; font-family:'Nunito',sans-serif; }

  .vocab-row { display:flex; flex-wrap:wrap; gap:12px; margin-top:16px; }
  .vocab-card { background:#f8f9fa; border-radius:10px; 
                padding:10px 14px; cursor:pointer;
                transition: all .15s; min-width:180px; }
  .vocab-card:hover { transform:scale(1.02); box-shadow:0 4px 12px rgba(0,0,0,.1); background:#fff; }
  .vocab-card .vw { font-size:16px; font-weight:bold; color:#2980b9; margin-right:6px; }
  .vocab-card .vp { font-size:13px; color:#888; }
  .vocab-card .vz { font-size:14px; color:#555; }
  .vocab-card .v-line { display:flex; align-items:baseline; gap:8px; margin-top:2px; }
  .vocab-card .vph { font-size:12px; color:#666; border-top:1px solid #eee; margin-top:6px; padding-top:4px; }
  .vocab-card .vph-en { color:#2980b9; }

  .nav { display:flex; align-items:center; justify-content:space-between;
         margin-top:20px; padding-bottom:24px; }
  .nav-btn { background:#ff9f43; color:#fff; border:none;
             border-radius:50px; padding:10px 28px; font-size:18px;
             cursor:pointer; transition: opacity .15s; }
  .nav-btn:disabled { opacity:.35; }
  .page-indicator { font-size:16px; color:#aaa; }

  .progress-bar { width:100%; height:6px; background:#eee;
                  border-radius:3px; margin-top:8px; }
  .progress-fill { height:100%; background:#ff9f43; 
                   border-radius:3px; transition:width .3s; }

  .read-btn { background:#54a0ff; color:#fff; border:none;
              border-radius:50px; padding:8px 16px; font-size:14px;
              cursor:pointer; margin-right:8px; }
  .read-btn:hover { background:#2980b9; }
  .speed-select { background:#fff; color:#333; border:1px solid #ddd;
                  border-radius:20px; padding:6px 12px; font-size:13px;
                  cursor:pointer; margin-right:8px; }
  .speed-select:hover { background:#f5f5f5; }

  h2 { text-align:center; color:#e17055; margin:16px 0 8px; font-size:22px }
  h2 small { display:block; font-size:16px; color:#888; font-weight:400; margin-top:4px; }
  .unit-tag { text-align:center; color:#888; font-size:14px; margin-bottom:8px; }
</style>
</head>
<body>
<div class="reader-wrap">
  <div class="unit-tag">Unit 1</div>
  <h2>Sugarcane Tank Battle<small>甘蔗坦克大作战</small></h2>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div id="pageArea" style="margin-top:16px"></div>
  <div class="nav">
    <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">← 上一页</button>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="read-btn" onclick="readCurrent()">🔊 朗读</button>
      <span class="page-indicator" id="pageIndicator"></span>
    </div>
    <button class="nav-btn" id="nextBtn" onclick="changePage(1)">下一页 →</button>
  </div>
  
  <div id="speedControl" style="text-align:center;margin-top:12px;display:none;">
    <label style="color:#888;font-size:13px;">语速：</label>
    <select class="speed-select" id="speedSelect" onchange="changeSpeed()">
      <option value="0.7">慢速</option>
      <option value="1" selected>常速</option>
      <option value="1.3">快速</option>
    </select>
  </div>
</div>

<script>
const PAGES = [{"img": "images/sugarcane-tank/sugarcane-tank/page-1.jpg", "en": "In a small village surrounded by green hills, there lived a brave little kid who loved building things.", "zh": "在一个被青山环绕的小村庄里，住着一个爱动手做东西的勇敢小孩。", "keys": [{"w": "village", "p": "/ˈvɪlɪdʒ/", "zh": "村庄，青山，勇敢，动手"}], "phrases": [{"en": "surrounded by green hills", "zh": "被青山环绕"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-2.jpg", "en": "Inside the workshop, the kid had been building something amazing — a tank made entirely of vegetables!", "zh": "工坊里，小孩一直在秘密制造一件了不起的东西——一辆全蔬菜做的坦克！", "keys": [{"w": "workshop", "p": "/ˈwɜːrkʃɑːp/", "zh": "工坊，秘密，坦克，蔬菜"}], "phrases": [{"en": "Inside the workshop", "zh": "在工坊里"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-3.jpg", "en": "The kid attached a hollow sugarcane tube as the cannon barrel. It smelled sweet like candy!", "zh": "小孩把一根空心甘蔗装上去当炮管，闻起来像糖果一样甜！", "keys": [{"w": "sugarcane", "p": "/ˈʃʊɡərkeɪn/", "zh": "甘蔗，炮管，甜，糖果"}], "phrases": [{"en": "hollow sugarcane tube", "zh": "空心甘蔗管"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-4.jpg", "en": "Round brown potato mines were loaded into the back of the tank, each coated in sticky golden syrup.", "zh": "圆圆的棕色土豆雷被装进坦克后面的弹仓，每个都裹着黏糊糊的金色糖浆。", "keys": [{"w": "potato", "p": "/pəˈteɪtoʊ/", "zh": "土豆，地雷，糖浆，金色"}], "phrases": [{"en": "potato mines", "zh": "土豆雷"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-5.jpg", "en": "Little Milk got a special tiny harness with pockets for smoke bombs. The puppy wagged its tail excitedly!", "zh": "小牛奶穿上了一件特别的小背心，口袋里装着烟雾弹，小狗兴奋地摇着尾巴！", "keys": [{"w": "puppy", "p": "/ˈpʌpi/", "zh": "小狗，背心，烟雾弹，兴奋"}], "phrases": [{"en": "special tiny harness", "zh": "特别的小背心"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-6.jpg", "en": "The biggest surprise — hollow pumpkin shells filled with magic growing seeds that could multiply forever!", "zh": "最大的秘密武器——掏空的南瓜壳里装着魔法生长种子，能无限分裂繁殖！", "keys": [{"w": "pumpkin", "p": "/ˈpʌmpkɪn/", "zh": "南瓜，炮弹，魔法种子，分裂"}], "phrases": [{"en": "hollow pumpkin shells", "zh": "掏空的南瓜壳"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-7.jpg", "en": "The sugarcane tank was finally complete! It had a sugarcane cannon, potato mine launcher, and pumpkin bomb bay.", "zh": "甘蔗坦克终于完工了！它有甘蔗炮、土豆雷发射器和南瓜弹仓。", "keys": [{"w": "complete", "p": "/kəmˈpliːt/", "zh": "完工，准备，坦克，武器"}], "phrases": [{"en": "sugarcane tank", "zh": "甘蔗坦克"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-8.jpg", "en": "Suddenly, a loud alarm echoed through the village — enemy tanks were approaching from the east!", "zh": "突然，村庄响起了警报——敌人的坦克正从东边逼近！", "keys": [{"w": "alarm", "p": "/əˈlɑːrm/", "zh": "警报，敌人，坦克，逼近"}], "phrases": [{"en": "a loud alarm echoed through the village", "zh": "警报声响彻整个村庄"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-9.jpg", "en": "Ten big steel tanks rolled into the village, crushing fences and scaring everyone away.", "zh": "十辆钢铁大坦克开进了村庄，压坏了栅栏，把大家都吓跑了。", "keys": [{"w": "enemy", "p": "/ˈɛnəmi/", "zh": "敌人，入侵，钢铁坦克，可怕"}], "phrases": [{"en": "big steel tanks", "zh": "巨大的钢铁坦克"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-10.jpg", "en": "'It's time to protect our home!' The kid jumped into the sugarcane tank and started the engine.", "zh": "\"是时候保护我们的家了！\"小孩跳进甘蔗坦克，发动了引擎。", "keys": [{"w": "charge", "p": "/tʃɑːrdʒ/", "zh": "出击，保护，引擎，勇敢"}], "phrases": [{"en": "protect our home", "zh": "保护我们的家"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-11.jpg", "en": "BANG! The sugarcane cannon fired a sticky syrup bomb that splattered all over the first enemy tank's tracks!", "zh": "砰！甘蔗炮发射了一发黏糊糊的糖浆弹，糊住了第一辆敌人坦克的履带！", "keys": [{"w": "syrup", "p": "/ˈsɪrəp/", "zh": "糖浆，发射，黏糊糊，履带"}], "phrases": [{"en": "sticky syrup bomb", "zh": "黏糊糊的糖浆弹"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-12.jpg", "en": "The kid pressed the rapid fire button and syrup bombs flew everywhere, gluing enemy tanks to the ground!", "zh": "小孩按下连射按钮，糖浆弹四处飞射，把敌人坦克全部粘在了地上！", "keys": [{"w": "rapid", "p": "/ˈræpɪd/", "zh": "快速的"}], "phrases": [{"en": "rapid fire button", "zh": "连射按钮"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-13.jpg", "en": "Little Milk sneaked out with a pink smoke bomb in mouth, running between the enemy tanks' legs!", "zh": "小牛奶叼着粉色烟雾弹偷偷溜出去，在敌人坦克腿之间跑来跑去！", "keys": [{"w": "puppy", "p": "/ˈpʌpi/", "zh": "小狗，偷偷，烟雾弹，敌人"}], "phrases": [{"en": "pink smoke bomb", "zh": "粉色烟雾弹"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-14.jpg", "en": "BOOM! The smoke bomb exploded filling the battlefield with thick pink smoke. The enemies couldn't see anything!", "zh": "砰！烟雾弹炸开了，战场上到处都是粉色烟雾，敌人什么也看不见！", "keys": [{"w": "smoke", "p": "/smoʊk/", "zh": "烟雾，粉色，爆炸，看不见"}], "phrases": [{"en": "thick pink smoke", "zh": "浓厚的粉色烟雾"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-15.jpg", "en": "A huge enemy commander tank, three times bigger than the others, pushed through the smoke!", "zh": "一辆比其他坦克大三倍的敌人队长坦克冲破了烟雾！", "keys": [{"w": "commander", "p": "/commander/", "zh": "队长，巨型坦克，冲破，烟雾"}], "phrases": [{"en": "enemy commander tank", "zh": "敌人队长坦克"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-16.jpg", "en": "'Time for the pumpkin bomb!' The kid pressed the big red button on the dashboard.", "zh": "\"该用南瓜弹了！\"小孩按下仪表盘上的大红色按钮。", "keys": [{"w": "pumpkin", "p": "/ˈpʌmpkɪn/", "zh": "南瓜，炮弹，红色按钮，终极"}], "phrases": [{"en": "pumpkin bomb", "zh": "南瓜弹"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-17.jpg", "en": "WHOOSH! A giant glowing pumpkin bomb launched from the cannon, spinning through the sky!", "zh": "嗖——一颗发光的巨大南瓜炮弹从炮管飞出，旋转着飞向天空！", "keys": [{"w": "pumpkin", "p": "/ˈpʌmpkɪn/", "zh": "南瓜，发射，旋转，天空"}], "phrases": [{"en": "giant glowing pumpkin bomb", "zh": "巨大发光的南瓜炮弹"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-18.jpg", "en": "The pumpkin bomb hit the commander tank and exploded into a giant pumpkin shell, trapping it completely!", "zh": "南瓜弹命中了队长坦克，炸开变成巨大的南瓜壳，把敌人整个包住了！", "keys": [{"w": "pumpkin", "p": "/ˈpʌmpkɪn/", "zh": "南瓜"}], "phrases": [{"en": "hit the commander tank", "zh": "命中了队长坦克"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-19.jpg", "en": "Then something incredible happened — the magic seeds sprouted! One pumpkin became ten, then a hundred, then thousands!", "zh": "然后不可思议的事情发生了——魔法种子发芽了！一个南瓜变十个，再变一百个，再变几千个！", "keys": [{"w": "magic", "p": "/ˈmædʒɪk/", "zh": "魔法，发芽，分裂，成千上万"}], "phrases": [{"en": "something incredible happened", "zh": "不可思议的事情发生了"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-20.jpg", "en": "Thick green pumpkin vines grew faster than lightning, wrapping around every enemy tank, truck, and weapon!", "zh": "粗壮的绿色南瓜藤蔓长得比闪电还快，缠住了每一个敌人坦克、卡车和武器！", "keys": [{"w": "vines", "p": "/vaɪnz/", "zh": "藤蔓，缠绕，闪电，敌人"}], "phrases": [{"en": "thick green pumpkin vines", "zh": "粗壮的绿色南瓜藤蔓"}]}, {"img": "images/sugarcane-tank/sugarcane-tank/page-21.jpg", "en": "The enemy commander waved a white flag from inside the pumpkin. 'We give up! Your vegetables are too powerful!'", "zh": "敌人队长从南瓜壳里伸出白旗投降：\"我们认输了！你们的蔬菜太厉害了！\"", "keys": [{"w": "surrender", "p": "/səˈrɛndər/", "zh": "投降，白旗，蔬菜，厉害"}], "phrases": [{"en": "waved a white flag", "zh": "挥舞白旗"}]}];
let cur = 0;
let currentSpeed = 1;
const synth = window.speechSynthesis;

function changeSpeed() {
  currentSpeed = parseFloat(document.getElementById('speedSelect').value);
}

function getVoice(lang) {
  const voices = synth.getVoices();
  if (!voices.length) return null;
  
  if (lang === 'zh') {
    // 中文：优先 Xiaoxiao（温暖女声）, Yunxi（阳光男声）
    const preferred = ['Xiaoxiao', 'Yunxi', 'Yunyang', 'Yunjian'];
    for (const p of preferred) {
      const v = voices.find(vo => vo.lang.startsWith('zh') && vo.name.includes(p));
      if (v) return v;
    }
    return voices.find(vo => vo.lang.startsWith('zh')) || null;
  } else {
    // 英文：优先自然声音
    const preferred = ['Google', 'Microsoft', 'Samantha', 'Daniel', 'Karen', 'Apple', 'Amazon'];
    for (const p of preferred) {
      const v = voices.find(vo => vo.lang.startsWith('en') && vo.name.includes(p));
      if (v) return v;
    }
    return voices.find(vo => vo.lang.startsWith('en')) || null;
  }
}

function renderPage(i) {
  const p = PAGES[i];
  const words = p.en.split(' ').map((w, idx) =>
    `<span class="word" id="w${idx}" onclick="showWordTip(this,'${w.replace(/'/g, "\\'")}')">${w}</span>`
  ).join(' ');

  const vocabCards = (p.keys || []).map(k =>
    `<div class="vocab-card" onclick="speakWord('${k.w}')">
      <div class="v-line"><span class="vw">${k.w}</span><span class="vp">${k.p}</span><span class="vz">${k.zh}</span></div>
      <div class="vph"><span class="vph-en">${k.ph || k.w}</span> ${k.ph ? k.zh : ''}</div>
    </div>`
  ).join('');

  // 如果没有ph字段，用中文解释代替
  const vocabPhrases = (p.keys || []).map(k => k.ph || k.zh).join(', ');

  document.getElementById('pageArea').innerHTML = `
    <img class="page-img" src="../../../${p.img}" alt="page ${i+1}" onerror="this.style.display='none'">
    <div class="text-area">
      <div class="en-sentence">${words}</div>
      <div class="zh-sentence">${p.zh}</div>
      <div class="vocab-row">${vocabCards}</div>
    </div>`;

  document.getElementById('progressFill').style.width = `${(i+1)/PAGES.length*100}%`;
  document.getElementById('pageIndicator').textContent = `${i+1} / ${PAGES.length}`;
  document.getElementById('prevBtn').disabled = i === 0;
  document.getElementById('nextBtn').disabled = i === PAGES.length - 1;
}

function changePage(dir) {
  synth.cancel();
  cur = Math.max(0, Math.min(PAGES.length - 1, cur + dir));
  renderPage(cur);
}

// 随机高亮朗读
let highlightTimer = null;
let highlightRunning = false;

function startRandomHighlight(wordCount, duration) {
  highlightRunning = true;
  const interval = duration / wordCount;
  let idx = 0;
  document.querySelectorAll('.word').forEach(el => el.classList.remove('speaking'));

  function next() {
    if (!highlightRunning) return;
    document.querySelectorAll('.word').forEach(el => el.classList.remove('speaking'));
    if (wordCount > 0) {
      const el = document.getElementById('w' + idx);
      if (el) el.classList.add('speaking');
    }
    idx++;
    if (idx < wordCount) {
      highlightTimer = setTimeout(next, interval);
    } else {
      setTimeout(() => {
        document.querySelectorAll('.word').forEach(el => el.classList.remove('speaking'));
        highlightRunning = false;
      }, 500);
    }
  }
  next();
}

function readCurrent() {
  synth.cancel();
  highlightRunning = false;
  if (highlightTimer) clearTimeout(highlightTimer);
  document.querySelectorAll('.word').forEach(el => el.classList.remove('speaking'));

  const p = PAGES[cur];
  
  // 先读英文整句
  const enUtt = new SpeechSynthesisUtterance(p.en);
  enUtt.lang = 'en-US';
  enUtt.rate = currentSpeed;
  enUtt.pitch = 1.0;
  const enVoice = getVoice('en');
  if (enVoice) enUtt.voice = enVoice;
  
  // 估算朗读时间用于高亮
  const estEnDuration = p.en.split(' ').length * 400; // ms per word
  enUtt.onstart = () => startRandomHighlight(p.en.split(' ').length, estEnDuration * currentSpeed);
  enUtt.onend = () => {
    highlightRunning = false;
    // 再读中文
    if (p.zh) {
      const zhUtt = new SpeechSynthesisUtterance(p.zh);
      zhUtt.lang = 'zh-CN';
      zhUtt.rate = currentSpeed;
      zhUtt.pitch = 1.0;
      const zhVoice = getVoice('zh');
      if (zhVoice) zhUtt.voice = zhVoice;
      synth.speak(zhUtt);
    }
  };
  synth.speak(enUtt);
}

function showWordTip(el, word) {
  speakWord(word);
  if (el.querySelector('.word-tip')) { el.querySelector('.word-tip').remove(); return; }
  const p = PAGES[cur];
  const key = (p.keys || []).find(k => k.w.toLowerCase() === word.toLowerCase().replace(/[.,!?']/g,''));
  if (key) {
    const tip = document.createElement('span');
    tip.className = 'word-tip';
    tip.textContent = `${key.p} ${key.zh}`;
    el.appendChild(tip);
  }
}

function speakWord(word) {
  synth.cancel();
  highlightRunning = false;
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'en-US';
  utt.rate = currentSpeed * 0.8;
  const v = getVoice('en');
  if (v) utt.voice = v;
  synth.speak(utt);
}

renderPage(0);
window.addEventListener('load', () => {
  setTimeout(() => {
    // Load voices then auto-read
    if (synth.getVoices().length > 0) readCurrent();
    else synth.onvoiceschanged = () => setTimeout(readCurrent, 500);
  }, 800);
});
</script>
</body>
</html>
