name: Build & Release Android APK

on:
  push:
    branches: [release/android]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.1, leave empty to auto-increment)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install dependencies
      run: npm install

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Determine version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          # Get latest tag, increment patch
          LATEST=$(git tag --list 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            VERSION="1.0.0"
          else
            # Strip v prefix and increment patch
            MAJOR=$(echo $LATEST | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo $LATEST | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo $LATEST | sed 's/v//' | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"

    - name: Update version in project
      run: |
        # Update package.json
        npm version ${{ steps.version.outputs.version }} --no-git-tag-version
        # Update Android versionName
        sed -i 's/versionName "[^"]*"/versionName "${{ steps.version.outputs.version }}"/' android/app/build.gradle
        # Update Android versionCode (use timestamp-based)
        VERSION_CODE=$(date +%s)
        sed -i 's/versionCode [0-9]*/versionCode '$VERSION_CODE'/' android/app/build.gradle

    - name: Build APK
      working-directory: android
      run: ./gradlew assembleDebug

    - name: Sign APK (debug)
      run: |
        cp android/app/build/outputs/apk/debug/app-debug.apk \
          bilingual-picturebooks-${{ steps.version.outputs.version }}.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ steps.version.outputs.version }}
        path: bilingual-picturebooks-${{ steps.version.outputs.version }}.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: app-${{ needs.build.outputs.version }}

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.build.outputs.tag }}
        name: "双语绘本朗读 v${{ needs.build.outputs.version }}"
        body: |
          ## 📚 双语绘本朗读 Bilingual Picture Book Reader
          
          **版本**: v${{ needs.build.outputs.version }}
          
          ### ✨ Features
          - 12 本双语绘本（237 页）
          - 重点单词 + 词组
          - Android 原生 TTS + 微软语音引擎支持
          - 离线可用
          
          ### 📥 安装说明
          1. 下载 APK
          2. 安装微软语音引擎（可选，推荐）
          3. 打开 App 开始阅读
          
          ### 🔗 在线版本
          https://nonomil.github.io/bilingual-picturebooks/
        files: bilingual-picturebooks-${{ needs.build.outputs.version }}.apk
        draft: false
        prerelease: false
