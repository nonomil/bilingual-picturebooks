name: Build & Release Android APK

on:
  push:
    branches: [release/android]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.1, leave empty to auto-increment)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install dependencies
      run: npm install

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Decode keystore
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release-key.jks

    - name: Determine version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          LATEST=$(git tag --list 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            VERSION="1.0.0"
          else
            MAJOR=$(echo $LATEST | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo $LATEST | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo $LATEST | sed 's/v//' | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"

    - name: Update version in project
      run: |
        npm version ${{ steps.version.outputs.version }} --no-git-tag-version
        MAJOR=$(echo ${{ steps.version.outputs.version }} | cut -d. -f1)
        MINOR=$(echo ${{ steps.version.outputs.version }} | cut -d. -f2)
        PATCH=$(echo ${{ steps.version.outputs.version }} | cut -d. -f3)
        VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
        sed -i 's/versionName "[^"]*"/versionName "${{ steps.version.outputs.version }}"/' android/app/build.gradle
        sed -i 's/versionCode [0-9]*/versionCode '$VERSION_CODE'/' android/app/build.gradle

    - name: Build signed APK
      working-directory: android
      run: |
        ./gradlew assembleRelease \
          -PMYAPP_UPLOAD_STORE_FILE=release-key.jks \
          -PMYAPP_UPLOAD_STORE_PASSWORD=picturebooks123 \
          -PMYAPP_UPLOAD_KEY_ALIAS=bilingual \
          -PMYAPP_UPLOAD_KEY_PASSWORD=picturebooks123

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ steps.version.outputs.version }}
        path: android/app/build/outputs/apk/release/app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: app-${{ needs.build.outputs.version }}

    - name: Rename APK
      run: mv app-release.apk bilingual-picturebooks-${{ needs.build.outputs.version }}.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.build.outputs.tag }}
        name: "双语绘本朗读 v${{ needs.build.outputs.version }}"
        body: |
          ## 📚 双语绘本朗读 Bilingual Picture Book Reader

          **版本**: v${{ needs.build.outputs.version }}

          ### ✨ Features
          - 12 本双语绘本（237 页）
          - 重点单词 + 词组
          - 预生成音频（edge-tts 晓晓/云希音色）
          - 系统 TTS 回退
          - 离线音频播放

          ### 📥 安装说明
          1. 下载 APK 直接安装（可覆盖旧版本）
          2. 推荐安装微软语音引擎（可选）

          ### 🔗 在线版本
          https://nonomil.github.io/bilingual-picturebooks/
        files: bilingual-picturebooks-${{ needs.build.outputs.version }}.apk
        draft: false
        prerelease: false
