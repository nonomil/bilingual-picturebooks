<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中英文绘本朗读</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FFF8F0;--c:#fff;--p:#FF8C42;--pl:#FFE4CC;--a:#6BCB77;--t:#3D3D3D;--tl:#888;--h:#FFCC80;--sh:0 4px 20px rgba(0,0,0,.08);--r:20px}
body{font-family:'PingFang SC',Arial,sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.nbar{position:fixed;top:0;left:0;right:0;height:64px;background:rgba(255,248,240,.96);backdrop-filter:blur(10px);display:flex;align-items:center;padding:0 24px;z-index:1000;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.nl{font-size:20px;font-weight:700;color:var(--p);cursor:pointer}
.ni{display:flex;gap:8px;margin-left:auto}
.nb{padding:8px 16px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:600;border:none;background:transparent;color:var(--t);transition:.2s}
.nb:hover{background:var(--pl);color:var(--p)}
.scr{display:none;padding-top:80px;min-height:100vh;animation:fadeIn .3s ease}
.scr.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hh{text-align:center;padding:40px 20px 10px}
.hh h1{font-size:30px;color:var(--p);margin-bottom:8px}
.hh p{color:var(--tl);font-size:15px}
.cats{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;padding:20px 32px 60px;max-width:900px;margin:0 auto}
.cc{background:var(--c);border-radius:var(--r);padding:32px 24px;text-align:center;box-shadow:var(--sh);cursor:pointer;transition:.2s;border:3px solid transparent}
.cc:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.12);border-color:var(--p)}
.ci{font-size:60px;margin-bottom:12px}.ct{font-size:19px;font-weight:700;margin-bottom:4px}
.cs{font-size:13px;color:var(--tl);margin-bottom:16px}
.cb{background:var(--p);color:#fff;border:none;padding:12px 32px;border-radius:50px;font-size:16px;font-weight:600;cursor:pointer;transition:.2s}
.cb:hover{transform:scale(1.05)}
.chd{display:flex;align-items:center;padding:20px 24px;gap:16px}
.bb{background:var(--c);border:none;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer;box-shadow:var(--sh)}
.sb{background:var(--c);border:2px solid var(--p);color:var(--p);padding:8px 16px;border-radius:50px;font-size:14px;font-weight:600;cursor:pointer}
.sl{padding:10px 32px 40px;max-width:580px;margin:0 auto}
.sc{background:var(--c);border-radius:var(--r);padding:24px;box-shadow:var(--sh);margin-bottom:16px;cursor:pointer;transition:.2s;border-left:6px solid var(--p)}
.sc:hover{transform:translateX(4px)}
.sc h3{font-size:17px;margin-bottom:4px}
.sc p{font-size:13px;color:var(--tl);margin-bottom:10px}
.ss{background:var(--a);color:#fff;border:none;padding:10px 28px;border-radius:50px;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;transition:.2s}
.ss:hover{transform:scale(1.05)}
.rh{display:flex;align-items:center;padding:16px 20px;gap:12px;background:var(--c);box-shadow:0 2px 12px rgba(0,0,0,.06)}
.rp{flex:1;height:8px;background:#eee;border-radius:4px;overflow:hidden}
.rb{height:100%;background:linear-gradient(90deg,var(--p),#FF6B6B);border-radius:4px;transition:width .5s}
.pn{font-size:14px;font-weight:600;color:var(--tl);min-width:65px;text-align:center}
.sc2{display:flex;align-items:center;gap:6px;background:var(--pl);padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600;color:var(--p);cursor:pointer;border:none}
.pb{width:52px;height:52px;border-radius:50%;background:var(--p);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(255,140,66,.4);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rb2{padding:20px;max-width:680px;margin:0 auto}
.sb2{text-align:center;padding:8px 16px;font-size:13px;color:var(--tl);background:var(--c);border-radius:8px;margin-bottom:12px;box-shadow:var(--sh)}
.ip{width:100%;height:200px;background:linear-gradient(135deg,#FFE4CC,#D4F0C4);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:56px;margin-bottom:20px;box-shadow:var(--sh)}
.ta{background:var(--c);border-radius:var(--r);padding:28px 24px;box-shadow:var(--sh);margin-bottom:20px;text-align:center}
.et{font-size:21px;font-weight:600;color:#333;margin-bottom:14px;line-height:1.8}
.zt{font-size:17px;color:#555;line-height:1.8}
.w{transition:background .15s,color .15s;border-radius:4px;padding:0 1px;display:inline}
.w.hl{background:var(--h);color:#333}
.w.dn{color:#ccc}
.kb{background:var(--c);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:20px}
.kt{font-size:13px;font-weight:700;color:var(--p);margin-bottom:14px;text-transform:uppercase;letter-spacing:1px}
.kr{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.ki{display:flex;align-items:center;gap:4px;font-size:14px;background:var(--bg);padding:5px 10px;border-radius:8px}
.ke{font-weight:700;color:#333}
.kp{color:#888;font-size:12px;font-style:italic}
.kz{color:var(--tl);font-size:13px}
.nbs{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.nb2{padding:14px 36px;border-radius:50px;font-size:16px;font-weight:600;cursor:pointer;border:none;transition:.2s}
.nb2:hover{transform:scale(1.05)}
.nb3{background:#eee;color:var(--t)}
.nb4{background:var(--p);color:#fff}
.nb2:disabled{opacity:.4;cursor:not-allowed;transform:none}
.pds{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:0 20px 50px}
.dt{width:10px;height:10px;border-radius:50%;background:#ddd;cursor:pointer;transition:.2s}
.dt.ac{background:var(--p);transform:scale(1.4)}
.dt.dn{background:var(--a)}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2000;align-items:flex-end;justify-content:center}
.mo.show{display:flex}
.sm{background:#fff;border-radius:24px 24px 0 0;padding:28px 32px 48px;width:100%;max-width:500px}
.sm h3{font-size:18px;margin-bottom:20px;text-align:center}
.so{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.so button{padding:10px 22px;border-radius:50px;border:2px solid #eee;background:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
.so button.sel{border-color:var(--p);background:var(--pl);color:var(--p)}
</style>
</head>

    <div class="cc" onclick="goCategory(0)"><div class="ci">🌻</div><div class="ct">植物大战僵尸</div><div class="cs">The Brave Pea Shooter · 勇敢的豌豆射手</div><button class="cb">▶ 开始阅读</button></div>

<script>
var S=[{"id": 0, "i": "🌻", "t": "植物大战僵尸", "s": "The Brave Pea Shooter / 勇敢的豌豆射手", "p": [{"en": "One sunny morning, in a peaceful garden, a little pea shooter named Pipi was born.", "zh": "一个阳光明媚的早晨，在一个平静的花园里，一个名叫皮皮的小豌豆射手诞生了。", "k": [{"e": "pea shooter", "p": "/piː ˈʃuːtər/", "z": "豌豆射手"}, {"e": "peaceful", "p": "/ˈpiːsfl/", "z": "平静的"}]}, {"en": "\"Good morning, Little Sun!\" said Pipi, waving his green leaves.", "zh": "\"早上好，小阳！\"皮皮挥动着绿色的叶子说道。", "k": [{"e": "wave", "p": "/weɪv/", "z": "挥动"}]}, {"en": "\"Good morning, Pipi!\" she replied, her petals sparkling in the light.", "zh": "\"早上好，皮皮！\"她回答道，花瓣在阳光下闪闪发光。", "k": []}, {"en": "But suddenly, the ground began to shake. A strange noise came from the far edge of the garden.", "zh": "但突然，大地开始震动。一个奇怪的声音从花园的远处传来。", "k": [{"e": "suddenly", "p": "/ˈsʌdənli/", "z": "突然"}]}, {"en": "\"What's that?\" asked Little Sun, worried. A huge red creature was marching toward them — the Road-Block Zombie!", "zh": "\"那是什么？\"小阳担心地问道。一个巨大的红色生物正向他们进军——路障僵尸！", "k": [{"e": "creature", "p": "/ˈkriːtʃər/", "z": "生物"}]}, {"en": "The Road-Block Zombie carried a bright orange cone on his head. He walked slowly but never stopped.", "zh": "路障僵尸头上顶着一个明亮的橙色路障。他走得很慢但从不停止。", "k": [{"e": "slowly", "p": "/ˈsloʊli/", "z": "缓慢地"}]}, {"en": "\"We need to stop him!\" shouted Pipi. He stretched tall and fired green peas at the zombie!", "zh": "\"我们需要阻止他！\"皮皮喊道。他挺直身子，向僵尸发射绿色的豌豆！", "k": [{"e": "fire", "p": "/ˈfaɪər/", "z": "发射"}]}, {"en": "But the peas bounced off the cone! The zombie kept coming!", "zh": "但豌豆从路障上弹开了！僵尸继续前进！", "k": [{"e": "bounce", "p": "/baʊns/", "z": "弹开"}]}, {"en": "\"My cone is too strong!\" laughed the zombie. Little Sun's petals drooped with worry.", "zh": "\"我的路障太强了！\"僵尸大笑着说。小阳的花瓣因担心而垂了下来。", "k": [{"e": "worry", "p": "/ˈwɜːri/", "z": "担心"}]}, {"en": "\"Don't be sad, Little Sun!\" said Pipi. \"We are a team! You power me with sunshine, and I'll protect our garden!\"", "zh": "\"别伤心，小阳！\"皮皮说。\"我们是一个团队！你用阳光给我能量，我保护我们的花园！\"", "k": [{"e": "team", "p": "/tiːm/", "z": "团队"}]}, {"en": "Little Sun stood up straight. Her petals glowed bright yellow. Energy flowed from her to Pipi!", "zh": "小阳站直了身子。她的花瓣发出明亮的黄色光芒。能量从她流向皮皮！", "k": [{"e": "energy", "p": "/ˈenərdʒi/", "z": "能量"}]}, {"en": "Pipi grew bigger and stronger! His leaves turned dark green. He could feel Little Sun's courage inside him.", "zh": "皮皮变得更大更强壮了！他的叶子变成了深绿色。他能感受到小阳给他的勇气。", "k": [{"e": "courage", "p": "/ˈkɜːrɪdʒ/", "z": "勇气"}]}, {"en": "\"Now, watch this!\" said Pipi. He aimed carefully at the gap above the cone — and fired a superpower pea!", "zh": "\"现在，看这个！\"皮皮说。他瞄准路障上方的缝隙——发射了一颗超级豌豆！", "k": [{"e": "aim", "p": "/eɪm/", "z": "瞄准"}]}, {"en": "The superpower pea flew high in a perfect arc. It soared over the cone and hit the zombie right on his nose!", "zh": "超级豌豆完美地抛向天空。它飞过路障，正好击中了僵尸的鼻子！", "k": [{"e": "nose", "p": "/noʊz/", "z": "鼻子"}]}, {"en": "\"Ouch!\" screamed the zombie. He stumbled and fell backward. His cone rolled away!", "zh": "\"哎哟！\"僵尸尖叫着。他踉跄着向后倒下。他的路障滚走了！", "k": [{"e": "stumble", "p": "/ˈstʌmbl/", "z": "踉跄"}]}, {"en": "\"We did it!\" cheered Little Sun, jumping up and down. \"We did it together!\"", "zh": "\"我们做到了！\"小阳高兴得跳上跳下。\"我们一起做到的！\"", "k": [{"e": "together", "p": "/təˈɡeðər/", "z": "一起"}]}, {"en": "The zombie got up slowly. He looked at Pipi and Little Sun. For the first time, he didn't look so scary.", "zh": "僵尸慢慢站起来。他看着皮皮和小阳。第一次，他看起来不那么可怕了。", "k": [{"e": "scary", "p": "/ˈskeri/", "z": "可怕的"}]}, {"en": "\"Your teamwork is strong,\" said the zombie. \"I was lonely, so I troubled you. I'm sorry.\"", "zh": "\"你们的团队合作很强，\"僵尸说。\"我很孤独，所以才来打扰你们。对不起。\"", "k": [{"e": "teamwork", "p": "/ˈtiːmwɜːrk/", "z": "团队合作"}]}, {"en": "Little Sun smiled warmly. \"You can stay in the corner of our garden. We'll be friends!\"", "zh": "小阳温暖地笑了。\"你可以留在我们花园的角落里。我们做朋友吧！\"", "k": [{"e": "friend", "p": "/frend/", "z": "朋友"}]}, {"en": "Pipi learned that being brave doesn't mean fighting alone. Real strength comes from friendship and working together.", "zh": "皮皮明白了，勇敢并不意味着独自战斗。真正的力量来自友谊和团队合作。", "k": [{"e": "brave", "p": "/breɪv/", "z": "勇敢的"}]}]}, {"id": 1, "i": "🧱", "t": "我的世界", "s": "Steve vs The Wither — Sky Knight / 天空骑士", "p": [{"en": "Steve lived in a quiet village. He was a builder, a miner, and a dreamer.", "zh": "史蒂夫住在一个安静的村庄里。他是一个建造者，一个矿工，也是一个梦想家。", "k": [{"e": "village", "p": "/ˈvɪlɪdʒ/", "z": "村庄"}]}, {"en": "One day, the sky turned dark. A terrible roar shook the ground. The Wither was coming.", "zh": "有一天，天空变暗了。可怕的咆哮震动了大地。凋零来了。", "k": [{"e": "terrible", "p": "/ˈterəbl/", "z": "可怕的"}]}, {"en": "\"I need to fight it from the sky,\" Steve said. He began to build something no one had ever seen — an airplane.", "zh": "\"我需要从天空战斗它，\"史蒂夫说。他开始建造一个从来没有人见过的东西——一架飞机。", "k": [{"e": "airplane", "p": "/ˈerpleɪn/", "z": "飞机"}]}, {"en": "Day and night, Steve worked on his airplane. He hammered iron, bent wood, and attached big propellers.", "zh": "日日夜夜，史蒂夫在他的飞机上工作。他锤打铁器，弯曲木材，安装巨大的螺旋桨。", "k": [{"e": "propeller", "p": "/prəˈpelər/", "z": "螺旋桨"}]}, {"en": "Finally, it was done. A beautiful red biplane, shining in the sunlight. Steve called it \"Sky Knight.\"", "zh": "终于，它完成了。一架美丽的红色双翼飞机，在阳光下闪闪发光。史蒂夫叫它\"天空骑士\"。", "k": [{"e": "finally", "p": "/ˈfaɪnəli/", "z": "终于"}]}, {"en": "The villagers gathered to watch. Steve put on his goggles and climbed into the cockpit.", "zh": "村民们聚在一起观看。史蒂夫戴上护目镜，爬进驾驶舱。", "k": [{"e": "cockpit", "p": "/ˈkɑːkpɪt/", "z": "驾驶舱"}]}, {"en": "The engine roared. The propeller spun faster and faster. Then, Steve was flying!", "zh": "引擎轰鸣。螺旋桨越转越快。然后，史蒂夫飞起来了！", "k": [{"e": "engine", "p": "/ˈendʒɪn/", "z": "引擎"}]}, {"en": "Up in the sky, everything looked different. The world was big and beautiful. Steve felt free like a bird.", "zh": "在天空中，一切看起来都不一样了。世界很大很美。史蒂夫感觉像鸟一样自由。", "k": [{"e": "free", "p": "/friː/", "z": "自由的"}]}, {"en": "But soon, the sky grew dark again. Purple clouds swirled ahead. Steve gripped the controls tightly.", "zh": "但很快，天空又变暗了。紫色的云在前方旋转。史蒂夫紧紧握住操纵杆。", "k": [{"e": "control", "p": "/kənˈtroʊl/", "z": "控制"}]}, {"en": "Then he saw it — the Wither. A giant creature with three heads, glowing blue eyes, and dark power swirling around it.", "zh": "然后他看到了——凋零。一个巨大的生物，有三个头，发出蓝色光芒的眼睛，黑暗的力量在它周围旋转。", "k": [{"e": "giant", "p": "/ˈdʒaɪənt/", "z": "巨大的"}]}, {"en": "The Wither shot explosive skulls at Steve! He swerved left, then right. BOOM! BOOM! The sky was full of explosions.", "zh": "凋零向史蒂夫射出爆炸骷髅头！他向左转，然后向右转。轰！轰！天空中满是爆炸。", "k": [{"e": "explosive", "p": "/ɪkˈsploʊsɪv/", "z": "爆炸的"}]}, {"en": "One skull came straight at him! Steve flipped his plane upside down and zoomed past it. Close call!", "zh": "一个骷髅头直冲他而来！史蒂夫把飞机翻了过来，从它旁边飞过。好险！", "k": [{"e": "zoom", "p": "/zuːm/", "z": "飞驰"}]}, {"en": "\"I need to fight back!\" Steve grabbed his enchanted bow. He had special arrows — arrows of light.", "zh": "\"我需要反击！\"史蒂夫拿起他的附魔弓。他有特殊的箭——光之箭。", "k": [{"e": "enchanted", "p": "/ɪnˈtʃæntɪd/", "z": "附魔的"}]}, {"en": "Steve aimed carefully. He fired! Golden arrows streaked through the dark sky like shooting stars.", "zh": "史蒂夫仔细瞄准。他射箭了！金色的箭像流星一样划过黑暗的天空。", "k": [{"e": "shooting star", "p": "/ˈʃuːtɪŋ stɑːr/", "z": "流星"}]}, {"en": "HIT! The arrow struck the Wither's first head. It screamed in pain! Blue sparks flew everywhere.", "zh": "命中！箭射中了凋零的第一个头。它痛苦地尖叫！蓝色火花四处飞溅。", "k": [{"e": "scream", "p": "/skriːm/", "z": "尖叫"}]}, {"en": "The Wither was furious! It grew bigger and shot skulls in every direction. The sky became a battlefield.", "zh": "凋零暴怒了！它变得更大，向四面八方射出骷髅头。天空变成了战场。", "k": [{"e": "battlefield", "p": "/ˈbætlfiːld/", "z": "战场"}]}, {"en": "CRASH! A skull hit Steve's wing. Smoke poured out. The plane shook. But Steve did not give up.", "zh": "砰！一个骷髅头击中了史蒂夫的机翼。烟冒了出来。飞机摇晃着。但史蒂夫没有放弃。", "k": [{"e": "give up", "p": "/ɡɪv ʌp/", "z": "放弃"}]}, {"en": "Steve stood up in his cockpit. He had one arrow left — his strongest one. \"This is for my village!\"", "zh": "史蒂夫在驾驶舱里站起来。他只剩一支箭了——他最强的一支。\"这是为了我的村庄！\"", "k": [{"e": "heroic", "p": "/hɪˈroʊɪk/", "z": "英雄的"}]}, {"en": "He fired! The golden arrow flew straight and true. It split into three beams of light and hit all three heads at once!", "zh": "他射箭了！金色的箭笔直飞去。它分裂成三束光，同时击中了三个头！", "k": [{"e": "split", "p": "/splɪt/", "z": "分裂"}]}, {"en": "The Wither was gone! Light filled the sky. Steve flew home through a golden sunset. He was a hero — the Sky Knight!", "zh": "凋零消失了！光芒充满天空。史蒂夫穿过金色的夕阳飞回家。他是一个英雄——天空骑士！", "k": [{"e": "hero", "p": "/ˈhɪroʊ/", "z": "英雄"}]}]}, {"id": 2, "i": "🐍", "t": "宫西达也", "s": "好饿的小蛇 / The Very Hungry Little Snake", "p": [{"en": "A little snake wiggles and wiggles along the path on a sunny morning.", "zh": "一个阳光明媚的早晨，小蛇一扭一扭地在小路上散步。", "k": [{"e": "wiggle", "p": "/ˈwɪɡl/", "z": "一扭一扭地"}]}, {"en": "He sees a round, red apple. \"What will he do?\" He goes... MUNCH, MUNCH, MUNCH! \"Yum, so delicious!\"", "zh": "他看到一个圆圆的红苹果。\"你猜他会怎么做？\"他啊呜，啊呜，真好吃！", "k": [{"e": "delicious", "p": "/dɪˈlɪʃəs/", "z": "好吃"}]}, {"en": "The next day, the hungry little snake is wiggling along again. He sees a long, yellow banana.", "zh": "第二天，好饿的小蛇又一扭一扭地去散步了。他看到一根弯弯的黄香蕉。", "k": [{"e": "banana", "p": "/bəˈnænə/", "z": "香蕉"}]}, {"en": "On the third day, the hungry little snake is wiggling along again. He sees a triangular, white rice ball.", "zh": "第三天，好饿的小蛇又一扭一扭地去散步了。他看到一个三角形的小饭团。", "k": [{"e": "rice ball", "p": "/raɪs bɔːl/", "z": "饭团"}]}, {"en": "On the fourth day, the hungry little snake is wiggling along again. He sees a big bunch of purple grapes.", "zh": "第四天，好饿的小蛇又一扭一扭地去散步了。他看到一大串紫色的葡萄。", "k": [{"e": "grapes", "p": "/ɡreɪps/", "z": "葡萄"}]}, {"en": "On the fifth day, the hungry little snake is wiggling along again. He sees a pointy pineapple.", "zh": "第五天，好饿的小蛇又一扭一扭地去散步了。他看到一个尖尖的菠萝。", "k": [{"e": "pineapple", "p": "/ˈpaɪnæpl/", "z": "菠萝"}]}, {"en": "On the sixth day, the hungry little snake is wiggling along again. He sees many red apples on a big tree.", "zh": "第六天，好饿的小蛇又一扭一扭地去散步了。他看到树上有许多红苹果。", "k": [{"e": "tree", "p": "/triː/", "z": "树"}]}, {"en": "His tail is here! He is a very happy, full little snake. THE END", "zh": "他的尾巴在这里呀！他是一条非常开心、饱饱的小蛇。", "k": [{"e": "happy", "p": "/ˈhæpi/", "z": "开心的"}]}]}];
</script>

<script>
var isPlaying=false;
var currentPage=0;
var currentCat=0;
var autoNext=true;
var speed=1.0;
function goHome(){stopSpeech();document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('active');});document.getElementById('screen-home').classList.add('active');}
function goCategory(id){stopSpeech();currentCat=id;var st=S[id];document.getElementById('cat-title').textContent=st.i+' '+st.t;document.getElementById('img-placeholder').textContent=st.i;var list=document.getElementById('story-list');list.innerHTML='';var card=document.createElement('div');card.className='sc';card.innerHTML='<h3>'+st.i+' '+st.t+'</h3><p>'+st.s+'</p><div style="display:flex;gap:12px;font-size:13px;color:#888;margin-bottom:8px"><span>'+st.p.length+'页</span><span>英文+中文</span></div><button class="ss" onclick="event.stopPropagation();startStory(0)">▶ 开始阅读</button>';card.onclick=function(){startStory(0);};list.appendChild(card);document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('active');});document.getElementById('screen-category').classList.add('active');}
function startStory(idx){currentPage=0;loadPage();document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('active');});document.getElementById('screen-reader').classList.add('active');}
function loadPage(){stopSpeech();var st=S[currentCat];var pg=st.p[currentPage];var total=st.p.length;document.getElementById('img-placeholder').textContent=st.i;document.getElementById('page-num').textContent=(currentPage+1)+'/'+total;document.getElementById('progress-bar').style.width=((currentPage+1)/total*100)+'%';document.getElementById('btn-prev').disabled=currentPage===0;document.getElementById('btn-next').disabled=currentPage>=total-1;var enEl=document.getElementById('en-text');var words=pg.en.split(' ');var html='';for(var i=0;i<words.length;i++){html+='<span class="w" id="w'+i+'">'+words[i]+' </span>';}enEl.innerHTML=html;document.getElementById('zh-text').textContent=pg.zh;var kwEl=document.getElementById('keywords-list');if(pg.k.length===0){kwEl.innerHTML='<div class="kr"><span class="ki"><span class="ke" style="color:#ccc">本页无关键词</span></span></div>';}else{var rows='';for(var ri=0;ri<pg.k.length;ri+=3){rows+='<div class="kr">';for(var ci=ri;ci<Math.min(ri+3,pg.k.length);ci++){var kw=pg.k[ci];rows+='<span class="ki"><span class="ke">'+kw.e+'</span> <span class="kp">'+kw.p+'</span> <span class="kz">'+kw.z+'</span></span>';}rows+='</div>';}kwEl.innerHTML=rows;}var dotsEl=document.getElementById('page-dots');dotsEl.innerHTML='';for(var d=0;d<total;d++){var dot=document.createElement('span');dot.className='dt'+(d===currentPage?' ac':'')+(d<currentPage?' dn':'');dot.onclick=(function(i){return function(){currentPage=i;loadPage();};})(d);dotsEl.appendChild(dot);}document.getElementById('status-bar').textContent='准备就绪';}
function togglePlay(){if(isPlaying){stopSpeech();}else{playPage();}}
function playPage(){var st=S[currentCat];var pg=st.p[currentPage];isPlaying=true;document.getElementById('play-btn').textContent='⏸';document.getElementById('status-bar').textContent='朗读中...';var words=pg.en.split(' ');for(var i=0;i<words.length;i++){var el=document.getElementById('w'+i);if(el)el.className='w';}var wi=0;function hlNext(){if(wi<words.length){var el=document.getElementById('w'+wi);if(el)el.className='w hl';if(wi>0){var prev=document.getElementById('w'+(wi-1));if(prev)prev.className='w dn';}wi++;setTimeout(hlNext,Math.max(100,300/speed));}}hlNext();function done(){isPlaying=false;document.getElementById('play-btn').textContent='▶';document.getElementById('status-bar').textContent='朗读完成';if(autoNext&&currentPage<st.p.length-1){setTimeout(function(){currentPage++;loadPage();playPage();},1000);}}speakEN(pg.en,function(){if(pg.zh){speakZH(pg.zh,done);}else{done();}});}
function stopSpeech(){if(window.speechSynthesis)window.speechSynthesis.cancel();isPlaying=false;try{document.getElementById('play-btn').textContent='▶';}catch(e){}}
function speakEN(text,cb){var ut=new SpeechSynthesisUtterance(text);ut.lang='en-US';ut.rate=speed;var voices=window.speechSynthesis.getVoices();var preferred=['Google US English','Microsoft David'];for(var i=0;i<preferred.length;i++){for(var j=0;j<voices.length;j++){if(voices[j].name.indexOf(preferred[i])>=0){ut.voice=voices[j];break;}}if(ut.voice)break;}ut.onend=cb;ut.onerror=cb;window.speechSynthesis.speak(ut);}
function speakZH(text,cb){var ut=new SpeechSynthesisUtterance(text);ut.lang='zh-CN';ut.rate=speed;var voices=window.speechSynthesis.getVoices();var preferred=['Google 简体中文','Microsoft Huihui'];for(var i=0;i<preferred.length;i++){for(var j=0;j<voices.length;j++){if(voices[j].name.indexOf(preferred[i])>=0){ut.voice=voices[j];break;}}if(ut.voice)break;}ut.onend=cb;ut.onerror=cb;window.speechSynthesis.speak(ut);}
function prevPage(){if(currentPage>0){currentPage--;loadPage();}}
function nextPage(){var st=S[currentCat];if(currentPage<st.p.length-1){currentPage++;loadPage();}}
function setSpeed(s){speed=s;document.getElementById('speed-label').textContent=s+'x';document.getElementById('speed-label2').textContent=s+'x';document.querySelectorAll('.so button').forEach(function(b){b.classList.remove('sel');});event.target.classList.add('sel');document.getElementById('speed-modal').classList.remove('show');}
function showSpeedModal(){document.getElementById('speed-modal').classList.add('show');}
document.getElementById('speed-modal').onclick=function(e){if(e.target===this)this.classList.remove('show');};
if(window.speechSynthesis)window.speechSynthesis.getVoices();
if(window.speechSynthesis)window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
</script>
</body>
</html>
