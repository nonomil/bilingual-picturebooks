<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugarcane Tank Battle — 游戏版</title>
<style>
  body { font-family:'Nunito','Comic Sans MS',cursive; background:#1a1a2e;
         min-height:100vh; display:flex; align-items:center; justify-content:center;
         overflow:hidden; }

  .starfield { position:fixed; inset:0; pointer-events:none; }

  .game-card { background:#16213e; border-radius:24px;
               padding:32px; max-width:700px; width:92%;
               border:2px solid #0f3460; position:relative; z-index:1; }

  .top-bar { display:flex; justify-content:space-between; 
             align-items:center; margin-bottom:24px; }
  .star-display { font-size:28px; }
  .unit-title { color:#e2b96f; font-size:18px; }

  .stage-title { color:#a8e6cf; font-size:22px; 
                 margin-bottom:20px; text-align:center; }

  .options-grid { display:grid; grid-template-columns:1fr 1fr;
                  gap:16px; margin-top:16px; }
  .opt-btn { background:#0f3460; color:#e2e2e2; border:2px solid #1a4a80;
             border-radius:16px; padding:20px; font-size:18px; cursor:pointer;
             transition: all .2s; text-align:center; }
  .opt-btn:hover { border-color:#e2b96f; transform:scale(1.03); }
  .opt-btn.correct { background:#2ecc71; border-color:#27ae60; color:#fff; }
  .opt-btn.wrong   { background:#e74c3c; border-color:#c0392b; color:#fff; }

  .drag-area { display:flex; gap:32px; justify-content:center; margin-top:24px; }
  .drag-words { display:flex; flex-direction:column; gap:12px; }
  .drag-item  { background:#0f3460; color:#e2e2e2; border-radius:12px;
                padding:12px 24px; cursor:grab; font-size:18px;
                border:2px solid transparent; transition:.2s; }
  .drag-item:hover { border-color:#e2b96f; }
  .drop-zones { display:flex; flex-direction:column; gap:12px; }
  .drop-zone  { background:#0a2844; border:2px dashed #1a4a80;
                border-radius:12px; padding:12px 24px; min-width:100px;
                font-size:28px; text-align:center; }
  .drop-zone.matched { border-color:#2ecc71; background:#0d3b1e; }

  @keyframes starPop {
    0%   { transform:scale(0) rotate(-20deg); opacity:0; }
    60%  { transform:scale(1.3) rotate(10deg); opacity:1; }
    100% { transform:scale(1) rotate(0); opacity:1; }
  }
  .star-pop { animation: starPop .5s ease-out forwards; }

  .finish-page { text-align:center; }
  .big-stars    { font-size:60px; letter-spacing:8px; }
  .finish-msg   { color:#a8e6cf; font-size:22px; margin:20px 0; }
  .next-unit-btn{ background:#e2b96f; color:#1a1a2e; border:none;
                  border-radius:50px; padding:14px 40px; font-size:20px;
                  cursor:pointer; font-weight:bold; margin-top:16px; }

  .story-intro { text-align:center; margin-bottom:20px; }
  .story-intro img { max-width:200px; border-radius:12px; margin:10px 0; }
  .story-intro p { color:#e2e2e2; font-size:16px; line-height:1.6; }

  h3 { color:#e17055; margin-bottom:16px; }
</style>
</head>
<body>
<canvas class="starfield" id="starCanvas"></canvas>
<div class="game-card">
  <div class="top-bar">
    <div class="unit-title">Sugarcane Tank Battle</div>
    <div class="star-display"><span id="starCount">⭐ 0</span></div>
  </div>
  <div id="stageArea"></div>
</div>

<script>
const STORY = {"id": "sugarcane-tank", "title": "Sugarcane Tank Battle", "titleZh": "甘蔗坦克大作战", "category": "我的世界", "cover": "images/covers/cover-sugarcane-tank.jpg", "pages": [{"img": "images/sugarcane-tank/page-1.jpg", "en": "In a small village surrounded by green hills, there lived a brave little kid who loved building things.", "zh": "在一个被青山环绕的小村庄里，住着一个爱动手做东西的勇敢小孩。", "keys": [{"w": "village", "p": "/ˈvɪlɪdʒ/", "zh": "村庄，青山，勇敢，动手"}], "phrases": [{"en": "surrounded by green hills", "zh": "被青山环绕"}]}, {"img": "images/sugarcane-tank/page-2.jpg", "en": "Inside the workshop, the kid had been building something amazing — a tank made entirely of vegetables!", "zh": "工坊里，小孩一直在秘密制造一件了不起的东西——一辆全蔬菜做的坦克！", "keys": [{"w": "workshop", "p": "/ˈwɜːrkʃɑːp/", "zh": "工坊，秘密，坦克，蔬菜"}], "phrases": [{"en": "Inside the workshop", "zh": "在工坊里"}]}, {"img": "images/sugarcane-tank/page-3.jpg", "en": "The kid attached a hollow sugarcane tube as the cannon barrel. It smelled sweet like candy!", "zh": "小孩把一根空心甘蔗装上去当炮管，闻起来像糖果一样甜！", "keys": [{"w": "sugarcane", "p": "/ˈʃʊɡərkeɪn/", "zh": "甘蔗，炮管，甜，糖果"}], "phrases": [{"en": "hollow sugarcane tube", "zh": "空心甘蔗管"}]}, {"img": "images/sugarcane-tank/page-4.jpg", "en": "Round brown potato mines were loaded into the back of the tank, each coated in sticky golden syrup.", "zh": "圆圆的棕色土豆雷被装进坦克后面的弹仓，每个都裹着黏糊糊的金色糖浆。", "keys": [{"w": "potato", "p": "/pəˈteɪtoʊ/", "zh": "土豆，地雷，糖浆，金色"}], "phrases": [{"en": "potato mines", "zh": "土豆雷"}]}, {"img": "images/sugarcane-tank/page-5.jpg", "en": "Little Milk got a special tiny harness with pockets for smoke bombs. The puppy wagged its tail excitedly!", "zh": "小牛奶穿上了一件特别的小背心，口袋里装着烟雾弹，小狗兴奋地摇着尾巴！", "keys": [{"w": "puppy", "p": "/ˈpʌpi/", "zh": "小狗，背心，烟雾弹，兴奋"}], "phrases": [{"en": "special tiny harness", "zh": "特别的小背心"}]}, {"img": "images/sugarcane-tank/page-6.jpg", "en": "The biggest surprise — hollow pumpkin shells filled with magic growing seeds that could multiply forever!", "zh": "最大的秘密武器——掏空的南瓜壳里装着魔法生长种子，能无限分裂繁殖！", "keys": [{"w": "pumpkin", "p": "/ˈpʌmpkɪn/", "zh": "南瓜，炮弹，魔法种子，分裂"}], "phrases": [{"en": "hollow pumpkin shells", "zh": "掏空的南瓜壳"}]}, {"img": "images/sugarcane-tank/page-7.jpg", "en": "The sugarcane tank was finally complete! It had a sugarcane cannon, potato mine launcher, and pumpkin bomb bay.", "zh": "甘蔗坦克终于完工了！它有甘蔗炮、土豆雷发射器和南瓜弹仓。", "keys": [{"w": "complete", "p": "/kəmˈpliːt/", "zh": "完工，准备，坦克，武器"}], "phrases": [{"en": "sugarcane tank", "zh": "甘蔗坦克"}]}, {"img": "images/sugarcane-tank/page-8.jpg", "en": "Suddenly, a loud alarm echoed through the village — enemy tanks were approaching from the east!", "zh": "突然，村庄响起了警报——敌人的坦克正从东边逼近！", "keys": [{"w": "alarm", "p": "/əˈlɑːrm/", "zh": "警报，敌人，坦克，逼近"}], "phrases": [{"en": "a loud alarm echoed through the village", "zh": "警报声响彻整个村庄"}]}, {"img": "images/sugarcane-tank/page-9.jpg", "en": "Ten big steel tanks rolled into the village, crushing fences and scaring everyone away.", "zh": "十辆钢铁大坦克开进了村庄，压坏了栅栏，把大家都吓跑了。", "keys": [{"w": "enemy", "p": "/ˈɛnəmi/", "zh": "敌人，入侵，钢铁坦克，可怕"}], "phrases": [{"en": "big steel tanks", "zh": "巨大的钢铁坦克"}]}, {"img": "images/sugarcane-tank/page-10.jpg", "en": "'It's time to protect our home!' The kid jumped into the sugarcane tank and started the engine.", "zh": "\"是时候保护我们的家了！\"小孩跳进甘蔗坦克，发动了引擎。", "keys": [{"w": "charge", "p": "/tʃɑːrdʒ/", "zh": "出击，保护，引擎，勇敢"}], "phrases": [{"en": "protect our home", "zh": "保护我们的家"}]}, {"img": "images/sugarcane-tank/page-11.jpg", "en": "BANG! The sugarcane cannon fired a sticky syrup bomb that splattered all over the first enemy tank's tracks!", "zh": "砰！甘蔗炮发射了一发黏糊糊的糖浆弹，糊住了第一辆敌人坦克的履带！", "keys": [{"w": "syrup", "p": "/ˈsɪrəp/", "zh": "糖浆，发射，黏糊糊，履带"}], "phrases": [{"en": "sticky syrup bomb", "zh": "黏糊糊的糖浆弹"}]}, {"img": "images/sugarcane-tank/page-12.jpg", "en": "The kid pressed the rapid fire button and syrup bombs flew everywhere, gluing enemy tanks to the ground!", "zh": "小孩按下连射按钮，糖浆弹四处飞射，把敌人坦克全部粘在了地上！", "keys": [{"w": "rapid", "p": "/ˈræpɪd/", "zh": "快速的"}], "phrases": [{"en": "rapid fire button", "zh": "连射按钮"}]}, {"img": "images/sugarcane-tank/page-13.jpg", "en": "Little Milk sneaked out with a pink smoke bomb in mouth, running between the enemy tanks' legs!", "zh": "小牛奶叼着粉色烟雾弹偷偷溜出去，在敌人坦克腿之间跑来跑去！", "keys": [{"w": "puppy", "p": "/ˈpʌpi/", "zh": "小狗，偷偷，烟雾弹，敌人"}], "phrases": [{"en": "pink smoke bomb", "zh": "粉色烟雾弹"}]}, {"img": "images/sugarcane-tank/page-14.jpg", "en": "BOOM! The smoke bomb exploded filling the battlefield with thick pink smoke. The enemies couldn't see anything!", "zh": "砰！烟雾弹炸开了，战场上到处都是粉色烟雾，敌人什么也看不见！", "keys": [{"w": "smoke", "p": "/smoʊk/", "zh": "烟雾，粉色，爆炸，看不见"}], "phrases": [{"en": "thick pink smoke", "zh": "浓厚的粉色烟雾"}]}, {"img": "images/sugarcane-tank/page-15.jpg", "en": "A huge enemy commander tank, three times bigger than the others, pushed through the smoke!", "zh": "一辆比其他坦克大三倍的敌人队长坦克冲破了烟雾！", "keys": [{"w": "commander", "p": "/commander/", "zh": "队长，巨型坦克，冲破，烟雾"}], "phrases": [{"en": "enemy commander tank", "zh": "敌人队长坦克"}]}, {"img": "images/sugarcane-tank/page-16.jpg", "en": "'Time for the pumpkin bomb!' The kid pressed the big red button on the dashboard.", "zh": "\"该用南瓜弹了！\"小孩按下仪表盘上的大红色按钮。", "keys": [{"w": "pumpkin", "p": "/ˈpʌmpkɪn/", "zh": "南瓜，炮弹，红色按钮，终极"}], "phrases": [{"en": "pumpkin bomb", "zh": "南瓜弹"}]}, {"img": "images/sugarcane-tank/page-17.jpg", "en": "WHOOSH! A giant glowing pumpkin bomb launched from the cannon, spinning through the sky!", "zh": "嗖——一颗发光的巨大南瓜炮弹从炮管飞出，旋转着飞向天空！", "keys": [{"w": "pumpkin", "p": "/ˈpʌmpkɪn/", "zh": "南瓜，发射，旋转，天空"}], "phrases": [{"en": "giant glowing pumpkin bomb", "zh": "巨大发光的南瓜炮弹"}]}, {"img": "images/sugarcane-tank/page-18.jpg", "en": "The pumpkin bomb hit the commander tank and exploded into a giant pumpkin shell, trapping it completely!", "zh": "南瓜弹命中了队长坦克，炸开变成巨大的南瓜壳，把敌人整个包住了！", "keys": [{"w": "pumpkin", "p": "/ˈpʌmpkɪn/", "zh": "南瓜"}], "phrases": [{"en": "hit the commander tank", "zh": "命中了队长坦克"}]}, {"img": "images/sugarcane-tank/page-19.jpg", "en": "Then something incredible happened — the magic seeds sprouted! One pumpkin became ten, then a hundred, then thousands!", "zh": "然后不可思议的事情发生了——魔法种子发芽了！一个南瓜变十个，再变一百个，再变几千个！", "keys": [{"w": "magic", "p": "/ˈmædʒɪk/", "zh": "魔法，发芽，分裂，成千上万"}], "phrases": [{"en": "something incredible happened", "zh": "不可思议的事情发生了"}]}, {"img": "images/sugarcane-tank/page-20.jpg", "en": "Thick green pumpkin vines grew faster than lightning, wrapping around every enemy tank, truck, and weapon!", "zh": "粗壮的绿色南瓜藤蔓长得比闪电还快，缠住了每一个敌人坦克、卡车和武器！", "keys": [{"w": "vines", "p": "/vaɪnz/", "zh": "藤蔓，缠绕，闪电，敌人"}], "phrases": [{"en": "thick green pumpkin vines", "zh": "粗壮的绿色南瓜藤蔓"}]}, {"img": "images/sugarcane-tank/page-21.jpg", "en": "The enemy commander waved a white flag from inside the pumpkin. 'We give up! Your vegetables are too powerful!'", "zh": "敌人队长从南瓜壳里伸出白旗投降：\"我们认输了！你们的蔬菜太厉害了！\"", "keys": [{"w": "surrender", "p": "/səˈrɛndər/", "zh": "投降，白旗，蔬菜，厉害"}], "phrases": [{"en": "waved a white flag", "zh": "挥舞白旗"}]}]};
let stars = 0, stage = 0;

// 星星背景
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
for(let i=0;i<120;i++){
  ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.6+0.1})`;
  ctx.beginPath();
  ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height,
          Math.random()*1.5+0.5, 0, Math.PI*2);
  ctx.fill();
}

function addStar(n=1){
  stars += n;
  const el = document.getElementById('starCount');
  el.textContent = `⭐ ${stars}`;
  el.classList.remove('star-pop');
  void el.offsetWidth;
  el.classList.add('star-pop');
}

const STAGES = [renderIntro, renderListenSelect, renderDragMatch, renderSentenceBuild, renderFinish];

function nextStage(){ stage++; if(stage<STAGES.length) STAGES[stage](); }

// 故事介绍页
function renderIntro(){
  document.getElementById('stageArea').innerHTML = `
    <div class="story-intro">
      <h3>Sugarcane Tank Battle</h3>
<img src="/${STORY.cover}" alt="cover">
      <p>和甘蔗坦克大作战一起学英语吧！</p>
      <button class="next-unit-btn" onclick="nextStage()" style="margin-top:20px">开始游戏 →</button>
    </div>`;
}

// 关卡1：听音选图
function renderListenSelect(){
  const vocab = STORY.unitVocab.slice(0,5);
  const q = vocab[Math.floor(Math.random()*vocab.length)];
  const opts = shuffle([q, ...vocab.filter(v=>v.w!==q.w).slice(0,3)]);
  speakWord(q.w);

  document.getElementById('stageArea').innerHTML = `
    <div class="stage-title">🎧 听一听，选出正确的图片！</div>
    <div style="text-align:center;margin:12px 0">
      <button onclick="speakWord('${q.w}')" 
              style="background:#0f3460;color:#e2e2e2;border:none;border-radius:50px;
                     padding:10px 24px;font-size:18px;cursor:pointer">
        🔊 再听一次
      </button>
    </div>
    <div class="options-grid">
      ${opts.map(o=>`
        <button class="opt-btn" onclick="checkAnswer(this,'${o.w}','${q.w}')">
          <div style="font-size:40px">${wordToEmoji(o.w)}</div>
          <div style="margin-top:8px;font-size:14px;color:#aaa">${o.zh}</div>
        </button>
      `).join('')}
    </div>`;
}

function checkAnswer(btn, chosen, correct){
  document.querySelectorAll('.opt-btn').forEach(b=>b.onclick=null);
  if(chosen===correct){
    btn.classList.add('correct');
    addStar(1);
    setTimeout(nextStage, 1200);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b=>{
      if(b.textContent.includes(wordToEmoji(correct))) b.classList.add('correct');
    });
    setTimeout(nextStage, 1800);
  }
}

// 关卡2：拖拽配对
function renderDragMatch(){
  const pairs = STORY.unitVocab.slice(0,3);
  document.getElementById('stageArea').innerHTML = `
    <div class="stage-title">✋ 拖一拖，把单词和图片配对！</div>
    <div class="drag-area">
      <div class="drag-words" id="dragWords">
        ${shuffle([...pairs]).map(p=>`
          <div class="drag-item" draggable="true" 
               data-word="${p.w}"
               ondragstart="dragStart(event,'${p.w}')">
            ${p.w}
          </div>
        `).join('')}
      </div>
      <div class="drop-zones">
        ${pairs.map(p=>`
          <div class="drop-zone" 
               data-target="${p.w}"
               ondragover="event.preventDefault()"
               ondrop="dragDrop(event,'${p.w}')">
            ${wordToEmoji(p.w)}
          </div>
        `).join('')}
      </div>
    </div>
    <div id="dragMsg" style="text-align:center;color:#a8e6cf;margin-top:16px;font-size:18px"></div>`;
}

let matched = 0;
function dragStart(e, word){ e.dataTransfer.setData('word', word); }
function dragDrop(e, target){
  const word = e.dataTransfer.getData('word');
  const zone = e.currentTarget;
  if(word === target && !zone.classList.contains('matched')){
    zone.classList.add('matched');
    zone.innerHTML = `${wordToEmoji(target)}<br><span style="font-size:14px;color:#2ecc71">${word}</span>`;
    document.querySelector(`[data-word="${word}"]`)?.remove();
    addStar(1); matched++;
    if(matched >= 3){ matched=0; setTimeout(nextStage,800); }
  }
}

// 关卡3：看图造句
function renderSentenceBuild(){
  const vocab = STORY.unitVocab.slice(0,5);
  const target = vocab[Math.floor(Math.random()*vocab.length)];
  const distractors = shuffle(vocab.filter(v=>v.w!==target.w)).slice(0,3);
  const choices = shuffle([target, ...distractors]);

  document.getElementById('stageArea').innerHTML = `
    <div class="stage-title">✏️ 看图，选词填空！</div>
    <div style="text-align:center;font-size:60px;margin:12px 0">${wordToEmoji(target.w)}</div>
    <div style="text-align:center;color:#e2e2e2;font-size:22px;margin:12px 0">
      I have one ___ .
    </div>
    <div class="options-grid">
      ${choices.map(c=>`
        <button class="opt-btn" onclick="checkAnswer(this,'${c.w}','${target.w}')">
          ${c.w}
        </button>
      `).join('')}
    </div>`;
}

// 完成页
function renderFinish(){
  const allStars = Math.min(stars, 3);
  document.getElementById('stageArea').innerHTML = `
    <div class="finish-page">
      <div class="big-stars">${'⭐'.repeat(allStars)}${'☆'.repeat(3-allStars)}</div>
      <div class="finish-msg">太棒了！你得了 ${stars} 颗星！</div>
      <div style="color:#a8e6cf;font-size:16px;margin-bottom:20px">
        ${stars>=3?'满分！你已经掌握这个单元了！':'继续加油，再挑战一次吧！'}
      </div>
      <button class="next-unit-btn" onclick="location.href='../../index.html'">
        🏠 回到主页
      </button>
      ${stars<3?`
      <br><button class="next-unit-btn" style="background:#54a0ff;margin-top:12px"
                  onclick="location.reload()">
        🔄 再玩一次
      </button>`:''}
    </div>`;
}

// 工具函数
function speakWord(word){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang='en-GB'; u.rate=0.7;
  speechSynthesis.speak(u);
}

function shuffle(arr){ return arr.sort(()=>Math.random()-.5); }

function wordToEmoji(w){
  const map = {
    car:'🚗', duck:'🦆', ball:'⚽', frog:'🐸', rabbit:'🐰',
    cat:'🐱', dog:'🐶', bird:'🐦', fish:'🐟', tree:'🌳',
    apple:'🍎', book:'📚', pen:'✏️', bag:'👜', hat:'🎩',
    red:'🔴', yellow:'🟡', blue:'🔵', green:'🟢', pink:'🩷'
  };
  return map[w.toLowerCase()] || '❓';
}

// 启动
STAGES[0]();
</script>
</body>
</html>
