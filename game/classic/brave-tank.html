<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Brave Little Tank — 游戏版</title>
<style>
  body { font-family:'Nunito','Comic Sans MS',cursive; background:#1a1a2e;
         min-height:100vh; display:flex; align-items:center; justify-content:center;
         overflow:hidden; }

  .starfield { position:fixed; inset:0; pointer-events:none; }

  .game-card { background:#16213e; border-radius:24px;
               padding:32px; max-width:700px; width:92%;
               border:2px solid #0f3460; position:relative; z-index:1; }

  .top-bar { display:flex; justify-content:space-between; 
             align-items:center; margin-bottom:24px; }
  .star-display { font-size:28px; }
  .unit-title { color:#e2b96f; font-size:18px; }

  .stage-title { color:#a8e6cf; font-size:22px; 
                 margin-bottom:20px; text-align:center; }

  .options-grid { display:grid; grid-template-columns:1fr 1fr;
                  gap:16px; margin-top:16px; }
  .opt-btn { background:#0f3460; color:#e2e2e2; border:2px solid #1a4a80;
             border-radius:16px; padding:20px; font-size:18px; cursor:pointer;
             transition: all .2s; text-align:center; }
  .opt-btn:hover { border-color:#e2b96f; transform:scale(1.03); }
  .opt-btn.correct { background:#2ecc71; border-color:#27ae60; color:#fff; }
  .opt-btn.wrong   { background:#e74c3c; border-color:#c0392b; color:#fff; }

  .drag-area { display:flex; gap:32px; justify-content:center; margin-top:24px; }
  .drag-words { display:flex; flex-direction:column; gap:12px; }
  .drag-item  { background:#0f3460; color:#e2e2e2; border-radius:12px;
                padding:12px 24px; cursor:grab; font-size:18px;
                border:2px solid transparent; transition:.2s; }
  .drag-item:hover { border-color:#e2b96f; }
  .drop-zones { display:flex; flex-direction:column; gap:12px; }
  .drop-zone  { background:#0a2844; border:2px dashed #1a4a80;
                border-radius:12px; padding:12px 24px; min-width:100px;
                font-size:28px; text-align:center; }
  .drop-zone.matched { border-color:#2ecc71; background:#0d3b1e; }

  @keyframes starPop {
    0%   { transform:scale(0) rotate(-20deg); opacity:0; }
    60%  { transform:scale(1.3) rotate(10deg); opacity:1; }
    100% { transform:scale(1) rotate(0); opacity:1; }
  }
  .star-pop { animation: starPop .5s ease-out forwards; }

  .finish-page { text-align:center; }
  .big-stars    { font-size:60px; letter-spacing:8px; }
  .finish-msg   { color:#a8e6cf; font-size:22px; margin:20px 0; }
  .next-unit-btn{ background:#e2b96f; color:#1a1a2e; border:none;
                  border-radius:50px; padding:14px 40px; font-size:20px;
                  cursor:pointer; font-weight:bold; margin-top:16px; }

  .story-intro { text-align:center; margin-bottom:20px; }
  .story-intro img { max-width:200px; border-radius:12px; margin:10px 0; }
  .story-intro p { color:#e2e2e2; font-size:16px; line-height:1.6; }

  h3 { color:#e17055; margin-bottom:16px; }
</style>
</head>
<body>
<canvas class="starfield" id="starCanvas"></canvas>
<div class="game-card">
  <div class="top-bar">
    <div class="unit-title">The Brave Little Tank</div>
    <div class="star-display"><span id="starCount">⭐ 0</span></div>
  </div>
  <div id="stageArea"></div>
</div>

<script>
const STORY = {"id": "brave-tank", "title": "The Brave Little Tank", "titleZh": "勇敢的小坦克", "category": "原创", "cover": "images/covers/cover-brave-tank.jpg", "pages": [{"img": "images/brave-tank/page-2.jpg", "en": "In a beautiful valley, there lived a brave little tank named Little Steel.", "zh": "在一片美丽的山谷里，住着一辆勇敢的小坦克，名叫小钢。", "keys": [{"w": "beautiful", "p": "/ˈbjuːtɪfəl/", "zh": "美丽的"}], "phrases": [{"en": "in a beautiful valley", "zh": "在一片美丽的山谷里"}]}, {"img": "images/brave-tank/page-3.jpg", "en": "Welcome to Tank Town, where all kinds of tanks live happily together!", "zh": "欢迎来到坦克小镇，各种各样的坦克快乐地生活在这里！", "keys": [{"w": "welcome", "p": "/ˈwelkəm/", "zh": "欢迎"}], "phrases": [{"en": "Welcome to Tank Town", "zh": "欢迎来到坦克小镇"}]}, {"img": "images/brave-tank/page-4.jpg", "en": "Little Steel was the smallest tank in town, with a tiny cannon and a big heart.", "zh": "小钢是镇上最小的坦克，炮管短短的，却有一颗大大的心。", "keys": [{"w": "smallest", "p": "/ˈsmɔːlɪst/", "zh": "最小的"}], "phrases": [{"en": "the smallest tank in town", "zh": "镇上最小的坦克"}]}, {"img": "images/brave-tank/page-5.jpg", "en": "“I want to be a hero!” Little Steel practiced his brave face in the mirror every day.", "zh": "“我要成为英雄！”小钢每天都对着镜子练习勇敢的表情。", "keys": [{"w": "hero", "p": "/ˈhɪroʊ/", "zh": "英雄"}], "phrases": [{"en": "I want to be a hero", "zh": "我要成为英雄"}]}, {"img": "images/brave-tank/page-6.jpg", "en": "Every year, Tank Town held the Brave Contest — a big adventure race!", "zh": "坦克小镇每年都会举办勇士大赛——一场大型冒险比赛！", "keys": [{"w": "year", "p": "/jɪr/", "zh": "年"}], "phrases": [{"en": "Every year", "zh": "每年"}]}, {"img": "images/brave-tank/page-7.jpg", "en": "“I’m joining!” said Little Steel. The big tanks all laughed. “You? Little you?”", "zh": "“我要参加！”小钢说。大坦克们都笑了。“你？小小的你？”", "keys": [{"w": "join", "p": "/dʒɔɪn/", "zh": "参加"}], "phrases": [{"en": "I’m joining", "zh": "我要参加"}]}, {"img": "images/brave-tank/page-8.jpg", "en": "Grandpa Armor patted Little Steel gently. “A true hero is not the biggest, but the bravest.”", "zh": "铁甲爷爷轻轻拍了拍小钢。“真正的英雄不是最大的，而是最勇敢的。”", "keys": [{"w": "grandpa", "p": "/ˈɡrændpɑː/", "zh": "爷爷"}], "phrases": [{"en": "patted Little Steel gently", "zh": "轻轻拍了拍小钢"}]}, {"img": "images/brave-tank/page-9.jpg", "en": "Little Steel teamed up with his best friends — steady Big Iron and fast Lightning!", "zh": "小钢找到了最好的朋友——稳重的大铁和快速的闪电，组成了一支队伍！", "keys": [{"w": "teamed up", "p": "/tiːmd ʌp/", "zh": "组队；合作"}], "phrases": [{"en": "teamed up with his best friends", "zh": "和他最好的朋友组队"}]}, {"img": "images/brave-tank/page-10.jpg", "en": "The race was on! Teams had to cross the desert, the forest, and climb the mountain!", "zh": "比赛开始了！队伍要穿越沙漠、森林，还要爬上山顶！", "keys": [{"w": "race", "p": "/reɪs/", "zh": "比赛"}], "phrases": [{"en": "The race was on", "zh": "比赛开始了"}]}, {"img": "images/brave-tank/page-11.jpg", "en": "The desert was so hot! Big Iron got stuck in the sand. “Don’t worry, I’ll help!”", "zh": "沙漠好热！大铁陷进沙子里了。“别急，我来帮你！”", "keys": [{"w": "hot", "p": "/hɑːt/", "zh": "炎热的"}], "phrases": [{"en": "so hot", "zh": "非常热"}]}, {"img": "images/brave-tank/page-12.jpg", "en": "The forest was full of big trees. “Follow me!” Lightning zipped through the narrow paths.", "zh": "森林里到处是大树。“跟我来！”闪电灵活地穿过小路。", "keys": [{"w": "forest", "p": "/ˈfɔːrɪst/", "zh": "森林"}], "phrases": [{"en": "full of big trees", "zh": "到处是大树"}]}, {"img": "images/brave-tank/page-13.jpg", "en": "A wide river blocked the way! There was no bridge. “How do we cross?” everyone worried.", "zh": "一条大河挡住了去路！没有桥。“怎么过去呢？”大家都愁了。", "keys": [{"w": "river", "p": "/ˈrɪvər/", "zh": "河流"}], "phrases": [{"en": "blocked the way", "zh": "挡住了去路"}]}, {"img": "images/brave-tank/page-14.jpg", "en": "“I have an idea!” Little Steel pointed at a fallen tree. “We can make a bridge!”", "zh": "“我有办法！”小钢指着倒下的大树。“我们可以搭一座桥！”", "keys": [{"w": "idea", "p": "/aɪˈdiːə/", "zh": "主意；想法"}], "phrases": [{"en": "I have an idea", "zh": "我有办法"}]}, {"img": "images/brave-tank/page-15.jpg", "en": "The log bridge held! Big Iron went first, then Lightning zoomed across. Little Steel crossed carefully and safely.", "zh": "树桥很稳！大铁先过，闪电忮地跑过，小钢小心翼翼地安全过了河。", "keys": [{"w": "log", "p": "/lɔːɡ/", "zh": "原木；木头"}], "phrases": [{"en": "The log bridge held", "zh": "树桥很稳"}]}, {"img": "images/brave-tank/page-16.jpg", "en": "Near the top, Red Thunder’s team blocked the path with big rocks! “You can’t win now!”", "zh": "快到山顶了！红雷的队伍用大石头挡住了路！“你们赢不了啦！”", "keys": [{"w": "top", "p": "/tɑːp/", "zh": "顶部；山顶"}], "phrases": [{"en": "blocked the path with big rocks", "zh": "用大石头挡住了路"}]}, {"img": "images/brave-tank/page-17.jpg", "en": "“There’s a gap under the rocks! I’m the smallest — I can squeeze through!” said Little Steel.", "zh": "“石头下面有缝隙！我最小，我可以钻过去！”小钢说。", "keys": [{"w": "gap", "p": "/ɡæp/", "zh": "缝隙；空隙"}], "phrases": [{"en": "There’s a gap under the rocks", "zh": "石头下面有缝隙"}]}, {"img": "images/brave-tank/page-18.jpg", "en": "Little Steel reached the top first and grabbed the golden flag! “We won!”", "zh": "小钢第一个到达山顶，拿到了金色旗帜！“我们赢了！”", "keys": [{"w": "reached", "p": "/riːtʃt/", "zh": "到达"}], "phrases": [{"en": "reached the top first", "zh": "第一个到达山顶"}]}, {"img": "images/brave-tank/page-19.jpg", "en": "On the way down, Red Thunder was trapped in a landslide! “Help me!” he cried.", "zh": "下山路上，红雷被困在滑坡里！“救命！”他喊道。", "keys": [{"w": "trapped", "p": "/træpt/", "zh": "被困住的"}], "phrases": [{"en": "On the way down", "zh": "下山路上"}]}, {"img": "images/brave-tank/page-19.jpg", "en": "Big Iron pulled with a rope, Lightning moved rocks, and Little Steel pushed from below. Together, they saved Red Thunder!", "zh": "大铁用绳子拉，闪电搬石头，小钢从下面顶。大家一起救出了红雷！", "keys": [{"w": "rope", "p": "/roʊp/", "zh": "绳子"}], "phrases": [{"en": "pulled with a rope", "zh": "用绳子拉"}]}]};
let stars = 0, stage = 0;

// 星星背景
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
for(let i=0;i<120;i++){
  ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.6+0.1})`;
  ctx.beginPath();
  ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height,
          Math.random()*1.5+0.5, 0, Math.PI*2);
  ctx.fill();
}

function addStar(n=1){
  stars += n;
  const el = document.getElementById('starCount');
  el.textContent = `⭐ ${stars}`;
  el.classList.remove('star-pop');
  void el.offsetWidth;
  el.classList.add('star-pop');
}

const STAGES = [renderIntro, renderListenSelect, renderDragMatch, renderSentenceBuild, renderFinish];

function nextStage(){ stage++; if(stage<STAGES.length) STAGES[stage](); }

// 故事介绍页
function renderIntro(){
  document.getElementById('stageArea').innerHTML = `
    <div class="story-intro">
      <h3>The Brave Little Tank</h3>
<img src="/${STORY.cover}" alt="cover">
      <p>和勇敢的小坦克一起学英语吧！</p>
      <button class="next-unit-btn" onclick="nextStage()" style="margin-top:20px">开始游戏 →</button>
    </div>`;
}

// 关卡1：听音选图
function renderListenSelect(){
  const vocab = STORY.unitVocab.slice(0,5);
  const q = vocab[Math.floor(Math.random()*vocab.length)];
  const opts = shuffle([q, ...vocab.filter(v=>v.w!==q.w).slice(0,3)]);
  speakWord(q.w);

  document.getElementById('stageArea').innerHTML = `
    <div class="stage-title">🎧 听一听，选出正确的图片！</div>
    <div style="text-align:center;margin:12px 0">
      <button onclick="speakWord('${q.w}')" 
              style="background:#0f3460;color:#e2e2e2;border:none;border-radius:50px;
                     padding:10px 24px;font-size:18px;cursor:pointer">
        🔊 再听一次
      </button>
    </div>
    <div class="options-grid">
      ${opts.map(o=>`
        <button class="opt-btn" onclick="checkAnswer(this,'${o.w}','${q.w}')">
          <div style="font-size:40px">${wordToEmoji(o.w)}</div>
          <div style="margin-top:8px;font-size:14px;color:#aaa">${o.zh}</div>
        </button>
      `).join('')}
    </div>`;
}

function checkAnswer(btn, chosen, correct){
  document.querySelectorAll('.opt-btn').forEach(b=>b.onclick=null);
  if(chosen===correct){
    btn.classList.add('correct');
    addStar(1);
    setTimeout(nextStage, 1200);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b=>{
      if(b.textContent.includes(wordToEmoji(correct))) b.classList.add('correct');
    });
    setTimeout(nextStage, 1800);
  }
}

// 关卡2：拖拽配对
function renderDragMatch(){
  const pairs = STORY.unitVocab.slice(0,3);
  document.getElementById('stageArea').innerHTML = `
    <div class="stage-title">✋ 拖一拖，把单词和图片配对！</div>
    <div class="drag-area">
      <div class="drag-words" id="dragWords">
        ${shuffle([...pairs]).map(p=>`
          <div class="drag-item" draggable="true" 
               data-word="${p.w}"
               ondragstart="dragStart(event,'${p.w}')">
            ${p.w}
          </div>
        `).join('')}
      </div>
      <div class="drop-zones">
        ${pairs.map(p=>`
          <div class="drop-zone" 
               data-target="${p.w}"
               ondragover="event.preventDefault()"
               ondrop="dragDrop(event,'${p.w}')">
            ${wordToEmoji(p.w)}
          </div>
        `).join('')}
      </div>
    </div>
    <div id="dragMsg" style="text-align:center;color:#a8e6cf;margin-top:16px;font-size:18px"></div>`;
}

let matched = 0;
function dragStart(e, word){ e.dataTransfer.setData('word', word); }
function dragDrop(e, target){
  const word = e.dataTransfer.getData('word');
  const zone = e.currentTarget;
  if(word === target && !zone.classList.contains('matched')){
    zone.classList.add('matched');
    zone.innerHTML = `${wordToEmoji(target)}<br><span style="font-size:14px;color:#2ecc71">${word}</span>`;
    document.querySelector(`[data-word="${word}"]`)?.remove();
    addStar(1); matched++;
    if(matched >= 3){ matched=0; setTimeout(nextStage,800); }
  }
}

// 关卡3：看图造句
function renderSentenceBuild(){
  const vocab = STORY.unitVocab.slice(0,5);
  const target = vocab[Math.floor(Math.random()*vocab.length)];
  const distractors = shuffle(vocab.filter(v=>v.w!==target.w)).slice(0,3);
  const choices = shuffle([target, ...distractors]);

  document.getElementById('stageArea').innerHTML = `
    <div class="stage-title">✏️ 看图，选词填空！</div>
    <div style="text-align:center;font-size:60px;margin:12px 0">${wordToEmoji(target.w)}</div>
    <div style="text-align:center;color:#e2e2e2;font-size:22px;margin:12px 0">
      I have one ___ .
    </div>
    <div class="options-grid">
      ${choices.map(c=>`
        <button class="opt-btn" onclick="checkAnswer(this,'${c.w}','${target.w}')">
          ${c.w}
        </button>
      `).join('')}
    </div>`;
}

// 完成页
function renderFinish(){
  const allStars = Math.min(stars, 3);
  document.getElementById('stageArea').innerHTML = `
    <div class="finish-page">
      <div class="big-stars">${'⭐'.repeat(allStars)}${'☆'.repeat(3-allStars)}</div>
      <div class="finish-msg">太棒了！你得了 ${stars} 颗星！</div>
      <div style="color:#a8e6cf;font-size:16px;margin-bottom:20px">
        ${stars>=3?'满分！你已经掌握这个单元了！':'继续加油，再挑战一次吧！'}
      </div>
      <button class="next-unit-btn" onclick="location.href='../../index.html'">
        🏠 回到主页
      </button>
      ${stars<3?`
      <br><button class="next-unit-btn" style="background:#54a0ff;margin-top:12px"
                  onclick="location.reload()">
        🔄 再玩一次
      </button>`:''}
    </div>`;
}

// 工具函数
function speakWord(word){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang='en-GB'; u.rate=0.7;
  speechSynthesis.speak(u);
}

function shuffle(arr){ return arr.sort(()=>Math.random()-.5); }

function wordToEmoji(w){
  const map = {
    car:'🚗', duck:'🦆', ball:'⚽', frog:'🐸', rabbit:'🐰',
    cat:'🐱', dog:'🐶', bird:'🐦', fish:'🐟', tree:'🌳',
    apple:'🍎', book:'📚', pen:'✏️', bag:'👜', hat:'🎩',
    red:'🔴', yellow:'🟡', blue:'🔵', green:'🟢', pink:'🩷'
  };
  return map[w.toLowerCase()] || '❓';
}

// 启动
STAGES[0]();
</script>
</body>
</html>
