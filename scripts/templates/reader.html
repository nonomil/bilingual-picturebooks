<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{STORY_TITLE}} — 朗读版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Nunito','PingFang SC','Microsoft YaHei',sans-serif;
    background:linear-gradient(180deg,#fffaf2 0%,#fff5e8 100%);
    min-height:100vh;
    display:flex;
    justify-content:center;
    color:#2f2f2f;
  }
  .reader_wrap { width:100%; max-width:900px; padding:16px 14px 28px; }
  .page_head {
    background:#fff;
    border-radius:18px;
    box-shadow:0 10px 28px rgba(0,0,0,.08);
    padding:14px 16px;
    margin-bottom:12px;
  }
  .page_head_top {
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .unit_tag { color:#8e8e8e; font-size:13px; margin-bottom:6px; }
  .story_brand {
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:#f4f7ff;
    color:#5c7cfa;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    padding:5px 10px;
  }
  h2 { color:#e17055; font-size:24px; line-height:1.3; }
  h2 small { display:block; color:#9b9b9b; font-size:16px; font-weight:500; margin-top:4px; }
  .page_meta {
    text-align:right;
    min-width:112px;
  }
  .page_total {
    color:#666;
    font-size:13px;
    font-weight:700;
    margin-bottom:6px;
  }
  .translate_btn {
    border:none;
    background:#fff3d8;
    color:#a26400;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    padding:8px 12px;
    cursor:pointer;
  }
  .progress_bar { width:100%; height:7px; background:#ececec; border-radius:999px; margin:12px 0 14px; overflow:hidden; }
  .progress_fill { height:100%; background:linear-gradient(90deg,#ff9f43,#ffd166); transition:width .25s ease; }
  .hero_img {
    width:100%;
    border-radius:18px;
    box-shadow:0 8px 30px rgba(0,0,0,.12);
    display:block;
    background:#f3f3f3;
    aspect-ratio:16/10;
    object-fit:cover;
  }
  .text_area {
    margin-top:14px;
    background:#fff;
    border-radius:16px;
    box-shadow:0 4px 18px rgba(0,0,0,.08);
    padding:16px 14px 14px;
  }
  .text_toolbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    margin-bottom:12px;
    flex-wrap:wrap;
  }
  .toolbar_tip {
    color:#9a8f82;
    font-size:12px;
    font-weight:700;
  }
  .toolbar_actions {
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .en_sentence { font-size:25px; line-height:1.65; color:#2f2f2f; font-weight:700; }
  .word {
    display:inline;
    border-radius:6px;
    cursor:pointer;
    padding:1px 2px;
    transition:all .15s ease;
  }
  .word:hover { background:#fff3b0; }
  .word.speaking { background:#ffd166; color:#3b2f0d; }
  .word_tip {
    display:inline-block;
    margin-left:6px;
    font-size:12px;
    color:#666;
    background:#f3f4f8;
    border-radius:999px;
    padding:2px 8px;
  }
  .zh_sentence {
    margin-top:12px;
    padding-top:12px;
    border-top:1px dashed #ececec;
    font-size:20px;
    line-height:1.8;
    color:#5d5d5d;
  }
  .zh_sentence.hidden { display:none; }
  .zh_chunk {
    border-radius:5px;
    transition:background .12s ease;
  }
  .zh_chunk.speaking {
    background:#ffe8bd;
    color:#403014;
  }
  .lexicon { margin-top:14px; display:grid; gap:10px; }
  .lex_row { display:flex; align-items:flex-start; gap:10px; flex-wrap:wrap; }
  .lex_label {
    min-width:54px;
    text-align:center;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    color:#fff;
    padding:4px 8px;
  }
  .lex_label.words { background:#54a0ff; }
  .lex_label.phrases { background:#10ac84; }
  .lex_items { flex:1; display:flex; flex-wrap:wrap; gap:8px; }
  .lex_chip {
    border-radius:999px;
    padding:6px 12px;
    border:1px solid #dde8ff;
    background:#f4f8ff;
    font-size:13px;
    color:#2f3f60;
    line-height:1.35;
    cursor:pointer;
    transition:all .15s ease;
  }
  .lex_chip:hover { transform:translateY(-1px); box-shadow:0 2px 8px rgba(0,0,0,.08); }
  .lex_chip.words b { color:#1f6fd1; }
  .lex_chip.phrases {
    border-color:#c9f0e4;
    background:#f1fffb;
    color:#22524a;
  }
  .lex_chip.phrases b { color:#0c9b78; }
  .lex_empty { font-size:13px; color:#989898; padding-top:7px; }
  .nav {
    margin-top:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
  }
  .btn {
    border:none;
    border-radius:999px;
    cursor:pointer;
    font-size:15px;
    font-weight:700;
    padding:10px 16px;
    transition:opacity .15s ease, transform .15s ease;
  }
  .btn:disabled { opacity:.35; cursor:not-allowed; }
  .btn:hover:not(:disabled) { transform:translateY(-1px); }
  .btn.nav_btn { background:#ff9f43; color:#fff; min-width:108px; }
  .btn.read_btn { background:#54a0ff; color:#fff; }
  .btn.zh_btn { background:#f368e0; color:#fff; }
  .btn.game_btn { background:#10ac84; color:#fff; display:none; }
  .page_indicator { color:#969696; font-size:14px; }
  @media (max-width: 640px) {
    .page_head_top { flex-direction:column; }
    .page_meta { width:100%; text-align:left; }
    .nav { flex-wrap:wrap; justify-content:center; }
    .en_sentence { font-size:22px; }
    .zh_sentence { font-size:18px; }
  }
</style>
</head>
<body>
<div class="reader_wrap">
  <div class="page_head">
    <div class="page_head_top">
      <div>
        <div class="unit_tag">{{UNIT_TAG}}</div>
        <div class="story_brand">📚 Minecraft Storybook Style</div>
        <h2>{{STORY_TITLE}}<small>{{STORY_TITLE_ZH}}</small></h2>
      </div>
      <div class="page_meta">
        <div class="page_total" id="page_total"></div>
        <button class="translate_btn" id="translate_toggle_btn" onclick="toggle_translation()">显示翻译</button>
      </div>
    </div>
    <div class="progress_bar"><div class="progress_fill" id="progress_fill"></div></div>
  </div>
  <div id="page_area"></div>
  <div class="nav">
    <button class="btn nav_btn" id="prev_btn" onclick="change_page(-1)">← 上一页</button>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="btn read_btn" onclick="read_current()">🔊 朗读</button>
      <button class="btn zh_btn" onclick="read_chinese_only()">🈶 中文</button>
      <button class="btn game_btn" id="to_game_btn" onclick="goto_game()">🎮 去游戏</button>
      <span class="page_indicator" id="page_indicator"></span>
    </div>
    <button class="btn nav_btn" id="next_btn" onclick="change_page(1)">下一页 →</button>
  </div>

<script>
const pages_data = {{PAGES_JSON}};
const game_url = '{{GAME_URL}}';
let current_page = 0;
let current_rate = 0.92;
let is_reading = false;
let translation_visible = false;
let current_word_ranges = [];
const synth = window.speechSynthesis;

function escape_for_attr(raw_text) {
  return String(raw_text || '').replace(/'/g, "\\'");
}

function get_asset_src(raw_path) {
  const path_text = String(raw_path || '').trim();
  if (!path_text) return '';
  if (path_text.startsWith('http://') || path_text.startsWith('https://')) return path_text;
  if (path_text.startsWith('images/')) return '../../' + path_text;
  return '../../images/' + path_text.replace(/^\/+/, '');
}

function split_zh_chunks(zh_text) {
  const source_text = String(zh_text || '');
  return source_text.split(/(?<=[。！？；：,.!?])/).filter(Boolean);
}

function build_word_tokens(en_text) {
  const source_text = String(en_text || '');
  const tokens = source_text.match(/\S+/g) || [];
  let search_index = 0;
  return tokens.map((token) => {
    const start = source_text.indexOf(token, search_index);
    const end = start + token.length;
    search_index = end;
    return { token, start, end };
  });
}

function update_translation_ui() {
  const zh_box = document.getElementById('zh_sentence');
  const toggle_btn = document.getElementById('translate_toggle_btn');
  if (!zh_box || !toggle_btn) return;
  zh_box.classList.toggle('hidden', !translation_visible);
  toggle_btn.textContent = translation_visible ? '隐藏翻译' : '显示翻译';
}

function toggle_translation(force_visible) {
  if (typeof force_visible === 'boolean') {
    translation_visible = force_visible;
  } else {
    translation_visible = !translation_visible;
  }
  update_translation_ui();
}

function render_page(page_index) {
  const page = pages_data[page_index];
  current_word_ranges = build_word_tokens(page.en || '');
  const words_html = current_word_ranges.map((item, idx) =>
    `<span class="word" id="w_${idx}" onclick="show_word_tip(this,'${escape_for_attr(item.token)}')">${item.token}</span>`
  ).join(' ');
  const zh_chunks = split_zh_chunks(page.zh || '');
  const zh_html = zh_chunks.map((chunk, idx) =>
    `<span class="zh_chunk" id="zh_${idx}">${chunk}</span>`
  ).join('');
  const word_row_html = (page.keys || []).length ? (page.keys || []).map((item) =>
    `<span class="lex_chip words" onclick="speak_word('${escape_for_attr(item.w || '')}')"><b>${item.w || ''}</b> ${item.p || ''} ${item.zh || ''}</span>`
  ).join('') : '<span class="lex_empty">暂无重点单词</span>';
  const phrase_row_html = (page.phrases || []).length ? (page.phrases || []).map((item) =>
    `<span class="lex_chip phrases" onclick="speak_phrase('${escape_for_attr(item.en || '')}')"><b>${item.en || ''}</b> ${item.zh || ''}</span>`
  ).join('') : '<span class="lex_empty">暂无重点词组</span>';

  document.getElementById('page_area').innerHTML = `
    <img class="hero_img" src="${get_asset_src(page.img)}" alt="page ${page_index + 1}" onerror="this.style.objectFit='contain';this.style.background='#eee';">
    <div class="text_area">
      <div class="text_toolbar">
        <div class="toolbar_tip">点英文可听单词，点下方卡片可听单词和词组</div>
        <div class="toolbar_actions">
          <button class="translate_btn" onclick="toggle_translation()">${translation_visible ? '隐藏翻译' : '显示翻译'}</button>
        </div>
      </div>
      <div class="en_sentence">${words_html}</div>
      <div class="zh_sentence hidden" id="zh_sentence">${zh_html}</div>
      <div class="lexicon">
        <div class="lex_row"><span class="lex_label words">单词</span><div class="lex_items">${word_row_html}</div></div>
        <div class="lex_row"><span class="lex_label phrases">词组</span><div class="lex_items">${phrase_row_html}</div></div>
      </div>
    </div>`;

  document.getElementById('progress_fill').style.width = `${((page_index + 1) / pages_data.length) * 100}%`;
  document.getElementById('page_total').textContent = `第 ${page_index + 1} 页，共 ${pages_data.length} 页`;
  document.getElementById('page_indicator').textContent = `${page_index + 1} / ${pages_data.length}`;
  document.getElementById('prev_btn').disabled = page_index === 0;
  const on_last_page = page_index === pages_data.length - 1;
  document.getElementById('next_btn').textContent = on_last_page ? '完成并去游戏 →' : '下一页 →';
  document.getElementById('to_game_btn').style.display = on_last_page ? 'inline-block' : 'none';
  update_translation_ui();
}

function clear_highlight() {
  document.querySelectorAll('.word.speaking').forEach((el) => el.classList.remove('speaking'));
  document.querySelectorAll('.zh_chunk.speaking').forEach((el) => el.classList.remove('speaking'));
}

function speak_utterance(text_value, lang_code, rate_value, on_boundary) {
  return new Promise((resolve) => {
    const utterance = new SpeechSynthesisUtterance(text_value);
    utterance.lang = lang_code;
    utterance.rate = rate_value;
    utterance.pitch = 1;
    if (on_boundary) utterance.onboundary = on_boundary;
    utterance.onend = resolve;
    utterance.onerror = resolve;
    synth.speak(utterance);
  });
}

function highlight_en_word(char_index) {
  clear_highlight();
  const word_index = current_word_ranges.findIndex((item) => char_index >= item.start && char_index < item.end);
  if (word_index < 0) return;
  const active_word = document.getElementById(`w_${word_index}`);
  if (active_word) active_word.classList.add('speaking');
}

async function speak_english_sentence() {
  const page = pages_data[current_page];
  await speak_utterance(String(page.en || ''), 'en-US', current_rate * 0.92, (event) => {
    if (typeof event.charIndex === 'number') {
      highlight_en_word(event.charIndex);
    }
  });
}

async function speak_chinese_sentence() {
  toggle_translation(true);
  const zh_chunks = split_zh_chunks(pages_data[current_page].zh || '');
  for (let i = 0; i < zh_chunks.length; i += 1) {
    clear_highlight();
    const current_chunk = document.getElementById(`zh_${i}`);
    if (current_chunk) current_chunk.classList.add('speaking');
    await speak_utterance(String(zh_chunks[i] || ''), 'zh-CN', current_rate);
  }
}

async function read_current() {
  if (is_reading) return;
  is_reading = true;
  synth.cancel();
  clear_highlight();
  const page = pages_data[current_page];
  await speak_english_sentence();
  clear_highlight();
  await speak_chinese_sentence();
  clear_highlight();
  for (const item of (page.keys || [])) {
    await speak_utterance(String(item.w || ''), 'en-US', current_rate * 0.85);
  }
  for (const item of (page.phrases || [])) {
    await speak_utterance(String(item.en || ''), 'en-US', current_rate * 0.82);
  }
  is_reading = false;
}

async function read_chinese_only() {
  if (is_reading) return;
  is_reading = true;
  synth.cancel();
  clear_highlight();
  await speak_chinese_sentence();
  clear_highlight();
  is_reading = false;
}

function show_word_tip(target_el, word_text) {
  speak_word(word_text);
  const old_tip = target_el.querySelector('.word_tip');
  if (old_tip) {
    old_tip.remove();
    return;
  }
  const page = pages_data[current_page];
  const clean_word = String(word_text || '').toLowerCase().replace(/[.,!?'"“”]/g, '');
  const found = (page.keys || []).find((item) => String(item.w || '').toLowerCase() === clean_word);
  if (!found) return;
  const tip = document.createElement('span');
  tip.className = 'word_tip';
  tip.textContent = `${found.p || ''} ${found.zh || ''}`.trim();
  target_el.appendChild(tip);
}

function speak_word(word_text) {
  if (!word_text) return;
  synth.cancel();
  clear_highlight();
  speak_utterance(String(word_text), 'en-US', current_rate * 0.84);
}

function speak_phrase(phrase_text) {
  if (!phrase_text) return;
  synth.cancel();
  clear_highlight();
  speak_utterance(String(phrase_text), 'en-US', current_rate * 0.8);
}

function goto_game() {
  window.location.href = game_url;
}

function change_page(direction) {
  synth.cancel();
  clear_highlight();
  const on_last_page = current_page === pages_data.length - 1;
  if (direction > 0 && on_last_page) {
    goto_game();
    return;
  }
  current_page = Math.max(0, Math.min(pages_data.length - 1, current_page + direction));
  render_page(current_page);
}

render_page(0);
window.addEventListener('load', () => {
  setTimeout(() => { read_current(); }, 500);
});
</script>
</body>
</html>
