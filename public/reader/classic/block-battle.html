<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Battle — 朗读版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body { font-family: 'Nunito', sans-serif; background: #f5f0eb;
         display:flex; flex-direction:column; min-height:100vh; }

  /* === Top Navigation === */
  .top-nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 0 20px; height: 56px;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow: 0 2px 12px rgba(0,0,0,.15);
  }
  .top-nav .back-btn {
    color:#fff; text-decoration:none; font-size:14px;
    opacity:.9; transition:opacity .2s; display:flex; align-items:center; gap:4px;
  }
  .top-nav .back-btn:hover { opacity:1; }
  .top-nav .title { color:#fff; font-size:17px; font-weight:700; letter-spacing:.3px; }
  .top-nav .spacer { width:60px; }

  /* === Main Content === */
  .main-content {
    flex:1; display:flex; flex-direction:column; align-items:center;
    padding: 72px 16px 100px; overflow-y:auto;
  }

  /* === White Card Container === */
  .reader-card {
    width:100%; max-width:920px;
    background:#fff; border-radius:20px;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
    overflow:hidden;
  }

  /* === Header === */
  .reader-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 20px 30px; text-align:center;
  }
  .reader-header h1 {
    color:#fff; font-size:20px; font-weight:700;
  }

  /* === Page Display: Side by Side (desktop) === */
  .page-display {
    display:flex; flex-direction:row; gap:30px; align-items:center;
    padding: 24px 30px;
  }

  /* Image - left side */
  .page-image {
    flex: 0 0 48%; max-width:440px;
  }
  .page-image img {
    width:100%; border-radius:15px;
    box-shadow: 0 10px 30px rgba(0,0,0,.15);
    display:block; object-fit:cover;
  }

  /* Text area - right side */
  .page-text-area {
    flex: 1; display:flex; flex-direction:column; justify-content:center;
    min-width:0;
  }
  .page-info {
    font-size:13px; color:#999; margin-bottom:8px;
  }

  /* English sentence - large, bold */
  .page-sentence {
    font-size:22px; font-weight:600; line-height:1.5;
    color:#333; margin-bottom:10px;
  }
  .page-sentence .word {
    cursor:pointer; border-radius:4px; padding:0 1px;
    transition: background .15s, color .15s; display:inline;
  }
  .page-sentence .word:hover { background:#fff3cd; color:#000; }
  .page-sentence .word.speaking { background:#ff6b6b; color:#fff; }

  /* Chinese translation - toggle */
  .translation-area { margin-bottom:12px; }
  .translation-toggle {
    font-size:13px; color:#667eea; cursor:pointer;
    transition: color .2s; user-select:none;
  }
  .translation-toggle:hover { color:#764ba2; }
  .translation-text {
    font-size:16px; color:#666; line-height:1.6;
    margin-top:6px; padding:10px 14px;
    background:#f8f6f3; border-radius:10px;
    display:none;
  }
  .translation-text.show { display:block; }
  .translation-text .zh-chunk {
    cursor:pointer; border-radius:4px; padding:0 2px;
    transition: background .15s;
  }
  .translation-text .zh-chunk:hover { background:#d4edda; }
  .translation-text .zh-chunk.speaking { background:#ff6b6b; color:#fff; }

  /* Audio controls */
  .audio-controls {
    display:flex; align-items:center; gap:12px; margin-top:6px;
  }
  .play-btn {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color:#fff; border:none; border-radius:20px;
    padding:8px 20px; font-size:14px; font-weight:600;
    cursor:pointer; transition: transform .15s, box-shadow .15s;
    box-shadow: 0 3px 12px rgba(102,126,234,.3);
    display:flex; align-items:center; gap:6px;
    font-family: 'Nunito', sans-serif;
  }
  .play-btn:hover { transform:scale(1.03); box-shadow: 0 4px 16px rgba(102,126,234,.4); }
  .play-btn:active { transform:scale(.97); }
  .speed-selector {
    background:#f0edf8; color:#555; border:1px solid #e0dce8;
    border-radius:12px; padding:6px 10px; font-size:13px;
    cursor:pointer; font-family: 'Nunito', sans-serif;
  }

  /* === Key Words & Phrases Row === */
  .keys-phrases-area {
    padding: 0 30px 20px;
  }
  .kp-row {
    display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px;
  }
  .kp-row:last-child { margin-bottom:0; }
  .kp-label {
    font-size:12px; color:#999; width:100%; margin-bottom:2px;
  }

  /* Vocab pill */
  .vocab-pill {
    background:linear-gradient(135deg, rgba(102,126,234,.1), rgba(118,75,162,.1));
    border:1px solid rgba(102,126,234,.2);
    border-radius:20px; padding:5px 14px; font-size:13px;
    cursor:pointer; transition:all .15s; display:inline-flex; align-items:center; gap:5px;
  }
  .vocab-pill:hover {
    background:linear-gradient(135deg, rgba(102,126,234,.2), rgba(118,75,162,.2));
    transform:scale(1.03);
  }
  .vocab-pill .vw { font-weight:700; color:#667eea; }
  .vocab-pill .vp { font-size:11px; color:#999; }
  .vocab-pill .vz { color:#555; font-size:13px; }

  /* Phrase pill */
  .phrase-pill {
    background:linear-gradient(135deg, rgba(255,165,0,.08), rgba(255,140,0,.12));
    border:1px solid rgba(255,165,0,.25);
    border-radius:20px; padding:5px 14px; font-size:13px;
    cursor:pointer; transition:all .15s; display:inline-flex; align-items:center; gap:5px;
  }
  .phrase-pill:hover {
    background:linear-gradient(135deg, rgba(255,165,0,.15), rgba(255,140,0,.2));
    transform:scale(1.03);
  }
  .phrase-pill .pen { font-weight:600; color:#e67e00; }
  .phrase-pill .pzh { color:#555; }

  /* === Navigation Controls === */
  .navigation-controls {
    display:flex; align-items:center; justify-content:center;
    gap:15px; padding:16px 30px 24px;
    border-top:1px solid #f0edf8;
  }
  .nav-btn {
    background:#f0edf8; color:#555; border:none;
    border-radius:20px; padding:10px 24px; font-size:14px;
    font-weight:600; cursor:pointer; transition:all .15s;
    font-family: 'Nunito', sans-serif;
  }
  .nav-btn:hover:not(:disabled) { background:#e0dce8; color:#333; }
  .nav-btn:disabled { opacity:.35; cursor:not-allowed; }
  .nav-btn.primary {
    background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color:#fff; box-shadow: 0 3px 12px rgba(102,126,234,.25);
  }
  .nav-btn.primary:hover:not(:disabled) {
    box-shadow: 0 4px 16px rgba(102,126,234,.35);
    transform:translateY(-1px);
  }
  .page-counter {
    font-size:15px; color:#888; font-weight:600; min-width:60px; text-align:center;
  }

  /* === Game Button (after last page) === */
  .game-btn-wrap {
    display:none; text-align:center; padding:0 30px 24px;
  }
  .game-btn-wrap.show { display:block; }
  .game-btn {
    background:linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    color:#fff; border:none; border-radius:20px;
    padding:14px 32px; font-size:16px; font-weight:700;
    cursor:pointer; transition:all .2s;
    box-shadow: 0 4px 16px rgba(245,87,108,.3);
    font-family: 'Nunito', sans-serif;
    display:inline-flex; align-items:center; gap:8px;
  }
  .game-btn:hover { transform:scale(1.04); box-shadow: 0 6px 20px rgba(245,87,108,.4); }

  /* === Responsive: Mobile === */
  @media (max-width: 700px) {
    .page-display {
      flex-direction:column; gap:16px; padding:16px 20px;
    }
    .page-image { flex:none; max-width:100%; }
    .page-sentence { font-size:19px; }
    .translation-text { font-size:15px; }
    .reader-header { padding:16px 20px; }
    .reader-header h1 { font-size:17px; }
    .keys-phrases-area { padding:0 20px 16px; }
    .navigation-controls { padding:12px 20px 20px; }
    .game-btn-wrap { padding:0 20px 20px; }
  }

  /* Landscape phone */
  @media (orientation:landscape) and (max-height: 500px) {
    .main-content { padding-top:64px; padding-bottom:60px; }
    .reader-header { padding:10px 20px; }
    .reader-header h1 { font-size:16px; }
    .page-display { padding:12px 20px; gap:16px; }
    .page-image { flex:0 0 40%; }
    .page-sentence { font-size:17px; }
  }
</style>
</head>

  <nav class="top-nav">

  </div>

const GAME_URL = '../game/classic/block-battle.html';
let cur = 0;
let currentSpeed = 1;
let transVisible = false;
let isReading = false;
const synth = window.speechSynthesis;

function changeSpeed() {
  currentSpeed = parseFloat(document.getElementById('speedSelect').value);
}

function getVoice(lang) {
  const voices = synth.getVoices();
  if (!voices.length) return null;
  if (lang === 'zh') {
    const preferred = ['Xiaoxiao','Yunxi','Yunyang','Yunjian','Ting-Ting','Meijia'];
    for (const p of preferred) {
      const v = voices.find(vo => vo.lang.startsWith('zh') && vo.name.includes(p));
      if (v) return v;
    }
    return voices.find(vo => vo.lang.startsWith('zh')) || null;
  } else {
    const preferred = ['Google','Microsoft','Samantha','Daniel','Karen','Apple','Amazon'];
    for (const p of preferred) {
      const v = voices.find(vo => vo.lang.startsWith('en') && vo.name.includes(p));
      if (v) return v;
    }
    return voices.find(vo => vo.lang.startsWith('en')) || null;
  }
}

function toggleTranslation() {
  transVisible = !transVisible;
  const el = document.getElementById('zhText');
  const toggle = document.getElementById('transToggle');
  if (transVisible) {
    el.classList.add('show');
    toggle.textContent = '📖 隐藏翻译';
  } else {
    el.classList.remove('show');
    toggle.textContent = '📖 显示翻译';
  }
}

function renderPage(i) {
  const p = PAGES[i];
  synth.cancel();
  isReading = false;
  updatePlayBtn(false);

  // Image
  document.getElementById('pageImg').src = '../../' + p.img;

  // Page info
  document.getElementById('pageInfo').textContent = `第 ${i+1} 页，共 ${PAGES.length} 页`;

  // English sentence - clickable words
  const words = p.en.split(' ').map(w => {
    const clean = w.replace(/[.,!?':;"""]/g, '');
    return `<span class="word" onclick="speakWord('${clean}', this)">${w}</span>`;
  }).join(' ');
  document.getElementById('enText').innerHTML = words;

  // Chinese translation - clickable chunks (by sentence clause)
  const zhText = document.getElementById('zhText');
  if (p.zh) {
    // Split Chinese by common delimiters into chunks for click-to-read
    const zhChunks = p.zh.split(/([，。！？、；：])/);
    zhText.innerHTML = zhChunks.map(c => 
      c.trim() ? `<span class="zh-chunk" onclick="speakZh(this)">${c}</span>` : c
    ).join('');
  } else {
    zhText.innerHTML = '';
  }

  // Reset translation toggle
  transVisible = false;
  document.getElementById('zhText').classList.remove('show');
  document.getElementById('transToggle').textContent = '📖 显示翻译';

  // Key words & phrases
  const keys = p.keys || [];
  const phrases = p.phrases || [];
  const kpArea = document.getElementById('keysPhrasesArea');

  let kpHTML = '';
  if (keys.length > 0) {
    kpHTML += '<div class="kp-label">💡 单词 (点击发音)</div><div class="kp-row">';
    kpHTML += keys.map(k =>
      `<span class="vocab-pill" onclick="speakWord('${k.w}', this)">
        <span class="vw">${k.w}</span>
        <span class="vp">${k.p}</span>
        <span class="vz">${k.zh}</span>
      </span>`
    ).join('');
    kpHTML += '</div>';
  }
  if (phrases.length > 0) {
    kpHTML += '<div class="kp-label">📚 词组 (点击发音)</div><div class="kp-row">';
    kpHTML += phrases.map(ph =>
      `<span class="phrase-pill" onclick="speakPhrase('${ph.en.replace(/'/g, "\\'")}')">
        <span class="pen">${ph.en}</span>
        <span class="pzh">${ph.zh}</span>
      </span>`
    ).join('');
    kpHTML += '</div>';
  }
  kpArea.innerHTML = kpHTML;

  // Navigation
  document.getElementById('pageNum').textContent = i + 1;
  document.getElementById('pageTotal').textContent = PAGES.length;
  document.getElementById('prevBtn').disabled = i === 0;
  document.getElementById('nextBtn').disabled = i === PAGES.length - 1;

  // Game button - show on last page
  const gameWrap = document.getElementById('gameBtnWrap');
  if (GAME_URL && i === PAGES.length - 1) {
    gameWrap.classList.add('show');
  } else {
    gameWrap.classList.remove('show');
  }

  // Scroll to top of card
  document.querySelector('.main-content').scrollTo(0, 0);
}

function changePage(dir) {
  synth.cancel();
  cur = Math.max(0, Math.min(PAGES.length - 1, cur + dir));
  renderPage(cur);
}

// Speak a single English word
function speakWord(word, el) {
  synth.cancel();
  document.querySelectorAll('.word.speaking, .vocab-pill').forEach(w => w.classList.remove('speaking'));
  if (el) el.classList.add('speaking');
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'en-US';
  utt.rate = currentSpeed * 0.85;
  const v = getVoice('en');
  if (v) utt.voice = v;
  utt.onend = () => { if (el) el.classList.remove('speaking'); };
  synth.speak(utt);
}

// Speak a Chinese chunk
function speakZh(el) {
  synth.cancel();
  document.querySelectorAll('.zh-chunk.speaking').forEach(w => w.classList.remove('speaking'));
  el.classList.add('speaking');
  const utt = new SpeechSynthesisUtterance(el.textContent);
  utt.lang = 'zh-CN';
  utt.rate = currentSpeed * 0.9;
  const v = getVoice('zh');
  if (v) utt.voice = v;
  utt.onend = () => el.classList.remove('speaking');
  synth.speak(utt);
}

// Speak a phrase
function speakPhrase(phrase) {
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(phrase);
  utt.lang = 'en-US';
  utt.rate = currentSpeed;
  const v = getVoice('en');
  if (v) utt.voice = v;
  synth.speak(utt);
}

// Read full page: EN sentence (word-by-word highlight) → ZH sentence
function readCurrent() {
  if (isReading) {
    synth.cancel();
    isReading = false;
    updatePlayBtn(false);
    return;
  }
  isReading = true;
  updatePlayBtn(true);
  const p = PAGES[cur];
  const words = p.en.split(' ');
  let wordIdx = 0;

  function speakNextWord() {
    if (!isReading || wordIdx >= words.length) {
      // Done with English, now read Chinese
      if (p.zh && isReading) {
        const zhUtt = new SpeechSynthesisUtterance(p.zh);
        zhUtt.lang = 'zh-CN';
        zhUtt.rate = currentSpeed * 0.9;
        const zhVoice = getVoice('zh');
        if (zhVoice) zhUtt.voice = zhVoice;
        zhUtt.onend = () => { isReading = false; updatePlayBtn(false); };
        synth.speak(zhUtt);
        // Show translation during read
        if (!transVisible) toggleTranslation();
      } else {
        isReading = false;
        updatePlayBtn(false);
      }
      return;
    }
    const clean = words[wordIdx].replace(/[.,!?':;"""]/g, '');
    // Highlight current word
    const wordEls = document.querySelectorAll('#enText .word');
    wordEls.forEach(w => w.classList.remove('speaking'));
    if (wordEls[wordIdx]) wordEls[wordIdx].classList.add('speaking');

    const utt = new SpeechSynthesisUtterance(clean);
    utt.lang = 'en-US';
    utt.rate = currentSpeed;
    const v = getVoice('en');
    if (v) utt.voice = v;
    utt.onend = () => {
      wordIdx++;
      setTimeout(speakNextWord, 80);
    };
    synth.speak(utt);
  }

  speakNextWord();
}

function updatePlayBtn(playing) {
  document.getElementById('playIcon').textContent = playing ? '⏸' : '▶';
  document.getElementById('playLabel').textContent = playing ? '暂停' : '播放';
}

function goToGame() {
  if (GAME_URL) window.location.href = GAME_URL;
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') changePage(-1);
  if (e.key === 'ArrowRight') changePage(1);
  if (e.key === ' ') { e.preventDefault(); readCurrent(); }
});

// Init
renderPage(0);
setTimeout(() => {
  if (synth.getVoices().length > 0) readCurrent();
  else synth.onvoiceschanged = () => setTimeout(readCurrent, 500);
}, 800);
</script>
</body>
