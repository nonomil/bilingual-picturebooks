<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Battle — 朗读版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(180deg, #fffaf2 0%, #fff5e8 100%);
    color: #2f2f2f;
    min-height: 100vh;
  }
  .reader_wrap {
    width: min(960px, calc(100% - 20px));
    margin: 0 auto;
    padding: 16px 0 28px;
  }
  .page_head {
    background: #fff;
    border-radius: 22px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.08);
    padding: 16px;
    margin-bottom: 14px;
  }
  .page_head_top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
  }
  .unit_tag {
    color: #8f8174;
    font-size: 13px;
    margin-bottom: 6px;
  }
  h1 {
    color: #e17055;
    font-size: 26px;
    line-height: 1.25;
  }
  h1 small {
    display: block;
    color: #8e8e8e;
    font-size: 16px;
    font-weight: 600;
    margin-top: 4px;
  }
  .page_meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  .page_total {
    color: #736456;
    font-size: 13px;
    font-weight: 700;
    text-align: right;
  }
  .meta_actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .top_btn {
    border: none;
    border-radius: 999px;
    background: #fff3d8;
    color: #a26400;
    font-size: 12px;
    font-weight: 800;
    padding: 8px 12px;
    cursor: pointer;
  }
  .top_btn.settings_btn {
    background: #edf4ff;
    color: #2e86de;
  }
  .progress_bar {
    width: 100%;
    height: 7px;
    background: #ececec;
    border-radius: 999px;
    margin-top: 12px;
    overflow: hidden;
  }
  .progress_fill {
    height: 100%;
    background: linear-gradient(90deg, #ff9f43, #ffd166);
    transition: width .25s ease;
  }
  .hero_img {
    width: 100%;
    display: block;
    aspect-ratio: 16 / 10;
    object-fit: cover;
    border-radius: 22px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.12);
    background: #f3f3f3;
  }
  .text_area {
    margin-top: 14px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    padding: 16px 14px;
  }
  .text_area.intro_mode {
    background: linear-gradient(180deg, #fffef9 0%, #fff8ec 100%);
  }
  .text_toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .phase_badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 999px;
    background: #fff4d9;
    color: #9c6500;
    font-size: 12px;
    font-weight: 800;
    padding: 6px 10px;
  }
  .intro_title {
    color: #7d5d2e;
    font-size: 24px;
    line-height: 1.35;
    font-weight: 800;
    margin-bottom: 12px;
  }
  .en_sentence {
    font-size: 28px;
    line-height: 1.7;
    color: #2f2f2f;
    font-weight: 800;
  }
  .word {
    display: inline;
    border-radius: 8px;
    cursor: pointer;
    padding: 1px 3px;
    transition: background .15s ease, color .15s ease;
  }
  .word:hover,
  .word.speaking {
    background: #ffd166;
    color: #3b2f0d;
  }
  .zh_sentence {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed #ececec;
    font-size: 22px;
    line-height: 1.85;
    color: #5d5d5d;
  }
  .zh_sentence.hidden {
    display: none;
  }
  .zh_chunk {
    border-radius: 6px;
    transition: background .12s ease, color .12s ease;
  }
  .zh_chunk.speaking {
    background: #ffe8bd;
    color: #403014;
  }
  .lexicon {
    margin-top: 16px;
    display: grid;
    gap: 10px;
  }
  .lex_row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    flex-wrap: wrap;
  }
  .lex_label {
    min-width: 54px;
    text-align: center;
    border-radius: 999px;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 8px;
  }
  .lex_label.words { background: #54a0ff; }
  .lex_label.phrases { background: #10ac84; }
  .lex_items {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .lex_chip {
    border-radius: 999px;
    padding: 7px 12px;
    border: 1px solid #dde8ff;
    background: #f4f8ff;
    font-size: 13px;
    line-height: 1.4;
    color: #2f3f60;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .lex_chip:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .lex_chip.words b { color: #1f6fd1; }
  .lex_chip.phrases {
    border-color: #c9f0e4;
    background: #f1fffb;
    color: #22524a;
  }
  .lex_chip.phrases b { color: #0c9b78; }
  .lex_chip.speaking {
    background: #ffd166;
    border-color: #ffc94d;
    color: #3b2f0d;
    box-shadow: 0 6px 14px rgba(255, 184, 51, 0.24);
  }
  .lex_empty {
    font-size: 13px;
    color: #989898;
    padding-top: 7px;
  }
  .nav {
    margin-top: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .nav_center {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    padding: 10px 16px;
    transition: opacity .15s ease, transform .15s ease;
  }
  .btn:hover:not(:disabled) {
    transform: translateY(-1px);
  }
  .btn:disabled {
    opacity: .35;
    cursor: not-allowed;
  }
  .btn.nav_btn { background: #ff9f43; color: #fff; min-width: 108px; }
  .btn.read_btn { background: #54a0ff; color: #fff; min-width: 110px; }
  .btn.zh_btn { background: #f368e0; color: #fff; }
  .btn.game_btn { background: #10ac84; color: #fff; display: none; }
  .page_indicator {
    color: #969696;
    font-size: 14px;
    font-weight: 700;
  }
  .settings_overlay {
    position: fixed;
    inset: 0;
    background: rgba(30, 18, 8, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 999;
  }
  .settings_overlay.show {
    display: flex;
  }
  .settings_panel {
    width: min(420px, 100%);
    background: #fff;
    border-radius: 22px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.18);
    padding: 20px 18px;
  }
  .settings_panel h3 {
    font-size: 20px;
    color: #2f2f2f;
    margin-bottom: 12px;
  }
  .settings_group {
    margin-bottom: 14px;
  }
  .settings_group label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #53463b;
    font-size: 15px;
    font-weight: 700;
  }
  .settings_hint {
    color: #8c7b6d;
    font-size: 13px;
    line-height: 1.6;
    margin-top: 6px;
  }
  .settings_actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .settings_action {
    flex: 1;
    border: none;
    border-radius: 999px;
    min-height: 40px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 800;
  }
  .settings_action.save {
    background: #ff9f43;
    color: #fff;
  }
  .settings_action.close {
    background: #f5f0ea;
    color: #7d6d60;
  }
  @media (max-width: 640px) {
    .reader_wrap {
      width: min(100%, calc(100% - 12px));
      padding-top: 10px;
    }
    .page_head_top {
      flex-direction: column;
    }
    .page_meta {
      width: 100%;
      align-items: flex-start;
    }
    .meta_actions {
      justify-content: flex-start;
    }
    .en_sentence { font-size: 23px; }
    .zh_sentence { font-size: 19px; }
    .nav {
      flex-wrap: wrap;
      justify-content: center;
    }
  }
</style>
</head>
<body>
<div class="reader_wrap">
  <div class="page_head">
    <div class="page_head_top">
      <div>
        <div class="unit_tag">分类：我的世界</div>
        <h1>Block Battle<small>方块大战</small></h1>
      </div>
      <div class="page_meta">
        <div class="page_total" id="page_total"></div>
        <div class="meta_actions">
          <button class="top_btn" id="translate_toggle_btn" onclick="toggle_translation()">中文开</button>
          <button class="top_btn settings_btn" onclick="open_settings()">设置</button>
        </div>
      </div>
    </div>
    <div class="progress_bar"><div class="progress_fill" id="progress_fill"></div></div>
  </div>

  <div id="page_area"></div>

  <div class="nav">
    <button class="btn nav_btn" id="prev_btn" onclick="change_page(-1)">← 上一页</button>
    <div class="nav_center">
      <button class="btn read_btn" id="read_btn" onclick="toggle_reading()">🔊 朗读</button>
      <button class="btn zh_btn" onclick="read_chinese_only()">🈶 中文</button>
      <button class="btn game_btn" id="to_game_btn" onclick="goto_game()">🎮 去游戏</button>
      <span class="page_indicator" id="page_indicator"></span>
    </div>
    <button class="btn nav_btn" id="next_btn" onclick="change_page(1)">下一页 →</button>
  </div>
</div>

<div class="settings_overlay" id="settings_overlay" onclick="close_settings_on_overlay(event)">
  <div class="settings_panel">
    <h3>阅读设置</h3>
    <div class="settings_group">
      <label>
        <input type="checkbox" id="hide_chinese_checkbox">
        默认隐藏中文
      </label>
      <div class="settings_hint">默认关闭。开启后第二阶段中文默认隐藏，但仍可点击“中文开/关”切换。</div>
    </div>
    <div class="settings_actions">
      <button class="settings_action save" onclick="save_reader_settings()">保存</button>
      <button class="settings_action close" onclick="close_settings()">关闭</button>
    </div>
  </div>
</div>

p": "/ˈleɪzər/", "zh": "激光"}], "phrases": [{"en": "laser-shooting turret", "zh": "会发射激光的炮塔"}], "title": ""}, {"img": "images/block-battle/page-9.jpg", "en": "Look at my super giant hammer!", "zh": "", "keys": [{"w": "hammer", "p": "/ˈhæmər/", "zh": "锤子"}], "phrases": [{"en": "super giant hammer", "zh": "超级大锤"}], "title": ""}, {"img": "images/block-battle/page-10.jpg", "en": "The turret got smashed into pieces!", "zh": "", "keys": [{"w": "pieces", "p": "/ˈpiːsɪz/", "zh": "碎片"}], "phrases": [{"en": "smashed into pieces", "zh": "被砸成碎片"}], "title": ""}, {"img": "images/block-battle/page-11.jpg", "en": "I will build a flying mechanical fortress!", "zh": "", "keys": [{"w": "fortress", "p": "/ˈfɔːrtrəs/", "zh": "堡垒"}], "phrases": [{"en": "flying mechanical fortress", "zh": "会飞的机械堡垒"}], "title": ""}, {"img": "images/block-battle/page-12.jpg", "en": "This hammer weighs 1,500 blocks!", "zh": "", "keys": [{"w": "hammer", "p": "/ˈhæmər/", "zh": "锤子"}], "phrases": [{"en": "weighs 1,500 blocks", "zh": "重达1500个方块"}], "title": ""}, {"img": "images/block-battle/page-13.jpg", "en": "The fortress got smashed and cannot move!", "zh": "", "keys": [{"w": "fortress", "p": "/ˈfɔːrtrəs/", "zh": "堡垒"}], "phrases": [{"en": "got smashed", "zh": "被砸了"}], "title": ""}, {"img": "images/block-battle/page-14.jpg", "en": "Look at my mechanical hand!", "zh": "", "keys": [{"w": "mechanical", "p": "/məˈkænɪkəl/", "zh": "机械的"}], "phrases": [{"en": "mechanical hand", "zh": "机械手"}], "title": ""}, {"img": "images/block-battle/page-15.jpg", "en": "The mechanical hand weighs 700!", "zh": "", "keys": [{"w": "mechanical", "p": "/məˈkænɪkəl/", "zh": "机械的"}], "phrases": [{"en": "mechanical hand", "zh": "机械手"}], "title": ""}, {"img": "images/block-battle/page-16.jpg", "en": "I will use the hammer to launch you into the sky!", "zh": "", "keys": [{"w": "hammer", "p": "/ˈhæmər/", "zh": "锤子"}], "phrases": [{"en": "launch you into the sky", "zh": "把你发射到天上"}], "title": ""}, {"img": "images/block-battle/page-17.jpg", "en": "BANG! The hammer strikes the ground!", "zh": "", "keys": [{"w": "bang", "p": "/bæŋ/", "zh": "砰"}], "phrases": [{"en": "strike the ground", "zh": "猛击地面"}], "title": ""}, {"img": "images/block-battle/page-18.jpg", "en": "Flying into the sky like a cannonball!", "zh": "", "keys": [{"w": "cannonball", "p": "/ˈkænənbɔːl/", "zh": "炮弹"}], "phrases": [{"en": "flying into the sky", "zh": "飞向天空"}], "title": ""}, {"img": "images/block-battle/page-19.jpg", "en": "Let the mechanical hand place blocks for me!", "zh": "", "keys": [{"w": "mechanical", "p": "/məˈkænɪkəl/", "zh": "机械的"}], "phrases": [{"en": "mechanical hand", "zh": "机械手"}], "title": ""}, {"img": "images/block-battle/page-20.jpg", "en": "I will just lie here and sleep peacefully!", "zh": "", "keys": [{"w": "lie", "p": "/laɪ/", "zh": "躺"}], "phrases": [{"en": "lie here", "zh": "躺在这里"}], "title": ""}, {"img": "images/block-battle/page-21.jpg", "en": "The adventure never ends! Let us play again!", "zh": "冒险永不止步！我们再来一场吧！", "keys": [{"w": "adventure", "p": "/ədˈventʃər/", "zh": "冒险"}], "phrases": [{"en": "the adventure never ends", "zh": "冒险永不止步"}], "title": ""}, {"img": "images/block-battle/page-22.jpg", "en": "battle - start a new battle in the colorful arena!", "zh": "两个小方块勇士在彩色的竞技场面对面，准备玩一个超酷的游戏——方块大战！他们每个人都要建造自己强大的武器。", "keys": [{"w": "battle", "p": "/ˈbætl/", "zh": "大战"}], "phrases": [{"en": "start a battle", "zh": "开始一场大战"}], "title": ""}, {"img": "images/block-battle/page-23.jpg", "en": "stealth - disappear into thin air with stealth skill!", "zh": "勇士选了一个带隐身技能的方块！它身上发出神秘的蓝色光芒，慢慢消失在空气中。", "keys": [{"w": "stealth", "p": "/stelθ/", "zh": "隐身"}], "phrases": [{"en": "stealth skill", "zh": "隐身技能"}], "title": ""}, {"img": "images/block-battle/page-24.jpg", "en": "obsidian - build a strong shield with obsidian layers!", "zh": "一个巨大的三层黑曜石盾牌从地面升起，散发着火山能量。一般攻击根本打不破！", "keys": [{"w": "obsidian", "p": "/əbˈsɪdiən/", "zh": "黑曜石"}], "phrases": [{"en": "build a shield", "zh": "造一个盾牌"}], "title": ""}, {"img": "images/block-battle/page-25.jpg", "en": "sword - ride a sword with evil attack power!", "zh": "勇士跳上一把巨大的暗紫色之剑。带着邪恶的攻击力，猛砸向盾牌！", "keys": [{"w": "sword", "p": "/sɔːrd/", "zh": "剑"}], "phrases": [{"en": "evil attack", "zh": "邪恶攻击"}], "title": ""}, {"img": "images/block-battle/page-26.jpg", "en": "crush - the shield was crushed flat into shards!", "zh": "黑曜石盾牌被彻底砸扁了！碎片像烟花一样四处飞溅。", "keys": [{"w": "crush", "p": "/krʌʃ/", "zh": "压碎"}], "phrases": [{"en": "crushed flat", "zh": "被砸扁"}], "title": ""}, {"img": "images/block-battle/page-27.jpg", "en": "laser - charge and dodge the laser beams!", "zh": "一个高科技炮塔升起，充能着明亮的红色激光束。你怎么躲？", "keys": [{"w": "laser", "p": "/ˈleɪzər/", "zh": "激光"}], "phrases": [{"en": "charge a bright red laser", "zh": "给明亮的红色激光充能"}], "title": ""}, {"img": "images/block-battle/page-28.jpg", "en": "hammer - one swing of the giant legendary hammer!", "zh": "勇士挥舞着一把巨大的金色锤子。这就是传说中的锤子王——最强的武器！", "keys": [{"w": "hammer", "p": "/ˈhæmər/", "zh": "锤子"}], "phrases": [{"en": "a giant golden hammer", "zh": "一把巨大的金色锤子"}], "title": ""}, {"img": "images/block-battle/page-29.jpg", "en": "swing - one mighty swing smashed everything tiny!", "zh": "激光炮塔被大锤一挥就砸成了碎片！", "keys": [{"w": "swing", "p": "/swɪŋ/", "zh": "挥舞"}], "phrases": [{"en": "one swing", "zh": "一下挥舞"}], "title": ""}, {"img": "images/block-battle/page-30.jpg", "en": "fortress - a mechanical flying fortress, unbeatable!", "zh": "一个带着翅膀的巨大堡垒升上天空。看起来不可战胜！", "keys": [{"w": "fortress", "p": "/ˈfɔːrtrəs/", "zh": "堡垒"}], "phrases": [{"en": "a giant fortress", "zh": "一个巨大的堡垒"}], "title": ""}, {"img": "images/block-battle/page-31.jpg", "en": "weigh - the immense mechanical hand has great weight!", "zh": "这锤子有1500个方块那么重！堡垒在巨大的重量下颤抖，几乎飞不动了！", "keys": [{"w": "weigh", "p": "/weɪ/", "zh": "重（动词）"}], "phrases": [{"en": "weigh 1500 blocks", "zh": "重达1500个方块"}], "title": ""}, {"img": "images/block-battle/page-32.jpg", "en": "extend - reach out with incredible extendable arms!", "zh": "一只巨大的金属手臂从地面伸出，以惊人的力量向堡垒抓去。", "keys": [{"w": "extend", "p": "/ɪkˈstend/", "zh": "伸出"}], "phrases": [{"en": "extend from the ground", "zh": "从地面伸出"}], "title": ""}, {"img": "images/block-battle/page-33.jpg", "en": "clever - a clever plan using sound wave to launch!", "zh": "勇士想到了一个聪明的计划！如果锤子砸到地面，声波把敌人弹飞到天上呢？", "keys": [{"w": "clever", "p": "/ˈklevər/", "zh": "聪明的"}], "phrases": [{"en": "a clever plan", "zh": "一个聪明的计划"}], "title": ""}, {"img": "images/block-battle/page-34.jpg", "en": "strike - the hammer strike sends a huge shockwave!", "zh": "锤子以惊人的力量猛击地面！巨大的冲击波向四面八方扩散。", "keys": [{"w": "strike", "p": "/straɪk/", "zh": "击打"}], "phrases": [{"en": "strike the ground", "zh": "击打地面"}], "title": ""}, {"img": "images/block-battle/page-35.jpg", "en": "cannonball - fly high over the arena like a cannonball!", "zh": "像一颗炮弹一样，敌人飞上了高高的天空！对战结束了！", "keys": [{"w": "cannonball", "p": "/ˈkænənbɔːl/", "zh": "炮弹"}], "phrases": [{"en": "like a cannonball", "zh": "像一颗炮弹一样"}], "title": ""}, {"img": "images/block-battle/page-36.jpg", "en": "lazy - fall asleep comfortably after the big battle!", "zh": "为什么要放方块？让机械手帮我放！勇士舒服地躺下来，睡着了。", "keys": [{"w": "lazy", "p": "/ˈleɪzi/", "zh": "懒惰的"}], "phrases": [{"en": "let the robotic arm do it", "zh": "让机械手帮我放"}], "title": ""}, {"img": "images/block-battle/page-37.jpg", "en": "The second round begins! A brave warrior returns to the arena.", "zh": "冒险永不止步！我们再来一场吧！", "keys": [{"w": "adventure", "p": "/ədˈventʃər/", "zh": "冒险"}], "phrases": [{"en": "The adventure never ends", "zh": "冒险永不止步"}], "title": ""}, {"img": "images/block-battle/page-38.jpg", "en": "stealth - disappear with stealth skill, very confused!", "zh": "一个阳光明媚的下午，两个最好的朋友——一个披着红披风的小勇士和一个聪明的建造师——在彩色的竞技场面对面站着。今天就是他们期待已久的日子：方块大战！每个人都要设计自己的武器，比比谁最强。", "keys": [{"w": "warrior", "p": "/ˈwɔːriər/", "zh": "勇士"}], "phrases": [{"en": "a brave warrior", "zh": "一个勇敢的勇士"}], "title": ""}, {"img": "images/block-battle/page-39.jpg", "en": "obsidian - build a shield with super hard obsidian material!", "zh": "建造师笑着说：'我选一个带隐身技能的方块！'突然，他全身开始发出神秘的蓝色光芒。慢慢地，他消失在了空气中！'现在你看不到我了！'他的声音从四面八方传来。", "keys": [{"w": "stealth", "p": "/stelθ/", "zh": "隐身"}], "phrases": [{"en": "stealth skill", "zh": "隐身技能"}], "title": ""}, {"img": "images/block-battle/page-40.jpg", "en": "evil - ride a sword with evil attack and purple lightning!", "zh": "建造师重新出现了，立刻开始工作。'我要造一个三层黑曜石盾牌！'他骄傲地宣布。一块一块地，一个巨大的黑色盾牌从地面升起。黑曜石是方块世界最坚硬的材料之一。'一般攻击根本打不破这个！'他笑着说。", "keys": [{"w": "obsidian", "p": "/əbˈsɪdiən/", "zh": "黑曜石"}], "phrases": [{"en": "obsidian shield", "zh": "黑曜石盾牌"}], "title": ""}, {"img": "images/block-battle/page-41.jpg", "en": "impossible - the obsidian shield cannot be broken!", "zh": "勇士一点也不担心。'看我的！'他大喊，跳上了一把漂浮在空中的巨大暗紫色之剑。剑上覆盖着邪恶能量，闪着暗紫色的闪电。'有这个邪恶攻击力，你的盾牌什么都不算！'勇士全速飞向盾牌。", "keys": [{"w": "sword", "p": "/sɔːrd/", "zh": "剑"}], "phrases": [{"en": "giant sword", "zh": "巨大的剑"}], "title": ""}, {"img": "images/block-battle/page-42.jpg", "en": "laser - a high-tech turret that shoots laser beams!", "zh": "哐当！邪恶之剑以惊人的力量撞上黑曜石盾牌。让所有人吃惊的是，传说中坚不可摧的盾牌被彻底砸扁了——像一张煎饼！黑曜石碎片像烟花一样四处飞溅。'不可能！'建造师惊呼，盯着被拍扁的盾牌残骸。", "keys": [{"w": "crush", "p": "/krʌʃ/", "zh": "压碎"}], "phrases": [{"en": "crushed flat", "zh": "被砸扁"}], "title": ""}, {"img": "images/block-battle/page-43.jpg", "en": "enormous - the enormous hammer is the secret weapon!", "zh": "建造师不肯认输。'好，比就比！'他迅速组装了一个高科技激光炮塔。炮塔嗡嗡地启动了，充能着明亮的红色激光束，照亮了整个竞技场。'看你躲不躲得过这个！'他咧嘴笑着，直接瞄准了勇士。", "keys": [{"w": "laser", "p": "/ˈleɪzər/", "zh": "激光"}], "phrases": [{"en": "laser turret", "zh": "激光炮塔"}], "title": ""}, {"img": "images/block-battle/page-44.jpg", "en": "fortress - a mechanical flying fortress, unbeatable!", "zh": "勇士大笑，掏出了他的秘密武器——一把巨大的金色锤子，叫做锤子王。这是任何人见过的最大的锤子，闪耀着金光。'你觉得一个小激光就能挡住我？'他说着，把锤子高高举过头顶。", "keys": [{"w": "hammer", "p": "/ˈhæmər/", "zh": "锤子"}], "phrases": [{"en": "secret weapon", "zh": "秘密武器"}], "title": ""}, {"img": "images/block-battle/page-45.jpg", "en": "swing - one mighty swing of the scrap hammer!", "zh": "只一挥，轰！金色锤子砸在激光炮塔上，把它砸成了碎片！齿轮、电线和金属零件四处飞溅。建造师震惊地盯着炮塔变成的那堆废铁。'这锤子也太太太强了！'他小声说。", "keys": [{"w": "swing", "p": "/swɪŋ/", "zh": "挥舞"}], "phrases": [{"en": "one mighty swing", "zh": "有力的一挥"}], "title": ""}, {"img": "images/block-battle/page-46.jpg", "en": "fortress - the mechanical fortress looks unbeatable!", "zh": "建造师还有一招。'我要造一个飞行的机械堡垒！'一个带着巨大翅膀的结构从地面升起，飞上了天空。它装着厚厚的金属板，看起来真的不可战胜。'你打不到会飞的东西！'建造师在空中大喊。", "keys": [{"w": "fortress", "p": "/ˈfɔːrtrəs/", "zh": "堡垒"}], "phrases": [{"en": "mechanical fortress", "zh": "机械堡垒"}], "title": ""}, {"img": "images/block-battle/page-47.jpg", "en": "weigh - the hammer weighs 1,500 blocks, immense!", "zh": "但勇士有一个更疯狂的主意。他拿出了最重的武器——一把重达1500个方块的锤子！当他举起它时，整个竞技场都在颤抖。飞行堡垒在巨大的重量下剧烈摇晃，几乎飞不动了。'这是我的超级武器！'勇士咧嘴笑道。", "keys": [{"w": "weigh", "p": "/weɪ/", "zh": "重（动词）"}], "phrases": [{"en": "weigh 1500 blocks", "zh": "重达1500个方块"}], "title": ""}, {"img": "images/block-battle/page-48.jpg", "en": "extend - extend and grab with incredible stretching arms!", "zh": "建造师快没招了，但他突然想起了一件事。'等等！我还有我的机械手！'一只巨大的金属手臂从地面伸出，伸向高空中的堡垒。它重700个方块，什么都能抓住。'这只手够强壮，能把你的堡垒抓碎！'他喊道。", "keys": [{"w": "extend", "p": "/ɪkˈstend/", "zh": "伸出"}], "phrases": [{"en": "extend from the ground", "zh": "从地面伸出"}], "title": ""}, {"img": "images/block-battle/page-49.jpg", "en": "clever - a brilliant clever plan with a shockwave!", "zh": "勇士看着伸向自己的机械手，使劲思考。然后他的眼睛亮了。'我有一个聪明的计划！'他对自己说。'如果我用锤子砸地面，声波产生的冲击力就会把你弹飞到天上——我就赢了！'这是一个绝妙的主意。", "keys": [{"w": "clever", "p": "/ˈklevər/", "zh": "聪明的"}], "phrases": [{"en": "a clever plan", "zh": "一个聪明的计划"}], "title": ""}, {"img": "images/block-battle/page-50.jpg", "en": "strike - the hammer strike has incredible impact!", "zh": "勇士把巨大的锤子高高举起，猛砸向地面。哐当！撞击力太大了，整个竞技场像地震一样摇晃。巨大的冲击波向四面八方扩散，把灰尘和方块都吹上了天。声音回荡在整个大地上。", "keys": [{"w": "strike", "p": "/straɪk/", "zh": "击打"}], "phrases": [{"en": "strike the ground", "zh": "击打地面"}], "title": ""}, {"img": "images/block-battle/page-51.jpg", "en": "cannonball - tumble through the sky like a cannonball, amazed!", "zh": "就像勇士计划的那样，建造师像一颗炮弹一样被弹飞上了天！他越飞越高，在云层中旋转翻滚。'我在飞！'他尖叫着，又害怕又惊讶。对战结束了——勇士用聪明的计谋赢了！", "keys": [{"w": "cannonball", "p": "/ˈkænənbɔː let current_page = 0;
let current_rate = 0.92;
let is_reading = false;
let current_word_ranges = [];
const synth = window.speechSynthesis;

function get_hide_chinese_setting() {
  if (localStorage.getItem('hideChineseTranslation') !== null) {
    return localStorage.getItem('hideChineseTranslation') === '1';
  }
  return localStorage.getItem('hideChinese') === 'true';
}

let translation_visible = !get_hide_chinese_setting();

function escape_for_attr(raw_text) {
  return String(raw_text || '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function get_asset_src(raw_path) {
  const path_text = String(raw_path || '').trim();
  if (!path_text) return '';
  if (path_text.startsWith('http://') || path_text.startsWith('https://')) return path_text;
  if (path_text.startsWith('images/')) return '../../' + path_text;
  return '../../images/' + path_text.replace(/^\/+/, '');
}

function split_zh_chunks(zh_text) {
  return String(zh_text || '')
    .split(/(?<=[。！？；：,.!?])/)
    .map((chunk) => chunk.trim())
    .filter(Boolean);
}

function build_word_tokens(en_text) {
  const source_text = String(en_text || '');
  const tokens = source_text.match(/\S+/g) || [];
  let search_index = 0;
  return tokens.map((token) => {
    const start = source_text.indexOf(token, search_index);
    const end = start + token.length;
    search_index = end;
    return { token, start, end };
  });
}

function get_current_page() {
  return page_list[current_page] || page_list[0];
}

function get_section_label(page) {
  if (page.section === 'intro') return '第一阶段 · 中文导入';
  return intro_pages.length ? '第二阶段 · 英文阅读' : '阅读页';
}

function update_read_button() {
  const read_btn = document.getElementById('read_btn');
  if (!read_btn) return;
  read_btn.textContent = is_reading ? '⏹ 停止' : '🔊 朗读';
}

function update_translation_ui() {
  const page = get_current_page();
  const zh_box = document.getElementById('zh_sentence');
  const toggle_btn = document.getElementById('translate_toggle_btn');
  if (!page || !zh_box || !toggle_btn) return;
  const is_intro = page.section === 'intro';
  toggle_btn.style.display = is_intro ? 'none' : 'inline-flex';
  zh_box.classList.toggle('hidden', !is_intro && !translation_visible);
  if (!is_intro) {
    toggle_btn.textContent = translation_visible ? '中文关' : '中文开';
  }
}

function toggle_translation(force_visible) {
  if (typeof force_visible === 'boolean') {
    translation_visible = force_visible;
  } else {
    translation_visible = !translation_visible;
  }
  update_translation_ui();
}

function open_settings() {
  const overlay = document.getElementById('settings_overlay');
  const checkbox = document.getElementById('hide_chinese_checkbox');
  checkbox.checked = get_hide_chinese_setting();
  overlay.classList.add('show');
}

function close_settings() {
  document.getElementById('settings_overlay').classList.remove('show');
}

function close_settings_on_overlay(event) {
  if (event.target.id === 'settings_overlay') {
    close_settings();
  }
}

function save_reader_settings() {
  const hidden = document.getElementById('hide_chinese_checkbox').checked;
  localStorage.setItem('hideChinese', hidden ? 'true' : 'false');
  localStorage.setItem('hideChineseTranslation', hidden ? '1' : '0');
  translation_visible = !hidden;
  update_translation_ui();
  close_settings();
}

function render_page(page_index) {
  const page = page_list[page_index];
  const is_intro = page.section === 'intro';
  const section_label = get_section_label(page);
  const image_src = get_asset_src(page.img);
  current_word_ranges = is_intro ? [] : build_word_tokens(page.en || '');

  const words_html = current_word_ranges.map((item, idx) =>
    `<span class="word" id="w_${idx}" onclick="speak_word_token(${idx})">${escape_for_attr(item.token)}</span>`
  ).join(' ');

  const zh_chunks = split_zh_chunks(page.zh || '');
  const zh_html = zh_chunks.map((chunk, idx) =>
    `<span class="zh_chunk" id="zh_${idx}">${escape_for_attr(chunk)}</span>`
  ).join('');

  const word_row_html = (page.keys || []).length
    ? (page.keys || []).map((item, idx) =>
      `<span class="lex_chip words" id="key_${idx}" onclick="manual_speak_word(${idx})"><b>${escape_for_attr(item.w || '')}</b> ${escape_for_attr(item.p || '')} ${escape_for_attr(item.zh || '')}</span>`
    ).join('')
    : '<span class="lex_empty">暂无重点单词</span>';

  const phrase_row_html = (page.phrases || []).length
    ? (page.phrases || []).map((item, idx) =>
      `<span class="lex_chip phrases" id="phrase_${idx}" onclick="manual_speak_phrase(${idx})"><b>${escape_for_attr(item.en || '')}</b> ${escape_for_attr(item.zh || '')}</span>`
    ).join('')
    : '<span class="lex_empty">暂无重点词组</span>';

  const intro_title_html = page.title ? `<div class="intro_title">${escape_for_attr(page.title)}</div>` : '';

  document.getElementById('page_area').innerHTML = is_intro ? `
    <img class="hero_img" src="${image_src}" alt="page ${page_index + 1}" onerror="this.style.objectFit='contain';this.style.background='#eee';">
    <div class="text_area intro_mode">
      <div class="text_toolbar">
        <div class="phase_badge">${section_label}</div>
      </div>
      ${intro_title_html}
      <div class="zh_sentence" id="zh_sentence">${zh_html}</div>
      <div class="lexicon">
        <div class="lex_row"><span class="lex_label words">单词</span><div class="lex_items">${word_row_html}</div></div>
        <div class="lex_row"><span class="lex_label phrases">词组</span><div class="lex_items">${phrase_row_html}</div></div>
      </div>
    </div>` : `
    <img class="hero_img" src="${image_src}" alt="page ${page_index + 1}" onerror="this.style.objectFit='contain';this.style.background='#eee';">
    <div class="text_area">
      <div class="text_toolbar">
        <div class="phase_badge">${section_label}</div>
      </div>
      <div class="en_sentence">${words_html}</div>
      <div class="zh_sentence" id="zh_sentence">${zh_html}</div>
      <div class="lexicon">
        <div class="lex_row"><span class="lex_label words">单词</span><div class="lex_items">${word_row_html}</div></div>
        <div class="lex_row"><span class="lex_label phrases">词组</span><div class="lex_items">${phrase_row_html}</div></div>
      </div>
    </div>`;

  document.getElementById('progress_fill').style.width = `${((page_index + 1) / page_list.length) * 100}%`;
  document.getElementById('page_total').textContent = `${section_label} · 第 ${page_index + 1} 页 / 共 ${page_list.length} 页`;
  document.getElementById('page_indicator').textContent = `${page_index + 1} / ${page_list.length}`;
  document.getElementById('prev_btn').disabled = page_index === 0;

  const on_last_page = page_index === page_list.length - 1;
  const on_last_intro_page = intro_pages.length && page_index === intro_pages.length - 1;
  document.getElementById('next_btn').textContent = on_last_page ? '完成并去游戏 →' : (on_last_intro_page ? '进入第二阶段 →' : '下一页 →');
  document.getElementById('to_game_btn').style.display = on_last_page ? 'inline-block' : 'none';
  update_translation_ui();
  update_read_button();
}

function clear_highlight() {
  document.querySelectorAll('.word.speaking').forEach((el) => el.classList.remove('speaking'));
  document.querySelectorAll('.zh_chunk.speaking').forEach((el) => el.classList.remove('speaking'));
  document.querySelectorAll('.lex_chip.speaking').forEach((el) => el.classList.remove('speaking'));
}

function stop_reading() {
  is_reading = false;
  clear_highlight();
  if (synth) synth.cancel();
  update_read_button();
}

function speak_utterance(text_value, lang_code, rate_value, on_boundary) {
  return new Promise((resolve) => {
    const safe_text = String(text_value || '').trim();
    if (!safe_text || !synth) {
      resolve();
      return;
    }
    const utterance = new SpeechSynthesisUtterance(safe_text);
    utterance.lang = lang_code;
    utterance.rate = rate_value;
    utterance.pitch = 1;
    if (on_boundary) utterance.onboundary = on_boundary;
    utterance.onend = resolve;
    utterance.onerror = resolve;
    synth.speak(utterance);
  });
}

function highlight_en_word(char_index) {
  const word_index = current_word_ranges.findIndex((item) => char_index >= item.start && char_index < item.end);
  if (word_index < 0) return;
  clear_highlight();
  const active_word = document.getElementById(`w_${word_index}`);
  if (active_word) active_word.classList.add('speaking');
}

function highlight_zh_chunk(chunk_index) {
  clear_highlight();
  const chunk_el = document.getElementById(`zh_${chunk_index}`);
  if (chunk_el) chunk_el.classList.add('speaking');
}

function highlight_lex_item(prefix, item_index) {
  clear_highlight();
  const target_el = document.getElementById(`${prefix}_${item_index}`);
  if (target_el) target_el.classList.add('speaking');
}

async function speak_english_sentence(page) {
  await speak_utterance(String(page.en || ''), 'en-US', current_rate * 0.92, (event) => {
    if (typeof event.charIndex === 'number') {
      highlight_en_word(event.charIndex);
    }
  });
}

async function speak_chinese_sentence(page) {
  const zh_chunks = split_zh_chunks(page.zh || '');
  for (let idx = 0; idx < zh_chunks.length; idx += 1) {
    if (!is_reading) return;
    highlight_zh_chunk(idx);
    await speak_utterance(String(zh_chunks[idx] || ''), 'zh-CN', current_rate);
  }
}

async function speak_word_item(item, item_index) {
  highlight_lex_item('key', item_index);
  await speak_utterance(String(item.w || ''), 'en-US', current_rate * 0.85);
  if (!is_reading) return;
  await speak_utterance(String(item.zh || ''), 'zh-CN', current_rate * 0.9);
}

async function speak_phrase_item(item, item_index) {
  highlight_lex_item('phrase', item_index);
  await speak_utterance(String(item.en || ''), 'en-US', current_rate * 0.82);
  if (!is_reading) return;
  await speak_utterance(String(item.zh || ''), 'zh-CN', current_rate * 0.88);
}

async function toggle_reading() {
  if (is_reading) {
    stop_reading();
    return;
  }
  await read_current();
}

async function read_current() {
  if (is_reading) return;
  const page = get_current_page();
  is_reading = true;
  if (synth) synth.cancel();
  clear_highlight();
  update_read_button();
  try {
    if (page.section === 'intro') {
      await speak_chinese_sentence(page);
    } else {
      await speak_english_sentence(page);
      if (!is_reading) return;
      await speak_chinese_sentence(page);
      if (!is_reading) return;
      for (let idx = 0; idx < (page.keys || []).length; idx += 1) {
        if (!is_reading) return;
        await speak_word_item(page.keys[idx], idx);
      }
      for (let idx = 0; idx < (page.phrases || []).length; idx += 1) {
        if (!is_reading) return;
        await speak_phrase_item(page.phrases[idx], idx);
      }
    }
  } finally {
    is_reading = false;
    clear_highlight();
    update_read_button();
  }
}

async function read_chinese_only() {
  if (is_reading) {
    stop_reading();
    return;
  }
  is_reading = true;
  if (synth) synth.cancel();
  clear_highlight();
  update_read_button();
  try {
    await speak_chinese_sentence(get_current_page());
  } finally {
    is_reading = false;
    clear_highlight();
    update_read_button();
  }
}

function sanitize_token(token) {
  return String(token || '').replace(/^[^\w]+|[^\w]+$/g, '');
}

function speak_word_token(word_index) {
  const page = get_current_page();
  const token_info = current_word_ranges[word_index];
  if (!token_info) return;
  stop_reading();
  highlight_en_word(token_info.start);
  const clean_token = sanitize_token(token_info.token);
  speak_utterance(clean_token || token_info.token, 'en-US', current_rate * 0.85).then(() => {
    clear_highlight();
  });
}

function manual_speak_word(item_index) {
  const page = get_current_page();
  const item = (page.keys || [])[item_index];
  if (!item) return;
  stop_reading();
  is_reading = true;
  update_read_button();
  speak_word_item(item, item_index).finally(() => {
    is_reading = false;
    clear_highlight();
    update_read_button();
  });
}

function manual_speak_phrase(item_index) {
  const page = get_current_page();
  const item = (page.phrases || [])[item_index];
  if (!item) return;
  stop_reading();
  is_reading = true;
  update_read_button();
  speak_phrase_item(item, item_index).finally(() => {
    is_reading = false;
    clear_highlight();
    update_read_button();
  });
}

function goto_game() {
  window.location.href = game_url;
}

function change_page(direction) {
  stop_reading();
  const on_last_page = current_page === page_list.length - 1;
  if (direction > 0 && on_last_page) {
    goto_game();
    return;
  }
  current_page = Math.max(0, Math.min(page_list.length - 1, current_page + direction));
  render_page(current_page);
}

render_page(0);
window.addEventListener('load', () => {
  setTimeout(() => { read_current(); }, 500);
});
</script>
</body>
</html>
