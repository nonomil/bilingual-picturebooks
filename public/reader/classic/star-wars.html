<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Wars — 朗读版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(180deg, #fffaf2 0%, #fff5e8 100%);
    color: #2f2f2f;
    min-height: 100vh;
  }
  .reader_wrap {
    width: min(960px, calc(100% - 20px));
    margin: 0 auto;
    padding: 16px 0 28px;
  }
  .page_head {
    background: #fff;
    border-radius: 22px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.08);
    padding: 16px;
    margin-bottom: 14px;
  }
  .page_head_top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
  }
  .unit_tag {
    color: #8f8174;
    font-size: 13px;
    margin-bottom: 6px;
  }
  h1 {
    color: #e17055;
    font-size: 26px;
    line-height: 1.25;
  }
  h1 small {
    display: block;
    color: #8e8e8e;
    font-size: 16px;
    font-weight: 600;
    margin-top: 4px;
  }
  .page_meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  .page_total {
    color: #736456;
    font-size: 13px;
    font-weight: 700;
    text-align: right;
  }
  .meta_actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .top_btn {
    border: 1px solid #f1e3cf;
    border-radius: 999px;
    background: #fffaf3;
    color: #8b6b47;
    font-size: 12px;
    font-weight: 800;
    padding: 8px 12px;
    cursor: pointer;
  }
  .top_btn.settings_btn {
    background: #f6f8fb;
    border-color: #dde6f2;
    color: #5d7188;
  }
  .progress_bar {
    width: 100%;
    height: 7px;
    background: #ececec;
    border-radius: 999px;
    margin-top: 12px;
    overflow: hidden;
  }
  .progress_fill {
    height: 100%;
    background: linear-gradient(90deg, #ff9f43, #ffd166);
    transition: width .25s ease;
  }
  .hero_img {
    width: 100%;
    display: block;
    aspect-ratio: 16 / 10;
    object-fit: cover;
    border-radius: 22px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.12);
    background: #f3f3f3;
  }
  .text_area {
    margin-top: 14px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    padding: 16px 14px;
  }
  .text_area.intro_mode {
    background: linear-gradient(180deg, #fffef9 0%, #fff8ec 100%);
  }
  .intro_title {
    color: #7d5d2e;
    font-size: 24px;
    line-height: 1.35;
    font-weight: 800;
    margin-bottom: 12px;
  }
  .en_sentence {
    font-size: 28px;
    line-height: 1.7;
    color: #2f2f2f;
    font-weight: 800;
  }
  .word {
    display: inline;
    border-radius: 8px;
    cursor: pointer;
    padding: 1px 3px;
    transition: background .15s ease, color .15s ease;
  }
  .word:hover,
  .word.speaking {
    background: #ffd166;
    color: #3b2f0d;
  }
  .zh_sentence {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed #ececec;
    font-size: 22px;
    line-height: 1.85;
    color: #5d5d5d;
  }
  .zh_sentence.hidden {
    display: none;
  }
  .zh_chunk {
    border-radius: 6px;
    transition: background .12s ease, color .12s ease;
  }
  .zh_chunk.speaking {
    background: #ffe8bd;
    color: #403014;
  }
  .lexicon {
    margin-top: 16px;
    display: grid;
    gap: 10px;
  }
  .lex_row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    flex-wrap: wrap;
  }
  .lex_label {
    min-width: 54px;
    text-align: center;
    border-radius: 999px;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 8px;
  }
  .lex_label.words { background: #54a0ff; }
  .lex_label.phrases { background: #10ac84; }
  .lex_items {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .lex_chip {
    border-radius: 999px;
    padding: 7px 12px;
    border: 1px solid #dde8ff;
    background: #f4f8ff;
    font-size: 13px;
    line-height: 1.4;
    color: #2f3f60;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .lex_chip:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .lex_chip.words b { color: #1f6fd1; }
  .lex_chip.phrases {
    border-color: #c9f0e4;
    background: #f1fffb;
    color: #22524a;
  }
  .lex_chip.phrases b { color: #0c9b78; }
  .lex_chip.speaking {
    background: #ffd166;
    border-color: #ffc94d;
    color: #3b2f0d;
    box-shadow: 0 6px 14px rgba(255, 184, 51, 0.24);
  }
  .lex_empty {
    font-size: 13px;
    color: #989898;
    padding-top: 7px;
  }
  .nav {
    margin-top: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .nav_center {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    padding: 10px 16px;
    transition: opacity .15s ease, transform .15s ease;
  }
  .btn:hover:not(:disabled) {
    transform: translateY(-1px);
  }
  .btn:disabled {
    opacity: .35;
    cursor: not-allowed;
  }
  .btn.nav_btn { background: #f8f2ea; color: #8f6c4d; min-width: 108px; border: 1px solid #eadccf; }
  .btn.read_btn { background: #54a0ff; color: #fff; min-width: 128px; font-size: 16px; padding: 12px 20px; box-shadow: 0 8px 18px rgba(84,160,255,0.24); }
  .btn.zh_btn { background: #fff; color: #7a5d45; border: 1px solid #eadccf; }
  .btn.game_btn { background: #10ac84; color: #fff; display: none; }
  .page_indicator {
    color: #969696;
    font-size: 14px;
    font-weight: 700;
  }
  .settings_overlay {
    position: fixed;
    inset: 0;
    background: rgba(30, 18, 8, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 999;
  }
  .settings_overlay.show {
    display: flex;
  }
  .settings_panel {
    width: min(420px, 100%);
    background: #fff;
    border-radius: 22px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.18);
    padding: 20px 18px;
  }
  .settings_panel h3 {
    font-size: 20px;
    color: #2f2f2f;
    margin-bottom: 12px;
  }
  .settings_group {
    margin-bottom: 14px;
  }
  .settings_group label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #53463b;
    font-size: 15px;
    font-weight: 700;
  }
  .settings_hint {
    color: #8c7b6d;
    font-size: 13px;
    line-height: 1.6;
    margin-top: 6px;
  }
  .settings_actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .settings_action {
    flex: 1;
    border: none;
    border-radius: 999px;
    min-height: 40px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 800;
  }
  .settings_action.save {
    background: #ff9f43;
    color: #fff;
  }
  .settings_action.close {
    background: #f5f0ea;
    color: #7d6d60;
  }
  @media (max-width: 640px) {
    .reader_wrap {
      width: min(100%, calc(100% - 12px));
      padding-top: 10px;
    }
    .page_head_top {
      flex-direction: column;
    }
    .page_meta {
      width: 100%;
      align-items: flex-start;
    }
    .meta_actions {
      justify-content: flex-start;
    }
    .en_sentence { font-size: 23px; }
    .zh_sentence { font-size: 19px; }
    .nav {
      flex-wrap: wrap;
      justify-content: center;
    }
  }
</style>
</head>
<body>
<div class="reader_wrap">
  <div class="page_head">
    <div class="page_head_top">
      <div>
        <div class="unit_tag">分类：原创</div>
        <h1>Star Wars<small>星球大战</small></h1>
      </div>
      <div class="page_meta">
        <div class="page_total" id="page_total"></div>
        <div class="meta_actions">
          <button class="top_btn" id="translate_toggle_btn" onclick="toggle_translation()">隐藏中文</button>
          <button class="top_btn settings_btn" onclick="open_settings()">设置</button>
        </div>
      </div>
    </div>
    <div class="progress_bar"><div class="progress_fill" id="progress_fill"></div></div>
  </div>

  <div id="page_area"></div>

  <div class="nav">
    <button class="btn nav_btn" id="prev_btn" onclick="change_page(-1)">← 上一页</button>
    <div class="nav_center">
      <button class="btn read_btn" id="read_btn" onclick="toggle_reading()">🔊 开始朗读</button>
      <button class="btn zh_btn" onclick="read_chinese_only()">听中文</button>
      <button class="btn game_btn" id="to_game_btn" onclick="goto_game()">🎮 去游戏</button>
      <span class="page_indicator" id="page_indicator"></span>
    </div>
    <button class="btn nav_btn" id="next_btn" onclick="change_page(1)">下一页 →</button>
  </div>
</div>

<div class="settings_overlay" id="settings_overlay" onclick="close_settings_on_overlay(event)">
  <div class="settings_panel">
    <h3>阅读设置</h3>
    <div class="settings_group">
      <label>
        <input type="checkbox" id="hide_chinese_checkbox">
        默认隐藏中文
      </label>
      <div class="settings_hint">默认关闭。开启后中文默认隐藏，但仍可点击上方按钮切换。</div>
    </div>
    <div class="settings_actions">
      <button class="settings_action save" onclick="save_reader_settings()">保存</button>
      <button class="settings_action close" onclick="close_settings()">关闭</button>
    </div>
  </div>
</div>

<script>
const STORY = {"id": "star-wars", "title": "Star Wars", "titleZh": "星球大战", "category": "原创", "cover": "images/covers/cover-star-wars.jpg", "pages": [{"img": "images/star-wars/page-1.jpg", "en": "In a faraway galaxy, a brave little astronaut named Little Star flew his shiny blue spaceship through the stars. Today, he was about to have the greatest adventure of his life!", "zh": "在一个遥远的星系里，勇敢的小宇航员小星驾驶着他闪亮的蓝色飞船穿越星空。今天，他即将迎来人生中最伟大的冒险！", "keys": [{"w": "galaxy", "p": "/ˈɡæləksi/", "zh": "星系"}], "phrases": [{"en": "a distant galaxy", "zh": "遥远的星系"}], "title": ""}, {"img": "images/star-wars/page-2.jpg", "en": "Little Star flew past twinkling little stars. They sparkled like tiny diamonds scattered across the dark sky. He looked at the beautiful planets around him, wondering which way to go.", "zh": "小星飞过一闪一闪的小星星。它们像撒落在黑暗天空中的小钻石一样闪烁。他看着周围美丽的星球，想该往哪边走。", "keys": [{"w": "twinkle", "p": "/ˈtwɪŋkəl/", "zh": "闪烁"}], "phrases": [{"en": "twinkling stars", "zh": "一闪一闪的小星星"}], "title": ""}, {"img": "images/star-wars/page-3.jpg", "en": "Suddenly, a round little robot floated over! His name was Doudou, with glowing eyes and a bouncy body. He smiled and asked Little Star if he wanted to play Star Wars together.", "zh": "突然，一个圆滚滚的小机器人飘了过来！他叫豆豆，有着发光的眼睛和弹弹的身体。他微笑着问小星想不想一起玩星球大战。", "keys": [{"w": "suddenly", "p": "/ˈsʌdənli/", "zh": "突然地"}], "phrases": [{"en": "a round little robot", "zh": "一个圆滚滚的小机器人"}], "title": ""}, {"img": "images/star-wars/page-4.jpg", "en": "Sure! Let's play! said Little Star. Doudou started designing his own planet, and it would be the best planet ever! Little Star got his special weapons ready too. The big battle was about to begin!", "zh": "好呀！我们来玩！小星说。豆豆开始设计他自己的星球，这将是最棒的星球！小星也准备好了他的特殊武器。大战即将开始！", "keys": [{"w": "design", "p": "/dɪˈzaɪn/", "zh": "设计"}], "phrases": [{"en": "design his own planet", "zh": "设计他自己的星球"}], "title": ""}, {"img": "images/star-wars/page-5.jpg", "en": "Doudou created a magnificent crystal energy planet! Its shell was made of transparent crystal that could absorb star energy. He proudly said it was his Crystal Planet, and it could fire super laser beams!", "zh": "豆豆创造了一颗壮观的水晶能量星球！它的外壳是透明的水晶，能吸收恒星的能量。他骄傲地说这是他的水晶星球，能发射超强激光炮！", "keys": [{"w": "create", "p": "/kriˈeɪt/", "zh": "创造"}], "phrases": [{"en": "a magnificent crystal energy planet", "zh": "一颗壮观的水晶能量星球"}], "title": ""}, {"img": "images/star-wars/page-6.jpg", "en": "Whoosh! The Crystal Planet fired a bright laser beam! It was so powerful that it lit up the whole galaxy. Doudou laughed happily and told Little Star to try dodging it!", "zh": "嗖！水晶星球发射出一道明亮的激光！激光太强了，照亮了整个星系。豆豆开心地大笑，叫小星躲开试试！", "keys": [{"w": "bright", "p": "/braɪt/", "zh": "明亮的"}], "phrases": [{"en": "a bright laser beam", "zh": "一道明亮的激光"}], "title": ""}, {"img": "images/star-wars/page-7.jpg", "en": "But Little Star was very clever! He threw a tiny crystal bomb at the Crystal Planet. BOOM! The bomb hit the surface and cracked the crystal shell right open!", "zh": "但是小星非常聪明！他朝水晶星球扔出一颗小小的水晶炸弹。轰！炸弹击中了星球表面，在水晶外壳上炸出了一道大裂纹！", "keys": [{"w": "smart", "p": "/smɑːrt/", "zh": "聪明的"}], "phrases": [{"en": "throw a tiny crystal bomb", "zh": "扔出一颗小小的水晶炸弹"}], "title": ""}, {"img": "images/star-wars/page-8.jpg", "en": "The crack spread across the Crystal Planet like a spider web. Doudou was shocked! He cried that his beautiful planet was breaking apart. The crystal shell began to shatter piece by piece.", "zh": "裂纹像蜘蛛网一样在水晶星球上蔓延。豆豆大吃一惊！他大喊他美丽的星球要碎了。水晶外壳一点一点地开始碎裂。", "keys": [{"w": "spread", "p": "/spred/", "zh": "蔓延"}], "phrases": [{"en": "spread like a spider web", "zh": "像蜘蛛网一样蔓延"}], "title": ""}, {"img": "images/star-wars/page-9.jpg", "en": "But Doudou had a plan! He sent out hundreds of tiny repair drones. Bzzz! They flew to the cracks and started fixing the planet. Doudou proudly said his drones would fix everything!", "zh": "但是豆豆有办法！他派出成百上千个小小的修复无人机。嗡嗡嗡！它们飞到裂缝处开始修复星球。豆豆骄傲地说他的无人机会修好一切！", "keys": [{"w": "repair", "p": "/rɪˈper/", "zh": "修复"}], "phrases": [{"en": "hundreds of tiny repair drones", "zh": "成百上千个小小的修复无人机"}], "title": ""}, {"img": "images/star-wars/page-10.jpg", "en": "Now Doudou had a super surprise! The Crystal Planet transformed into a giant Space Whale! It was huge and shiny, with crystal fins and an enormous mouth. Doudou laughed and said his planet could transform!", "zh": "现在豆豆有一个超级惊喜！水晶星球变形成为一只巨大的星际巨鲸！它又大又闪亮，有着水晶鱼鳍和巨大的嘴巴。豆豆大笑着说他的星球可以变形！", "keys": [{"w": "surprise", "p": "/sərˈpraɪz/", "zh": "惊喜"}], "phrases": [{"en": "a super surprise", "zh": "一个超级惊喜"}], "title": ""}, {"img": "images/star-wars/page-11.jpg", "en": "The Space Whale opened its super big mouth, trying to suck in Little Star's stars! Whoosh! The stars started flying toward the whale's mouth. Doudou cheered for the stars to enter his energy furnace!", "zh": "星际巨鲸张开超级大的嘴巴，要把小星的小星星吸进来！呼！星星们开始飞向巨鲸的嘴巴。豆豆喊着让星星进入他的能量熔炉！", "keys": [{"w": "mouth", "p": "/maʊθ/", "zh": "嘴巴"}], "phrases": [{"en": "open its enormous mouth", "zh": "张开超级大的嘴巴"}], "title": ""}, {"img": "images/star-wars/page-12.jpg", "en": "Little Star had the best idea ever! He grabbed a bottle of Galaxy Bubble Bath, stuffed it with explosives, and lit it with a mini lighter. He threw the bubbly bomb right at the Space Whale!", "zh": "小星有了最棒的主意！他抓起一瓶银河系沐浴露，塞进炸药，用一个迷你打火机点燃。他把满是泡泡的炸弹扔向星际巨鲸！", "keys": [{"w": "idea", "p": "/aɪˈdiːə/", "zh": "主意"}], "phrases": [{"en": "the best idea", "zh": "最棒的主意"}], "title": ""}, {"img": "images/star-wars/page-13.jpg", "en": "BOOM! The Galaxy Bubble Bath bomb exploded! The Space Whale was covered in bubbles! Pop, pop, pop! Black smoke rose from its crystal body. Doudou cried that he was full of foam!", "zh": "轰！银河系沐浴露炸弹爆炸了！星际巨鲸现在满身都是泡泡！噗噗噗！黑烟从它的水晶身体上升起。豆豆大叫他全身都是泡沫！", "keys": [{"w": "explode", "p": "/ɪkˈsploʊd/", "zh": "爆炸"}], "phrases": [{"en": "galaxy bath bomb", "zh": "银河系沐浴露炸弹"}], "title": ""}, {"img": "images/star-wars/page-14.jpg", "en": "Don't worry! Doudou had a secret weapon too — super tiny nano repair robots! They were so small you couldn't even see them. They zoomed around the Space Whale fixing it fast. Doudou said his nano robots would save it!", "zh": "别担心！豆豆也有秘密武器，超小的纳米修复机器人！它们小到根本看不见。它们在星际巨鲸周围飞速修复。豆豆说他的纳米机器人会救他！", "keys": [{"w": "secret", "p": "/ˈsiːkrət/", "zh": "秘密的"}], "phrases": [{"en": "secret weapon", "zh": "秘密武器"}], "title": ""}, {"img": "images/star-wars/page-15.jpg", "en": "But Little Star didn't stop! He built the ultimate bomb — the biggest and strongest bomb in the whole universe! It glowed bright red and made all the nearby stars shake. He shouted it was his final strike!", "zh": "但是小星没有停下！他制作了终极炸弹，整个宇宙中最大最强的炸弹！它发出明亮的红光，连周围的星星都在震动。他喊着这是他的最后一击！", "keys": [{"w": "ultimate", "p": "/ˈʌltɪmət/", "zh": "终极的"}], "phrases": [{"en": "ultimate bomb", "zh": "终极炸弹"}], "title": ""}, {"img": "images/star-wars/page-16.jpg", "en": "KA-BOOM! The ultimate bomb hit the Space Whale. Poof! Nothing was left! Not even a tiny piece. Doudou's planet had completely vanished. Doudou whispered that it was incredible.", "zh": "轰隆！终极炸弹击中了星际巨鲸，噗！什么都不剩了！连一小块碎片都没有。豆豆的星球完全消失了。豆豆小声说太厉害了。", "keys": [{"w": "hit", "p": "/hɪt/", "zh": "击中"}], "phrases": [{"en": "hit the space whale", "zh": "击中了星际巨鲸"}], "title": ""}, {"img": "images/star-wars/page-17.jpg", "en": "But Doudou was a tough little robot! He collected all the scrap metal floating in space and built a brand new planet! It wasn't as shiny as before, but it was built with love and determination.", "zh": "但是豆豆是个坚强的小机器人！他收集太空中漂浮的所有废铁，建造了一个全新的星球！虽然没有以前那么闪亮，但它是用爱和决心建造的。", "keys": [{"w": "strong", "p": "/strɔːŋ/", "zh": "坚强的"}], "phrases": [{"en": "a tough little robot", "zh": "一个坚强的小机器人"}], "title": ""}, {"img": "images/star-wars/page-18.jpg", "en": "Little Star picked up a shield to give to Doudou. But oh no! He threw it too hard, and the shield flew straight at Doudou! Then he quickly followed with another attack!", "zh": "小星拿起一个保护盾想送给豆豆。但是哎呀！他扔得太用力，盾牌直接飞向了豆豆！然后他赶紧又来了一个报废攻击！", "keys": [{"w": "shield", "p": "/ʃiːld/", "zh": "盾牌"}], "phrases": [{"en": "protective shield", "zh": "保护盾"}], "title": ""}, {"img": "images/star-wars/page-19.jpg", "en": "CRACK! The shield shattered into pieces, and the new planet turned into a pile of scrap metal. Doudou raised his little robot arm and surrendered! He said Little Star's bombs were too powerful — he gave up!", "zh": "咔嚓！盾牌碎成碎片，新星球变成了一堆废铁。豆豆举起他的小机器人手臂投降了！他说小星的炸弹太厉害了，他认输！", "keys": [{"w": "shatter", "p": "/ˈʃætər/", "zh": "碎裂"}], "phrases": [{"en": "shattered into pieces", "zh": "碎成碎片"}], "title": ""}, {"img": "images/star-wars/page-20.jpg", "en": "Even though they had an epic battle, Little Star and Doudou were still the best of friends! They high-fived, laughed together, and shouted that this was the most fun Star Wars game ever!", "zh": "虽然他们打了一场史诗级的大战，但小星和豆豆还是最好的朋友！他们互相击掌，一起大笑，喊着这是最好玩的星球大战游戏！", "keys": [{"w": "epic", "p": "/ˈepɪk/", "zh": "史诗般的"}], "phrases": [{"en": "an epic battle", "zh": "一场史诗级的大战"}], "title": ""}, {"img": "images/star-wars/page-21.jpg", "en": "Little Star looked at the stars and had a new idea. He told Doudou they should go to Mars next time! Doudou's eyes lit up with excitement as he shouted — Mars, here we come!", "zh": "小星看着星星，有了新主意。他跟豆豆说下次去火星吧！豆豆的眼睛兴奋地发亮，喊着火星我们来了！", "keys": [{"w": "star", "p": "/stɑːr/", "zh": "星星"}], "phrases": [{"en": "a new idea", "zh": "新主意"}], "title": ""}], "intro_cn_pages": [{"title": "星球大战 · 故事开始", "img": "images/star-wars/page-1.jpg", "en": "", "zh": "在一个遥远的星系里，勇敢的小宇航员小星驾驶着他闪亮的蓝色飞船穿越星空。今天，他即将迎来人生中最伟大的冒险！", "keys": [{"w": "galaxy", "p": "/ˈɡæləksi/", "zh": "星系"}], "phrases": [{"en": "a distant galaxy", "zh": "遥远的星系"}]}, {"title": "星球大战 · 中间发生了什么", "img": "images/star-wars/page-11.jpg", "en": "", "zh": "星际巨鲸张开超级大的嘴巴，要把小星的小星星吸进来！呼！", "keys": [{"w": "mouth", "p": "/maʊθ/", "zh": "嘴巴"}], "phrases": [{"en": "open its enormous mouth", "zh": "张开超级大的嘴巴"}]}, {"title": "星球大战 · 故事结尾", "img": "images/star-wars/page-21.jpg", "en": "", "zh": "小星看着星星，有了新主意。他跟豆豆说下次去火星吧！", "keys": [{"w": "star", "p": "/stɑːr/", "zh": "星星"}], "phrases": [{"en": "a new idea", "zh": "新主意"}]}], "reader_pages_simple_en": [{ const game_url = '../../game/classic/star-wars.html';
const intro_pages = Array.isArray(STORY.intro_cn_pages) ? STORY.intro_cn_pages : [];
const reader_pages = Array.isArray(STORY.reader_pages_simple_en) && STORY.reader_pages_simple_en.length
  ? STORY.reader_pages_simple_en
  : (Array.isArray(STORY.pages) && STORY.pages.length ? STORY.pages : legacy_pages);
const page_list = [
  ...intro_pages.map((page) => ({ ...page, section: 'intro' })),
  ...reader_pages.map((page) => ({ ...page, section: 'reader' })),
];
if (!page_list.length) {
  page_list.push({
    section: 'reader',
    title: '',
    img: '',
    en: 'Content is coming soon.',
    zh: '故事内容正在整理中。',
    keys: [],
    phrases: [],
  });
}

let current_page = 0;
let current_rate = 0.92;
let is_reading = false;
let current_word_ranges = [];
const synth = window.speechSynthesis;

function get_hide_chinese_setting() {
  if (localStorage.getItem('hideChineseTranslation') !== null) {
    return localStorage.getItem('hideChineseTranslation') === '1';
  }
  return localStorage.getItem('hideChinese') === 'true';
}

let translation_visible = !get_hide_chinese_setting();

function escape_for_attr(raw_text) {
  return String(raw_text || '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function get_asset_src(raw_path) {
  const path_text = String(raw_path || '').trim();
  if (!path_text) return '';
  if (path_text.startsWith('http://') || path_text.startsWith('https://')) return path_text;
  if (path_text.startsWith('images/')) return '../../' + path_text;
  return '../../images/' + path_text.replace(/^\/+/, '');
}

function split_zh_chunks(zh_text) {
  return String(zh_text || '')
    .split(/(?<=[。！？；：,.!?])/)
    .map((chunk) => chunk.trim())
    .filter(Boolean);
}

function build_word_tokens(en_text) {
  const source_text = String(en_text || '');
  const tokens = source_text.match(/\S+/g) || [];
  let search_index = 0;
  return tokens.map((token) => {
    const start = source_text.indexOf(token, search_index);
    const end = start + token.length;
    search_index = end;
    return { token, start, end };
  });
}

function get_current_page() {
  return page_list[current_page] || page_list[0];
}

function update_read_button() {
  const read_btn = document.getElementById('read_btn');
  if (!read_btn) return;
  read_btn.textContent = is_reading ? '⏹ 停止朗读' : '🔊 开始朗读';
}

function update_translation_ui() {
  const page = get_current_page();
  const zh_box = document.getElementById('zh_sentence');
  const toggle_btn = document.getElementById('translate_toggle_btn');
  if (!page || !zh_box || !toggle_btn) return;
  const is_intro = page.section === 'intro';
  toggle_btn.style.display = is_intro ? 'none' : 'inline-flex';
  zh_box.classList.toggle('hidden', !is_intro && !translation_visible);
  if (!is_intro) {
    toggle_btn.textContent = translation_visible ? '隐藏中文' : '显示中文';
  }
}

function toggle_translation(force_visible) {
  if (typeof force_visible === 'boolean') {
    translation_visible = force_visible;
  } else {
    translation_visible = !translation_visible;
  }
  update_translation_ui();
}

function open_settings() {
  const overlay = document.getElementById('settings_overlay');
  const checkbox = document.getElementById('hide_chinese_checkbox');
  checkbox.checked = get_hide_chinese_setting();
  overlay.classList.add('show');
}

function close_settings() {
  document.getElementById('settings_overlay').classList.remove('show');
}

function close_settings_on_overlay(event) {
  if (event.target.id === 'settings_overlay') {
    close_settings();
  }
}

function save_reader_settings() {
  const hidden = document.getElementById('hide_chinese_checkbox').checked;
  localStorage.setItem('hideChinese', hidden ? 'true' : 'false');
  localStorage.setItem('hideChineseTranslation', hidden ? '1' : '0');
  translation_visible = !hidden;
  update_translation_ui();
  close_settings();
}

function render_page(page_index) {
  const page = page_list[page_index];
  const is_intro = page.section === 'intro';
  const image_src = get_asset_src(page.img);
  current_word_ranges = is_intro ? [] : build_word_tokens(page.en || '');

  const words_html = current_word_ranges.map((item, idx) =>
    `<span class="word" id="w_${idx}" onclick="speak_word_token(${idx})">${escape_for_attr(item.token)}</span>`
  ).join(' ');

  const zh_chunks = split_zh_chunks(page.zh || '');
  const zh_html = zh_chunks.map((chunk, idx) =>
    `<span class="zh_chunk" id="zh_${idx}">${escape_for_attr(chunk)}</span>`
  ).join('');

  const word_row_html = (page.keys || []).length
    ? (page.keys || []).map((item, idx) =>
      `<span class="lex_chip words" id="key_${idx}" onclick="manual_speak_word(${idx})"><b>${escape_for_attr(item.w || '')}</b> ${escape_for_attr(item.p || '')} ${escape_for_attr(item.zh || '')}</span>`
    ).join('')
    : '<span class="lex_empty">暂无重点单词</span>';

  const phrase_row_html = (page.phrases || []).length
    ? (page.phrases || []).map((item, idx) =>
      `<span class="lex_chip phrases" id="phrase_${idx}" onclick="manual_speak_phrase(${idx})"><b>${escape_for_attr(item.en || '')}</b> ${escape_for_attr(item.zh || '')}</span>`
    ).join('')
    : '<span class="lex_empty">暂无重点词组</span>';

  const intro_title_html = page.title ? `<div class="intro_title">${escape_for_attr(page.title)}</div>` : '';

  document.getElementById('page_area').innerHTML = is_intro ? `
    <img class="hero_img" src="${image_src}" alt="page ${page_index + 1}" onerror="this.style.objectFit='contain';this.style.background='#eee';">
    <div class="text_area intro_mode">
      ${intro_title_html}
      <div class="zh_sentence" id="zh_sentence">${zh_html}</div>
      <div class="lexicon">
        <div class="lex_row"><span class="lex_label words">单词</span><div class="lex_items">${word_row_html}</div></div>
        <div class="lex_row"><span class="lex_label phrases">词组</span><div class="lex_items">${phrase_row_html}</div></div>
      </div>
    </div>` : `
    <img class="hero_img" src="${image_src}" alt="page ${page_index + 1}" onerror="this.style.objectFit='contain';this.style.background='#eee';">
    <div class="text_area">
      <div class="en_sentence">${words_html}</div>
      <div class="zh_sentence" id="zh_sentence">${zh_html}</div>
      <div class="lexicon">
        <div class="lex_row"><span class="lex_label words">单词</span><div class="lex_items">${word_row_html}</div></div>
        <div class="lex_row"><span class="lex_label phrases">词组</span><div class="lex_items">${phrase_row_html}</div></div>
      </div>
    </div>`;

  document.getElementById('progress_fill').style.width = `${((page_index + 1) / page_list.length) * 100}%`;
  document.getElementById('page_total').textContent = `第 ${page_index + 1} 页 / 共 ${page_list.length} 页`;
  document.getElementById('page_indicator').textContent = `${page_index + 1} / ${page_list.length}`;
  document.getElementById('prev_btn').disabled = page_index === 0;

  const on_last_page = page_index === page_list.length - 1;
  document.getElementById('next_btn').textContent = on_last_page ? '已经读完' : '下一页 →';
  document.getElementById('next_btn').disabled = on_last_page;
  document.getElementById('to_game_btn').style.display = on_last_page ? 'inline-block' : 'none';
  update_translation_ui();
  update_read_button();
}

function clear_highlight() {
  document.querySelectorAll('.word.speaking').forEach((el) => el.classList.remove('speaking'));
  document.querySelectorAll('.zh_chunk.speaking').forEach((el) => el.classList.remove('speaking'));
  document.querySelectorAll('.lex_chip.speaking').forEach((el) => el.classList.remove('speaking'));
}

function stop_reading() {
  is_reading = false;
  clear_highlight();
  if (synth) synth.cancel();
  update_read_button();
}

function wait_between(ms) {
  return new Promise((resolve) => setTimeout(resolve, ms));
}

function speak_utterance(text_value, lang_code, rate_value, on_boundary) {
  return new Promise((resolve) => {
    const safe_text = String(text_value || '').trim();
    if (!safe_text || !synth) {
      resolve();
      return;
    }
    const utterance = new SpeechSynthesisUtterance(safe_text);
    utterance.lang = lang_code;
    utterance.rate = rate_value;
    utterance.pitch = 1;
    if (on_boundary) utterance.onboundary = on_boundary;
    utterance.onend = resolve;
    utterance.onerror = resolve;
    synth.speak(utterance);
  });
}

function highlight_en_word(char_index) {
  const word_index = current_word_ranges.findIndex((item) => char_index >= item.start && char_index < item.end);
  if (word_index < 0) return;
  clear_highlight();
  const active_word = document.getElementById(`w_${word_index}`);
  if (active_word) active_word.classList.add('speaking');
}

function highlight_zh_chunk(chunk_index) {
  clear_highlight();
  const chunk_el = document.getElementById(`zh_${chunk_index}`);
  if (chunk_el) chunk_el.classList.add('speaking');
}

function highlight_lex_item(prefix, item_index) {
  clear_highlight();
  const target_el = document.getElementById(`${prefix}_${item_index}`);
  if (target_el) target_el.classList.add('speaking');
}

async function speak_english_sentence(page) {
  await speak_utterance(String(page.en || ''), 'en-US', current_rate * 0.92, (event) => {
    if (typeof event.charIndex === 'number') {
      highlight_en_word(event.charIndex);
    }
  });
}

async function speak_chinese_sentence(page) {
  const zh_chunks = split_zh_chunks(page.zh || '');
  for (let idx = 0; idx < zh_chunks.length; idx += 1) {
    if (!is_reading) return;
    highlight_zh_chunk(idx);
    await speak_utterance(String(zh_chunks[idx] || ''), 'zh-CN', current_rate);
    if (!is_reading) return;
    if (idx < zh_chunks.length - 1) {
      await wait_between(220);
    }
  }
}

async function speak_word_item(item, item_index) {
  highlight_lex_item('key', item_index);
  await speak_utterance(String(item.w || ''), 'en-US', current_rate * 0.85);
  if (!is_reading) return;
  await wait_between(260);
  if (!is_reading) return;
  await speak_utterance(String(item.zh || ''), 'zh-CN', current_rate * 0.9);
}

async function speak_phrase_item(item, item_index) {
  highlight_lex_item('phrase', item_index);
  await speak_utterance(String(item.en || ''), 'en-US', current_rate * 0.82);
  if (!is_reading) return;
  await wait_between(260);
  if (!is_reading) return;
  await speak_utterance(String(item.zh || ''), 'zh-CN', current_rate * 0.88);
}

async function toggle_reading() {
  if (is_reading) {
    stop_reading();
    return;
  }
  await read_current();
}

async function read_current() {
  if (is_reading) return;
  const page = get_current_page();
  is_reading = true;
  if (synth) synth.cancel();
  clear_highlight();
  update_read_button();
  try {
    if (page.section === 'intro') {
      await speak_chinese_sentence(page);
    } else {
      await speak_english_sentence(page);
      if (!is_reading) return;
      await wait_between(700);
      if (!is_reading) return;
      await speak_chinese_sentence(page);
      if (!is_reading) return;
      await wait_between(850);
      if (!is_reading) return;
      for (let idx = 0; idx < (page.keys || []).length; idx += 1) {
        if (!is_reading) return;
        await speak_word_item(page.keys[idx], idx);
        if (!is_reading) return;
        if (idx < (page.keys || []).length - 1 || (page.phrases || []).length) {
          await wait_between(420);
        }
      }
      for (let idx = 0; idx < (page.phrases || []).length; idx += 1) {
        if (!is_reading) return;
        await speak_phrase_item(page.phrases[idx], idx);
        if (!is_reading) return;
        if (idx < (page.phrases || []).length - 1) {
          await wait_between(420);
        }
      }
    }
  } finally {
    is_reading = false;
    clear_highlight();
    update_read_button();
  }
}

async function read_chinese_only() {
  if (is_reading) {
    stop_reading();
    return;
  }
  is_reading = true;
  if (synth) synth.cancel();
  clear_highlight();
  update_read_button();
  try {
    await speak_chinese_sentence(get_current_page());
  } finally {
    is_reading = false;
    clear_highlight();
    update_read_button();
  }
}

function sanitize_token(token) {
  return String(token || '').replace(/^[^\w]+|[^\w]+$/g, '');
}

function speak_word_token(word_index) {
  const page = get_current_page();
  const token_info = current_word_ranges[word_index];
  if (!token_info) return;
  stop_reading();
  highlight_en_word(token_info.start);
  const clean_token = sanitize_token(token_info.token);
  speak_utterance(clean_token || token_info.token, 'en-US', current_rate * 0.85).then(() => {
    clear_highlight();
  });
}

function manual_speak_word(item_index) {
  const page = get_current_page();
  const item = (page.keys || [])[item_index];
  if (!item) return;
  stop_reading();
  is_reading = true;
  update_read_button();
  speak_word_item(item, item_index).finally(() => {
    is_reading = false;
    clear_highlight();
    update_read_button();
  });
}

function manual_speak_phrase(item_index) {
  const page = get_current_page();
  const item = (page.phrases || [])[item_index];
  if (!item) return;
  stop_reading();
  is_reading = true;
  update_read_button();
  speak_phrase_item(item, item_index).finally(() => {
    is_reading = false;
    clear_highlight();
    update_read_button();
  });
}

function goto_game() {
  window.location.href = game_url;
}

function change_page(direction) {
  stop_reading();
  const on_last_page = current_page === page_list.length - 1;
  if (direction > 0 && on_last_page) {
    return;
  }
  current_page = Math.max(0, Math.min(page_list.length - 1, current_page + direction));
  render_page(current_page);
}

render_page(0);
window.addEventListener('load', () => {
  setTimeout(() => { read_current(); }, 500);
});
</script>
