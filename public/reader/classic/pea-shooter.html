<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Brave Pea Shooter — 朗读版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(180deg, #fffaf2 0%, #fff5e8 100%);
    color: #2f2f2f;
    min-height: 100vh;
  }
  .reader_wrap {
    width: min(960px, calc(100% - 20px));
    margin: 0 auto;
    padding: 16px 0 28px;
  }
  .page_head {
    background: #fff;
    border-radius: 22px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.08);
    padding: 16px;
    margin-bottom: 14px;
  }
  .page_head_top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
  }
  .unit_tag {
    color: #8f8174;
    font-size: 13px;
    margin-bottom: 6px;
  }
  h1 {
    color: #e17055;
    font-size: 26px;
    line-height: 1.25;
  }
  h1 small {
    display: block;
    color: #8e8e8e;
    font-size: 16px;
    font-weight: 600;
    margin-top: 4px;
  }
  .page_meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  .page_total {
    color: #736456;
    font-size: 13px;
    font-weight: 700;
    text-align: right;
  }
  .meta_actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .top_btn {
    border: 1px solid #f1e3cf;
    border-radius: 999px;
    background: #fffaf3;
    color: #8b6b47;
    font-size: 12px;
    font-weight: 800;
    padding: 8px 12px;
    cursor: pointer;
  }
  .top_btn.settings_btn {
    background: #f6f8fb;
    border-color: #dde6f2;
    color: #5d7188;
  }
  .progress_bar {
    width: 100%;
    height: 7px;
    background: #ececec;
    border-radius: 999px;
    margin-top: 12px;
    overflow: hidden;
  }
  .progress_fill {
    height: 100%;
    background: linear-gradient(90deg, #ff9f43, #ffd166);
    transition: width .25s ease;
  }
  .hero_img {
    width: 100%;
    display: block;
    aspect-ratio: 16 / 10;
    object-fit: cover;
    border-radius: 22px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.12);
    background: #f3f3f3;
  }
  .text_area {
    margin-top: 14px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    padding: 16px 14px;
  }
  .text_area.intro_mode {
    background: linear-gradient(180deg, #fffef9 0%, #fff8ec 100%);
  }
  .intro_title {
    color: #7d5d2e;
    font-size: 24px;
    line-height: 1.35;
    font-weight: 800;
    margin-bottom: 12px;
  }
  .en_sentence {
    font-size: 28px;
    line-height: 1.7;
    color: #2f2f2f;
    font-weight: 800;
  }
  .word {
    display: inline;
    border-radius: 8px;
    cursor: pointer;
    padding: 1px 3px;
    transition: background .15s ease, color .15s ease;
  }
  .word:hover,
  .word.speaking {
    background: #ffd166;
    color: #3b2f0d;
  }
  .zh_sentence {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed #ececec;
    font-size: 22px;
    line-height: 1.85;
    color: #5d5d5d;
  }
  .zh_sentence.hidden {
    display: none;
  }
  .zh_chunk {
    border-radius: 6px;
    transition: background .12s ease, color .12s ease;
  }
  .zh_chunk.speaking {
    background: #ffe8bd;
    color: #403014;
  }
  .lexicon {
    margin-top: 16px;
    display: grid;
    gap: 10px;
  }
  .lex_row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    flex-wrap: wrap;
  }
  .lex_label {
    min-width: 54px;
    text-align: center;
    border-radius: 999px;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 8px;
  }
  .lex_label.words { background: #54a0ff; }
  .lex_label.phrases { background: #10ac84; }
  .lex_items {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .lex_chip {
    border-radius: 999px;
    padding: 7px 12px;
    border: 1px solid #dde8ff;
    background: #f4f8ff;
    font-size: 13px;
    line-height: 1.4;
    color: #2f3f60;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .lex_chip:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .lex_chip.words b { color: #1f6fd1; }
  .lex_chip.phrases {
    border-color: #c9f0e4;
    background: #f1fffb;
    color: #22524a;
  }
  .lex_chip.phrases b { color: #0c9b78; }
  .lex_chip.speaking {
    background: #ffd166;
    border-color: #ffc94d;
    color: #3b2f0d;
    box-shadow: 0 6px 14px rgba(255, 184, 51, 0.24);
  }
  .lex_empty {
    font-size: 13px;
    color: #989898;
    padding-top: 7px;
  }
  .nav {
    margin-top: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .nav_center {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    padding: 10px 16px;
    transition: opacity .15s ease, transform .15s ease;
  }
  .btn:hover:not(:disabled) {
    transform: translateY(-1px);
  }
  .btn:disabled {
    opacity: .35;
    cursor: not-allowed;
  }
  .btn.nav_btn { background: #f8f2ea; color: #8f6c4d; min-width: 108px; border: 1px solid #eadccf; }
  .btn.read_btn { background: #54a0ff; color: #fff; min-width: 128px; font-size: 16px; padding: 12px 20px; box-shadow: 0 8px 18px rgba(84,160,255,0.24); }
  .btn.zh_btn { background: #fff; color: #7a5d45; border: 1px solid #eadccf; }
  .btn.game_btn { background: #10ac84; color: #fff; display: none; }
  .page_indicator {
    color: #969696;
    font-size: 14px;
    font-weight: 700;
  }
  .settings_overlay {
    position: fixed;
    inset: 0;
    background: rgba(30, 18, 8, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 999;
  }
  .settings_overlay.show {
    display: flex;
  }
  .settings_panel {
    width: min(420px, 100%);
    background: #fff;
    border-radius: 22px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.18);
    padding: 20px 18px;
  }
  .settings_panel h3 {
    font-size: 20px;
    color: #2f2f2f;
    margin-bottom: 12px;
  }
  .settings_group {
    margin-bottom: 14px;
  }
  .settings_group label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #53463b;
    font-size: 15px;
    font-weight: 700;
  }
  .settings_hint {
    color: #8c7b6d;
    font-size: 13px;
    line-height: 1.6;
    margin-top: 6px;
  }
  .settings_actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .settings_action {
    flex: 1;
    border: none;
    border-radius: 999px;
    min-height: 40px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 800;
  }
  .settings_action.save {
    background: #ff9f43;
    color: #fff;
  }
  .settings_action.close {
    background: #f5f0ea;
    color: #7d6d60;
  }
  @media (max-width: 640px) {
    .reader_wrap {
      width: min(100%, calc(100% - 12px));
      padding-top: 10px;
    }
    .page_head_top {
      flex-direction: column;
    }
    .page_meta {
      width: 100%;
      align-items: flex-start;
    }
    .meta_actions {
      justify-content: flex-start;
    }
    .en_sentence { font-size: 23px; }
    .zh_sentence { font-size: 19px; }
    .nav {
      flex-wrap: wrap;
      justify-content: center;
    }
  }
</style>
</head>
<body>
<div class="reader_wrap">
  <div class="page_head">
    <div class="page_head_top">
      <div>
        <div class="unit_tag">分类：植物大战僵尸</div>
        <h1>The Brave Pea Shooter<small>勇敢的豌豆射手</small></h1>
      </div>
      <div class="page_meta">
        <div class="page_total" id="page_total"></div>
        <div class="meta_actions">
          <button class="top_btn" id="translate_toggle_btn" onclick="toggle_translation()">隐藏中文</button>
          <button class="top_btn settings_btn" onclick="open_settings()">设置</button>
        </div>
      </div>
    </div>
    <div class="progress_bar"><div class="progress_fill" id="progress_fill"></div></div>
  </div>

  <div id="page_area"></div>

  <div class="nav">
    <button class="btn nav_btn" id="prev_btn" onclick="change_page(-1)">← 上一页</button>
    <div class="nav_center">
      <button class="btn read_btn" id="read_btn" onclick="toggle_reading()">🔊 开始朗读</button>
      <button class="btn zh_btn" onclick="read_chinese_only()">听中文</button>
      <button class="btn game_btn" id="to_game_btn" onclick="goto_game()">🎮 去游戏</button>
      <span class="page_indicator" id="page_indicator"></span>
    </div>
    <button class="btn nav_btn" id="next_btn" onclick="change_page(1)">下一页 →</button>
  </div>
</div>

<div class="settings_overlay" id="settings_overlay" onclick="close_settings_on_overlay(event)">
  <div class="settings_panel">
    <h3>阅读设置</h3>
    <div class="settings_group">
      <label>
        <input type="checkbox" id="hide_chinese_checkbox">
        默认隐藏中文
      </label>
      <div class="settings_hint">默认关闭。开启后中文默认隐藏，但仍可点击上方按钮切换。</div>
    </div>
    <div class="settings_actions">
      <button class="settings_action save" onclick="save_reader_settings()">保存</button>
      <button class="settings_action close" onclick="close_settings()">关闭</button>
    </div>
  </div>
</div>

<script>
const STORY = {"id": "pea-shooter", "title": "The Brave Pea Shooter", "titleZh": "勇敢的豌豆射手", "category": "植物大战僵尸", "cover": "images/covers/cover-pea-shooter.jpg", "pages": [{"img": "images/pea-shooter/page-1.jpg", "en": "In a bright, sunny garden lived a tiny green Pea Shooter named Pip. He had big round eyes, a cheerful smile, and a little leaf on his head. Pip loved his garden home more than anything in the world.\n\nEvery morning, Pip would stretch his leaves and say, \"Today is going to be a great day!\"", "zh": "在一个明亮、阳光灿烂的花园里，住着一只绿色的小豌豆射手，名叫皮皮。他有一双圆圆的大眼睛，一个开心的笑容，头顶上还有一片小叶子。皮皮爱他的花园家园胜过世界上的一切。\n\n每天早上，皮皮都会伸伸他的叶子说：“今天一定会是个好日子！”", "keys": [{"w": "bright", "p": "/braɪt/", "zh": "明亮的"}], "phrases": [{"en": "a bright, sunny garden", "zh": "一个明亮、阳光灿烂的花园"}], "title": ""}, {"img": "images/pea-shooter/page-2.jpg", "en": "One sunny morning, Pip decided to take a walk along the cobblestone path. The flowers waved at him as he passed. Butterflies danced around his head.\n\n\"What a wonderful day for a walk!\" Pip cheered, hopping along the path.", "zh": "一个阳光明媚的早晨，皮皮决定沿着鹅卵石小路散步。花朵们在他经过时向他挥手，蝴蝶在他头顶翩翩起舞。\n\n“散步的好天气！”皮皮欢呼着，沿着小路蹦蹦跳跳。", "keys": [{"w": "decide", "p": "/dɪˈsaɪd/", "zh": "决定"}], "phrases": [{"en": "take a walk along the cobblestone path", "zh": "沿着鹅卵石小路散步"}], "title": ""}, {"img": "images/pea-shooter/page-3.jpg", "en": "Pip walked through the most beautiful part of the garden. Tall sunflowers stood like guards. Colorful mushrooms dotted the ground. Bees hummed happy songs.\n\n\"I love my garden so much,\" Pip whispered happily.", "zh": "皮皮走过花园中最美丽的地方。高高的向日葵像卫兵一样站着，五颜六色的蘑菇点缀着地面，蜜蜂哼着快乐的歌。\n\n“我太爱我的花园了，”皮皮幸福地低语。", "keys": [{"w": "beautiful", "p": "/ˈbjuːtəfəl/", "zh": "美丽的"}], "phrases": [{"en": "the most beautiful part of the garden", "zh": "花园中最美丽的地方"}], "title": ""}, {"img": "images/pea-shooter/page-4.jpg", "en": "Suddenly, Pip heard a strange sound. THUMP. THUMP. THUMP. The ground began to shake. Dark clouds rolled in from nowhere.\n\n\"W-what was that?\" Pip's eyes grew wide with worry.", "zh": "突然，皮皮听到了一个奇怪的声音。咚。咚。咚。地面开始震动，乌云不知从哪里涌了上来。\n\n“那…那是什么？”皮皮的眼睛因担心而睁大了。", "keys": [{"w": "suddenly", "p": "/ˈsʌdənli/", "zh": "突然地"}], "phrases": [{"en": "a strange sound", "zh": "一个奇怪的声音"}], "title": ""}, {"img": "images/pea-shooter/page-5.jpg", "en": "From behind the bushes stumbled a scary zombie! It had an orange traffic cone on its head and moved very slowly. But it kept coming closer and closer!\n\n\"A ZOMBIE!\" Pip gasped. His little body trembled with fear.", "zh": "从灌木丛后面踉跄地走出一个可怕的僵尸！它头上戴着一个橙色的路障，走得很慢，但一直越来越近！\n\n“僵尸！”皮皮倒吸一口气，他的小身体因恐惧而颤抖。", "keys": [{"w": "bush", "p": "/bʊʃ/", "zh": "灌木丛"}], "phrases": [{"en": "from behind the bushes", "zh": "从灌木丛后面"}], "title": ""}, {"img": "images/pea-shooter/page-6.jpg", "en": "\"I must be brave!\" Pip shouted. He puffed up his cheeks and fired green peas at the zombie. PEW! PEW! PEW!\n\nThe peas flew through the air like tiny green bullets. \"Take THAT, you big bully!\"", "zh": "“我必须勇敢！”皮皮大喊。他鼓起腮帮子，向僵尸发射绿色豌豆。噗！噗！噗！\n\n豌豆像绿色的小子弹一样飞过空中。“接招吧，你这个大坏蛋！”", "keys": [{"w": "brave", "p": "/breɪv/", "zh": "勇敢的"}], "phrases": [{"en": "I must be brave", "zh": "我必须勇敢"}], "title": ""}, {"img": "images/pea-shooter/page-7.jpg", "en": "But something terrible happened. The peas bounced right off the traffic cone! BING! BONG! PING! The zombie didn't even slow down.\n\n\"Oh no! My peas can't break through that cone!\" Pip cried in frustration.", "zh": "但可怕的事情发生了。豌豆直接从路障上弹开了！叮！当！乒！僵尸甚至没有放慢脚步。\n\n“哦不！我的豌豆打不穿那个路障！”皮皮沮丧地哭了。", "keys": [{"w": "terrible", "p": "/ˈterəbəl/", "zh": "可怕的"}], "phrases": [{"en": "bounced right off the traffic cone", "zh": "直接从路障上弹开了"}], "title": ""}, {"img": "images/pea-shooter/page-8.jpg", "en": "Pip turned and ran as fast as his little legs could carry him. He zoomed past Cherry Bombs and Potato Mines, looking for help.\n\n\"I need to find someone who can help me!\" Pip panted as he ran.", "zh": "皮皮转身拼命地跑。他飞速经过樱桃炸弹和土豆地雷，到处寻找帮助。\n\n“我需要找到能帮我的人！”皮皮一边跑一边喘气。", "keys": [{"w": "turn", "p": "/tɜːrn/", "zh": "转身"}], "phrases": [{"en": "ran as fast as his little legs could carry him", "zh": "拼命地跑"}], "title": ""}, {"img": "images/pea-shooter/page-9.jpg", "en": "Then Pip found his best friend — Sunny the Sunflower! Sunny had bright golden petals and a warm, kind smile. She always made everyone feel better.\n\n\"Sunny! I need your help! There's a zombie coming!\" Pip cried.", "zh": "然后皮皮找到了他最好的朋友——向日葵小阳！小阳有明亮金色的花瓣和温暖善良的笑容，她总是让每个人感觉好起来。\n\n“小阳！我需要你的帮助！有僵尸来了！”皮皮哭着说。", "keys": [{"w": "friend", "p": "/frend/", "zh": "朋友"}], "phrases": [{"en": "best friend", "zh": "最好的朋友"}], "title": ""}, {"img": "images/pea-shooter/page-10.jpg", "en": "Sunny listened carefully and nodded. \"Don't worry, Pip. I know exactly what to do. We need to call someone very special — someone very HOT!\"\n\n\"Hot?\" Pip asked, confused. \"Who could help us with a zombie?\"", "zh": "小阳仔细听着，点了点头。“别担心，皮皮。我完全知道该怎么办。我们需要叫一个非常特别的人——一个非常火热的人！”\n\n“火热？”皮皮疑惑地问，“谁能帮我们对付僵尸？”", "keys": [{"w": "carefully", "p": "/ˈkerfəli/", "zh": "仔细地"}], "phrases": [{"en": "Don't worry", "zh": "别担心"}], "title": ""}, {"img": "images/pea-shooter/page-11.jpg", "en": "Sunny closed her eyes and lifted her face to the sky. Her golden petals began to glow brighter and brighter. Magical golden sparkles swirled around her.\n\n\"I need to collect enough sunlight energy first,\" Sunny explained. The whole garden seemed to light up!", "zh": "小阳闭上眼睛，把脸朝向天空。她金色的花瓣开始越来越亮地发光，神奇的金色火花围绕着她旋转。\n\n“我需要先收集足够的阳光能量，”小阳解释道。整个花园似乎都亮了起来！", "keys": [{"w": "petal", "p": "/ˈpetl/", "zh": "花瓣"}], "phrases": [{"en": "lifted her face to the sky", "zh": "把脸朝向天空"}], "title": ""}, {"img": "images/pea-shooter/page-12.jpg", "en": "One by one, beautiful golden orbs of sunlight floated from Sunny's petals. They sparkled like tiny suns, filling the air with warmth.\n\n\"Wow!\" Pip gasped. \"That's the most beautiful thing I've ever seen!\"", "zh": "一颗又一颗美丽的金色阳光球从小阳的花瓣中飘出。它们像小太阳一样闪耀，让空气中充满了温暖。\n\n“哇！”皮皮惊叹道，“这是我见过的最美丽的东西！”", "keys": [{"w": "orb", "p": "/ɔːrb/", "zh": "球体；光球"}], "phrases": [{"en": "golden orbs of sunlight", "zh": "金色的阳光球"}], "title": ""}, {"img": "images/pea-shooter/page-13.jpg", "en": "But the zombie was getting closer! It was now at the edge of the garden. Sunny glowed even brighter, producing more and more sunlight.\n\n\"Hurry, Sunny!\" Pip urged. \"The zombie is almost here!\"", "zh": "但僵尸越来越近了！它现在已经到了花园的边缘。小阳发出更亮的光，产生越来越多的阳光。\n\n“快点，小阳！”皮皮催促道，“僵尸马上就到了！”", "keys": [{"w": "zombie", "p": "/ˈzɑːmbi/", "zh": "僵尸"}], "phrases": [{"en": "getting closer", "zh": "越来越近"}], "title": ""}, {"img": "images/pea-shooter/page-14.jpg", "en": "Finally, a big pile of golden sunlight orbs gathered on the ground. Pip and Sunny cheered! They had enough energy now.\n\n\"We did it!\" Sunny smiled. \"Now, let me call our special friend...\"", "zh": "终于，一大堆金色阳光球聚集在地面上。皮皮和小阳欢呼起来！他们现在有足够的能量了。\n\n“我们做到了！”小阳微笑着说，“现在，让我叫我们特别的朋友...”", "keys": [{"w": "finally", "p": "/ˈfaɪnəli/", "zh": "终于"}], "phrases": [{"en": "a big pile of golden sunlight orbs", "zh": "一大堆金色阳光球"}], "title": ""}, {"img": "images/pea-shooter/page-15.jpg", "en": "Sunny gathered all the golden light together. She whispered magical words that made the ground rumble. The earth began to shake and crack.\n\n\"Who's coming?\" Pip asked nervously, clutching Sunny's stem.", "zh": "小阳把所有金色的光聚在一起，她低声念着魔法咒语，让地面发出隆隆声。大地开始震动和裂开。\n\n“谁要来了？”皮皮紧张地问，紧紧抓住小阳的茎。", "keys": [{"w": "whisper", "p": "/ˈwɪspər/", "zh": "低声说"}], "phrases": [{"en": "gathered all the golden light together", "zh": "把所有金色的光聚在一起"}], "title": ""}, {"img": "images/pea-shooter/page-16.jpg", "en": "CRACK! BOOM! A GIANT red Jalapeno burst from the soil! He was enormous, fierce, and ON FIRE! Flames shot from his body like a volcano.\n\n\"WHO DARED TO WAKE ME UP?!\" Jalapeno roared. Pip stared in amazement.", "zh": "裂开！轰！一个巨大的红色火爆辣椒从土壤中冲了出来！他巨大、凶猛，而且全身着火！火焰像火山一样从他的身体喷射出来。\n\n“谁敢把我叫醒？！”火爆辣椒咆哮道。皮皮惊呆了。", "keys": [{"w": "giant", "p": "/ˈdʒaɪənt/", "zh": "巨大的"}], "phrases": [{"en": "burst from the soil", "zh": "从土壤中冲了出来"}], "ti e zombie was getting closer! It was now at the edge of the garden. Sunny glowed even brighter, producing more and more sunlight.\n\n\"Hurry, Sunny!\" Pip urged. \"The zombie is almost here!\"", "zh": "但僵尸越来越近了！它现在已经到了花园的边缘。小阳发出更亮的光，产生越来越多的阳光。\n\n“快点，小阳！”皮皮催促道，“僵尸马上就到了！”", "keys": [{"w": "zombie", "p": "/ˈzɑːmbi/", "zh": "僵尸"}], "phrases": [{"en": "getting closer", "zh": "越来越近"}], "title": ""}, {"img": "images/pea-shooter/page-14.jpg", "en": "Finally, a big pile of golden sunlight orbs gathered on the ground. Pip and Sunny cheered! They had enough energy now.\n\n\"We did it!\" Sunny smiled. \"Now, let me call our special friend...\"", "zh": "终于，一大堆金色阳光球聚集在地面上。皮皮和小阳欢呼起来！他们现在有足够的能量了。\n\n“我们做到了！”小阳微笑着说，“现在，让我叫我们特别的朋友...”", "keys": [{"w": "finally", "p": "/ˈfaɪnəli/", "zh": "终于"}], "phrases": [{"en": "a big pile of golden sunlight orbs", "zh": "一大堆金色阳光球"}], "title": ""}, {"img": "images/pea-shooter/page-15.jpg", "en": "Sunny gathered all the golden light together. She whispered magical words that made the ground rumble. The earth began to shake and crack.\n\n\"Who's coming?\" Pip asked nervously, clutching Sunny's stem.", "zh": "小阳把所有金色的光聚在一起，她低声念着魔法咒语，让地面发出隆隆声。大地开始震动和裂开。\n\n“谁要来了？”皮皮紧张地问，紧紧抓住小阳的茎。", "keys": [{"w": "whisper", "p": "/ˈwɪspər/", "zh": "低声说"}], "phrases": [{"en": "gathered all the golden light together", "zh": "把所有金色的光聚在一起"}], "title": ""}, {"img": "images/pea-shooter/page-16.jpg", "en": "CRACK! BOOM! A GIANT red Jalapeno burst from the soil! He was enormous, fierce, and ON FIRE! Flames shot from his body like a volcano.\n\n\"WHO DARED TO WAKE ME UP?!\" Jalapeno roared. Pip stared in amazement.", "zh": "裂开！轰！一个巨大的红色火爆辣椒从土壤中冲了出来！他巨大、凶猛，而且全身着火！火焰像火山一样从他的身体喷射出来。\n\n“谁敢把我叫醒？！”火爆辣椒咆哮道。皮皮惊呆了。", "keys": [{"w": "giant", "p": "/ˈdʒaɪənt/", "zh": "巨大的"}], "phrases": [{"en": "burst from the soil", "zh": "从土壤中冲了出来"}], "title": ""}, {"img": "images/pea-shooter/page-17.jpg", "en": "Jalapeno saw the zombie and his eyes blazed with anger. Red and orange flames erupted everywhere! The entire garden lit up in fiery colors.\n\n\"THAT zombie dared to threaten my garden? NOT ON MY WATCH!\" Jalapeno fumed.", "zh": "火爆辣椒看到了僵尸，他的眼睛因愤怒而燃烧。红色和橙色的火焰到处喷发！整个花园被火热的颜色照亮了。\n\n“那个僵尸敢威胁我的花园？绝不允许！”火爆辣椒怒气冲冲地说。", "keys": [{"w": "blaze", "p": "/bleɪz/", "zh": "熊熊燃烧"}], "phrases": [{"en": "his eyes blazed with anger", "zh": "他的眼睛因愤怒而燃烧"}], "title": ""}, {"img": "images/pea-shooter/page-18.jpg", "en": "Jalapeno took a deep breath and WHOOSH — a massive wave of fire hit the Conehead Zombie! The traffic cone melted like butter. The zombie screamed and disappeared in a puff of smoke.\n\n\"AND STAY OUT!\" Jalapeno shouted triumphantly.", "zh": "火爆辣椒深吸一口气，呼——巨大的火焰波击中了路障僵尸！路障像黄油一样融化了。僵尸尖叫一声，在一缕烟雾中消失了。\n\n“滚远点！”火爆辣椒得意地喊道。", "keys": [{"w": "massive", "p": "/ˈmæsɪv/", "zh": "巨大的"}], "phrases": [{"en": "took a deep breath", "zh": "深吸一口气"}], "title": ""}, {"img": "images/pea-shooter/page-19.jpg", "en": "Pip and Sunny cheered happily! Where the zombie had been, there was only a small puff of smoke. The garden was safe once more.\n\nJalapeno smiled, gave a thumbs up, and slowly sank back into the ground. \"Anytime, friends. Anytime.\"", "zh": "皮皮和小阳开心地欢呼！僵尸原来在的地方，只剩下一个小小的烟雾。花园再次安全了。\n\n火爆辣椒微笑着，竖起大拇指，慢慢沉回地面。“随时效劳，朋友们。”", "keys": [{"w": "cheer", "p": "/tʃɪr/", "zh": "欢呼"}], "phrases": [{"en": "cheered happily", "zh": "开心地欢呼"}], "title": ""}];
const game_url = '../../game/classic/pea-shooter.html';
const intro_pages = Array.isArray(STORY.intro_cn_pages) ? STORY.intro_cn_pages : [];

  ? STORY.reader_pages_simple_en
  : (Array.isArray(STORY.pages) && STORY.pages.length ? STORY.pages : legacy_pages);
const page_list = [
  ...intro_pages.map((page) => ({ ...page, section: 'intro' })),
  ...reader_pages.map((page) => ({ ...page, section: 'reader' })),

if (!page_list.length) {
  page_list.push({
    section: 'reader',
    title: '',
    img: '',
    en: 'Content is coming soon.',

let current_page = 0;
let current_rate = 0.92;
let is_reading = false;
let current_word_ranges = [];
const synth = window.speechSynthesis;

function get_hide_chinese_setting() {
  if (localStorage.getItem('hideChineseTranslation') !== null) {
    return localStorage.getItem('hideChineseTranslation') === '1';
  }
  return localStorage.getItem('hideChinese') === 'true';
}

let translation_visible = !get_hide_chinese_setting();

function escape_for_attr(raw_text) {
  return String(raw_text || '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function get_asset_src(raw_path) {
  const path_text = String(raw_path || '').trim();
  if (!path_text) return '';
  if (path_text.startsWith('http://') || path_text.startsWith('https://')) return path_text;
  if (path_text.startsWith('images/')) return '../../' + path_text;
  return '../../images/' + path_text.replace(/^\/+/, '');
}

function split_zh_chunks(zh_text) {
  return String(zh_text || '')
    .split(/(?<=[。！？；：,.!?])/)
    .map((chunk) => chunk.trim())
    .filter(Boolean);
}

function build_word_tokens(en_text) {
  const source_text = String(en_text || '');
  const tokens = source_text.match(/\S+/g) || [];
  let search_index = 0;
  return tokens.map((token) => {
    const start = source_text.indexOf(token, search_index);
    const end = start + token.length;
    search_index = end;
    return { token, start, end };
  });
}

function get_current_page() {
  return page_list[current_page] || page_list[0];
}

function update_read_button() {
  const read_btn = document.getElementById('read_btn');
  if (!read_btn) return;
  read_btn.textContent = is_reading ? '⏹ 停止朗读' : '🔊 开始朗读';
}

function update_translation_ui() {
  const page = get_current_page();
  const zh_box = document.getElementById('zh_sentence');
  const toggle_btn = document.getElementById('translate_toggle_btn');
  if (!page || !zh_box || !toggle_btn) return;
  const is_intro = page.section === 'intro';
  toggle_btn.style.display = is_intro ? 'none' : 'inline-flex';
  zh_box.classList.toggle('hidden', !is_intro && !translation_visible);
  if (!is_intro) {
    toggle_btn.textContent = translation_visible ? '隐藏中文' : '显示中文';
  }
}

function toggle_translation(force_visible) {
  if (typeof force_visible === 'boolean') {
    translation_visible = force_visible;
  } else {
    translation_visible = !translation_visible;
  }
  update_translation_ui();
}

function open_settings() {
  const overlay = document.getElementById('settings_overlay');
  const checkbox = document.getElementById('hide_chinese_checkbox');
  checkbox.checked = get_hide_chinese_setting();
  overlay.classList.add('show');
}

function close_settings() {
  document.getElementById('settings_overlay').classList.remove('show');
}

function close_settings_on_overlay(event) {
  if (event.target.id === 'settings_overlay') {
    close_settings();
  }
}

function save_reader_settings() {
  const hidden = document.getElementById('hide_chinese_checkbox').checked;
  localStorage.setItem('hideChinese', hidden ? 'true' : 'false');
  localStorage.setItem('hideChineseTranslation', hidden ? '1' : '0');
  translation_visible = !hidden;
  update_translation_ui();
  close_settings();
}

function render_page(page_index) {
  const page = page_list[page_index];
  const is_intro = page.section === 'intro';
  const image_src = get_asset_src(page.img);
  current_word_ranges = is_intro ? [] : build_word_tokens(page.en || '');

  const words_html = current_word_ranges.map((item, idx) =>
    `<span class="word" id="w_${idx}" onclick="speak_word_token(${idx})">${escape_for_attr(item.token)}</span>`
  ).join(' ');

  const zh_chunks = split_zh_chunks(page.zh || '');
  const zh_html = zh_chunks.map((chunk, idx) =>
    `<span class="zh_chunk" id="zh_${idx}">${escape_for_attr(chunk)}</span>`
  ).join('');

  const word_row_html = (page.keys || []).length
    ? (page.keys || []).map((item, idx) =>
      `<span class="lex_chip words" id="key_${idx}" onclick="manual_speak_word(${idx})"><b>${escape_for_attr(item.w || '')}</b> ${escape_for_attr(item.p || '')} ${escape_for_attr(item.zh || '')}</span>`
    ).join('')
    : '<span class="lex_empty">暂无重点单词</span>';

  const phrase_row_html = (page.phrases || []).length
    ? (page.phrases || []).map((item, idx) =>
      `<span class="lex_chip phrases" id="phrase_${idx}" onclick="manual_speak_phrase(${idx})"><b>${escape_for_attr(item.en || '')}</b> ${escape_for_attr(item.zh || '')}</span>`
    ).join('')
    : '<span class="lex_empty">暂无重点词组</span>';

  const intro_title_html = page.title ? `<div class="intro_title">${escape_for_attr(page.title)}</div>` : '';

  document.getElementById('page_area').innerHTML = is_intro ? `
    <img class="hero_img" src="${image_src}" alt="page ${page_index + 1}" onerror="this.style.objectFit='contain';this.style.background='#eee';">
    <div class="text_area intro_mode">
      ${intro_title_html}
      <div class="zh_sentence" id="zh_sentence">${zh_html}</div>
      <div class="lexicon">
        <div class="lex_row"><span class="lex_label words">单词</span><div class="lex_items">${word_row_html}</div></div>
        <div class="lex_row"><span class="lex_label phrases">词组</span><div class="lex_items">${phrase_row_html}</div></div>
      </div>
    </div>` : `
    <img class="hero_img" src="${image_src}" alt="page ${page_index + 1}" onerror="this.style.objectFit='contain';this.style.background='#eee';">
    <div class="text_area">
      <div class="en_sentence">${words_html}</div>
      <div class="zh_sentence" id="zh_sentence">${zh_html}</div>
      <div class="lexicon">
        <div class="lex_row"><span class="lex_label words">单词</span><div class="lex_items">${word_row_html}</div></div>
        <div class="lex_row"><span class="lex_label phrases">词组</span><div class="lex_items">${phrase_row_html}</div></div>
      </div>
    </div>`;

  document.getElementById('progress_fill').style.width = `${((page_index + 1) / page_list.length) * 100}%`;
  document.getElementById('page_total').textContent = `第 ${page_index + 1} 页 / 共 ${page_list.length} 页`;
  document.getElementById('page_indicator').textContent = `${page_index + 1} / ${page_list.length}`;
  document.getElementById('prev_btn').disabled = page_index === 0;

  const on_last_page = page_index === page_list.length - 1;
  document.getElementById('next_btn').textContent = on_last_page ? '已经读完' : '下一页 →';
  document.getElementById('next_btn').disabled = on_last_page;
  document.getElementById('to_game_btn').style.display = on_last_page ? 'inline-block' : 'none';
  update_translation_ui();
  update_read_button();
}

function clear_highlight() {
  document.querySelectorAll('.word.speaking').forEach((el) => el.classList.remove('speaking'));
  document.querySelectorAll('.zh_chunk.speaking').forEach((el) => el.classList.remove('speaking'));
  document.querySelectorAll('.lex_chip.speaking').forEach((el) => el.classList.remove('speaking'));
}

function stop_reading() {
  is_reading = false;
  clear_highlight();
  if (synth) synth.cancel();
  update_read_button();
}

function wait_between(ms) {
  return new Promise((resolve) => setTimeout(resolve, ms));
}

function speak_utterance(text_value, lang_code, rate_value, on_boundary) {
  return new Promise((resolve) => {
    const safe_text = String(text_value || '').trim();
    if (!safe_text || !synth) {
      resolve();
      return;
    }
    const utterance = new SpeechSynthesisUtterance(safe_text);
    utterance.lang = lang_code;
    utterance.rate = rate_value;
    utterance.pitch = 1;
    if (on_boundary) utterance.onboundary = on_boundary;
    utterance.onend = resolve;
    utterance.onerror = resolve;
    synth.speak(utterance);
  });
}

function highlight_en_word(char_index) {
  const word_index = current_word_ranges.findIndex((item) => char_index >= item.start && char_index < item.end);
  if (word_index < 0) return;
  clear_highlight();
  const active_word = document.getElementById(`w_${word_index}`);
  if (active_word) active_word.classList.add('speaking');
}

function highlight_zh_chunk(chunk_index) {
  clear_highlight();
  const chunk_el = document.getElementById(`zh_${chunk_index}`);
  if (chunk_el) chunk_el.classList.add('speaking');
}

function highlight_lex_item(prefix, item_index) {
  clear_highlight();
  const target_el = document.getElementById(`${prefix}_${item_index}`);
  if (target_el) target_el.classList.add('speaking');
}

async function speak_english_sentence(page) {
  await speak_utterance(String(page.en || ''), 'en-US', current_rate * 0.92, (event) => {
    if (typeof event.charIndex === 'number') {
      highlight_en_word(event.charIndex);
    }
  });
}

async function speak_chinese_sentence(page) {
  const zh_chunks = split_zh_chunks(page.zh || '');
  for (let idx = 0; idx < zh_chunks.length; idx += 1) {
    if (!is_reading) return;
    highlight_zh_chunk(idx);
    await speak_utterance(String(zh_chunks[idx] || ''), 'zh-CN', current_rate);
    if (!is_reading) return;
    if (idx < zh_chunks.length - 1) {
      await wait_between(220);
    }
  }
}

async function speak_word_item(item, item_index) {
  highlight_lex_item('key', item_index);
  await speak_utterance(String(item.w || ''), 'en-US', current_rate * 0.85);
  if (!is_reading) return;
  await wait_between(260);
  if (!is_reading) return;
  await speak_utterance(String(item.zh || ''), 'zh-CN', current_rate * 0.9);
}

async function speak_phrase_item(item, item_index) {
  highlight_lex_item('phrase', item_index);
  await speak_utterance(String(item.en || ''), 'en-US', current_rate * 0.82);
  if (!is_reading) return;
  await wait_between(260);
  if (!is_reading) return;
  await speak_utterance(String(item.zh || ''), 'zh-CN', current_rate * 0.88);
}

async function toggle_reading() {
  if (is_reading) {
    stop_reading();
    return;
  }
  await read_current();
}

async function read_current() {
  if (is_reading) return;
  const page = get_current_page();
  is_reading = true;
  if (synth) synth.cancel();
  clear_highlight();
  update_read_button();
  try {
    if (page.section === 'intro') {
      await speak_chinese_sentence(page);
    } else {
      await speak_english_sentence(page);
      if (!is_reading) return;
      await wait_between(700);
      if (!is_reading) return;
      await speak_chinese_sentence(page);
      if (!is_reading) return;
      await wait_between(850);
      if (!is_reading) return;
      for (let idx = 0; idx < (page.keys || []).length; idx += 1) {
        if (!is_reading) return;
        await speak_word_item(page.keys[idx], idx);
        if (!is_reading) return;
        if (idx < (page.keys || []).length - 1 || (page.phrases || []).length) {
          await wait_between(420);
        }
      }
      for (let idx = 0; idx < (page.phrases || []).length; idx += 1) {
        if (!is_reading) return;
        await speak_phrase_item(page.phrases[idx], idx);
        if (!is_reading) return;
        if (idx < (page.phrases || []).length - 1) {
          await wait_between(420);
        }
      }
    }
  } finally {
    is_reading = false;
    clear_highlight();
    update_read_button();
  }
}

async function read_chinese_only() {
  if (is_reading) {
    stop_reading();
    return;
  }
  is_reading = true;
  if (synth) synth.cancel();
  clear_highlight();
  update_read_button();
  try {
    await speak_chinese_sentence(get_current_page());
  } finally {
    is_reading = false;
    clear_highlight();
    update_read_button();
  }
}

function sanitize_token(token) {
  return String(token || '').replace(/^[^\w]+|[^\w]+$/g, '');
}

function speak_word_token(word_index) {
  const page = get_current_page();
  const token_info = current_word_ranges[word_index];
  if (!token_info) return;
  stop_reading();
  highlight_en_word(token_info.start);
  const clean_token = sanitize_token(token_info.token);
  speak_utterance(clean_token || token_info.token, 'en-US', current_rate * 0.85).then(() => {
    clear_highlight();
  });
}

function manual_speak_word(item_index) {
  const page = get_current_page();
  const item = (page.keys || [])[item_index];
  if (!item) return;
  stop_reading();
  is_reading = true;
  update_read_button();
  speak_word_item(item, item_index).finally(() => {
    is_reading = false;
    clear_highlight();
    update_read_button();
  });
}

function manual_speak_phrase(item_index) {
  const page = get_current_page();
  const item = (page.phrases || [])[item_index];
  if (!item) return;
  stop_reading();
  is_reading = true;
  update_read_button();
  speak_phrase_item(item, item_index).finally(() => {
    is_reading = false;
    clear_highlight();
    update_read_button();
  });
}

function goto_game() {
  window.location.href = game_url;
}

function change_page(direction) {
  stop_reading();
  const on_last_page = current_page === page_list.length - 1;
  if (direction > 0 && on_last_page) {
    return;
  }
  current_page = Math.max(0, Math.min(page_list.length - 1, current_page + direction));
  render_page(current_page);
}

render_page(0);
window.addEventListener('load', () => {
  setTimeout(() => { read_current(); }, 500);
});
</script>
</body>
</html>
