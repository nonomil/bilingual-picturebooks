<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invisible Tank Mission — 朗读版</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Nunito','PingFang SC','Microsoft YaHei',sans-serif;
    background:#fff9f2;
    min-height:100vh;
    display:flex;
    justify-content:center;
    color:#2f2f2f;
  }
  .reader_wrap { width:100%; max-width:900px; padding:16px 14px 28px; }
  .unit_tag { text-align:center; color:#8e8e8e; font-size:13px; margin-bottom:6px; }
  h2 { text-align:center; color:#e17055; font-size:24px; line-height:1.3; }
  h2 small { display:block; color:#9b9b9b; font-size:16px; font-weight:500; margin-top:4px; }
  .progress_bar { width:100%; height:7px; background:#ececec; border-radius:999px; margin:12px 0 14px; overflow:hidden; }
  .progress_fill { height:100%; background:linear-gradient(90deg,#ff9f43,#ffd166); transition:width .25s ease; }
  .hero_img {
    width:100%;
    border-radius:18px;
    box-shadow:0 8px 30px rgba(0,0,0,.12);
    display:block;
    background:#f3f3f3;
    aspect-ratio:16/10;
    object-fit:cover;
  }
  .text_area {
    margin-top:14px;
    background:#fff;
    border-radius:16px;
    box-shadow:0 4px 18px rgba(0,0,0,.08);
    padding:16px 14px 14px;
  }
  .en_sentence { font-size:25px; line-height:1.65; color:#2f2f2f; font-weight:700; }
  .word {
    display:inline;
    border-radius:6px;
    cursor:pointer;
    padding:1px 2px;
    transition:all .15s ease;
  }
  .word:hover { background:#fff3b0; }
  .word.speaking { background:#ffd166; color:#3b2f0d; }
  .word_tip {
    display:inline-block;
    margin-left:6px;
    font-size:12px;
    color:#666;
    background:#f3f4f8;
    border-radius:999px;
    padding:2px 8px;
  }
  .zh_sentence {
    margin-top:12px;
    padding-top:12px;
    border-top:1px dashed #ececec;
    font-size:20px;
    line-height:1.8;
    color:#5d5d5d;
  }
  .zh_chunk {
    border-radius:5px;
    transition:background .12s ease;
  }
  .zh_chunk.speaking {
    background:#ffe8bd;
    color:#403014;
  }
  .lexicon { margin-top:14px; display:grid; gap:10px; }
  .lex_row { display:flex; align-items:flex-start; gap:10px; flex-wrap:wrap; }
  .lex_label {
    min-width:54px;
    text-align:center;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    color:#fff;
    padding:4px 8px;
  }
  .lex_label.words { background:#54a0ff; }
  .lex_label.phrases { background:#10ac84; }
  .lex_items { flex:1; display:flex; flex-wrap:wrap; gap:8px; }
  .lex_chip {
    border-radius:999px;
    padding:6px 12px;
    border:1px solid #dde8ff;
    background:#f4f8ff;
    font-size:13px;
    color:#2f3f60;
    line-height:1.35;
    cursor:pointer;
    transition:all .15s ease;
  }
  .lex_chip:hover { transform:translateY(-1px); box-shadow:0 2px 8px rgba(0,0,0,.08); }
  .lex_chip.words b { color:#1f6fd1; }
  .lex_chip.phrases {
    border-color:#c9f0e4;
    background:#f1fffb;
    color:#22524a;
  }
  .lex_chip.phrases b { color:#0c9b78; }
  .lex_empty { font-size:13px; color:#989898; padding-top:7px; }
  .nav {
    margin-top:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
  }
  .btn {
    border:none;
    border-radius:999px;
    cursor:pointer;
    font-size:15px;
    font-weight:700;
    padding:10px 16px;
    transition:opacity .15s ease, transform .15s ease;
  }
  .btn:disabled { opacity:.35; cursor:not-allowed; }
  .btn:hover:not(:disabled) { transform:translateY(-1px); }
  .btn.nav_btn { background:#ff9f43; color:#fff; min-width:108px; }
  .btn.read_btn { background:#54a0ff; color:#fff; }
  .btn.game_btn { background:#10ac84; color:#fff; display:none; }
  .page_indicator { color:#969696; font-size:14px; }
</style>
</head>
<body>
<div class="reader_wrap">
  <div class="unit_tag">分类：我的世界</div>
  <h2>Invisible Tank Mission<small>隐身战车奇袭</small></h2>
  <div class="progress_bar"><div class="progress_fill" id="progress_fill"></div></div>
  <div id="page_area"></div>
  <div class="nav">
    <button class="btn nav_btn" id="prev_btn" onclick="change_page(-1)">← 上一页</button>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="btn read_btn" onclick="read_current()">🔊 朗读</button>
      <button class="btn game_btn" id="to_game_btn" onclick="goto_game()">🎮 去游戏</button>
      <span class="page_indicator" id="page_indicator"></span>
    </div>
    <button class="btn nav_btn" id="next_btn" onclick="change_page(1)">下一页 →</button>
  </div>
</div>

<script>
const pages_data = [{"img": "images/invisible-tank/page-1.jpg", "en": "A mysterious black tank that can turn invisible, ready for a secret mission.", "zh": "一辆神秘的黑色坦克，可以变得完全透明，准备执行秘密任务。", "keys": [{"w": "mysterious", "p": "/mɪˈstɪriəs/", "zh": "神秘的"}], "phrases": [{"en": "mysterious black tank", "zh": "神秘的黑色坦克"}]}, {"img": "images/invisible-tank/page-2.jpg", "en": "Sneaky enemy trucks steal the glowing energy crystals hidden on the mountain top.", "zh": "偷偷摸摸的敌人卡车把藏在山顶的发光能量水晶偷走了！", "keys": [{"w": "sneaky", "p": "/ˈsniːki/", "zh": "鬼鬼祟祟的"}], "phrases": [{"en": "sneaky enemy trucks", "zh": "偷偷摸摸的敌人卡车"}]}, {"img": "images/invisible-tank/page-3.jpg", "en": "The kid presses the glowing blue button — whoosh! The tank becomes completely invisible!", "zh": "小孩按下发光的蓝色按钮——嗖！坦克变得完全透明了！", "keys": [{"w": "press", "p": "/pres/", "zh": "按下"}], "phrases": [{"en": "glowing blue button", "zh": "发光的蓝色按钮"}]}, {"img": "images/invisible-tank/page-4.jpg", "en": "The invisible tank follows the enemy convoy silently, not even the guard dogs notice it.", "zh": "隐身坦克悄悄跟在敌人车队后面，连敌人的侦查狗都没发现。", "keys": [{"w": "follows", "p": "/ˈfɑːloʊz/", "zh": "跟随"}], "phrases": [{"en": "follows the enemy convoy silently", "zh": "悄悄跟着敌人车队"}]}, {"img": "images/invisible-tank/page-5.jpg", "en": "The invisible tank reaches the enemy camp. There are guards everywhere and tall watchtowers!", "zh": "隐身坦克到达敌人营地。到处都是卫兵和高高的瞭望塔！", "keys": [{"w": "reaches", "p": "/ˈriːtʃɪz/", "zh": "到达"}], "phrases": [{"en": "reaches the enemy camp", "zh": "到达敌人营地"}]}, {"img": "images/invisible-tank/page-6.jpg", "en": "Twenty fake tanks appear around the enemy camp and the soldiers panic in confusion!", "zh": "敌人营地周围突然出现了二十辆一模一样的幻影坦克，士兵们吓得四处张望！", "keys": [{"w": "fake", "p": "/feɪk/", "zh": "假的"}], "phrases": [{"en": "appear around the enemy camp", "zh": "出现在敌人营地周围"}]}, {"img": "images/invisible-tank/page-7.jpg", "en": "Tiny fly-sized cameras zip over to the enemy tanks and send back live video to the kid's screen.", "zh": "像苍蝇一样小的微型摄像头飞到敌人坦克上，把画面传回屏幕。", "keys": [{"w": "tiny", "p": "/ˈtaɪni/", "zh": "极小的"}], "phrases": [{"en": "fly-sized cameras", "zh": "像苍蝇一样小的摄像头"}]}, {"img": "images/invisible-tank/page-8.jpg", "en": "The kid throws a special dart that flies straight into the enemy truck's energy core!", "zh": "小孩投出飞镖，精准命中敌人卡车的能量核心！", "keys": [{"w": "special", "p": "/ˈspeʃl/", "zh": "特殊的"}], "phrases": [{"en": "throws a special dart", "zh": "投出一枚特殊飞镖"}]}, {"img": "images/invisible-tank/page-9.jpg", "en": "The dart hits the core — BOOM! The enemy truck's power shuts down completely!", "zh": "飞镖命中核心——轰！敌人卡车的动力彻底熄火了！", "keys": [{"w": "hits", "p": "/hɪts/", "zh": "击中"}], "phrases": [{"en": "hits the core", "zh": "击中核心"}]}, {"img": "images/invisible-tank/page-10.jpg", "en": "A magnetic claw reaches out and zips the crystal boxes right into the invisible tank.", "zh": "磁力抓取爪伸出，嗖地一下把能量水晶吸了过来！", "keys": [{"w": "magnetic", "p": "/mæɡˈnetɪk/", "zh": "磁性的"}], "phrases": [{"en": "A magnetic claw reaches out", "zh": "一只磁力爪伸出来"}]}, {"img": "images/invisible-tank/page-11.jpg", "en": "The magnetic claw grabs the second crystal too! Two down, one to go!", "zh": "磁力爪又抓到了第二个水晶！两个到手，还差一个！", "keys": [{"w": "grabs", "p": "/ɡræbz/", "zh": "抓住"}], "phrases": [{"en": "grabs the second crystal", "zh": "抓住第二个水晶"}]}, {"img": "images/invisible-tank/page-12.jpg", "en": "The last enemy truck spots the floating crystals and sounds the alarm! WHEE-OOH WHEE-OOH!", "zh": "最后一辆敌人卡车发现了飘浮的水晶，拉响了警报！呜——呜——！", "keys": [{"w": "enemy", "p": "/ˈenəmi/", "zh": "敌人"}], "phrases": [{"en": "spots the floating crystals", "zh": "发现漂浮的水晶"}]}, {"img": "images/invisible-tank/page-13.jpg", "en": "The enemy truck chases the invisible tank through the forest at full speed!", "zh": "敌人卡车全速追赶隐身坦克，在森林里疯狂穿梭！", "keys": [{"w": "chases", "p": "/ˈtʃeɪsɪz/", "zh": "追赶"}], "phrases": [{"en": "chases the invisible tank", "zh": "追赶隐身坦克"}]}, {"img": "images/invisible-tank/page-14.jpg", "en": "An explosion sends Doubao the robot flying higher than the whole galaxy!", "zh": "一阵爆炸把豆包炸飞了，豆包飞得比银河系还高！", "keys": [{"w": "explosion", "p": "/ɪkˈspləʊʒən/", "zh": "爆炸"}], "phrases": [{"en": "An explosion sends Doubao flying", "zh": "一场爆炸把豆包炸飞了"}]}, {"img": "images/invisible-tank/page-15.jpg", "en": "Doubao falls back down like a shooting star, yelling all the way!", "zh": "豆包像流星一样落下来，一路尖叫！", "keys": [{"w": "falls", "p": "/fɔːlz/", "zh": "掉落"}], "phrases": [{"en": "falls back down like a shooting star", "zh": "像流星一样落下来"}]}, {"img": "images/invisible-tank/page-16.jpg", "en": "Doubao lands on the ground with a big BUMP and says 'Ouch, my bottom hurts!'", "zh": "豆包砰地坐到地上，哎呀，屁股好疼啊，摔了个屁股蹲！", "keys": [{"w": "lands", "p": "/lændz/", "zh": "着地"}], "phrases": [{"en": "lands on the ground with a big BUMP", "zh": "砰地坐到地上"}]}, {"img": "images/invisible-tank/page-17.jpg", "en": "Doubao accidentally falls right in front of the enemy truck! The truck screeches to a halt!", "zh": "豆包正好摔在敌人卡车前面！卡车急刹车停了下来！", "keys": [{"w": "accidentally", "p": "/ˌæksɪˈdentəli/", "zh": "意外地"}], "phrases": [{"en": "accidentally falls right in front of the enemy truck", "zh": "正好摔在敌人卡车前面"}]}, {"img": "images/invisible-tank/page-18.jpg", "en": "While the truck is stopped, the magnetic claw quickly grabs the last crystal!", "zh": "趁卡车停下，磁力爪迅速抓走了最后一个水晶！", "keys": [{"w": "stopped", "p": "/stɒpt/", "zh": "停下的"}], "phrases": [{"en": "while the truck is stopped", "zh": "趁卡车停下"}]}, {"img": "images/invisible-tank/page-19.jpg", "en": "Doubao has a bouncy bottom pad and springs right back up, ready to keep fighting!", "zh": "豆包有弹性缓冲垫，一下子就弹了起来，继续战斗！", "keys": [{"w": "bouncy", "p": "/ˈbaʊnsi/", "zh": "有弹性的"}], "phrases": [{"en": "has a bouncy bottom pad", "zh": "有弹性缓冲垫"}]}, {"img": "images/invisible-tank/page-20.jpg", "en": "The invisible tank activates full stealth and vanishes completely! The enemy trucks can't find it!", "zh": "隐身坦克开启全隐身模式，彻底消失！敌人卡车找不到它了！", "keys": [{"w": "activates", "p": "/ˈæktɪveɪts/", "zh": "启动"}], "phrases": [{"en": "activates full stealth", "zh": "开启全隐身模式"}]}, {"img": "images/invisible-tank/page-21.jpg", "en": "The invisible tank carries the crystals home safely, with Doubao riding on top as a lookout.", "zh": "隐身坦克带着水晶安全回到基地，豆包坐在坦克顶上当侦查员。", "keys": [{"w": "carries", "p": "/ˈkæriz/", "zh": "运送"}], "phrases": [{"en": "carries the crystals home safely", "zh": "安全地把水晶带回基地"}]}];
const game_url = '../../game/classic/invisible-tank.html';
let current_page = 0;
let current_rate = 0.92;
let is_reading = false;
const synth = window.speechSynthesis;

function escape_for_attr(raw_text) {
  return String(raw_text || '').replace(/'/g, "\\'");
}

function get_asset_src(raw_path) {
  const path_text = String(raw_path || '').trim();
  if (!path_text) return '';
  if (path_text.startsWith('http://') || path_text.startsWith('https://')) return path_text;
  if (path_text.startsWith('images/')) return '../../' + path_text;
  return '../../images/' + path_text.replace(/^\/+/, '');
}

function split_zh_chunks(zh_text) {
  const source_text = String(zh_text || '');
  return source_text.split(/(?<=[。！？；：,.!?])/).filter(Boolean);
}

function render_page(page_index) {
  const page = pages_data[page_index];
  const words_html = String(page.en || '').split(/\s+/).filter(Boolean).map((word_text, idx) =>
    `<span class="word" id="w_${idx}" onclick="show_word_tip(this,'${escape_for_attr(word_text)}')">${word_text}</span>`
  ).join(' ');
  const zh_chunks = split_zh_chunks(page.zh || '');
  const zh_html = zh_chunks.map((chunk, idx) =>
    `<span class="zh_chunk" id="zh_${idx}">${chunk}</span>`
  ).join('');
  const word_row_html = (page.keys || []).length ? (page.keys || []).map((item) =>
    `<span class="lex_chip words" onclick="speak_word('${escape_for_attr(item.w || '')}')"><b>${item.w || ''}</b> ${item.p || ''} ${item.zh || ''}</span>`
  ).join('') : '<span class="lex_empty">暂无重点单词</span>';
  const phrase_row_html = (page.phrases || []).length ? (page.phrases || []).map((item) =>
    `<span class="lex_chip phrases" onclick="speak_phrase('${escape_for_attr(item.en || '')}')"><b>${item.en || ''}</b> ${item.zh || ''}</span>`
  ).join('') : '<span class="lex_empty">暂无重点词组</span>';

  document.getElementById('page_area').innerHTML = `
    <img class="hero_img" src="${get_asset_src(page.img)}" alt="page ${page_index + 1}" onerror="this.style.objectFit='contain';this.style.background='#eee';">
    <div class="text_area">
      <div class="en_sentence">${words_html}</div>
      <div class="zh_sentence">${zh_html}</div>
      <div class="lexicon">
        <div class="lex_row"><span class="lex_label words">单词</span><div class="lex_items">${word_row_html}</div></div>
        <div class="lex_row"><span class="lex_label phrases">词组</span><div class="lex_items">${phrase_row_html}</div></div>
      </div>
    </div>`;

  document.getElementById('progress_fill').style.width = `${((page_index + 1) / pages_data.length) * 100}%`;
  document.getElementById('page_indicator').textContent = `${page_index + 1} / ${pages_data.length}`;
  document.getElementById('prev_btn').disabled = page_index === 0;
  const on_last_page = page_index === pages_data.length - 1;
  document.getElementById('next_btn').textContent = on_last_page ? '完成并去游戏 →' : '下一页 →';
  document.getElementById('to_game_btn').style.display = on_last_page ? 'inline-block' : 'none';
}

function clear_highlight() {
  document.querySelectorAll('.word.speaking').forEach((el) => el.classList.remove('speaking'));
  document.querySelectorAll('.zh_chunk.speaking').forEach((el) => el.classList.remove('speaking'));
}

function speak_utterance(text_value, lang_code, rate_value, on_boundary) {
  return new Promise((resolve) => {
    const utterance = new SpeechSynthesisUtterance(text_value);
    utterance.lang = lang_code;
    utterance.rate = rate_value;
    utterance.pitch = 1;
    if (on_boundary) utterance.onboundary = on_boundary;
    utterance.onend = resolve;
    utterance.onerror = resolve;
    synth.speak(utterance);
  });
}

async function read_current() {
  if (is_reading) return;
  is_reading = true;
  synth.cancel();
  clear_highlight();
  const page = pages_data[current_page];
  const words = String(page.en || '').split(/\s+/).filter(Boolean);
  for (let i = 0; i < words.length; i += 1) {
    clear_highlight();
    const word_el = document.getElementById(`w_${i}`);
    if (word_el) word_el.classList.add('speaking');
    await speak_utterance(words[i], 'en-US', current_rate * 0.88);
  }
  clear_highlight();
  const zh_chunks = split_zh_chunks(page.zh || '');
  let zh_index = 0;
  await speak_utterance(String(page.zh || ''), 'zh-CN', current_rate, () => {
    clear_highlight();
    const current_chunk = document.getElementById(`zh_${zh_index}`);
    if (current_chunk) current_chunk.classList.add('speaking');
    zh_index = Math.min(zh_index + 1, zh_chunks.length - 1);
  });
  clear_highlight();
  for (const item of (page.keys || [])) {
    await speak_utterance(String(item.w || ''), 'en-US', current_rate * 0.85);
  }
  for (const item of (page.phrases || [])) {
    await speak_utterance(String(item.en || ''), 'en-US', current_rate * 0.82);
  }
  is_reading = false;
}

function show_word_tip(target_el, word_text) {
  speak_word(word_text);
  const old_tip = target_el.querySelector('.word_tip');
  if (old_tip) {
    old_tip.remove();
    return;
  }
  const page = pages_data[current_page];
  const clean_word = String(word_text || '').toLowerCase().replace(/[.,!?'"“”]/g, '');
  const found = (page.keys || []).find((item) => String(item.w || '').toLowerCase() === clean_word);
  if (!found) return;
  const tip = document.createElement('span');
  tip.className = 'word_tip';
  tip.textContent = `${found.p || ''} ${found.zh || ''}`.trim();
  target_el.appendChild(tip);
}

function speak_word(word_text) {
  if (!word_text) return;
  synth.cancel();
  clear_highlight();
  speak_utterance(String(word_text), 'en-US', current_rate * 0.84);
}

function speak_phrase(phrase_text) {
  if (!phrase_text) return;
  synth.cancel();
  clear_highlight();
  speak_utterance(String(phrase_text), 'en-US', current_rate * 0.8);
}

function goto_game() {
  window.location.href = game_url;
}

function change_page(direction) {
  synth.cancel();
  clear_highlight();
  const on_last_page = current_page === pages_data.length - 1;
  if (direction > 0 && on_last_page) {
    goto_game();
    return;
  }
  current_page = Math.max(0, Math.min(pages_data.length - 1, current_page + direction));
  render_page(current_page);
}

render_page(0);
window.addEventListener('load', () => {
  setTimeout(() => { read_current(); }, 500);
});
</script>
</body>
</html>
