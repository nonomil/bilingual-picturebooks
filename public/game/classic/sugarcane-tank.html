<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugarcane Tank Battle — 游戏版</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Nunito','PingFang SC','Microsoft YaHei',sans-serif;
    background:#1a1a2e;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    padding:12px;
  }
  .starfield { position:fixed; inset:0; pointer-events:none; }
  .game_card {
    position:relative;
    z-index:1;
    width:100%;
    max-width:760px;
    background:#16213e;
    border:2px solid #0f3460;
    border-radius:24px;
    padding:20px;
    box-shadow:0 16px 36px rgba(0,0,0,.28);
  }
  .top_bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:8px; }
  .unit_title { color:#f4c778; font-size:17px; font-weight:700; }
  .star_display { color:#ffd166; font-size:24px; font-weight:800; }
  .stage_title { color:#a8e6cf; font-size:22px; text-align:center; margin-bottom:14px; }
  .options_grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; margin-top:12px; }
  .opt_btn {
    border:2px solid #1f5187;
    border-radius:14px;
    background:#10365f;
    color:#f2f7ff;
    padding:14px 10px;
    font-size:18px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .opt_btn:hover { transform:translateY(-1px); border-color:#e2b96f; }
  .opt_btn.correct { background:#2ecc71; border-color:#28a85e; color:#fff; }
  .opt_btn.wrong { background:#e74c3c; border-color:#bf3a2f; color:#fff; }
  .play_btn {
    border:none;
    background:#3e8ed8;
    color:#fff;
    border-radius:999px;
    padding:10px 16px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
  }
  .drag_area { display:flex; justify-content:center; align-items:flex-start; gap:14px; margin-top:12px; flex-wrap:wrap; }
  .drag_words { display:flex; flex-direction:column; gap:10px; width:45%; min-width:220px; }
  .drag_item {
    background:#10365f;
    color:#f2f7ff;
    border:2px solid transparent;
    border-radius:12px;
    padding:10px 12px;
    font-size:18px;
    cursor:grab;
  }
  .drag_item:hover { border-color:#f1be67; }
  .drop_zones { display:flex; flex-direction:column; gap:10px; width:45%; min-width:220px; }
  .drop_zone {
    background:#102944;
    border:2px dashed #36689e;
    border-radius:12px;
    min-height:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#cde0f5;
    font-size:16px;
    text-align:center;
    padding:8px;
  }
  .drop_zone.matched { border-color:#2ecc71; background:#124931; color:#eafff5; }
  .story_intro { text-align:center; }
  .story_intro img {
    width:100%;
    max-width:260px;
    border-radius:14px;
    margin:10px auto;
    display:block;
    background:#f4f4f4;
    aspect-ratio:4/3;
    object-fit:cover;
  }
  .story_intro p { color:#dce7f5; line-height:1.65; font-size:16px; margin:8px auto; max-width:620px; }
  .action_btn {
    border:none;
    border-radius:999px;
    padding:11px 18px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    margin-top:12px;
    background:#e2b96f;
    color:#1d2233;
  }
  .finish_page { text-align:center; }
  .big_stars { font-size:52px; letter-spacing:6px; }
  .finish_msg { margin-top:10px; color:#c6ffe6; font-size:22px; }
  .finish_tip { margin-top:8px; color:#dbebfd; font-size:15px; }
  .finish_links { display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin-top:14px; }
  @keyframes star_pop {
    0% { transform:scale(0.2); opacity:0.2; }
    60% { transform:scale(1.18); opacity:1; }
    100% { transform:scale(1); opacity:1; }
  }
  .star_pop { animation:star_pop .35s ease-out; }
</style>
</head>

<script>
const STORY = {"id": "sugarcane-tank", "title": "Sugarcane Tank Battle", "titleZh": "甘蔗坦克大作战", "category": "我的世界", "cover": "images/covers/cover-sugarcane-tank.jpg", "pages": [{"img": "images/sugarcane-tank/page-1.jpg", "en": "In a small village surrounded by green hills, there lived a brave little kid who loved building things.", "zh": "在一个被青山环绕的小村庄里，住着一个爱动手做东西的勇敢小孩。", "keys": [{"w": "village", "p": "/ˈvɪlɪdʒ/", "zh": "村庄，青山，勇敢，动手"}], "phrases": [{"en": "surrounded by green hills", "zh": "被青山环绕"}]}, {"img": "images/sugarcane-tank/page-2.jpg", "en": "Inside the workshop, the kid had been building something amazing — a tank made entirely of vegetables!", "zh": "工坊里，小孩一直在秘密制造一件了不起的东西——一辆全蔬菜做的坦克！", "keys": [{"w": "workshop", "p": "/ˈwɜːrkʃɑːp/", "zh": "工坊，秘密，坦克，蔬菜"}], "phrases": [{"en": "Inside the workshop", "zh": "在工坊里"}]}, {"img": "images/sugarcane-tank/page-3.jpg", "en": "The kid attached a hollow sugarcane tube as the cannon barrel. It smelled sweet like candy!", "zh": "小孩把一根空心甘蔗装上去当炮管，闻起来像糖果一样甜！", "keys": [{"w": "sugarcane", "p": "/ˈʃʊɡərkeɪn/", "zh": "甘蔗，炮管，甜，糖果"}], "phrases": [{"en": "hollow sugarcane tube", "zh": "空心甘蔗管"}]}, {"img": "images/sugarcane-tank/page-4.jpg", "en": "Round brown potato mines were loaded into the back of the tank, each coated in sticky golden syrup.", "zh": "圆圆的棕色土豆雷被装进坦克后面的弹仓，每个都裹着黏糊糊的金色糖浆。", "keys": [{"w": "potato", "p": "/pəˈteɪtoʊ/", "zh": "土豆，地雷，糖浆，金色"}], "phrases": [{"en": "potato mines", "zh": "土豆雷"}]}, {"img": "images/sugarcane-tank/page-5.jpg", "en": "Little Milk got a special tiny harness with pockets for smoke bombs. The puppy wagged its tail excitedly!", "zh": "小牛奶穿上了一件特别的小背心，口袋里装着烟雾弹，小狗兴奋地摇着尾巴！", "keys": [{"w": "puppy", "p": "/ˈpʌpi/", "zh": "小狗，背心，烟雾弹，兴奋"}], "phrases": [{"en": "special tiny harness", "zh": "特别的小背心"}]}, {"img": "images/sugarcane-tank/page-6.jpg", "en": "The biggest surprise — hollow pumpkin shells filled with magic growing seeds that could multiply forever!", "zh": "最大的秘密武器——掏空的南瓜壳里装着魔法生长种子，能无限分裂繁殖！", "keys": [{"w": "pumpkin", "p": "/ˈpʌmpkɪn/", "zh": "南瓜，炮弹，魔法种子，分裂"}], "phrases": [{"en": "hollow pumpkin shells", "zh": "掏空的南瓜壳"}]}, {"img": "images/sugarcane-tank/page-7.jpg", "en": "The sugarcane tank was finally complete! It had a sugarcane cannon, potato mine launcher, and pumpkin bomb bay.", "zh": "甘蔗坦克终于完工了！它有甘蔗炮、土豆雷发射器和南瓜弹仓。", "keys": [{"w": "complete", "p": "/kəmˈpliːt/", "zh": "完工，准备，坦克，武器"}], "phrases": [{"en": "sugarcane tank", "zh": "甘蔗坦克"}]}, {"img": "images/sugarcane-tank/page-8.jpg", "en": "Suddenly, a loud alarm echoed through the village — enemy tanks were approaching from the east!", "zh": "突然，村庄响起了警报——敌人的坦克正从东边逼近！", "keys": [{"w": "alarm", "p": "/əˈlɑːrm/", "zh": "警报，敌人，坦克，逼近"}], "phrases": [{"en": "a loud alarm echoed through the village", "zh": "警报声响彻整个村庄"}]}, {"img": "images/sugarcane-tank/page-9.jpg", "en": "Ten big steel tanks rolled into the village, crushing fences and scaring everyone away.", "zh": "十辆钢铁大坦克开进了村庄，压坏了栅栏，把大家都吓跑了。", "keys": [{"w": "enemy", "p": "/ˈɛnəmi/", "zh": "敌人，入侵，钢铁坦克，可怕"}], "phrases": [{"en": "big steel tanks", "zh": "巨大的钢铁坦克"}]}, {"img": "images/sugarcane-tank/page-10.jpg", "en": "'It's time to protect our home!' The kid jumped into the sugarcane tank and started the engine.", "zh": "\"是时候保护我们的家了！\"小孩跳进甘蔗坦克，发动了引擎。", "keys": [{"w": "charge", "p": "/tʃɑːrdʒ/", "zh": "出击，保护，引擎，勇敢"}], "phrases": [{"en": "protect our home", "zh": "保护我们的家"}]}, {"img": "images/sugarcane-tank/page-11.jpg", "en": "BANG! The sugarcane cannon fired a sticky syrup bomb that splattered all over the first enemy tank's tracks!", "zh": "砰！甘蔗炮发射了一发黏糊糊的糖浆弹，糊住了第一辆敌人坦克的履带！", "keys": [{"w": "syrup", "p": "/ˈsɪrəp/", "zh": "糖浆，发射，黏糊糊，履带"}], "phrases": [{"en": "sticky syrup bomb", "zh": "黏糊糊的糖浆弹"}]}, {"img": "images/sugarcane-tank/page-12.jpg", "en": "The kid pressed the rapid fire button and syrup bombs flew everywhere, gluing enemy tanks to the ground!", "zh": "小孩按下连射按钮，糖浆弹四处飞射，把敌人坦克全部粘在了地上！", "keys": [{"w": "rapid", "p": "/ˈræpɪd/", "zh": "快速的"}], "phrases": [{"en": "rapid fire button", "zh": "连射按钮"}]}, {"img": "images/sugarcane-tank/page-13.jpg", "en": "Little Milk sneaked out with a pink smoke bomb in mouth, running between the enemy tanks' legs!", "zh": "小牛奶叼着粉色烟雾弹偷偷溜出去，在敌人坦克腿之间跑来跑去！", "keys": [{"w": "puppy", "p": "/ˈpʌpi/", "zh": "小狗，偷偷，烟雾弹，敌人"}], "phrases": [{"en": "pink smoke bomb", "zh": "粉色烟雾弹"}]}, {"img": "images/sugarcane-tank/page-14.jpg", "en": "BOOM! The smoke bomb exploded filling the battlefield with thick pink smoke. The enemies couldn't see anything!", "zh": "砰！烟雾弹炸开了，战场上到处都是粉色烟雾，敌人什么也看不见！", "keys": [{"w": "smoke", "p": "/smoʊk/", "zh": "烟雾，粉色，爆炸，看不见"}], "phrases": [{"en": "thick pink smoke", "zh": "浓厚的粉色烟雾"}]}, {"img": "images/sugarcane-tank/page-15.jpg", "en": "A huge enemy commander tank, three times bigger than the others, pushed through the smoke!", "zh": "一辆比其他坦克大三倍的敌人队长坦克冲破了烟雾！", "keys": [{"w": "commander", "p": "/commander/", "zh": "队长，巨型坦克，冲破，烟雾"}], "phrases": [{"en": "enemy commander tank", "zh": "敌人队长坦克"}]}, {"img": "images/sugarcane-tank/page-16.jpg", "en": "'Time for the pumpkin bomb!' The kid pressed the big red button on the dashboard.", "zh": "\"该用南瓜弹了！\"小孩按下仪表盘上的大红色按钮。", "keys": [{"w": "pumpkin", "p": "/ˈpʌmpkɪn/", "zh": "南瓜，炮弹，红色按钮，终极"}], "phrases": [{"en": "pumpkin bomb", "zh": "南瓜弹"}]}, {"img": "images/sugarcane-tank/page-17.jpg", "en": "WHOOSH! A giant glowing pumpkin bomb launched from the cannon, spinning through the sky!", "zh": "嗖——一颗发光的巨大南瓜炮弹从炮管飞出，旋转着飞向天空！", "keys": [{"w": "pumpkin", "p": "/ˈpʌmpkɪn/", "zh": "南瓜，发射，旋转，天空"}], "phrases": [{"en": "giant glowing pumpkin bomb", "zh": "巨大发光的南瓜炮弹"}]}, {"img": "images/sugarcane-tank/page-18.jpg", "en": "The pumpkin bomb hit the commander tank and exploded into a giant pumpkin shell, trapping it completely!", "zh": "南瓜弹命中了队长坦克，炸开变成巨大的南瓜壳，把敌人整个包住了！", "keys": [{"w": "pumpkin", "p": "/ˈpʌmpkɪn/", "zh": "南瓜"}], "phrases": [{"en": "hit the commander tank", "zh": "命中了队长坦克"}]}, {"img": "images/sugarcane-tank/page-19.jpg", "en": "Then something incredible happened — the magic seeds sprouted! One pumpkin became ten, then a hundred, then thousands!", "zh": "然后不可思议的事情发生了——魔法种子发芽了！一个南瓜变十个，再变一百个，再变几千个！", "keys": [{"w": "magic", "p": "/ˈmædʒɪk/", "zh": "魔法，发芽，分裂，成千上万"}], "phrases": [{"en": "something incredible happened", "zh": "不可思议的事情发生了"}]}, {"img": "images/sugarcane-tank/page-20.jpg", "en": "Thick green pumpkin vines grew faster than lightning, wrapping around every enemy tank, truck, and weapon!", "zh": "粗壮的绿色南瓜藤蔓长得比闪电还快，缠住了每一个敌人坦克、卡车和武器！", "keys": [{"w": "vines", "p": "/vaɪnz/", "zh": "藤蔓，缠绕，闪电，敌人"}], "phrases": [{"en": "thick green pumpkin vines", "zh": "粗壮的绿色南瓜藤蔓"}]}, {"img": "images/sugarcane-tank/page-21.jpg", "en": "The enemy commander waved a white flag from inside the pumpkin. 'We give up! Your vegetables are too powerful!'", "zh": "敌人队长从南瓜壳里伸出白旗投降：\"我们认输了！你们的蔬菜太厉害了！\"", "keys": [{"w": "surrender", "p": "/səˈrɛndər/", "zh": "投降，白旗，蔬菜，厉害"}], "phrases": [{"en": "waved a white flag", "zh": "挥舞白旗"}]}]};
const reader_url = '../../reader/classic/sugarcane-tank.html';
let stars = 0;
let stage_index = 0;
let drag_matched = 0;

const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
for (let i = 0; i < 120; i += 1) {
  ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.6 + 0.1})`;
  ctx.beginPath();
  ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 1.5 + 0.5, 0, Math.PI * 2);
  ctx.fill();
}

function get_asset_src(raw_path) {
  const path_text = String(raw_path || '').trim();
  if (!path_text) return '';
  if (path_text.startsWith('http://') || path_text.startsWith('https://')) return path_text;
  if (path_text.startsWith('images/')) return '../../' + path_text;
  return '../../images/' + path_text.replace(/^\/+/, '');
}

function shuffle(array_data) {
  const list = [...array_data];
  for (let i = list.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    const temp = list[i];
    list[i] = list[j];
    list[j] = temp;
  }
  return list;
}

function normalize_word(raw_text) {
  return String(raw_text || '').toLowerCase().replace(/[^a-z0-9'-]/g, '');
}

function fallback_vocab() {
  const map = new Map();
  (STORY.pages || []).forEach((page) => {
    (page.keys || []).forEach((item) => {
      const key_text = normalize_word(item.w);
      if (key_text && !map.has(key_text)) map.set(key_text, item);
    });
  });
  if (map.size === 0) {
    (STORY.pages || []).forEach((page) => {
      String(page.en || '').split(/\s+/).forEach((word) => {
        const key_text = normalize_word(word);
        if (key_text.length >= 3 && !map.has(key_text)) {
          map.set(key_text, { w: key_text, p: '', zh: '' });
        }
      });
    });
  }
  return [...map.values()].slice(0, 8);
}

function fallback_phrases() {
  const phrases = [];
  (STORY.pages || []).forEach((page) => {
    (page.phrases || []).forEach((item) => {
      if (item.en) phrases.push(item);
    });
  });
  if (phrases.length) return phrases.slice(0, 8);
  return (STORY.pages || []).slice(0, 8).map((page) => {
    const text = String(page.en || '');
    const short_text = text.split(/[.!?]/)[0].trim();
    return { en: short_text, zh: page.zh || '' };
  }).filter((item) => item.en);
}

const vocab_pool = (STORY.unitVocab && STORY.unitVocab.length ? STORY.unitVocab : fallback_vocab()).slice(0, 8);
const phrase_pool = fallback_phrases();

function add_star(amount = 1) {
  stars += amount;
  const el = document.getElementById('star_count');
  el.textContent = `⭐ ${stars}`;
  el.classList.remove('star_pop');
  void el.offsetWidth;
  el.classList.add('star_pop');
}

function speak_en(text_value) {
  if (!text_value) return;
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(String(text_value));
  utterance.lang = 'en-US';
  utterance.rate = 0.84;
  speechSynthesis.speak(utterance);
}

function word_to_emoji(word_text) {
  const map = {
    car:'🚗', duck:'🦆', ball:'⚽', frog:'🐸', rabbit:'🐰', cat:'🐱', dog:'🐶', bird:'🐦', fish:'🐟', tree:'🌳',
    apple:'🍎', book:'📚', pen:'✏️', bag:'👜', hat:'🎩', red:'🔴', yellow:'🟡', blue:'🔵', green:'🟢', pink:'🩷',
    airplane:'✈️', plane:'✈️', sky:'☁️', sword:'🗡️', dragon:'🐉', village:'🏠', hero:'🦸', river:'🌊', mountain:'⛰️'
  };
  return map[normalize_word(word_text)] || '🧩';
}

function next_stage() {
  stage_index += 1;
  if (stage_index < stages.length) stages[stage_index]();
}

function render_intro() {
  document.getElementById('stage_area').innerHTML = `
    <div class="story_intro">
      <div class="stage_title">🎮 Sugarcane Tank Battle</div>
      <img src="${get_asset_src(STORY.cover)}" alt="cover" onerror="this.style.objectFit='contain';this.style.background='#eee';">
      <p>读完《甘蔗坦克大作战》后，通过小游戏巩固单词和词组吧！</p>
      <button class="action_btn" onclick="next_stage()">开始游戏 →</button>
    </div>`;
}

function render_listen_select() {
  const quiz_pool = vocab_pool.length >= 4 ? vocab_pool : [...vocab_pool, ...vocab_pool].slice(0, 4);
  const answer = quiz_pool[Math.floor(Math.random() * quiz_pool.length)];
  const options = shuffle([answer, ...shuffle(quiz_pool.filter((v) => v.w !== answer.w)).slice(0, 3)]);
  speak_en(answer.w);
  document.getElementById('stage_area').innerHTML = `
    <div class="stage_title">🎧 听一听，选出正确单词</div>
    <div style="text-align:center;">
      <button class="play_btn" onclick="speak_en('${String(answer.w || '').replace(/'/g, "\\'")}')">🔊 再听一次</button>
    </div>
    <div class="options_grid">
      ${options.map((item) => `
        <button class="opt_btn" onclick="check_choice(this,'${String(item.w || '').replace(/'/g, "\\'")}','${String(answer.w || '').replace(/'/g, "\\'")}')">
          <div style="font-size:40px;">${word_to_emoji(item.w)}</div>
          <div style="margin-top:6px;font-size:20px;font-weight:700;">${item.w || ''}</div>
          <div style="margin-top:4px;font-size:13px;color:#c0d5f1;">${item.zh || ''}</div>
        </button>
      `).join('')}
    </div>`;
}

function check_choice(button, chosen, correct) {
  document.querySelectorAll('.opt_btn').forEach((item) => { item.onclick = null; });
  if (chosen === correct) {
    button.classList.add('correct');
    add_star(1);
    setTimeout(next_stage, 1000);
  } else {
    button.classList.add('wrong');
    document.querySelectorAll('.opt_btn').forEach((item) => {
      if (item.textContent.toLowerCase().includes(String(correct).toLowerCase())) item.classList.add('correct');
    });
    setTimeout(next_stage, 1400);
  }
}

function render_drag_match() {
  const pair_list = shuffle(vocab_pool).slice(0, 3);
  drag_matched = 0;
  document.getElementById('stage_area').innerHTML = `
    <div class="stage_title">✋ 拖一拖，单词配图片</div>
    <div class="drag_area">
      <div class="drag_words">
        ${shuffle(pair_list).map((item) => `
          <div class="drag_item" draggable="true" data-word="${item.w}" ondragstart="drag_start(event,'${item.w}')">
            ${item.w}
          </div>
        `).join('')}
      </div>
      <div class="drop_zones">
        ${pair_list.map((item) => `
          <div class="drop_zone"
               data-target="${item.w}"
               ondragover="event.preventDefault()"
               ondrop="drag_drop(event,'${item.w}')">
            ${word_to_emoji(item.w)}
          </div>
        `).join('')}
      </div>
    </div>
    <div style="text-align:center;margin-top:10px;color:#bcd8f4;font-size:14px;">把左侧单词拖到右侧正确图标</div>`;
}

function drag_start(event, word) {
  event.dataTransfer.setData('word', word);
}

function drag_drop(event, target) {
  event.preventDefault();
  const zone = event.currentTarget;
  if (zone.classList.contains('matched')) return;
  const word = event.dataTransfer.getData('word');
  if (word !== target) return;
  zone.classList.add('matched');
  zone.innerHTML = `${word_to_emoji(target)}<br><span style="font-size:13px;">${target}</span>`;
  const source = document.querySelector(`.drag_item[data-word="${word}"]`);
  if (source) source.remove();
  drag_matched += 1;
  add_star(1);
  if (drag_matched >= 3) setTimeout(next_stage, 800);
}

function render_phrase_quiz() {
  const usable = phrase_pool.length >= 4 ? phrase_pool : [...phrase_pool, ...phrase_pool].slice(0, 4);
  const answer = usable[Math.floor(Math.random() * usable.length)];
  const options = shuffle([answer, ...shuffle(usable.filter((item) => item.en !== answer.en)).slice(0, 3)]);
  speak_en(answer.en);
  document.getElementById('stage_area').innerHTML = `
    <div class="stage_title">🧠 选出这句话的中文意思</div>
    <div style="text-align:center;color:#f4f8ff;font-size:24px;font-weight:700;">${answer.en}</div>
    <div style="text-align:center;margin-top:8px;">
      <button class="play_btn" onclick="speak_en('${String(answer.en || '').replace(/'/g, "\\'")}')">🔊 读句子</button>
    </div>
    <div class="options_grid">
      ${options.map((item) => `
        <button class="opt_btn" onclick="check_phrase(this,'${String(item.zh || '').replace(/'/g, "\\'")}','${String(answer.zh || '').replace(/'/g, "\\'")}')">
          ${item.zh || '(暂无中文释义)'}
        </button>
      `).join('')}
    </div>`;
}

function check_phrase(button, chosen, correct) {
  document.querySelectorAll('.opt_btn').forEach((item) => { item.onclick = null; });
  if (chosen === correct) {
    button.classList.add('correct');
    add_star(1);
  } else {
    button.classList.add('wrong');
    document.querySelectorAll('.opt_btn').forEach((item) => {
      if (item.textContent.trim() === correct) item.classList.add('correct');
    });
  }
  setTimeout(next_stage, 1200);
}

function render_finish() {
  const max_star = 5;
  const shown_star = Math.min(stars, max_star);
  const star_row = '⭐'.repeat(shown_star) + '☆'.repeat(max_star - shown_star);
  document.getElementById('stage_area').innerHTML = `
    <div class="finish_page">
      <div class="big_stars">${star_row}</div>
      <div class="finish_msg">太棒了！你获得 ${stars} 颗星</div>
      <div class="finish_tip">${stars >= 4 ? '表现超级棒，继续下一本吧！' : '已经很不错，再玩一次会更强！'}</div>
      <div class="finish_links">
        <button class="action_btn" onclick="location.href='../../index.html'">🏠 回到首页</button>
        <button class="action_btn" style="background:#65a7e8;" onclick="location.reload()">🔄 再玩一次</button>
        <button class="action_btn" style="background:#66d6af;" onclick="location.href=reader_url">📖 返回阅读</button>
      </div>
    </div>`;
}

const stages = [render_intro, render_listen_select, render_drag_match, render_phrase_quiz, render_finish];

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

if (vocab_pool.length < 2) {
  document.getElementById('stage_area').innerHTML = `
    <div class="finish_page">
      <div class="finish_msg">当前故事词汇数据不足，先去阅读页学习吧</div>
      <div class="finish_links">
        <button class="action_btn" onclick="location.href=reader_url">📖 返回阅读</button>
        <button class="action_btn" onclick="location.href='../../index.html'">🏠 回到首页</button>
      </div>
    </div>`;
} else {
  stages[0]();
}
</script>
</body>
</html>
