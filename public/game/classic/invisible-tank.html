<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invisible Tank Mission — 游戏版</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Nunito','PingFang SC','Microsoft YaHei',sans-serif;
    background:#1a1a2e;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    padding:12px;
  }
  .starfield { position:fixed; inset:0; pointer-events:none; }
  .game_card {
    position:relative;
    z-index:1;
    width:100%;
    max-width:760px;
    background:#16213e;
    border:2px solid #0f3460;
    border-radius:24px;
    padding:20px;
    box-shadow:0 16px 36px rgba(0,0,0,.28);
  }
  .top_bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:8px; }
  .unit_title { color:#f4c778; font-size:17px; font-weight:700; }
  .star_display { color:#ffd166; font-size:24px; font-weight:800; }
  .stage_title { color:#a8e6cf; font-size:22px; text-align:center; margin-bottom:14px; }
  .options_grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; margin-top:12px; }
  .opt_btn {
    border:2px solid #1f5187;
    border-radius:14px;
    background:#10365f;
    color:#f2f7ff;
    padding:14px 10px;
    font-size:18px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .opt_btn:hover { transform:translateY(-1px); border-color:#e2b96f; }
  .opt_btn.correct { background:#2ecc71; border-color:#28a85e; color:#fff; }
  .opt_btn.wrong { background:#e74c3c; border-color:#bf3a2f; color:#fff; }
  .play_btn {
    border:none;
    background:#3e8ed8;
    color:#fff;
    border-radius:999px;
    padding:10px 16px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
  }
  .drag_area { display:flex; justify-content:center; align-items:flex-start; gap:14px; margin-top:12px; flex-wrap:wrap; }
  .drag_words { display:flex; flex-direction:column; gap:10px; width:45%; min-width:220px; }
  .drag_item {
    background:#10365f;
    color:#f2f7ff;
    border:2px solid transparent;
    border-radius:12px;
    padding:10px 12px;
    font-size:18px;
    cursor:grab;
  }
  .drag_item:hover { border-color:#f1be67; }
  .drop_zones { display:flex; flex-direction:column; gap:10px; width:45%; min-width:220px; }
  .drop_zone {
    background:#102944;
    border:2px dashed #36689e;
    border-radius:12px;
    min-height:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#cde0f5;
    font-size:16px;
    text-align:center;
    padding:8px;
  }
  .drop_zone.matched { border-color:#2ecc71; background:#124931; color:#eafff5; }
  .story_intro { text-align:center; }
  .story_intro img {
    width:100%;
    max-width:260px;
    border-radius:14px;
    margin:10px auto;
    display:block;
    background:#f4f4f4;
    aspect-ratio:4/3;
    object-fit:cover;
  }
  .story_intro p { color:#dce7f5; line-height:1.65; font-size:16px; margin:8px auto; max-width:620px; }
  .action_btn {
    border:none;
    border-radius:999px;
    padding:11px 18px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    margin-top:12px;
    background:#e2b96f;
    color:#1d2233;
  }
  .finish_page { text-align:center; }
  .big_stars { font-size:52px; letter-spacing:6px; }
  .finish_msg { margin-top:10px; color:#c6ffe6; font-size:22px; }
  .finish_tip { margin-top:8px; color:#dbebfd; font-size:15px; }
  .finish_links { display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin-top:14px; }
  @keyframes star_pop {
    0% { transform:scale(0.2); opacity:0.2; }
    60% { transform:scale(1.18); opacity:1; }
    100% { transform:scale(1); opacity:1; }
  }
  .star_pop { animation:star_pop .35s ease-out; }
</style>
</head>
<body>
<canvas class="starfield" id="starCanvas"></canvas>
<div class="game_card">
  <div class="top_bar">
    <div class="unit_title">Invisible Tank Mission</div>
    <div class="star_display"><span id="star_count">⭐ 0</span></div>
  </div>
  <div id="stage_area"></div>
</div>

<script>
const STORY = {"id": "invisible-tank", "title": "Invisible Tank Mission", "titleZh": "隐身战车奇袭", "category": "我的世界", "cover": "images/covers/cover-invisible-tank.jpg", "pages": [{"img": "images/invisible-tank/page-1.jpg", "en": "A mysterious black tank that can turn invisible, ready for a secret mission.", "zh": "一辆神秘的黑色坦克，可以变得完全透明，准备执行秘密任务。", "keys": [{"w": "mysterious", "p": "/mɪˈstɪriəs/", "zh": "神秘的"}], "phrases": [{"en": "mysterious black tank", "zh": "神秘的黑色坦克"}]}, {"img": "images/invisible-tank/page-2.jpg", "en": "Sneaky enemy trucks steal the glowing energy crystals hidden on the mountain top.", "zh": "偷偷摸摸的敌人卡车把藏在山顶的发光能量水晶偷走了！", "keys": [{"w": "sneaky", "p": "/ˈsniːki/", "zh": "鬼鬼祟祟的"}], "phrases": [{"en": "sneaky enemy trucks", "zh": "偷偷摸摸的敌人卡车"}]}, {"img": "images/invisible-tank/page-3.jpg", "en": "The kid presses the glowing blue button — whoosh! The tank becomes completely invisible!", "zh": "小孩按下发光的蓝色按钮——嗖！坦克变得完全透明了！", "keys": [{"w": "press", "p": "/pres/", "zh": "按下"}], "phrases": [{"en": "glowing blue button", "zh": "发光的蓝色按钮"}]}, {"img": "images/invisible-tank/page-4.jpg", "en": "The invisible tank follows the enemy convoy silently, not even the guard dogs notice it.", "zh": "隐身坦克悄悄跟在敌人车队后面，连敌人的侦查狗都没发现。", "keys": [{"w": "follows", "p": "/ˈfɑːloʊz/", "zh": "跟随"}], "phrases": [{"en": "follows the enemy convoy silently", "zh": "悄悄跟着敌人车队"}]}, {"img": "images/invisible-tank/page-5.jpg", "en": "The invisible tank reaches the enemy camp. There are guards everywhere and tall watchtowers!", "zh": "隐身坦克到达敌人营地。到处都是卫兵和高高的瞭望塔！", "keys": [{"w": "reaches", "p": "/ˈriːtʃɪz/", "zh": "到达"}], "phrases": [{"en": "reaches the enemy camp", "zh": "到达敌人营地"}]}, {"img": "images/invisible-tank/page-6.jpg", "en": "Twenty fake tanks appear around the enemy camp and the soldiers panic in confusion!", "zh": "敌人营地周围突然出现了二十辆一模一样的幻影坦克，士兵们吓得四处张望！", "keys": [{"w": "fake", "p": "/feɪk/", "zh": "假的"}], "phrases": [{"en": "appear around the enemy camp", "zh": "出现在敌人营地周围"}]}, {"img": "images/invisible-tank/page-7.jpg", "en": "Tiny fly-sized cameras zip over to the enemy tanks and send back live video to the kid's screen.", "zh": "像苍蝇一样小的微型摄像头飞到敌人坦克上，把画面传回屏幕。", "keys": [{"w": "tiny", "p": "/ˈtaɪni/", "zh": "极小的"}], "phrases": [{"en": "fly-sized cameras", "zh": "像苍蝇一样小的摄像头"}]}, {"img": "images/invisible-tank/page-8.jpg", "en": "The kid throws a special dart that flies straight into the enemy truck's energy core!", "zh": "小孩投出飞镖，精准命中敌人卡车的能量核心！", "keys": [{"w": "special", "p": "/ˈspeʃl/", "zh": "特殊的"}], "phrases": [{"en": "throws a special dart", "zh": "投出一枚特殊飞镖"}]}, {"img": "images/invisible-tank/page-9.jpg", "en": "The dart hits the core — BOOM! The enemy truck's power shuts down completely!", "zh": "飞镖命中核心——轰！敌人卡车的动力彻底熄火了！", "keys": [{"w": "hits", "p": "/hɪts/", "zh": "击中"}], "phrases": [{"en": "hits the core", "zh": "击中核心"}]}, {"img": "images/invisible-tank/page-10.jpg", "en": "A magnetic claw reaches out and zips the crystal boxes right into the invisible tank.", "zh": "磁力抓取爪伸出，嗖地一下把能量水晶吸了过来！", "keys": [{"w": "magnetic", "p": "/mæɡˈnetɪk/", "zh": "磁性的"}], "phrases": [{"en": "A magnetic claw reaches out", "zh": "一只磁力爪伸出来"}]}, {"img": "images/invisible-tank/page-11.jpg", "en": "The magnetic claw grabs the second crystal too! Two down, one to go!", "zh": "磁力爪又抓到了第二个水晶！两个到手，还差一个！", "keys": [{"w": "grabs", "p": "/ɡræbz/", "zh": "抓住"}], "phrases": [{"en": "grabs the second crystal", "zh": "抓住第二个水晶"}]}, {"img": "images/invisible-tank/page-12.jpg", "en": "The last enemy truck spots the floating crystals and sounds the alarm! WHEE-OOH WHEE-OOH!", "zh": "最后一辆敌人卡车发现了飘浮的水晶，拉响了警报！呜——呜——！", "keys": [{"w": "enemy", "p": "/ˈenəmi/", "zh": "敌人"}], "phrases": [{"en": "spots the floating crystals", "zh": "发现漂浮的水晶"}]}, {"img": "images/invisible-tank/page-13.jpg", "en": "The enemy truck chases the invisible tank through the forest at full speed!", "zh": "敌人卡车全速追赶隐身坦克，在森林里疯狂穿梭！", "keys": [{"w": "chases", "p": "/ˈtʃeɪsɪz/", "zh": "追赶"}], "phrases": [{"en": "chases the invisible tank", "zh": "追赶隐身坦克"}]}, {"img": "images/invisible-tank/page-14.jpg", "en": "An explosion sends Doubao the robot flying higher than the whole galaxy!", "zh": "一阵爆炸把豆包炸飞了，豆包飞得比银河系还高！", "keys": [{"w": "explosion", "p": "/ɪkˈspləʊʒən/", "zh": "爆炸"}], "phrases": [{"en": "An explosion sends Doubao flying", "zh": "一场爆炸把豆包炸飞了"}]}, {"img": "images/invisible-tank/page-15.jpg", "en": "Doubao falls back down like a shooting star, yelling all the way!", "zh": "豆包像流星一样落下来，一路尖叫！", "keys": [{"w": "falls", "p": "/fɔːlz/", "zh": "掉落"}], "phrases": [{"en": "falls back down like a shooting star", "zh": "像流星一样落下来"}]}, {"img": "images/invisible-tank/page-16.jpg", "en": "Doubao lands on the ground with a big BUMP and says 'Ouch, my bottom hurts!'", "zh": "豆包砰地坐到地上，哎呀，屁股好疼啊，摔了个屁股蹲！", "keys": [{"w": "lands", "p": "/lændz/", "zh": "着地"}], "phrases": [{"en": "lands on the ground with a big BUMP", "zh": "砰地坐到地上"}]}, {"img": "images/invisible-tank/page-17.jpg", "en": "Doubao accidentally falls right in front of the enemy truck! The truck screeches to a halt!", "zh": "豆包正好摔在敌人卡车前面！卡车急刹车停了下来！", "keys": [{"w": "accidentally", "p": "/ˌæksɪˈdentəli/", "zh": "意外地"}], "phrases": [{"en": "accidentally falls right in front of the enemy truck", "zh": "正好摔在敌人卡车前面"}]}, {"img": "images/invisible-tank/page-18.jpg", "en": "While the truck is stopped, the magnetic claw quickly grabs the last crystal!", "zh": "趁卡车停下，磁力爪迅速抓走了最后一个水晶！", "keys": [{"w": "stopped", "p": "/stɒpt/", "zh": "停下的"}], "phrases": [{"en": "while the truck is stopped", "zh": "趁卡车停下"}]}, {"img": "images/invisible-tank/page-19.jpg", "en": "Doubao has a bouncy bottom pad and springs right back up, ready to keep fighting!", "zh": "豆包有弹性缓冲垫，一下子就弹了起来，继续战斗！", "keys": [{"w": "bouncy", "p": "/ˈbaʊnsi/", "zh": "有弹性的"}], "phrases": [{"en": "has a bouncy bottom pad", "zh": "有弹性缓冲垫"}]}, {"img": "images/invisible-tank/page-20.jpg", "en": "The invisible tank activates full stealth and vanishes completely! The enemy trucks can't find it!", "zh": "隐身坦克开启全隐身模式，彻底消失！敌人卡车找不到它了！", "keys": [{"w": "activates", "p": "/ˈæktɪveɪts/", "zh": "启动"}], "phrases": [{"en": "activates full stealth", "zh": "开启全隐身模式"}]}, {"img": "images/invisible-tank/page-21.jpg", "en": "The invisible tank carries the crystals home safely, with Doubao riding on top as a lookout.", "zh": "隐身坦克带着水晶安全回到基地，豆包坐在坦克顶上当侦查员。", "keys": [{"w": "carries", "p": "/ˈkæriz/", "zh": "运送"}], "phrases": [{"en": "carries the crystals home safely", "zh": "安全地把水晶带回基地"}]}]};
const reader_url = '../../reader/classic/invisible-tank.html';
let stars = 0;
let stage_index = 0;
let drag_matched = 0;

const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
for (let i = 0; i < 120; i += 1) {
  ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.6 + 0.1})`;
  ctx.beginPath();
  ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 1.5 + 0.5, 0, Math.PI * 2);
  ctx.fill();
}

function get_asset_src(raw_path) {
  const path_text = String(raw_path || '').trim();
  if (!path_text) return '';
  if (path_text.startsWith('http://') || path_text.startsWith('https://')) return path_text;
  if (path_text.startsWith('images/')) return '../../' + path_text;
  return '../../images/' + path_text.replace(/^\/+/, '');
}

function shuffle(array_data) {
  const list = [...array_data];
  for (let i = list.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    const temp = list[i];
    list[i] = list[j];
    list[j] = temp;
  }
  return list;
}

function normalize_word(raw_text) {
  return String(raw_text || '').toLowerCase().replace(/[^a-z0-9'-]/g, '');
}

function fallback_vocab() {
  const map = new Map();
  (STORY.pages || []).forEach((page) => {
    (page.keys || []).forEach((item) => {
      const key_text = normalize_word(item.w);
      if (key_text && !map.has(key_text)) map.set(key_text, item);
    });
  });
  if (map.size === 0) {
    (STORY.pages || []).forEach((page) => {
      String(page.en || '').split(/\s+/).forEach((word) => {
        const key_text = normalize_word(word);
        if (key_text.length >= 3 && !map.has(key_text)) {
          map.set(key_text, { w: key_text, p: '', zh: '' });
        }
      });
    });
  }
  return [...map.values()].slice(0, 8);
}

function fallback_phrases() {
  const phrases = [];
  (STORY.pages || []).forEach((page) => {
    (page.phrases || []).forEach((item) => {
      if (item.en) phrases.push(item);
    });
  });
  if (phrases.length) return phrases.slice(0, 8);
  return (STORY.pages || []).slice(0, 8).map((page) => {
    const text = String(page.en || '');
    const short_text = text.split(/[.!?]/)[0].trim();
    return { en: short_text, zh: page.zh || '' };
  }).filter((item) => item.en);
}

const vocab_pool = (STORY.unitVocab && STORY.unitVocab.length ? STORY.unitVocab : fallback_vocab()).slice(0, 8);
const phrase_pool = fallback_phrases();

function add_star(amount = 1) {
  stars += amount;
  const el = document.getElementById('star_count');
  el.textContent = `⭐ ${stars}`;
  el.classList.remove('star_pop');
  void el.offsetWidth;
  el.classList.add('star_pop');
}

function speak_en(text_value) {
  if (!text_value) return;
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(String(text_value));
  utterance.lang = 'en-US';
  utterance.rate = 0.84;
  speechSynthesis.speak(utterance);
}

function word_to_emoji(word_text) {
  const map = {
    car:'🚗', duck:'🦆', ball:'⚽', frog:'🐸', rabbit:'🐰', cat:'🐱', dog:'🐶', bird:'🐦', fish:'🐟', tree:'🌳',
    apple:'🍎', book:'📚', pen:'✏️', bag:'👜', hat:'🎩', red:'🔴', yellow:'🟡', blue:'🔵', green:'🟢', pink:'🩷',
    airplane:'✈️', plane:'✈️', sky:'☁️', sword:'🗡️', dragon:'🐉', village:'🏠', hero:'🦸', river:'🌊', mountain:'⛰️'
  };
  return map[normalize_word(word_text)] || '🧩';
}

function next_stage() {
  stage_index += 1;
  if (stage_index < stages.length) stages[stage_index]();
}

function render_intro() {
  document.getElementById('stage_area').innerHTML = `
    <div class="story_intro">
      <div class="stage_title">🎮 Invisible Tank Mission</div>
      <img src="${get_asset_src(STORY.cover)}" alt="cover" onerror="this.style.objectFit='contain';this.style.background='#eee';">
      <p>读完《隐身战车奇袭》后，通过小游戏巩固单词和词组吧！</p>
      <button class="action_btn" onclick="next_stage()">开始游戏 →</button>
    </div>`;
}

function render_listen_select() {
  const quiz_pool = vocab_pool.length >= 4 ? vocab_pool : [...vocab_pool, ...vocab_pool].slice(0, 4);
  const answer = quiz_pool[Math.floor(Math.random() * quiz_pool.length)];
  const options = shuffle([answer, ...shuffle(quiz_pool.filter((v) => v.w !== answer.w)).slice(0, 3)]);
  speak_en(answer.w);
  document.getElementById('stage_area').innerHTML = `
    <div class="stage_title">🎧 听一听，选出正确单词</div>
    <div style="text-align:center;">
      <button class="play_btn" onclick="speak_en('${String(answer.w || '').replace(/'/g, "\\'")}')">🔊 再听一次</button>
    </div>
    <div class="options_grid">
      ${options.map((item) => `
        <button class="opt_btn" onclick="check_choice(this,'${String(item.w || '').replace(/'/g, "\\'")}','${String(answer.w || '').replace(/'/g, "\\'")}')">
          <div style="font-size:40px;">${word_to_emoji(item.w)}</div>
          <div style="margin-top:6px;font-size:20px;font-weight:700;">${item.w || ''}</div>
          <div style="margin-top:4px;font-size:13px;color:#c0d5f1;">${item.zh || ''}</div>
        </button>
      `).join('')}
    </div>`;
}

function check_choice(button, chosen, correct) {
  document.querySelectorAll('.opt_btn').forEach((item) => { item.onclick = null; });
  if (chosen === correct) {
    button.classList.add('correct');
    add_star(1);
    setTimeout(next_stage, 1000);
  } else {
    button.classList.add('wrong');
    document.querySelectorAll('.opt_btn').forEach((item) => {
      if (item.textContent.toLowerCase().includes(String(correct).toLowerCase())) item.classList.add('correct');
    });
    setTimeout(next_stage, 1400);
  }
}

function render_drag_match() {
  const pair_list = shuffle(vocab_pool).slice(0, 3);
  drag_matched = 0;
  document.getElementById('stage_area').innerHTML = `
    <div class="stage_title">✋ 拖一拖，单词配图片</div>
    <div class="drag_area">
      <div class="drag_words">
        ${shuffle(pair_list).map((item) => `
          <div class="drag_item" draggable="true" data-word="${item.w}" ondragstart="drag_start(event,'${item.w}')">
            ${item.w}
          </div>
        `).join('')}
      </div>
      <div class="drop_zones">
        ${pair_list.map((item) => `
          <div class="drop_zone"
               data-target="${item.w}"
               ondragover="event.preventDefault()"
               ondrop="drag_drop(event,'${item.w}')">
            ${word_to_emoji(item.w)}
          </div>
        `).join('')}
      </div>
    </div>
    <div style="text-align:center;margin-top:10px;color:#bcd8f4;font-size:14px;">把左侧单词拖到右侧正确图标</div>`;
}

function drag_start(event, word) {
  event.dataTransfer.setData('word', word);
}

function drag_drop(event, target) {
  event.preventDefault();
  const zone = event.currentTarget;
  if (zone.classList.contains('matched')) return;
  const word = event.dataTransfer.getData('word');
  if (word !== target) return;
  zone.classList.add('matched');
  zone.innerHTML = `${word_to_emoji(target)}<br><span style="font-size:13px;">${target}</span>`;
  const source = document.querySelector(`.drag_item[data-word="${word}"]`);
  if (source) source.remove();
  drag_matched += 1;
  add_star(1);
  if (drag_matched >= 3) setTimeout(next_stage, 800);
}

function render_phrase_quiz() {
  const usable = phrase_pool.length >= 4 ? phrase_pool : [...phrase_pool, ...phrase_pool].slice(0, 4);
  const answer = usable[Math.floor(Math.random() * usable.length)];
  const options = shuffle([answer, ...shuffle(usable.filter((item) => item.en !== answer.en)).slice(0, 3)]);
  speak_en(answer.en);
  document.getElementById('stage_area').innerHTML = `
    <div class="stage_title">🧠 选出这句话的中文意思</div>
    <div style="text-align:center;color:#f4f8ff;font-size:24px;font-weight:700;">${answer.en}</div>
    <div style="text-align:center;margin-top:8px;">
      <button class="play_btn" onclick="speak_en('${String(answer.en || '').replace(/'/g, "\\'")}')">🔊 读句子</button>
    </div>
    <div class="options_grid">
      ${options.map((item) => `
        <button class="opt_btn" onclick="check_phrase(this,'${String(item.zh || '').replace(/'/g, "\\'")}','${String(answer.zh || '').replace(/'/g, "\\'")}')">
          ${item.zh || '(暂无中文释义)'}
        </button>
      `).join('')}
    </div>`;
}

function check_phrase(button, chosen, correct) {
  document.querySelectorAll('.opt_btn').forEach((item) => { item.onclick = null; });
  if (chosen === correct) {
    button.classList.add('correct');
    add_star(1);
  } else {
    button.classList.add('wrong');
    document.querySelectorAll('.opt_btn').forEach((item) => {
      if (item.textContent.trim() === correct) item.classList.add('correct');
    });
  }
  setTimeout(next_stage, 1200);
}

function render_finish() {
  const max_star = 5;
  const shown_star = Math.min(stars, max_star);
  const star_row = '⭐'.repeat(shown_star) + '☆'.repeat(max_star - shown_star);
  document.getElementById('stage_area').innerHTML = `
    <div class="finish_page">
      <div class="big_stars">${star_row}</div>
      <div class="finish_msg">太棒了！你获得 ${stars} 颗星</div>
      <div class="finish_tip">${stars >= 4 ? '表现超级棒，继续下一本吧！' : '已经很不错，再玩一次会更强！'}</div>
      <div class="finish_links">
        <button class="action_btn" onclick="location.href='../../index.html'">🏠 回到首页</button>
        <button class="action_btn" style="background:#65a7e8;" onclick="location.reload()">🔄 再玩一次</button>
        <button class="action_btn" style="background:#66d6af;" onclick="location.href=reader_url">📖 返回阅读</button>
      </div>
    </div>`;
}

const stages = [render_intro, render_listen_select, render_drag_match, render_phrase_quiz, render_finish];

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

if (vocab_pool.length < 2) {
  document.getElementById('stage_area').innerHTML = `
    <div class="finish_page">
      <div class="finish_msg">当前故事词汇数据不足，先去阅读页学习吧</div>
      <div class="finish_links">
        <button class="action_btn" onclick="location.href=reader_url">📖 返回阅读</button>
        <button class="action_btn" onclick="location.href='../../index.html'">🏠 回到首页</button>
      </div>
    </div>`;
} else {
  stages[0]();
}
</script>
</body>
</html>
