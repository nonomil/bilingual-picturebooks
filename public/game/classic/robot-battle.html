<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chore Robot Battle — 游戏版</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Nunito','PingFang SC','Microsoft YaHei',sans-serif;
    background:#1a1a2e;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    padding:12px;
  }
  .starfield { position:fixed; inset:0; pointer-events:none; }
  .game_card {
    position:relative;
    z-index:1;
    width:100%;
    max-width:760px;
    background:#16213e;
    border:2px solid #0f3460;
    border-radius:24px;
    padding:20px;
    box-shadow:0 16px 36px rgba(0,0,0,.28);
  }
  .top_bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:8px; }
  .unit_title { color:#f4c778; font-size:17px; font-weight:700; }
  .star_display { color:#ffd166; font-size:24px; font-weight:800; }
  .stage_title { color:#a8e6cf; font-size:22px; text-align:center; margin-bottom:14px; }
  .options_grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; margin-top:12px; }
  .opt_btn {
    border:2px solid #1f5187;
    border-radius:14px;
    background:#10365f;
    color:#f2f7ff;
    padding:14px 10px;
    font-size:18px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .opt_btn:hover { transform:translateY(-1px); border-color:#e2b96f; }
  .opt_btn.correct { background:#2ecc71; border-color:#28a85e; color:#fff; }
  .opt_btn.wrong { background:#e74c3c; border-color:#bf3a2f; color:#fff; }
  .play_btn {
    border:none;
    background:#3e8ed8;
    color:#fff;
    border-radius:999px;
    padding:10px 16px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
  }
  .drag_area { display:flex; justify-content:center; align-items:flex-start; gap:14px; margin-top:12px; flex-wrap:wrap; }
  .drag_words { display:flex; flex-direction:column; gap:10px; width:45%; min-width:220px; }
  .drag_item {
    background:#10365f;
    color:#f2f7ff;
    border:2px solid transparent;
    border-radius:12px;
    padding:10px 12px;
    font-size:18px;
    cursor:grab;
  }
  .drag_item:hover { border-color:#f1be67; }
  .drop_zones { display:flex; flex-direction:column; gap:10px; width:45%; min-width:220px; }
  .drop_zone {
    background:#102944;
    border:2px dashed #36689e;
    border-radius:12px;
    min-height:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#cde0f5;
    font-size:16px;
    text-align:center;
    padding:8px;
  }
  .drop_zone.matched { border-color:#2ecc71; background:#124931; color:#eafff5; }
  .story_intro { text-align:center; }
  .story_intro img {
    width:100%;
    max-width:260px;
    border-radius:14px;
    margin:10px auto;
    display:block;
    background:#f4f4f4;
    aspect-ratio:4/3;
    object-fit:cover;
  }
  .story_intro p { color:#dce7f5; line-height:1.65; font-size:16px; margin:8px auto; max-width:620px; }
  .action_btn {
    border:none;
    border-radius:999px;
    padding:11px 18px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    margin-top:12px;
    background:#e2b96f;
    color:#1d2233;
  }
  .finish_page { text-align:center; }
  .big_stars { font-size:52px; letter-spacing:6px; }
  .finish_msg { margin-top:10px; color:#c6ffe6; font-size:22px; }
  .finish_tip { margin-top:8px; color:#dbebfd; font-size:15px; }
  .finish_links { display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin-top:14px; }
  @keyframes star_pop {
    0% { transform:scale(0.2); opacity:0.2; }
    60% { transform:scale(1.18); opacity:1; }
    100% { transform:scale(1); opacity:1; }
  }
  .star_pop { animation:star_pop .35s ease-out; }
</style>
</head>
<body>
<canvas class="starfield" id="starCanvas"></canvas>
<div class="game_card">
  <div class="top_bar">
    <div class="unit_title">Chore Robot Battle</div>
    <div class="star_display"><span id="star_count">⭐ 0</span></div>
  </div>
  <div id="stage_area"></div>
</div>

<script>
const STORY = {"id": "robot-battle", "title": "Chore Robot Battle", "titleZh": "家务机器人大战", "category": "原创", "cover": "images/covers/cover-robot-battle.jpg", "pages": [{"img": "images/robot-battle/page-2.jpg", "en": "Doudou and Doubao's Great Chore Robot Battle", "zh": "豆豆和豆包的家务机器人大战 | Doudou and Doubao's Great Chore Robot Battle", "keys": [{"w": "chore", "p": "/tʃɔːr/", "zh": "家务"}], "phrases": [{"en": "great chore robot battle", "zh": "家务机器人大战"}]}, {"img": "images/robot-battle/page-3.jpg", "en": "This is the story of a little boy named Doudou and his round robot friend Doubao.", "zh": "这是关于小男孩豆豆和他的圆滚滚机器人朋友豆包的故事。", "keys": [{"w": "chore", "p": "/tʃɔːr/", "zh": "家务"}], "phrases": [{"en": "little boy named Doudou", "zh": "名叫豆豆的小男孩"}]}, {"img": "images/robot-battle/page-4.jpg", "en": "\"Today we're playing the Great Chore Battle!\" Doudou announced excitedly.", "zh": "\"今天我们来玩家务大战！\"豆豆兴奋地宣布。", "keys": [{"w": "announce", "p": "/əˈnaʊns/", "zh": "宣布"}], "phrases": [{"en": "playing the Great Chore Battle", "zh": "玩家庭杂务大战"}]}, {"img": "images/robot-battle/page-5.jpg", "en": "\"Behold my Stinky Shield!\" Doudou raised a shield glowing with green light.", "zh": "\"看我的臭臭护盾！\"豆豆举起一面发着绿色光芒的盾牌。", "keys": [{"w": "shield", "p": "/ʃiːld/", "zh": "盾牌"}], "phrases": [{"en": "Behold my Stinky Shield", "zh": "看我的臭臭护盾"}]}, {"img": "images/robot-battle/page-6.jpg", "en": "\"I choose the Bubble Gun! Bang bang bang!\" Countless colorful bubbles flew toward Doudou.", "zh": "\"我选泡泡枪！砰砰砰！\"无数彩色泡泡飞向豆豆。", "keys": [{"w": "bubble", "p": "/ˈbʌbl/", "zh": "泡泡"}], "phrases": [{"en": "I choose the Bubble Gun", "zh": "我选泡泡枪"}]}, {"img": "images/robot-battle/page-7.jpg", "en": "\"My Stinky Bombs already turned you into a stinker!\" Doudou laughed triumphantly.", "zh": "\"我的臭臭炮弹早就把你打成臭臭了！\"豆豆得意地大笑。", "keys": [{"w": "bomb", "p": "/bɑːm/", "zh": "炸弹"}], "phrases": [{"en": "My Stinky Bombs", "zh": "我的臭臭炮弹"}]}, {"img": "images/robot-battle/page-8.jpg", "en": "\"Soap Attack! Scrub scrub scrub! All clean!\" Doudou washed Doubao squeaky clean.", "zh": "\"肥皂武装！擦呀擦！洗完啦！\"豆豆用巨大的肥皂把豆包洗得干干净净。", "keys": [{"w": "scrub", "p": "/skrʌb/", "zh": "擦洗"}], "phrases": [{"en": "Soap Attack", "zh": "肥皂攻击"}]}, {"img": "images/robot-battle/page-9.jpg", "en": "\"My Robot Vacuum Tank is here!\" Mechanical arms stretched out, sweeping everywhere.", "zh": "\"我的扫地机器人战车来啦！\"机械臂伸出，四处清扫。", "keys": [{"w": "vacuum", "p": "/ˈvækjuːm/", "zh": "吸尘器"}], "phrases": [{"en": "Robot Vacuum Tank", "zh": "扫地机器人战车"}]}, {"img": "images/robot-battle/page-10.jpg", "en": "\"Robot Vacuum enters Angry Mode!\" The battle grew more and more intense.", "zh": "\"扫地机器人进入愤怒模式！\"对战越来越激烈。", "keys": [{"w": "intense", "p": "/ɪnˈtens/", "zh": "激烈的"}], "phrases": [{"en": "enters Angry Mode", "zh": "进入愤怒模式"}]}, {"img": "images/robot-battle/page-11.jpg", "en": "\"Look at my Flying Shield! Tracking bullets, right through Doubao's tank!\"", "zh": "\"看我的飞翔盾牌！追踪子弹，穿过豆包的坦克！\"", "keys": [{"w": "ultimate", "p": "/ˈʌltɪmət/", "zh": "终极的"}], "phrases": [{"en": "my Flying Shield", "zh": "我的飞翔盾牌"}]}, {"img": "images/robot-battle/page-12.jpg", "en": "\"Okay okay, you win this time!\" Doubao laughed. \"Let's still be best friends!\"", "zh": "\"好吧好吧，这次算你厉害！\"豆包笑着说。\"那我们还是做好朋友吧！\"", "keys": [{"w": "sparkle", "p": "/ˈspɑːrkl/", "zh": "闪耀"}], "phrases": [{"en": "you win this time", "zh": "这次你赢了"}]}, {"img": "images/robot-battle/page-13.jpg", "en": "A loud crash came from the kitchen! \"Oh no! Mom said we need to bake a cake today!\"", "zh": "厨房传来一声巨响！\"完了完了，妈妈说今天要做蛋糕！\"", "keys": [{"w": "crash", "p": "/kræʃ/", "zh": "巨响，碰撞声"}], "phrases": [{"en": "a loud crash", "zh": "一声巨响"}]}, {"img": "images/robot-battle/page-14.jpg", "en": "\"Doubao, switch to Kitchen Agent Mode!\" Doudou put on a chef's hat and apron.", "zh": "\"豆包，变成厨房特工模式！\"豆豆戴上厨师帽，系上围裙。", "keys": [{"w": "chef", "p": "/ʃef/", "zh": "厨师"}], "phrases": [{"en": "Kitchen Agent Mode", "zh": "厨房特工模式"}]}, {"img": "images/robot-battle/page-15.jpg", "en": "Doudou accidentally flung the entire bag of flour into the air, like a winter wonderland!", "zh": "豆豆不小心把整袋面粉甩到了空中，像冬天的童话世界！", "keys": [{"w": "flour", "p": "/ˈflaʊər/", "zh": "面粉"}], "phrases": [{"en": "accidentally flung the entire bag of flour into the air", "zh": "不小心把整袋面粉甩到了空中"}]}, {"img": "images/robot-battle/page-16.jpg", "en": "The mixer spun too fast, sending batter flying everywhere like a fountain!", "zh": "搅拌器转得太快了，面糊像喷泉一样飞溅得到处都是！", "keys": [{"w": "mixer", "p": "/ˈmɪksər/", "zh": "搅拌器"}], "phrases": [{"en": "spun too fast", "zh": "转得太快了"}]}, {"img": "images/robot-battle/page-17.jpg", "en": "Doubao secretly added laundry detergent to the batter — giant colorful bubbles started flooding the kitchen!", "zh": "豆包偷偷往面糊里加了洗衣液——巨大的彩色泡泡开始淹没厨房！", "keys": [{"w": "detergent", "p": "/dɪˈtɜːrdʒənt/", "zh": "洗涤剂"}], "phrases": [{"en": "secretly added laundry detergent to the batter", "zh": "偷偷往面糊里加了洗衣液"}]}, {"img": "images/robot-battle/page-18.jpg", "en": "The giant bubbles lifted Doudou and Doubao all the way to the ceiling!", "zh": "巨大的泡泡把豆豆和豆包一直飘到了天花板上！", "keys": [{"w": "lift", "p": "/lɪft/", "zh": "举起，飘起"}], "phrases": [{"en": "giant bubbles", "zh": "巨大的泡泡"}]}, {"img": "images/robot-battle/page-19.jpg", "en": "\"Activate Anti-Bubble System!\" Doubao popped the bubbles one by one for a safe landing.", "zh": "\"启动反泡泡系统！\"豆包一个个戳破了泡泡，安全着陆。", "keys": [{"w": "activate", "p": "/ˈæktɪveɪt/", "zh": "激活"}], "phrases": [{"en": "Activate Anti-Bubble System", "zh": "启动反泡泡系统"}]}, {"img": "images/robot-battle/page-20.jpg", "en": "\"MY KITCHEN!!!\" Mom stood at the door, flames shooting from her eyes!", "zh": "\"我的厨房！！！\"妈妈站在门口，眼睛里冒着火！", "keys": [{"w": "devastated", "p": "/ˈdevəsteɪtɪd/", "zh": "一片狼藉的"}], "phrases": [{"en": "stood at the door", "zh": "站在门口"}]}, {"img": "images/robot-battle/page-20.jpg", "en": "Doubao transformed into a Super Cleaning Robot and polished the kitchen sparkling clean!", "zh": "豆包变成了超级清洁机器人，把厨房打扫得闪闪发亮！", "keys": [{"w": "transform", "p": "/trænsˈfɔːrm/", "zh": "变形，转变"}], "phrases": [{"en": "transformed into a Super Cleaning Robot", "zh": "变成了超级清洁机器人"}]}]};
const reader_url = '../../reader/classic/robot-battle.html';
let stars = 0;
let stage_index = 0;
let drag_matched = 0;

const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
for (let i = 0; i < 120; i += 1) {
  ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.6 + 0.1})`;
  ctx.beginPath();
  ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 1.5 + 0.5, 0, Math.PI * 2);
  ctx.fill();
}

function get_asset_src(raw_path) {
  const path_text = String(raw_path || '').trim();
  if (!path_text) return '';
  if (path_text.startsWith('http://') || path_text.startsWith('https://')) return path_text;
  if (path_text.startsWith('images/')) return '../../' + path_text;
  return '../../images/' + path_text.replace(/^\/+/, '');
}

function shuffle(array_data) {
  const list = [...array_data];
  for (let i = list.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    const temp = list[i];
    list[i] = list[j];
    list[j] = temp;
  }
  return list;
}

function normalize_word(raw_text) {
  return String(raw_text || '').toLowerCase().replace(/[^a-z0-9'-]/g, '');
}

function fallback_vocab() {
  const map = new Map();
  (STORY.pages || []).forEach((page) => {
    (page.keys || []).forEach((item) => {
      const key_text = normalize_word(item.w);
      if (key_text && !map.has(key_text)) map.set(key_text, item);
    });
  });
  if (map.size === 0) {
    (STORY.pages || []).forEach((page) => {
      String(page.en || '').split(/\s+/).forEach((word) => {
        const key_text = normalize_word(word);
        if (key_text.length >= 3 && !map.has(key_text)) {
          map.set(key_text, { w: key_text, p: '', zh: '' });
        }
      });
    });
  }
  return [...map.values()].slice(0, 8);
}

function fallback_phrases() {
  const phrases = [];
  (STORY.pages || []).forEach((page) => {
    (page.phrases || []).forEach((item) => {
      if (item.en) phrases.push(item);
    });
  });
  if (phrases.length) return phrases.slice(0, 8);
  return (STORY.pages || []).slice(0, 8).map((page) => {
    const text = String(page.en || '');
    const short_text = text.split(/[.!?]/)[0].trim();
    return { en: short_text, zh: page.zh || '' };
  }).filter((item) => item.en);
}

const vocab_pool = (STORY.unitVocab && STORY.unitVocab.length ? STORY.unitVocab : fallback_vocab()).slice(0, 8);
const phrase_pool = fallback_phrases();

function add_star(amount = 1) {
  stars += amount;
  const el = document.getElementById('star_count');
  el.textContent = `⭐ ${stars}`;
  el.classList.remove('star_pop');
  void el.offsetWidth;
  el.classList.add('star_pop');
}

function speak_en(text_value) {
  if (!text_value) return;
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(String(text_value));
  utterance.lang = 'en-US';
  utterance.rate = 0.84;
  speechSynthesis.speak(utterance);
}

function word_to_emoji(word_text) {
  const map = {
    car:'🚗', duck:'🦆', ball:'⚽', frog:'🐸', rabbit:'🐰', cat:'🐱', dog:'🐶', bird:'🐦', fish:'🐟', tree:'🌳',
    apple:'🍎', book:'📚', pen:'✏️', bag:'👜', hat:'🎩', red:'🔴', yellow:'🟡', blue:'🔵', green:'🟢', pink:'🩷',
    airplane:'✈️', plane:'✈️', sky:'☁️', sword:'🗡️', dragon:'🐉', village:'🏠', hero:'🦸', river:'🌊', mountain:'⛰️'
  };
  return map[normalize_word(word_text)] || '🧩';
}

function next_stage() {
  stage_index += 1;
  if (stage_index < stages.length) stages[stage_index]();
}

function render_intro() {
  document.getElementById('stage_area').innerHTML = `
    <div class="story_intro">
      <div class="stage_title">🎮 Chore Robot Battle</div>
      <img src="${get_asset_src(STORY.cover)}" alt="cover" onerror="this.style.objectFit='contain';this.style.background='#eee';">
      <p>读完《家务机器人大战》后，通过小游戏巩固单词和词组吧！</p>
      <button class="action_btn" onclick="next_stage()">开始游戏 →</button>
    </div>`;
}

function render_listen_select() {
  const quiz_pool = vocab_pool.length >= 4 ? vocab_pool : [...vocab_pool, ...vocab_pool].slice(0, 4);
  const answer = quiz_pool[Math.floor(Math.random() * quiz_pool.length)];
  const options = shuffle([answer, ...shuffle(quiz_pool.filter((v) => v.w !== answer.w)).slice(0, 3)]);
  speak_en(answer.w);
  document.getElementById('stage_area').innerHTML = `
    <div class="stage_title">🎧 听一听，选出正确单词</div>
    <div style="text-align:center;">
      <button class="play_btn" onclick="speak_en('${String(answer.w || '').replace(/'/g, "\\'")}')">🔊 再听一次</button>
    </div>
    <div class="options_grid">
      ${options.map((item) => `
        <button class="opt_btn" onclick="check_choice(this,'${String(item.w || '').replace(/'/g, "\\'")}','${String(answer.w || '').replace(/'/g, "\\'")}')">
          <div style="font-size:40px;">${word_to_emoji(item.w)}</div>
          <div style="margin-top:6px;font-size:20px;font-weight:700;">${item.w || ''}</div>
          <div style="margin-top:4px;font-size:13px;color:#c0d5f1;">${item.zh || ''}</div>
        </button>
      `).join('')}
    </div>`;
}

function check_choice(button, chosen, correct) {
  document.querySelectorAll('.opt_btn').forEach((item) => { item.onclick = null; });
  if (chosen === correct) {
    button.classList.add('correct');
    add_star(1);
    setTimeout(next_stage, 1000);
  } else {
    button.classList.add('wrong');
    document.querySelectorAll('.opt_btn').forEach((item) => {
      if (item.textContent.toLowerCase().includes(String(correct).toLowerCase())) item.classList.add('correct');
    });
    setTimeout(next_stage, 1400);
  }
}

function render_drag_match() {
  const pair_list = shuffle(vocab_pool).slice(0, 3);
  drag_matched = 0;
  document.getElementById('stage_area').innerHTML = `
    <div class="stage_title">✋ 拖一拖，单词配图片</div>
    <div class="drag_area">
      <div class="drag_words">
        ${shuffle(pair_list).map((item) => `
          <div class="drag_item" draggable="true" data-word="${item.w}" ondragstart="drag_start(event,'${item.w}')">
            ${item.w}
          </div>
        `).join('')}
      </div>
      <div class="drop_zones">
        ${pair_list.map((item) => `
          <div class="drop_zone"
               data-target="${item.w}"
               ondragover="event.preventDefault()"
               ondrop="drag_drop(event,'${item.w}')">
            ${word_to_emoji(item.w)}
          </div>
        `).join('')}
      </div>
    </div>
    <div style="text-align:center;margin-top:10px;color:#bcd8f4;font-size:14px;">把左侧单词拖到右侧正确图标</div>`;
}

function drag_start(event, word) {
  event.dataTransfer.setData('word', word);
}

function drag_drop(event, target) {
  event.preventDefault();
  const zone = event.currentTarget;
  if (zone.classList.contains('matched')) return;
  const word = event.dataTransfer.getData('word');
  if (word !== target) return;
  zone.classList.add('matched');
  zone.innerHTML = `${word_to_emoji(target)}<br><span style="font-size:13px;">${target}</span>`;
  const source = document.querySelector(`.drag_item[data-word="${word}"]`);
  if (source) source.remove();
  drag_matched += 1;
  add_star(1);
  if (drag_matched >= 3) setTimeout(next_stage, 800);
}

function render_phrase_quiz() {
  const usable = phrase_pool.length >= 4 ? phrase_pool : [...phrase_pool, ...phrase_pool].slice(0, 4);
  const answer = usable[Math.floor(Math.random() * usable.length)];
  const options = shuffle([answer, ...shuffle(usable.filter((item) => item.en !== answer.en)).slice(0, 3)]);
  speak_en(answer.en);
  document.getElementById('stage_area').innerHTML = `
    <div class="stage_title">🧠 选出这句话的中文意思</div>
    <div style="text-align:center;color:#f4f8ff;font-size:24px;font-weight:700;">${answer.en}</div>
    <div style="text-align:center;margin-top:8px;">
      <button class="play_btn" onclick="speak_en('${String(answer.en || '').replace(/'/g, "\\'")}')">🔊 读句子</button>
    </div>
    <div class="options_grid">
      ${options.map((item) => `
        <button class="opt_btn" onclick="check_phrase(this,'${String(item.zh || '').replace(/'/g, "\\'")}','${String(answer.zh || '').replace(/'/g, "\\'")}')">
          ${item.zh || '(暂无中文释义)'}
        </button>
      `).join('')}
    </div>`;
}

function check_phrase(button, chosen, correct) {
  document.querySelectorAll('.opt_btn').forEach((item) => { item.onclick = null; });
  if (chosen === correct) {
    button.classList.add('correct');
    add_star(1);
  } else {
    button.classList.add('wrong');
    document.querySelectorAll('.opt_btn').forEach((item) => {
      if (item.textContent.trim() === correct) item.classList.add('correct');
    });
  }
  setTimeout(next_stage, 1200);
}

function render_finish() {
  const max_star = 5;
  const shown_star = Math.min(stars, max_star);
  const star_row = '⭐'.repeat(shown_star) + '☆'.repeat(max_star - shown_star);
  document.getElementById('stage_area').innerHTML = `
    <div class="finish_page">
      <div class="big_stars">${star_row}</div>
      <div class="finish_msg">太棒了！你获得 ${stars} 颗星</div>
      <div class="finish_tip">${stars >= 4 ? '表现超级棒，继续下一本吧！' : '已经很不错，再玩一次会更强！'}</div>
      <div class="finish_links">
        <button class="action_btn" onclick="location.href='../../index.html'">🏠 回到首页</button>
        <button class="action_btn" style="background:#65a7e8;" onclick="location.reload()">🔄 再玩一次</button>
        <button class="action_btn" style="background:#66d6af;" onclick="location.href=reader_url">📖 返回阅读</button>
      </div>
    </div>`;
}

const stages = [render_intro, render_listen_select, render_drag_match, render_phrase_quiz, render_finish];

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

if (vocab_pool.length < 2) {
  document.getElementById('stage_area').innerHTML = `
    <div class="finish_page">
      <div class="finish_msg">当前故事词汇数据不足，先去阅读页学习吧</div>
      <div class="finish_links">
        <button class="action_btn" onclick="location.href=reader_url">📖 返回阅读</button>
        <button class="action_btn" onclick="location.href='../../index.html'">🏠 回到首页</button>
      </div>
    </div>`;
} else {
  stages[0]();
}
</script>
</body>
</html>
